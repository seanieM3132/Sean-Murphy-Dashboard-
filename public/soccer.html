<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050D0A">
<title>Soccer — Sean</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050D0A;--line:rgba(74,222,128,.10);
  --green:#4ADE80;--teal:#7DD3C0;--amber:#E8873A;--gold:#D8B24A;
  --ink:#E6F2EC;--dim:#5F786E;--dimmer:#3B4E47;
  --mono:'JetBrains Mono',monospace;--serif:'Instrument Serif',Georgia,serif;
  --w:1000px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  min-height:100vh;padding:40px 24px 64px;
  background:radial-gradient(1000px 500px at 50% -10%,#0D2419 0%,transparent 60%),var(--bg);
  color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;
}
ul{list-style:none;padding:0;}
button{font-family:inherit;}
input{font-family:inherit;}

/* header */
.c-top{max-width:var(--w);margin:0 auto 20px;}
.c-back{font:500 11px/1 var(--mono);letter-spacing:.14em;color:var(--dim);text-decoration:none;}
.c-back:hover{color:var(--green);}
.c-title{font-family:var(--serif);font-size:clamp(32px,4.6vw,52px);font-weight:400;font-style:italic;margin:14px 0 10px;}
.c-title em{color:var(--green);}
.c-meta{display:flex;align-items:center;font:500 9px var(--mono);letter-spacing:.2em;color:var(--dimmer);}
.c-meta i{width:3px;height:3px;border-radius:50%;background:currentColor;margin:0 12px;opacity:.5;}

/* HERO */
.c-hero{position:relative;overflow:hidden;display:flex;justify-content:space-between;align-items:center;gap:24px;
  max-width:var(--w);margin:0 auto 16px;padding:30px 32px;border-radius:20px;
  border:1px solid rgba(232,135,58,.26);
  background:linear-gradient(115deg,rgba(56,26,10,.75) 0%,rgba(10,23,18,.6) 55%,rgba(6,15,11,.5) 100%);}
.c-pitch{position:absolute;inset:0;width:100%;height:100%;opacity:.055;pointer-events:none;}
.c-pitch rect,.c-pitch line,.c-pitch circle{fill:none;stroke:var(--amber);stroke-width:1.4;}
.c-pitch .c-pitch-f{fill:var(--amber);stroke:none;}
.c-hero-l,.c-hero-r{position:relative;}
.c-eyebrow{font:500 9px var(--mono);letter-spacing:.24em;color:var(--dim);}
.c-eyebrow.is-amber{color:var(--amber);}
.c-opp{font-family:var(--serif);font-weight:400;font-size:clamp(28px,4vw,42px);margin:12px 0 8px;letter-spacing:-.01em;}
.c-kick{font:500 10px var(--mono);letter-spacing:.2em;color:var(--dim);}
.c-hero-r{text-align:right;}
.c-count b{font-family:var(--serif);font-size:clamp(48px,7vw,76px);line-height:.9;color:var(--amber);font-weight:400;}
.c-count span{font:500 10px var(--mono);letter-spacing:.24em;color:var(--amber);opacity:.7;margin-left:8px;}
.c-left{font:400 10px var(--mono);letter-spacing:.06em;color:var(--dim);margin-top:12px;}

/* coach — left border rule, not a card */
.c-coach{display:flex;gap:16px;max-width:var(--w);margin:0 auto 20px;padding:16px 20px;
  border-left:2px solid rgba(74,222,128,.4);border-radius:0 12px 12px 0;background:rgba(16,36,27,.35);}
.c-av{width:36px;height:36px;flex:none;border-radius:10px;border:1px solid rgba(74,222,128,.3);
  display:grid;place-items:center;background:rgba(74,222,128,.06);}
.c-av span{font-family:var(--serif);font-size:18px;color:var(--green);}
.c-cname{font:500 9px var(--mono);letter-spacing:.2em;color:var(--green);}
.c-cname em{font-style:normal;color:var(--dimmer);letter-spacing:.1em;}
.c-clead{font:400 13px/1.65 'Inter',sans-serif;color:var(--ink);opacity:.88;margin-top:7px;max-width:74ch;}
.c-clead.is-hot{color:var(--amber);opacity:1;}

/* tabs — underline, not pill */
.c-tabs{display:flex;gap:28px;max-width:var(--w);margin:0 auto 24px;border-bottom:1px solid var(--line);}
.c-tabs button{display:flex;align-items:center;gap:9px;background:none;border:0;cursor:pointer;padding:0 2px 14px;
  font:500 10px var(--mono);letter-spacing:.2em;color:var(--dim);position:relative;transition:color .2s;}
.c-tabs button em{font-style:normal;color:var(--dimmer);font-weight:400;}
.c-tabs button:hover{color:var(--ink);}
.c-tabs button.is-on{color:var(--green);}
.c-tabs button.is-on:after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:1px;background:var(--green);
  box-shadow:0 0 8px rgba(74,222,128,.7);}
.c-tabs button:focus-visible{outline:2px solid var(--green);outline-offset:3px;border-radius:3px;}

.c-main{max-width:var(--w);margin:0 auto;}

/* week spine */
.c-spine{position:relative;display:flex;justify-content:space-between;margin-bottom:24px;padding:0 10px;}
.c-spine-line{position:absolute;left:18px;right:18px;top:7px;height:1px;background:var(--line);}
.c-node{position:relative;display:flex;flex-direction:column;align-items:center;gap:12px;background:none;border:0;cursor:pointer;padding:0;color:inherit;}
.c-bead{width:11px;height:11px;border-radius:50%;background:var(--bg);border:1px solid var(--dimmer);transition:transform .2s;}
.c-node em{font-style:normal;font:400 9px var(--mono);letter-spacing:.14em;color:var(--dimmer);}
.c-node.is-team .c-bead{border-color:var(--green);}
.c-node.is-solo .c-bead{border-color:var(--teal);}
.c-node.is-past .c-bead{background:currentColor;}
.c-node.is-past.is-team .c-bead{background:var(--green);}
.c-node.is-past.is-solo .c-bead{background:var(--teal);}
.c-node.is-today em{color:var(--green);}
.c-node.is-today .c-bead{box-shadow:0 0 0 4px rgba(74,222,128,.12);}
.c-node.is-match{margin-top:-3px;}
.c-node.is-match .c-bead{width:17px;height:17px;background:var(--amber);border-color:var(--amber);
  box-shadow:0 0 0 5px rgba(232,135,58,.12),0 0 14px rgba(232,135,58,.6);}
.c-node.is-match em{color:var(--amber);}
.c-node.is-sel .c-bead{transform:scale(1.25);}
.c-node.is-sel em{color:var(--ink);}
.c-node:focus-visible{outline:2px solid var(--green);outline-offset:5px;border-radius:4px;}

/* panel */
.c-panel{border:1px solid var(--line);border-radius:18px;background:rgba(16,36,27,.35);}
.c-ph{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;padding:22px 24px 20px;border-bottom:1px solid var(--line);}
.c-pt{font-family:var(--serif);font-style:italic;font-weight:400;font-size:27px;margin-top:10px;}
.c-body{padding:24px;}
.c-field{margin-bottom:26px;}
.c-field:last-child{margin-bottom:0;}
.c-row{display:flex;gap:32px;}
.c-row .c-field{flex:none;}
.c-grow{flex:1 !important;}
.c-lab{font:500 8px var(--mono);letter-spacing:.24em;color:var(--dimmer);margin-bottom:12px;text-transform:uppercase;}
.c-empty{font:400 12px 'Inter',sans-serif;color:var(--dim);margin-bottom:16px;}

.c-chips{display:flex;gap:6px;flex-wrap:wrap;}
.c-chips button{background:none;border:1px solid var(--line);border-radius:20px;padding:9px 15px;cursor:pointer;
  font:400 11px 'Inter',sans-serif;color:var(--dim);transition:all .15s;}
.c-chips button:hover{color:var(--ink);border-color:rgba(255,255,255,.16);}
.c-chips button.is-on{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.35);color:var(--green);}
.c-chips button:focus-visible{outline:2px solid var(--green);outline-offset:2px;}

.c-step{display:flex;align-items:center;gap:3px;width:148px;}
.c-step button{width:32px;height:36px;border-radius:8px;border:1px solid var(--line);background:rgba(255,255,255,.02);
  color:var(--dim);cursor:pointer;font-size:15px;line-height:1;}
.c-step button:hover{color:var(--green);border-color:rgba(74,222,128,.3);}
.c-step button:focus-visible{outline:2px solid var(--green);outline-offset:1px;}
.c-step span{flex:1;text-align:center;font:400 16px var(--mono);color:var(--ink);}

.c-scale{display:flex;gap:0;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
.c-scale button{flex:1;height:36px;background:none;border:0;border-right:1px solid var(--line);cursor:pointer;
  color:var(--dimmer);font:400 12px var(--mono);transition:all .12s;}
.c-scale button:last-child{border-right:0;}
.c-scale button.is-on{background:rgba(216,178,74,.1);color:var(--gold);}
.c-scale button.is-sel{background:var(--gold);color:#1A1204;font-weight:500;}
.c-scale button:focus-visible{outline:2px solid var(--gold);outline-offset:-2px;}
.c-scale.is-wide button.is-on{background:rgba(74,222,128,.09);color:var(--green);}
.c-scale.is-wide button.is-sel{background:var(--green);color:#062015;}

.c-ratebox{display:flex;align-items:center;gap:22px;}
.c-ratenum{font-family:var(--serif);font-size:42px;line-height:1;color:var(--green);flex:none;}
.c-ratenum em{font-style:normal;font:400 12px var(--mono);color:var(--dimmer);margin-left:3px;}
.c-ratebox .c-scale{flex:1;}

.c-readout{display:flex;align-items:center;gap:24px;border-top:1px solid var(--line);padding-top:22px;}
.c-readout b{display:block;font-family:var(--serif);font-size:44px;font-weight:400;color:var(--green);line-height:1;margin-top:8px;}
.c-readout p{font:400 10px/1.7 var(--mono);color:var(--dim);letter-spacing:.03em;max-width:46ch;}

.c-add{display:flex;gap:8px;margin-bottom:6px;}
.c-add input{flex:1;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:9px;
  padding:13px;color:var(--ink);font:400 12px 'Inter',sans-serif;}
.c-add input::placeholder{color:var(--dimmer);}
.c-add input:focus{outline:none;border-color:rgba(74,222,128,.4);}
.c-add button{background:rgba(74,222,128,.09);border:1px solid rgba(74,222,128,.28);color:var(--green);
  border-radius:9px;padding:0 18px;cursor:pointer;font:500 10px var(--mono);letter-spacing:.1em;}
.c-moments li{display:flex;align-items:center;gap:10px;padding:11px 0;border-top:1px solid rgba(255,255,255,.04);}
.c-moments span{flex:1;font:400 12px 'Inter',sans-serif;color:var(--dim);}
.c-moments button{width:22px;height:22px;border-radius:5px;border:1px solid var(--line);background:none;
  color:var(--dim);cursor:pointer;font-size:12px;line-height:1;}
.c-moments button:hover{color:var(--amber);border-color:rgba(232,135,58,.35);}

/* guided session blocks */
.c-sess-h{margin-bottom:20px;}
.c-sess-title{font-family:var(--serif);font-style:italic;font-weight:400;font-size:22px;margin:8px 0 6px;}
.c-sess-dur{font:400 10px var(--mono);color:var(--dim);letter-spacing:.1em;}
.c-blk{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.c-blk-h{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;cursor:pointer;
  background:rgba(255,255,255,.02);border:0;width:100%;color:inherit;font-family:inherit;}
.c-blk-h:hover{background:rgba(255,255,255,.04);}
.c-blk-l{font:500 11px var(--mono);letter-spacing:.12em;color:var(--ink);}
.c-blk-m{font:400 10px var(--mono);color:var(--dim);}
.c-blk-c{font:500 9px var(--mono);color:var(--dimmer);margin-left:auto;margin-right:12px;}
.c-blk-chev{font:400 14px var(--mono);color:var(--dimmer);}
.c-blk-b{padding:0 18px 14px;}
.c-blk-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-top:1px solid rgba(255,255,255,.04);}
.c-blk-row:first-child{border-top:0;}
.c-blk-row.is-done{opacity:.45;}
.c-blk-box{width:20px;height:20px;border-radius:5px;border:1px solid var(--line);display:grid;place-items:center;
  cursor:pointer;background:none;color:var(--dimmer);font-size:11px;flex:none;}
.c-blk-box:hover{border-color:rgba(74,222,128,.4);}
.c-blk-row.is-done .c-blk-box{background:rgba(74,222,128,.15);border-color:rgba(74,222,128,.4);color:var(--green);}
.c-blk-name{font:400 12px 'Inter',sans-serif;color:var(--ink);flex:1;}
.c-blk-reps{font:400 9px var(--mono);color:var(--dim);letter-spacing:.06em;flex:none;}
.c-blk.is-complete .c-blk-l{color:var(--green);}
.c-blk.is-complete{border-color:rgba(74,222,128,.2);background:rgba(74,222,128,.02);}

.c-go{background:var(--green);border:0;color:#062015;border-radius:9px;padding:14px 20px;cursor:pointer;
  font:500 10px var(--mono);letter-spacing:.14em;}
.c-go:disabled{opacity:.22;cursor:not-allowed;}
.c-go:hover:not(:disabled){filter:brightness(1.08);}
.c-ghost{background:none;border:1px solid var(--line);border-radius:8px;padding:12px 15px;cursor:pointer;
  font:500 9px var(--mono);letter-spacing:.12em;color:var(--dim);}
.c-ghost:hover{color:var(--green);border-color:rgba(74,222,128,.3);}
.c-go:focus-visible,.c-ghost:focus-visible{outline:2px solid var(--green);outline-offset:2px;}

.c-sess-progress{display:flex;align-items:center;gap:14px;margin-top:18px;padding:16px 20px;
  border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.02);}
.c-sess-progress-bar{flex:1;height:6px;border-radius:3px;background:rgba(255,255,255,.06);overflow:hidden;}
.c-sess-progress-fill{height:100%;border-radius:3px;background:var(--green);transition:width .3s;}
.c-sess-progress-txt{font:500 10px var(--mono);color:var(--dim);letter-spacing:.1em;flex:none;}

.c-foot{display:flex;justify-content:space-between;max-width:var(--w);margin:44px auto 0;padding-top:18px;
  border-top:1px solid var(--line);font:400 9px var(--mono);letter-spacing:.18em;color:var(--dimmer);}

@media(max-width:760px){
  body{padding:24px 16px 48px;}
  .c-hero{flex-direction:column;align-items:flex-start;gap:20px;padding:24px;}
  .c-hero-r{text-align:left;}
  .c-coach{flex-direction:column;gap:12px;}
  .c-row{flex-direction:column;gap:0;}
  .c-row .c-field{flex:1 !important;}
  .c-readout{flex-direction:column;align-items:flex-start;gap:14px;}
  .c-ratebox{flex-direction:column;align-items:flex-start;gap:14px;}
  .c-ratebox .c-scale{width:100%;}
  .c-foot{flex-direction:column;gap:8px;}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>

<header class="c-top">
  <a href="/train.html" class="c-back">&#8592; Train</a>
  <h1 class="c-title">Soccer, <em>Sean</em></h1>
  <p class="c-meta" id="meta"></p>
</header>

<section class="c-hero" id="hero"></section>

<section class="c-coach" id="coach"></section>

<nav class="c-tabs" role="tablist" id="tabs"></nav>

<main class="c-main" id="main"></main>

<footer class="c-foot">
  <span>SESSION LOAD = RPE &times; MINUTES</span>
  <span>BALL WORK ROTATION &middot; BRAIN-PLANNED</span>
</footer>

<script>
(function(){
'use strict';

/* ═══ CONFIG ═══════════════════════════════════════════════════ */
var TODAY = new Date().getDay(); // 0=Sun in JS
// Convert to 0=Mon format
TODAY = TODAY === 0 ? 6 : TODAY - 1;

var MATCH = { round: 12, opponent: "Bentleigh United Cobras FC", home: true, venue: "Reema Reserve" };
var WEAK_FOOT = 58;

/* === CONFIG READERS (shared with dashboard/plan/gym) === */
function loadGameDay() {
  try { return JSON.parse(localStorage.getItem('planner-gameday')) || {}; } catch(e) { return {}; }
}
function loadTeamDays() {
  try { return JSON.parse(localStorage.getItem('planner-teamdays')) || {}; } catch(e) { return {}; }
}

function buildWeek() {
  var cfg = loadGameDay();
  var teamCfg = loadTeamDays();
  var gameDays = cfg.days || [5];
  var isBye = cfg.status === 'bye';
  var teamDays = teamCfg.days || [1, 3];
  var DAY_NAMES = ["MON","TUE","WED","THU","FRI","SAT","SUN"];
  var week = [];
  for (var i = 0; i < 7; i++) {
    var entry = { d: DAY_NAMES[i] };
    if (gameDays.indexOf(i) >= 0 && !isBye) {
      entry.kind = 'match'; entry.label = 'Round ' + MATCH.round; entry.at = '15:00';
    } else if (gameDays.indexOf(i) >= 0 && isBye) {
      entry.kind = 'rest'; entry.label = 'Bye Week';
    } else if (teamDays.indexOf(i) >= 0 && !isBye) {
      entry.kind = 'team'; entry.label = 'Team training'; entry.at = '18:00'; entry.mins = 90;
    } else if (i === 6) {
      entry.kind = 'rest'; entry.label = 'Rest & mobility';
    } else {
      // Check if prematch or recovery
      var isPre = false, isRec = false;
      if (!isBye) {
        for (var g = 0; g < gameDays.length; g++) {
          if (i === (gameDays[g] + 6) % 7) isPre = true;
          if (i === (gameDays[g] + 1) % 7) isRec = true;
        }
      }
      if (isRec) {
        entry.kind = 'rest'; entry.label = 'Recovery';
      } else if (isPre) {
        entry.kind = 'solo'; entry.label = 'Individual \u00b7 light';
      } else {
        entry.kind = 'solo'; entry.label = 'Individual';
      }
    }
    week.push(entry);
  }
  MATCH.at = week.find(function(w){ return w.kind === 'match'; }) ?
    week.find(function(w){ return w.kind === 'match'; }).d + ' 15:00' : 'TBD';
  return week;
}

var WEEK = buildWeek();

var KIND = {
  team:  { c: "#4ADE80", t: "TEAM" },
  solo:  { c: "#7DD3C0", t: "INDIVIDUAL" },
  match: { c: "#E8873A", t: "MATCH" },
  rest:  { c: "#3B4E47", t: "REST" }
};

var THEMES = ["Possession", "Pressing", "Set pieces", "Shape", "Scrimmage", "Transition", "Finishing", "Crossing"];
var POSITIONS = ["CDM", "CM", "RB", "LB", "CB"];

var DAYS = ["MON","TUE","WED","THU","FRI","SAT","SUN"];

/* ═══ BALL WORK ROTATION ══════════════════════════════════════ */
var WARMUP = [
  { n: 'Toe taps', d: '1 min' },
  { n: 'Inside rolls', d: '1 min' },
  { n: 'Sole rolls', d: '1 min' },
  { n: 'Foundation', d: '2 min' },
  { n: 'Juggling (aim 50+)', d: '5 min' }
];

var SET_A = { label: 'Set A \u2014 Joner Style', mins: 10, drills: [
  { n: 'Sole drag inside push', d: '4\u00d720s' },
  { n: 'Inside-outside cut', d: '4\u00d720s' },
  { n: 'Iniesta', d: '4\u00d720s' },
  { n: 'V-drag', d: '4\u00d720s' },
  { n: 'La Croqueta', d: '4\u00d720s' }
]};

var SET_B = { label: 'Set B \u2014 Takuya Sole Skills', mins: 10, drills: [
  { n: 'Sole roll stepover', d: '4\u00d720s' },
  { n: 'Fake shot sole pull', d: '4\u00d720s' },
  { n: 'Matthews cut', d: '4\u00d720s' },
  { n: 'Elastico', d: '4\u00d720s' },
  { n: 'Berbatov wall drill', d: '4\u00d730s' }
]};

var SET_C = { label: 'Set C \u2014 Cognitive', mins: 10, drills: [
  { n: 'Sole drags + tennis ball catch', d: '4\u00d730s' },
  { n: 'Coerver pull-push speed test', d: '4\u00d720s' },
  { n: 'Freestyle combo chains', d: '4\u00d730s' }
]};

var FIRST_TOUCH = { label: 'First Touch \u2014 CM', mins: 8, drills: [
  { n: 'Wall pass open body', d: '3\u00d710 R/L' },
  { n: 'Back foot reception', d: '3\u00d710 R/L' },
  { n: 'Ground receive turn & play', d: '3\u00d78 each' },
  { n: 'Chest control volley', d: '3\u00d78' }
]};

var PASSING = { label: 'Passing & Switching', mins: 8, drills: [
  { n: 'Short pass accuracy', d: '3\u00d710 R/L' },
  { n: 'Driven pass', d: '3\u00d78 R/L' },
  { n: 'Lofted switch', d: '3\u00d76 R/L' },
  { n: 'One-two off wall', d: '4\u00d730s' },
  { n: 'Ping long ball', d: '3\u00d78 R/L' }
]};

var WEAK_FOOT_BLOCK = { label: 'Weak Foot Block', mins: 5, drills: [
  { n: 'Inside-outside rolls (LEFT)', d: '1 min' },
  { n: 'Wall passing (LEFT)', d: '2 min' },
  { n: 'Sole drag inside push (LEFT)', d: '1 min' },
  { n: 'Driven pass to target (LEFT)', d: '1 min' }
]};

var LONG_THROWS = { label: 'Long Throw Training', mins: 8, drills: [
  { n: 'Arm circles + light throws', d: '2 min' },
  { n: 'Standing throws', d: '3\u00d75' },
  { n: 'One-step throws', d: '3\u00d75' },
  { n: 'Run-up throws', d: '3\u00d75' },
  { n: 'Max attempts', d: '5\u00d71' }
]};

var PRE_TEAM = { label: 'Pre-team Touches', mins: 10, drills: [
  { n: 'Toe taps', d: '1 min' },
  { n: 'Inside rolls', d: '1 min' },
  { n: 'Sole rolls', d: '1 min' },
  { n: 'Foundation', d: '2 min' },

]};

var PRE_GAME = { label: 'Pre-game Warm-up Touches', mins: 5, drills: [
  { n: 'Passing pairs', d: '2 min' },
  { n: 'Shooting', d: '2 min' },
  { n: 'Coerver pull-push', d: '1 min' }
]};

// Full individual session templates (rotate through)
var SOLO_SESSIONS = [
  { title: 'Set A + Passing & Switching + Long Throws', blocks: [
    { label: 'Warm-up', mins: 5, drills: WARMUP }, SET_A, PASSING, LONG_THROWS
  ]},
  { title: 'Set B + Weak Foot Block + Long Throws', blocks: [

  ]},

  ]},
  { title: 'Set A + First Touch', blocks: [

];

// Build SESSIONS dynamically based on WEEK
function buildSessions() {
  var sessions = {};
  var soloIdx = 0;
  for (var i = 0; i < 7; i++) {
    var w = WEEK[i];
    if (w.kind === 'team') {
      sessions[i] = { title: 'Pre-team Touches', blocks: [PRE_TEAM] };
    } else if (w.kind === 'match') {
      sessions[i] = { title: 'Pre-game Warm-up', blocks: [PRE_GAME] };
    } else if (w.kind === 'solo') {
      sessions[i] = SOLO_SESSIONS[soloIdx % SOLO_SESSIONS.length];
      soloIdx++;
    } else {
      sessions[i] = { title: 'Rest Day', blocks: [] };
    }
  }
  return sessions;
}
var SESSIONS = buildSessions();

/* ═══ Khabib ═══════════════════════════════════════════════════ */
function khabib(today) {
  var m = -1;
  for (var i = 0; i < WEEK.length; i++) { if (WEEK[i].kind === "match") { m = i; break; } }
  var days = m === -1 ? null : m - today;
  if (days === 0) return { tone: "hot", line: "Match today. Nothing on this page matters now. Warm up, play." };
  if (days === 1) return { tone: "hot", line: "Match tomorrow. Keep tonight light \u2014 touch and shape, nothing that leaves you sore." };
  if (days === 2) return { tone: "good", line: "Two days out. Sharp and short. Volume was yesterday\u2019s job." };
  if (days === null || days < 0) return { tone: "good", line: "No match this week. Double down \u2014 weak foot is at " + WEAK_FOOT + "% and it won\u2019t fix itself in season." };
  return { tone: "good", line: "Match in " + days + " days. Load now, sharpen later." };
}

/* ═══ STATE ═══════════════════════════════════════════════════ */
var state = {
  tab: "team",
  sel: TODAY,
  done: {},       // 'blockIdx-drillIdx' -> true
  openBlock: 0,   // which block is expanded
  openProto: null, // which pre-training protocol block is expanded
  protoDone: {},   // 'blockIdx-itemIdx' -> true
  logs: {},       // i -> { themes: {}, rpe, mins }
  match: { pos: "CDM", mins: 90, rating: 0, goals: 0, assists: 0, moments: [] }
};

// Init logs
for (var i = 0; i < WEEK.length; i++) {
  state.logs[i] = { themes: {}, rpe: 7, mins: WEEK[i].mins || 60 };
}

/* ═══ HELPERS ═════════════════════════════════════════════════ */
function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function weekLoad() {
  var total = 0;
  for (var i = 0; i < WEEK.length; i++) {
    if (WEEK[i].kind === "team" && Object.keys(state.logs[i].themes).length > 0) {
      total += state.logs[i].rpe * state.logs[i].mins;
    }
  }
  return total;
}

/* ═══ RENDER ═════════════════════════════════════════════════ */
function render() {
  var k = khabib(TODAY);

  // Coach
  document.getElementById("coach").innerHTML =
    '<div class="c-av"><span>K</span></div>' +

  // Main
  var main = document.getElementById("main");
  if (state.tab === "team") {

/* ═══ SPINE ══════════════════════════════════════════════════ */
function renderSpine() {
  var h = '<nav class="c-spine" aria-label="Week"><span class="c-spine-line"></span>';
  for (var i = 0; i < WEEK.length; i++) {
    var d = WEEK[i];
    var cls = 'c-node is-' + d.kind;
    if (i === state.sel) cls += ' is-sel';
    if (i === TODAY) cls += ' is-today';
    if (i < TODAY) cls += ' is-past';
    h += '<button class="' + cls + '" data-day="' + i + '" aria-pressed="' + (i === state.sel) + '" aria-label="' + d.d + ' \u2014 ' + esc(d.label) + '">';
    h += '<span class="c-bead"></span><em>' + d.d + '</em></button>';
  }
  h += '</nav>';
  return h;
}

/* ═══ TEAM PANEL ═════════════════════════════════════════════ */
function renderTeamPanel() {
  var day = WEEK[state.sel];
  var h = '<section class="c-panel"><header class="c-ph"><div>';
  h += '<p class="c-eyebrow" style="color:' + KIND[day.kind].c + '">' + KIND[day.kind].t;
  if (day.at) h += ' \u00b7 ' + day.at;
  if (state.sel === TODAY) h += ' \u00b7 TODAY';
  h += '</p><h2 class="c-pt">' + esc(day.label) + '</h2></div>';
  if (state.sel !== TODAY) h += '<button class="c-ghost" data-backtoday>Back to today</button>';
  h += '</header><div class="c-body">';

  if (day.kind === "team") {
    h += renderTraining();
  } else if (day.kind === "match") {
    h += renderMatch();
  } else if (day.kind === "solo") {
    h += '<p class="c-empty">Individual work lives in the next tab.</p>';
    h += '<button class="c-go" data-gotosolo>Open individual</button>';
  } else {
    h += '<p class="c-empty">Rest. It is a session. Treat it like one.</p>';
  }

  h += '</div></section>';
  return h;
}

/* ═══ TRAINING ═══════════════════════════════════════════════ */
var PRE_TRAINING = [
  { label: 'GOATA GROUNDWORK (5 min)', items: [
    'Ground Hip Stretch \u2014 45-60s each side, keep IABH',
    'Child Rocker \u2014 60s \u00d7 3, head stays up',
    'Toe Tuck Rocker \u2014 60s \u00d7 3, heels open'
  ]},
  { label: 'PEP / ACL PREVENTION (15-20 min) \u2014 reduces ACL injuries 70%', items: [
    'Avoidance: Jog straight 1 min \u00d7 3, side shuttle 1 min, backward run 1 min',
    'Flexibility: Calf stretch, quad stretch, figure-4 hamstring, inner thigh, hip flexor (30s each)',
    'Strength: Walking lunges 1 min, single-leg bridge 30s/side, single toe raise 30s/side',
    'Plyometrics: Side-to-side hops 20 reps, front-back hops 30s, single-leg hops 30s/side, scissor jumps 30s',

];

function renderTraining() {
  var log = state.logs[state.sel];
  var load = Math.round(log.rpe * log.mins);
  var h = '';

  // Pre-training protocols
  h += '<div class="c-field"><p class="c-lab">Pre-training protocol</p>';
  PRE_TRAINING.forEach(function(block, bi) {
    var key = 'pt-' + bi;
    var isOpen = state.openProto === bi;
    var allDone = block.items.every(function(_, ii) { return state.protoDone[bi + '-' + ii]; });
    h += '<div class="c-blk' + (allDone ? ' is-complete' : '') + '" style="margin-bottom:8px">';
    h += '<button class="c-blk-h" data-toggleproto="' + bi + '">';
    h += '<span class="c-blk-l">' + esc(block.label) + '</span>';
    h += '<span class="c-blk-chev">' + (isOpen ? '\u2212' : '+') + '</span>';
    h += '</button>';
    if (isOpen) {
      h += '<div class="c-blk-b">';
      block.items.forEach(function(item, ii) {
        var dk = bi + '-' + ii;
        var done = !!state.protoDone[dk];
        h += '<div class="c-blk-row' + (done ? ' is-done' : '') + '">';
        h += '<button class="c-blk-box" data-checkproto="' + dk + '">' + (done ? '\u2713' : '') + '</button>';
        h += '<span class="c-blk-name">' + esc(item) + '</span>';
        h += '</div>';
      });
      h += '</div>';
    }
    h += '</div>';
  });
  h += '</div>';

  // Themes
  h += '<div class="c-field"><p class="c-lab">Worked on</p><div class="c-chips">';
  THEMES.forEach(function(t) {
    h += '<button class="' + (log.themes[t] ? 'is-on' : '') + '" data-theme="' + esc(t) + '" aria-pressed="' + !!log.themes[t] + '">' + esc(t) + '</button>';
  });
  h += '</div></div>';

  // Minutes + RPE
  h += '<div class="c-row">';
  h += '<div class="c-field"><p class="c-lab">Minutes</p>';
  h += '<div class="c-step"><button data-stepm="-5">\u2212</button><span>' + log.mins + '</span><button data-stepm="5">+</button></div>';
  h += '</div>';
  h += '<div class="c-field c-grow"><p class="c-lab">Session RPE</p><div class="c-scale">';
  [4,5,6,7,8,9,10].forEach(function(r) {
    var cls = log.rpe === r ? 'is-sel' : log.rpe > r ? 'is-on' : '';
    h += '<button class="' + cls + '" data-rpe="' + r + '">' + r + '</button>';
  });
  h += '</div></div></div>';

  // Readout
  h += '<div class="c-readout"><div><span class="c-lab">Session load</span><b>' + (load || '\u2014') + '</b></div>';
  h += '<p>RPE \u00d7 minutes. The number the Peak page reads \u2014 Garmin can\u2019t score a football session.</p></div>';

  return h;
}

  var h = '';

  // Position + Minutes
  h += '<div class="c-row"><div class="c-field"><p class="c-lab">Position</p><div class="c-chips">';

  h += '<div class="c-field"><p class="c-lab">Minutes</p>';
  h += '<div class="c-step"><button data-matchm="-5">\u2212</button><span>' + m.mins + '</span><button data-matchm="5">+</button></div>';
  h += '</div></div>';

  // Rating
  h += '<div class="c-field"><p class="c-lab">Rating</p><div class="c-ratebox">';
  h += '<span class="c-ratenum">' + (m.rating || '\u2014') + '<em>/10</em></span>';
  h += '<div class="c-scale is-wide">';
  for (var r = 1; r <= 10; r++) {
    var cls = m.rating === r ? 'is-sel' : m.rating > r ? 'is-on' : '';
    h += '<button class="' + cls + '" data-rate="' + r + '" aria-label="Rate ' + r + '">' + r + '</button>';
  }
  h += '</div></div></div>';

  // Goals + Assists
  h += '<div class="c-row">';
  h += '<div class="c-field"><p class="c-lab">Goals</p><div class="c-step"><button data-matchg="-1">\u2212</button><span>' + m.goals + '</span><button data-matchg="1">+</button></div></div>';
  h += '<div class="c-field"><p class="c-lab">Assists</p><div class="c-step"><button data-matcha="-1">\u2212</button><span>' + m.assists + '</span><button data-matcha="1">+</button></div></div>';
  h += '</div>';

  // Key moments
  h += '<div class="c-field"><p class="c-lab">Key moments</p>';
  h += '<div class="c-add"><input id="momentInput" placeholder="Lost the ball turning into pressure, 62\u2032" aria-label="Key moment">';

    m.moments.forEach(function(x, i) {
      h += '<li><span>' + esc(x) + '</span><button data-rmmoment="' + i + '" aria-label="Remove">\u00d7</button></li>';
    });
  } else {
    h += '<p class="c-empty">The moments you remember are the ones worth training.</p>';
  }
  h += '</ul></div>';

  return h;

/* ═══ INDIVIDUAL PANEL (GUIDED DAILY SESSION) ════════════════ */
function renderIndividualPanel() {
  var sess = SESSIONS[TODAY];
  var totalMins = 0;
  for (var b = 0; b < sess.blocks.length; b++) { totalMins += sess.blocks[b].mins; }

  // Count done drills
  var totalDrills = 0;
  var doneDrills = 0;
  for (var b = 0; b < sess.blocks.length; b++) {
    for (var d = 0; d < sess.blocks[b].drills.length; d++) {
      totalDrills++;
      if (state.done[b + '-' + d]) doneDrills++;
    }
  }
  var pct = totalDrills > 0 ? Math.round((doneDrills / totalDrills) * 100) : 0;

  var h = '<section class="c-panel"><header class="c-ph"><div>';
  h += '<p class="c-eyebrow" style="color:var(--teal)">GUIDED SESSION \u00b7 ' + DAYS[TODAY] + '</p>';
  h += '<div class="c-sess-h">';
  h += '<h2 class="c-sess-title">' + esc(sess.title) + '</h2>';
  h += '<p class="c-sess-dur">' + totalMins + ' MIN \u00b7 ' + sess.blocks.length + ' BLOCK' + (sess.blocks.length === 1 ? '' : 'S') + '</p>';
  h += '</div>';
  h += '</div></header><div class="c-body">';

  // Blocks
  for (var b = 0; b < sess.blocks.length; b++) {
    var blk = sess.blocks[b];
    var isOpen = state.openBlock === b;

    // Check if block is complete
    var blockDone = true;
    for (var d = 0; d < blk.drills.length; d++) {
      if (!state.done[b + '-' + d]) { blockDone = false; break; }
    }
    var blockDoneCount = 0;
    for (var d = 0; d < blk.drills.length; d++) {
      if (state.done[b + '-' + d]) blockDoneCount++;
    }

    h += '<div class="c-blk' + (blockDone ? ' is-complete' : '') + '">';
    h += '<button class="c-blk-h" data-toggleblk="' + b + '">';
    h += '<span class="c-blk-l">' + esc(blk.label) + '</span>';
    h += '<span class="c-blk-c">' + blockDoneCount + '/' + blk.drills.length + '</span>';
    h += '<span class="c-blk-m">' + blk.mins + ' min</span>';
    h += '<span class="c-blk-chev">' + (isOpen ? '\u2212' : '+') + '</span>';
    h += '</button>';

    if (isOpen) {
      h += '<div class="c-blk-b">';
      for (var d = 0; d < blk.drills.length; d++) {
        var dr = blk.drills[d];
        var key = b + '-' + d;
        var isDone = !!state.done[key];
        h += '<div class="c-blk-row' + (isDone ? ' is-done' : '') + '">';
        h += '<button class="c-blk-box" data-check="' + key + '" aria-label="Mark done">' + (isDone ? '\u2713' : '') + '</button>';
        h += '<span class="c-blk-name">' + esc(dr.n) + '</span>';
        h += '<span class="c-blk-reps">' + esc(dr.d) + '</span>';
        h += '</div>';
      }
      h += '</div>';
    }

    h += '</div>';
  }

  // Progress bar
  h += '<div class="c-sess-progress">';
  h += '<div class="c-sess-progress-bar"><div class="c-sess-progress-fill" style="width:' + pct + '%"></div></div>';
  h += '<span class="c-sess-progress-txt">' + doneDrills + '/' + totalDrills + ' \u00b7 ' + pct + '%</span>';
  h += '</div>';

  h += '</div></section>';
  return h;
}

/* ═══ BIND ═══════════════════════════════════════════════════ */
function bindAll() {
  // Tabs
  document.querySelectorAll('[data-stab]').forEach(function(btn) {
    btn.addEventListener('click', function() { state.tab = this.dataset.stab; render(); });
  });

  // Spine days
  document.querySelectorAll('[data-day]').forEach(function(btn) {
    btn.addEventListener('click', function() { state.sel = parseInt(this.dataset.day); render(); });
  });

  // Back to today
  var bt = document.querySelector('[data-backtoday]');
  if (bt) bt.addEventListener('click', function() { state.sel = TODAY; render(); });

  // Go to solo
  var gs = document.querySelector('[data-gotosolo]');
  if (gs) gs.addEventListener('click', function() { state.tab = 'solo'; render(); });

  // Theme chips
  document.querySelectorAll('[data-theme]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var t = this.dataset.theme;
      var log = state.logs[state.sel];
      if (log.themes[t]) { delete log.themes[t]; } else { log.themes[t] = true; }
      render();
    });
  });

  // Minutes stepper
  document.querySelectorAll('[data-stepm]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var d = parseInt(this.dataset.stepm);
      var log = state.logs[state.sel];
      log.mins = Math.max(0, Math.min(180, log.mins + d));
      render();
    });
  });

  // RPE scale
  document.querySelectorAll('[data-rpe]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      state.logs[state.sel].rpe = parseInt(this.dataset.rpe);
      render();
    });
  });

  // Position
  document.querySelectorAll('[data-pos]').forEach(function(btn) {
    btn.addEventListener('click', function() { state.match.pos = this.dataset.pos; render(); });
  });

  // Match minutes
  document.querySelectorAll('[data-matchm]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      state.match.mins = Math.max(0, Math.min(120, state.match.mins + parseInt(this.dataset.matchm)));
      render();
    });
  });

  // Rating
  document.querySelectorAll('[data-rate]').forEach(function(btn) {
    btn.addEventListener('click', function() { state.match.rating = parseInt(this.dataset.rate); render(); });
  });

  // Goals
  document.querySelectorAll('[data-matchg]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      state.match.goals = Math.max(0, Math.min(9, state.match.goals + parseInt(this.dataset.matchg)));
      render();
    });
  });

  // Assists
  document.querySelectorAll('[data-matcha]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      state.match.assists = Math.max(0, Math.min(9, state.match.assists + parseInt(this.dataset.matcha)));
      render();
    });
  });

  // Add moment
  var am = document.querySelector('[data-addmoment]');
  if (am) am.addEventListener('click', addMoment);
  var mi = document.getElementById('momentInput');
  if (mi) mi.addEventListener('keydown', function(e) { if (e.key === 'Enter') addMoment(); });

  // Remove moment
  document.querySelectorAll('[data-rmmoment]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      state.match.moments.splice(parseInt(this.dataset.rmmoment), 1);
      render();
    });
  });

  // Toggle block
  document.querySelectorAll('[data-toggleblk]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var idx = parseInt(this.dataset.toggleblk);
      state.openBlock = state.openBlock === idx ? -1 : idx;
      render();
    });
  });

  // Drill checkboxes
  document.querySelectorAll('[data-check]').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var key = this.dataset.check;
      if (state.done[key]) { delete state.done[key]; } else { state.done[key] = true; }
      render();
    });
  });

  // Pre-training protocol toggles
  document.querySelectorAll('[data-toggleproto]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var idx = parseInt(this.dataset.toggleproto);
      state.openProto = state.openProto === idx ? null : idx;
      render();
    });
  });

  // Pre-training protocol checkboxes
  document.querySelectorAll('[data-checkproto]').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var key = this.dataset.checkproto;
      if (state.protoDone[key]) { delete state.protoDone[key]; } else { state.protoDone[key] = true; }
      render();
    });
  });
}

function addMoment() {
  var inp = document.getElementById('momentInput');
  if (!inp) return;
  var v = inp.value.trim();
  if (v) { state.match.moments.push(v); render(); }
}

// Initial render
render();

})();
</script>
</body>
</html>
