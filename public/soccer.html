<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050D0A">
<title>Soccer — Sean</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#050D0A;--line:rgba(74,222,128,.10);--green:#4ADE80;--teal:#7DD3C0;--amber:#E8873A;--gold:#D8B24A;--violet:#9C8ADE;
  --ink:#E6F2EC;--dim:#5F786E;--dimmer:#3B4E47;--mono:'JetBrains Mono',monospace;--serif:'Instrument Serif',Georgia,serif;--w:1060px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;padding:26px 20px 40px;background:radial-gradient(900px 460px at 50% -6%,rgba(74,222,128,.04),transparent 62%),var(--bg);
  color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
ul{list-style:none;padding:0;} button{font-family:inherit;cursor:pointer;}
.mono{font:500 8px var(--mono);letter-spacing:.22em;color:var(--dim);}

.s-top{max-width:var(--w);margin:0 auto 20px;}
.s-top h1{font-family:var(--serif);font-size:30px;font-weight:400;}
.s-top h1 em{font-style:italic;color:var(--green);}
.s-top .sub{margin-top:7px;font:500 8px var(--mono);letter-spacing:.22em;color:var(--dim);}

.s-tabs{max-width:var(--w);margin:0 auto 16px;display:flex;gap:3px;border:1px solid var(--line);border-radius:10px;padding:3px;background:rgba(10,23,18,.5);}
.s-tabs button{flex:1;background:none;border:0;padding:10px 6px;border-radius:7px;font:500 8px var(--mono);letter-spacing:.12em;color:var(--dim);transition:all .2s;}
.s-tabs button:hover{color:var(--ink);}
.s-tabs button.is-on{background:rgba(74,222,128,.09);color:var(--green);}

.blk{max-width:var(--w);margin:0 auto 16px;border:1px solid var(--line);border-left:3px solid var(--green);border-radius:16px;padding:20px 24px;background:rgba(6,15,11,.5);}
.blk h2{font-family:var(--serif);font-size:24px;font-weight:400;margin-bottom:4px;}
.blk .purpose{font:500 8px var(--mono);letter-spacing:.2em;color:var(--dim);margin-bottom:14px;}
.blk .note{font:400 10px/1.6 'Inter',sans-serif;color:var(--dimmer);margin-bottom:12px;max-width:70ch;}

.drill{display:grid;grid-template-columns:1fr 120px 60px;gap:12px;align-items:center;padding:8px 0;border-top:1px solid rgba(255,255,255,.04);}
.drill .nm{font:400 12px 'Inter',sans-serif;color:var(--ink);}
.drill .nm .cue{display:block;font:400 9px/1.4 'Inter',sans-serif;color:var(--dimmer);margin-top:2px;}
.drill .rx{font:400 9px var(--mono);color:var(--green);text-align:right;}
.drill .ft{font:400 9px var(--mono);color:var(--dimmer);text-align:right;}

.grp{margin-top:16px;}
.grp-label{font:500 8px var(--mono);letter-spacing:.22em;color:var(--ink);text-transform:uppercase;margin-bottom:8px;}

@media(max-width:640px){
  body{padding:20px 14px 36px;}
  .drill{grid-template-columns:1fr auto;gap:8px;}
  .drill .ft{display:none;}
}
</style>
</head>
<body>

<header class="s-top">
  <h1>Soccer, <em>Sean</em></h1>
  <p class="sub">TECHNICAL TRAINING &middot; CM / CDM &middot; BALL EVERY DAY</p>
</header>

<nav class="s-tabs" id="tabs"></nav>
<div id="content"></div>

<script>
(function(){
'use strict';

var SESSIONS = {

full: {
  label: 'Full Session',
  desc: '30-45 min. Ball mastery + first touch + passing + weak foot + long throws.',
  blocks: [
    {
      title: 'Warm-Up Touches', purpose: '5 MIN', note: 'Light and rhythmic. Wake up the feet.',
      drills: [
        { n:'Toe taps on ball', rx:'30 sec', ft:'Both', cue:'Light and quick. Stay on balls of feet.' },
        { n:'Inside-inside rolls', rx:'30 sec', ft:'Both', cue:'Roll ball side to side. Low center of gravity.' },
        { n:'Sole rolls forward/back', rx:'30s R + 30s L', ft:'Each', cue:'Pull back with sole, push forward with laces.' },
        { n:'Foundation (ball between feet)', rx:'30 sec', ft:'Both', cue:'Inside R \u2192 inside L. Tight. Head up.' },
        { n:'Freestyle juggling', rx:'2 min', ft:'Both', cue:'Mix feet, thighs, head. Target: 50+ without drop.' }
      ]
    },
    {
      title: 'Ball Mastery', purpose: '10 MIN \u00B7 SPEED OF FEET', note: 'Rotate sets A/B/C every 2 weeks. 4 \u00D7 20 sec per drill, 10 sec rest.',
      groups: [
        { label: 'Set A \u2014 Joner Football (Weeks 1-2)', drills: [
          { n:'Sole drag \u2192 inside push', rx:'4\u00D720s', ft:'R then L', cue:'Drag back, push forward. SPEED.' },
          { n:'Inside-outside cut', rx:'4\u00D720s', ft:'R then L', cue:'Inside across body, outside to push away.' },
          { n:'Iniesta (sole drag behind standing leg)', rx:'4\u00D720s', ft:'R then L', cue:'Drag behind, pop out. Head UP.' },
          { n:'V-drag', rx:'4\u00D720s', ft:'R then L', cue:'Pull back, push 45\u00B0 with inside. Explosive.' },
          { n:'La Croqueta (inside-inside)', rx:'4\u00D720s', ft:'Both', cue:'Quick succession. Tight space skill.' }
        ]},
        { label: 'Set B \u2014 Takuya Sole Skills (Weeks 3-4)', drills: [
          { n:'Sole roll stepover', rx:'4\u00D720s', ft:'R then L', cue:'Roll across, stepover, push opposite.' },
          { n:'Fake shot \u2192 sole pull', rx:'4\u00D720s', ft:'R then L', cue:'Wind up, pull back with sole.' },
          { n:'Matthews cut (outside hook)', rx:'4\u00D720s', ft:'R then L', cue:'Push outside, sharp cut inside.' },
          { n:'Elastico', rx:'4\u00D720s', ft:'R then L', cue:'Outside \u2192 inside flick. Whip ankle.' },
          { n:'Berbatov wall drill', rx:'4\u00D730s', ft:'Both', cue:'Pass wall, first touch, pass. Rhythm.' }
        ]},
        { label: 'Set C \u2014 Cognitive (Weeks 5+)', drills: [
          { n:'Sole drags + tennis ball catch', rx:'4\u00D730s', ft:'Both', cue:'Partner tosses tennis ball. EYES OFF BALL.' },
          { n:'Coerver pull-push speed test', rx:'4\u00D720s', ft:'R then L', cue:'Count reps. Beat your number.' },
          { n:'Ball mastery + color call', rx:'4\u00D730s', ft:'Both', cue:'Partner holds colored cones. Call while mastering.' },
          { n:'Freestyle combo chains', rx:'4\u00D730s', ft:'Both', cue:'Chain 3 skills. No stopping.' }
        ]}
      ]
    },
    {
      title: 'First Touch \u2014 CM Specific', purpose: '5-8 MIN',
      note: 'Know where you\'re playing BEFORE the ball arrives. Scan \u2192 shoulder check \u2192 receive \u2192 play.',
      drills: [
        { n:'Wall pass \u2192 open body first touch', rx:'3\u00D710 ea ft', ft:'R + L', cue:'Open hips, receive half-turn. Head up BEFORE ball.' },
        { n:'Wall pass \u2192 back foot reception', rx:'3\u00D710 ea ft', ft:'R + L', cue:'Ball across body, back foot. Creates space.' },
        { n:'Chest control \u2192 volley pass', rx:'3\u00D78', ft:'Both', cue:'Chest down, volley to target.' },
        { n:'Ground receive \u2192 turn & play', rx:'3\u00D78 ea side', ft:'Both', cue:'Already turning. One fluid motion.' },
        { n:'Lofted \u2192 thigh/chest \u2192 pass', rx:'3\u00D76', ft:'Both', cue:'Control high ball, set, pass.' }
      ]
    },
    {
      title: 'Passing & Switching', purpose: '5-8 MIN',
      note: '7mlc Ping: Plant foot at target, laces, angle foot out. Chop down for backspin.',
      drills: [
        { n:'Short pass accuracy (5m)', rx:'3\u00D710 ea ft', ft:'R + L', cue:'Inside foot. Hit base of cone.' },
        { n:'Driven pass (15-20m)', rx:'3\u00D78 ea ft', ft:'R + L', cue:'Lock ankle, strike center. Ground. FIRM.' },
        { n:'Lofted switch (25-30m)', rx:'3\u00D76 ea ft', ft:'R + L', cue:'Lean back, laces under ball.' },
        { n:'One-two off wall', rx:'4\u00D730s', ft:'Both', cue:'Pass \u2192 move \u2192 receive \u2192 pass. Speed.' },
        { n:'Ping long ball', rx:'3\u00D78 ea ft', ft:'R + L', cue:'Lower half with laces. Backspin.' }
      ]
    },
    {
      title: 'Weak Foot Block', purpose: '5 MIN \u00B7 LEFT FOOT ONLY',
      note: 'Every session. No exceptions.',
      drills: [
        { n:'Inside-outside rolls', rx:'1 min', ft:'L only', cue:'Smooth. Don\'t rush.' },
        { n:'Wall passing', rx:'2 min', ft:'L only', cue:'5m. Clean strike, clean reception.' },
        { n:'Sole drag \u2192 inside push', rx:'1 min', ft:'L only', cue:'Build speed over weeks.' },
        { n:'Driven pass to target', rx:'1 min', ft:'L only', cue:'15m. Lock ankle. Every rep.' }
      ]
    },
    {
      title: 'Long Throw-In', purpose: '5-10 MIN \u00B7 MON / WED / FRI',
      note: 'Gronnemark: Start with the HIP. Arch back like a bow, snap forward like releasing an arrow. Target: 25m+.',
      drills: [
        { n:'Arm circles + overhead stretch', rx:'2 min', ft:'\u2014', cue:'Open lats and obliques.' },
        { n:'Standing throw (feet together)', rx:'3\u00D75', ft:'\u2014', cue:'Feet planted. Ball behind head. Snap with core + lats.' },
        { n:'One-step approach', rx:'3\u00D75', ft:'\u2014', cue:'Plant hard. Transfer weight. Ground reaction force.' },
        { n:'Run-up throw (3-5 steps)', rx:'3\u00D75', ft:'\u2014', cue:'Plant, lean back, explode. Ball BEHIND head (Law 15).' },
        { n:'Max distance attempts', rx:'5\u00D71', ft:'\u2014', cue:'Full effort. Measure. Track weekly.' }
      ]
    }
  ]
},

light: {
  label: 'Light Touches',
  desc: '10-15 min. Pre-team training. Just stay sharp.',
  blocks: [
    {
      title: 'Pre-Team Touch Work', purpose: '10-15 MIN',
      note: 'Don\'t fatigue yourself. Get comfortable on the ball before tonight.',
      drills: [
        { n:'Toe taps', rx:'30 sec', ft:'Both', cue:'Light rhythm.' },
        { n:'Inside-inside foundation', rx:'1 min', ft:'Both', cue:'Tight, head up.' },
        { n:'Sole rolls', rx:'1 min', ft:'Both', cue:'Smooth control.' },
        { n:'Freestyle juggling', rx:'3 min', ft:'Both', cue:'Beat yesterday.' },
        { n:'Wall passing rhythm', rx:'3 min', ft:'Alternate', cue:'2 touch: control + pass.' },
        { n:'Coerver pull-push', rx:'2 min', ft:'R then L', cue:'20s speed test each foot.' }
      ]
    }
  ]
},

cm: {
  label: 'CM Specific',
  desc: 'Midfield turns, distribution, 1v1 defending. RC Performance + 7mlc.',
  blocks: [
    {
      title: 'Midfield Turns', purpose: 'RECEIVE \u2192 TURN \u2192 PLAY FORWARD',
      note: 'RC Performance: Open hip, back foot, Cruyff, half-turn. Always on the move.',
      drills: [
        { n:'Wall pass \u2192 open hip turn', rx:'3\u00D710 ea side', ft:'Both', cue:'Pass, open body, take around marker.' },
        { n:'Back foot \u2192 Cruyff turn', rx:'3\u00D78 ea ft', ft:'Both', cue:'Receive back foot, Cruyff behind standing leg, burst.' },
        { n:'180\u00B0 turn + through ball', rx:'3\u00D78', ft:'Both', cue:'Rebounder, back foot, turn 180\u00B0, play forward.' },
        { n:'Half-turn reception', rx:'3\u00D78 ea side', ft:'Both', cue:'Body sideways on reception. Transition forward.' },
        { n:'Outside cut \u2192 accelerate', rx:'3\u00D78', ft:'Both', cue:'Spin off press with outside foot. Burst away.' }
      ]
    },
    {
      title: 'Distribution', purpose: 'DICTATE TEMPO',
      note: '7mlc: Figure-8 dribble \u2192 immediate long pass. Close control to range instantly.',
      drills: [
        { n:'Figure-8 dribble \u2192 long pass', rx:'3\u00D76', ft:'Both', cue:'Tight through cones, then ping far target.' },
        { n:'Grass cutter passes (18 yard)', rx:'3\u00D710 ea ft', ft:'R + L', cue:'Flat, backspin. Low and firm.' },
        { n:'Clipped pass into channel', rx:'3\u00D78', ft:'Both', cue:'Chip with backspin for overlapping run.' },
        { n:'Quick switch (2 targets)', rx:'3\u00D78', ft:'Both', cue:'Receive left, switch right. One touch.' }
      ]
    },
    {
      title: '1v1 Defending', purpose: 'CLOSE \u2192 JOCKEY \u2192 WIN',
      note: 'Close 1-2 steps. Eyes on ball. Small steps. Force weak foot/sideline.',
      drills: [
        { n:'Close down + jockey (solo)', rx:'4\u00D730s', ft:'\u2014', cue:'15m cones. Sprint, close, jockey back. Toes.' },
        { n:'Shadow defending (partner)', rx:'3\u00D71 min', ft:'\u2014', cue:'Mirror. Stay 1 step away. Don\'t commit.' },
        { n:'1v1 in gates', rx:'5 each', ft:'\u2014', cue:'Force wide. Angle. Patient then STRIKE.' }
      ]
    },
    {
      title: 'Dynamic Ball Mastery (7mlc)', purpose: '30 SEC BURSTS',
      note: '30 seconds non-stop touches through scattered cones. All surfaces, both feet. Repeat 3 times.',
      drills: [
        { n:'30s non-stop through cones', rx:'3\u00D730s', ft:'Both', cue:'All surfaces. No stopping. Game chaos.' },
        { n:'Edge-of-box finishing', rx:'3\u00D75', ft:'Both', cue:'Pass rebounder, touch out of feet, strike.' }
      ]
    }
  ]
},

gameday: {
  label: 'Game Day',
  desc: 'Change room personal prep (20 min) + Team warm-up (30 min). Ready from minute 1.',
  blocks: [
    {
      title: 'Change Room Personal Prep', purpose: '20 MIN \u00B7 BEFORE TEAM WARM-UP',
      note: 'YOUR personal protocol. Do this while physio is around. Get your body right BEFORE the team starts. Find a quiet corner.',
      drills: [
        { n:'Physio rub / foam roll trouble spots', rx:'5 min', ft:'\u2014', cue:'Quads, hip flexors, calves. Get the physio to work any tight spots.' },
        { n:'GOATA Groundwork (abbreviated)', rx:'4 min', ft:'\u2014', cue:'Ground hip stretch 30s/side + Child rocker 45s\u00D72. Quick but complete.' },
        { n:'Lateral pelvic tilts (3 positions)', rx:'3 min', ft:'Both', cue:'Side-lying 30s \u2192 half-kneeling 30s \u2192 split squat 30s. Both sides.' },
        { n:'Ankle activation (circles + pogos)', rx:'2 min', ft:'Both', cue:'10 circles each direction each foot. Then 20 light pogos. Wake up Achilles.' },
        { n:'Band glute activation', rx:'2 min', ft:'Both', cue:'Banded lateral walks 10 each way + clamshells 10 each side. Fire up glutes.' },
        { n:'Physiological sigh (3 rounds)', rx:'1 min', ft:'\u2014', cue:'Double inhale through nose, long exhale through mouth. Calm the nervous system.' },
        { n:'Visualization', rx:'3 min', ft:'\u2014', cue:'Eyes closed. First touch, tackles, passing lanes, long throws. See yourself winning every duel.' }
      ]
    },
    {
      title: 'Team Warm-Up', purpose: '25-30 MIN \u00B7 WITH THE TEAM',
      note: 'Follow team structure: Bands \u2192 Dynamic stretches \u2192 Sprints \u2192 Ball work \u2192 Tactics. Add your extras between.',
      drills: [
        { n:'Band activation (team)', rx:'5 min', ft:'\u2014', cue:'Follow team routine. Add extra hip flexor band pulls if time.' },
        { n:'Dynamic stretches (team)', rx:'5 min', ft:'\u2014', cue:'Walking lunges, high knees, butt kicks, leg swings. GO THROUGH FULL RANGE.' },
        { n:'Sprints (team)', rx:'5 min', ft:'\u2014', cue:'4\u00D720m progressive sprints. Last 2 at 95%. Match speed or nothing.' },
        { n:'Ball work (team)', rx:'5 min', ft:'Both', cue:'Passing pairs, rondos, shooting. BOTH FEET. Clean first touch.' },
        { n:'Tactical walk-through (team)', rx:'5 min', ft:'\u2014', cue:'Shape, set pieces, pressing triggers. Listen and focus.' },
        { n:'Final personal prep', rx:'2 min', ft:'\u2014', cue:'Coerver pull-push 20s each foot. 2 explosive sprints. Deep breath. YOU\'RE READY.' }
      ]
    }
  ]
}

};

var TABS = ['full','light','cm','gameday'];
var currentTab = 'full';

function render(){
  var sess = SESSIONS[currentTab];
  var tabHtml = '';
  TABS.forEach(function(t){
    tabHtml += '<button class="'+(t===currentTab?'is-on':'')+'" data-tab="'+t+'">'+SESSIONS[t].label+'</button>';
  });
  document.getElementById('tabs').innerHTML = tabHtml;

  var html = '<p class="mono" style="max-width:var(--w);margin:0 auto 16px;">'+sess.desc+'</p>';
  sess.blocks.forEach(function(b){
    html += '<div class="blk"><h2>'+b.title+'</h2><p class="purpose">'+b.purpose+'</p>';
    if(b.note) html += '<p class="note">'+b.note+'</p>';
    if(b.groups){
      b.groups.forEach(function(g){
        html += '<div class="grp"><p class="grp-label">'+g.label+'</p>';
        g.drills.forEach(function(d){
          html += '<div class="drill"><span class="nm">'+d.n+(d.cue?'<span class="cue">'+d.cue+'</span>':'')+'</span><span class="rx">'+d.rx+'</span><span class="ft">'+d.ft+'</span></div>';
        });
        html += '</div>';
      });
    } else {
      b.drills.forEach(function(d){
        html += '<div class="drill"><span class="nm">'+d.n+(d.cue?'<span class="cue">'+d.cue+'</span>':'')+'</span><span class="rx">'+d.rx+'</span><span class="ft">'+d.ft+'</span></div>';
      });
    }
    html += '</div>';
  });
  document.getElementById('content').innerHTML = html;
  document.querySelectorAll('[data-tab]').forEach(function(btn){
    btn.onclick = function(){ currentTab = this.getAttribute('data-tab'); render(); };
  });
}
render();
})();
</script>
</body>
</html>
