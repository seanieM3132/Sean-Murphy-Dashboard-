<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050D0A">
<title>Finance — Sean</title>
<script src="/topbar.js" defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
@charset "UTF-8";
:root {
  --bg:#050D0A;--line:rgba(74,222,128,.10);
  --green:#4ADE80;--teal:#7DD3C0;--amber:#E8873A;--gold:#D8B24A;
  --ink:#E6F2EC;--dim:#5F786E;--dimmer:#3B4E47;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height:100vh; padding:40px 32px 64px;
  background:radial-gradient(1200px 600px at 20% -10%,#0D2419 0%,transparent 60%),var(--bg);
  color:var(--ink); font-family:'Inter',system-ui,sans-serif; -webkit-font-smoothing:antialiased;
}

/* ── Header ── */
.f-top{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;max-width:1240px;margin:0 auto 26px;}
.f-back{font:500 11px/1 'JetBrains Mono',monospace;letter-spacing:.14em;color:var(--dim);text-decoration:none;}
.f-back:hover{color:var(--green);}
.f-title{font-family:'Instrument Serif',Georgia,serif;font-size:clamp(30px,3.6vw,44px);font-weight:400;font-style:italic;margin:14px 0 10px;}
.f-title em{color:var(--green);}
.f-hero{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;}
.f-net{font-family:'Instrument Serif',serif;font-size:clamp(38px,5vw,62px);line-height:1;letter-spacing:-.015em;}
.f-delta{font:500 11px 'JetBrains Mono',monospace;letter-spacing:.1em;}
.f-delta.is-up{color:var(--green);} .f-delta.is-down{color:var(--amber);}
.f-pill{display:flex;gap:12px;align-items:center;border:1px solid var(--line);border-radius:12px;padding:12px 16px;background:rgba(10,23,18,.6);}
.f-pill b{display:block;font:500 12px/1.5 'JetBrains Mono',monospace;letter-spacing:.14em;}
.f-pill>span:last-child{font:400 11px/1.5 'JetBrains Mono',monospace;color:var(--dim);}
.f-pulse{width:7px;height:7px;border-radius:50%;background:var(--green);animation:fp 2.4s infinite;}
@keyframes fp{0%{box-shadow:0 0 0 0 rgba(74,222,128,.5)}70%{box-shadow:0 0 0 10px rgba(74,222,128,0)}}

/* ── Tabs ── */
.f-tabs{display:flex;gap:2px;max-width:1240px;margin:0 auto 20px;border:1px solid var(--line);border-radius:12px;padding:4px;background:rgba(10,23,18,.5);}
.f-tabs button{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;background:none;border:0;cursor:pointer;
  padding:11px;border-radius:9px;font:500 10px 'JetBrains Mono',monospace;letter-spacing:.18em;color:var(--dim);transition:all .2s;}
.f-tabs button:hover{color:var(--ink);}
.f-tabs button.is-on{background:rgba(74,222,128,.09);color:var(--green);}
.f-tabs button:focus-visible{outline:2px solid var(--green);outline-offset:2px;}
.f-tn{color:var(--dimmer);font-weight:400;}
.f-tabs button.is-on .f-tn{color:rgba(74,222,128,.5);}

/* ── Grid & Card ── */
.f-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:20px;max-width:1240px;margin:0 auto;}
.f-card{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:18px;padding:18px 20px 16px;
  background:linear-gradient(180deg,rgba(16,36,27,.55),rgba(6,15,11,.55));}
.f-card-h{font:400 10px/1 'JetBrains Mono',monospace;letter-spacing:.16em;color:var(--dimmer);}
.f-card-b{flex:1;padding:18px 0 14px;}
.f-card-f{}
.f-card-t{font-family:'Instrument Serif',Georgia,serif;font-style:italic;font-weight:400;font-size:22px;}
.f-card-m{font:500 9px/1 'JetBrains Mono',monospace;letter-spacing:.2em;color:var(--dim);margin-top:7px;}

/* ── Stat ── */
.f-stat-v{font-family:'Instrument Serif',serif;font-size:26px;line-height:1;}
.f-stat-v.is-good{color:var(--green);} .f-stat-v.is-hot{color:var(--amber);}
.f-stat-u{font:400 10px 'JetBrains Mono',monospace;color:var(--dim);margin-left:4px;}
.f-stat-l{font:500 9px 'JetBrains Mono',monospace;letter-spacing:.18em;color:var(--dim);margin-top:8px;text-transform:uppercase;}
.f-legend{display:flex;gap:36px;margin-bottom:20px;flex-wrap:wrap;}
.f-read{font:400 10px/1.5 'JetBrains Mono',monospace;color:var(--dim);letter-spacing:.05em;margin-top:14px;}
.f-read b{color:var(--green);font-weight:500;}

/* ── Curve ── */
.f-svg{width:100%;height:auto;display:block;overflow:visible;}
.f-line{fill:none;stroke:var(--green);stroke-width:1.7;filter:drop-shadow(0 0 6px rgba(74,222,128,.45));}
.f-hi{stroke:var(--gold);stroke-width:1;stroke-dasharray:2 4;opacity:.5;}
.f-hidot{fill:var(--gold);}
.f-cross{stroke:rgba(74,222,128,.3);stroke-dasharray:3 3;}
.f-dot{fill:#fff;stroke:var(--green);stroke-width:2;}
.f-axis{font:500 8px 'JetBrains Mono',monospace;fill:var(--dimmer);letter-spacing:.16em;}
.f-axis.is-gold{fill:var(--gold);opacity:.65;}

/* ── Donut ── */
.f-donut{display:flex;flex-direction:column;align-items:center;gap:18px;}
.f-donut svg{width:170px;transform:rotate(-90deg);}
.f-arc{transition:stroke-width .2s;cursor:pointer;}
.f-dv{font-family:'Instrument Serif',serif;font-size:19px;fill:var(--ink);transform:rotate(90deg);transform-origin:80px 80px;}
.f-dl{font:500 7px 'JetBrains Mono',monospace;fill:var(--dim);letter-spacing:.2em;transform:rotate(90deg);transform-origin:80px 80px;}
.f-keys{list-style:none;padding:0;width:100%;display:flex;flex-direction:column;gap:10px;}
.f-keys li{display:flex;align-items:center;gap:9px;font:400 10px 'JetBrains Mono',monospace;color:var(--dim);cursor:default;}
.f-keys i{width:7px;height:7px;border-radius:2px;flex:none;display:inline-block;}
.f-keys em{font-style:normal;color:var(--dimmer);margin-left:auto;}
.f-keys b{color:var(--ink);font-weight:400;width:76px;text-align:right;}

/* ── Accounts ── */
.f-accts{list-style:none;padding:0;display:flex;flex-direction:column;gap:11px;}
.f-accts li{display:flex;align-items:center;gap:14px;}
.f-an{font:400 12px 'Inter',sans-serif;color:var(--ink);width:190px;flex:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.f-abar{flex:1;height:5px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;}
.f-abar div{height:100%;border-radius:3px;}
.f-ap{font:400 10px 'JetBrains Mono',monospace;color:var(--dimmer);width:42px;text-align:right;}
.f-accts b{font:400 11px 'JetBrains Mono',monospace;color:var(--ink);width:90px;text-align:right;}

/* ── Burn ── */
.f-catbar{display:flex;height:10px;border-radius:5px;overflow:hidden;gap:2px;margin-bottom:14px;}
.f-cats{list-style:none;padding:0;display:flex;gap:22px;margin-bottom:26px;}
.f-cats li{display:flex;align-items:center;gap:7px;font:400 10px 'JetBrains Mono',monospace;color:var(--dim);}
.f-cats i{width:7px;height:7px;border-radius:2px;display:inline-block;}
.f-cats b{color:var(--ink);font-weight:400;}

.f-subs{list-style:none;padding:0;display:flex;flex-direction:column;gap:3px;}
.f-subs li{display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:8px;transition:background .2s;}
.f-subs li:hover{background:rgba(74,222,128,.04);}
.f-sn{font:400 12px 'Inter',sans-serif;color:var(--ink);width:170px;flex:none;}
.f-scat{font:500 8px 'JetBrains Mono',monospace;letter-spacing:.14em;border:1px solid;border-radius:3px;padding:3px 5px;width:66px;text-align:center;flex:none;}
.f-snext{font:400 10px 'JetBrains Mono',monospace;color:var(--dimmer);width:40px;}
.f-sbar{flex:1;height:4px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;}
.f-sbar div{height:100%;border-radius:3px;}
.f-subs b{font:400 11px 'JetBrains Mono',monospace;color:var(--ink);width:96px;text-align:right;}
.f-subs b em{font-style:normal;color:var(--dimmer);}

/* ── Orders timeline ── */
.f-timeline{position:relative;padding-top:26px;}
.f-tl-axis{position:absolute;top:0;left:190px;right:150px;height:18px;}
.f-tl-axis span{position:absolute;font:500 8px 'JetBrains Mono',monospace;color:var(--dimmer);letter-spacing:.14em;transform:translateX(-50%);}
.f-tl-row{display:flex;align-items:center;gap:14px;padding:11px 0;}
.f-tl-name{font:400 12px 'Inter',sans-serif;color:var(--ink);width:176px;flex:none;}
.f-tl-track{flex:1;position:relative;height:2px;background:rgba(255,255,255,.05);}
.f-tl-line{height:100%;background:linear-gradient(90deg,rgba(74,222,128,.15),var(--green));}
.f-tl-dot{position:absolute;top:-3px;width:8px;height:8px;border-radius:50%;background:var(--green);
  box-shadow:0 0 8px rgba(74,222,128,.7);transform:translateX(-50%);}
.f-tl-pct{font:400 10px 'JetBrains Mono',monospace;color:var(--amber);width:44px;text-align:right;}
.f-tl-row b{font:400 11px 'JetBrains Mono',monospace;color:var(--ink);width:80px;text-align:right;}

/* ── Wishlist ── */
.f-wish{list-style:none;padding:0;display:flex;flex-direction:column;gap:13px;}
.f-wish li{display:flex;align-items:center;gap:14px;}
.f-wn{font:400 12px 'Inter',sans-serif;color:var(--ink);width:176px;flex:none;}
.f-wbar{flex:1;height:5px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;}
.f-wbar div{height:100%;background:var(--green);border-radius:3px;box-shadow:0 0 8px rgba(74,222,128,.4);}
.f-wbar div.is-hot{background:var(--amber);box-shadow:0 0 8px rgba(232,135,58,.4);}
.f-wm{font:400 10px 'JetBrains Mono',monospace;color:var(--teal);width:52px;text-align:right;}
.f-wp{font:400 10px 'JetBrains Mono',monospace;color:var(--dimmer);width:44px;text-align:right;}
.f-wish b{font:400 11px 'JetBrains Mono',monospace;color:var(--ink);width:80px;text-align:right;}

/* ── Footer ── */
.f-foot{display:flex;justify-content:space-between;max-width:1240px;margin:44px auto 0;padding-top:18px;border-top:1px solid var(--line);
  font:400 9px 'JetBrains Mono',monospace;letter-spacing:.2em;color:var(--dimmer);}

/* ── Responsive ── */
@media (max-width:1000px){
  .f-card{grid-column:span 12 !important;}
  .f-top{flex-direction:column;}
  .f-tabs button{font-size:9px;letter-spacing:.1em;} .f-tn{display:none;}
}
@media (max-width:640px){
  body{padding:24px 16px 48px;}
  .f-legend{gap:20px;}
  .f-an,.f-sn,.f-wn,.f-tl-name{width:110px;}
  .f-sbar,.f-abar,.f-tl-axis{display:none;}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>

<header class="f-top">
  <div>
    <a href="/" class="f-back">&#8592; Home</a>
    <h1 class="f-title">Finance, <em>Sean</em></h1>
    <div class="f-hero">
      <span class="f-net" id="hero-net"></span>
      <span class="f-delta" id="hero-delta"></span>
    </div>
  </div>
  <div class="f-pill">
    <span class="f-pulse"></span>
    <div>
      <b>AUD</b>
      <span id="pill-snaps" style="font:400 11px/1.5 'JetBrains Mono',monospace;color:var(--dim)"></span>
    </div>
  </div>
</header>

<nav class="f-tabs" role="tablist" id="tabs"></nav>

<main class="f-grid" id="grid"></main>

<footer class="f-foot">
  <span>ALL FIGURES AUD &middot; MANUAL SNAPSHOTS</span>
  <span id="foot-net"></span>
</footer>

<script>
(function() {
  'use strict';

  /* ── AUD formatter ── */
  var audFmt0 = new Intl.NumberFormat('en-AU', { style:'currency', currency:'AUD', minimumFractionDigits:0, maximumFractionDigits:0 });
  var audFmt2 = new Intl.NumberFormat('en-AU', { style:'currency', currency:'AUD', minimumFractionDigits:2, maximumFractionDigits:2 });
  function aud(n, dp) { return dp === 2 ? audFmt2.format(n) : audFmt0.format(n); }

  var CLASSES = {
    cash:   { label:'Cash',   color:'#4ADE80' },
    stocks: { label:'Stocks', color:'#7DD3C0' },
    crypto: { label:'Crypto', color:'#E8873A' },
    other:  { label:'Other',  color:'#D8B24A' }
  };

  /* ── Deterministic RNG ── */
  var _seed = 100726 >>> 0;
  function rng() { _seed = (_seed * 1664525 + 1013904223) >>> 0; return _seed / 4294967296; }

  /* ── Mock data ── */
  function buildMock() {
    var accounts = [
      { name:'CommBank Everyday', cls:'cash', value:2840 },
      { name:'ING Savings Maximiser', cls:'cash', value:9600 },
      { name:'Vanguard VAS', cls:'stocks', value:4120 },
      { name:'Vanguard VGS', cls:'stocks', value:3380 },
      { name:'BTC', cls:'crypto', value:1910 },
      { name:'ETH', cls:'crypto', value:640 },
      { name:'Road bike', cls:'other', value:1200 }
    ];

    var history = [];
    for (var i = 0; i < 18; i++) {
      var trend = 9200 + i * 780;
      var wobble = Math.sin(i / 2.1) * 900 + (rng() - 0.5) * 700;
      history.push({ m: i, value: Math.round(trend + wobble) });
    }
    var totalAccounts = accounts.reduce(function(a, b) { return a + b.value; }, 0);
    history[history.length - 1].value = totalAccounts;

    var subs = [
      { name:'Spotify', amount:13.99, cycle:'mo', cat:'Media', next:4 },
      { name:'Adobe CC', amount:29.99, cycle:'mo', cat:'Tools', next:11 },
      { name:'Claude Pro', amount:30.00, cycle:'mo', cat:'Tools', next:18 },
      { name:'Gym — F45', amount:65.00, cycle:'mo', cat:'Health', next:2 },
      { name:'Garmin Connect+', amount:9.99, cycle:'mo', cat:'Health', next:22 },
      { name:'Domain + hosting', amount:216.00, cycle:'yr', cat:'Tools', next:61 },
      { name:'Football club fees', amount:480.00, cycle:'yr', cat:'Health', next:143 }
    ];

    var orders = [
      { item:'Nike Phantom GX', cost:289, account:'CommBank Everyday', eta:3 },
      { item:'Whoop strap', cost:349, account:'CommBank Everyday', eta:9 },
      { item:'Recovery boots', cost:620, account:'ING Savings Maximiser', eta:21 }
    ];

    var wishes = [
      { item:'MacBook Air M4', cost:1799 },
      { item:'Trip — Japan', cost:4200 },
      { item:'Studio monitors', cost:890 },
      { item:'New boots (spare)', cost:240 }
    ];

    return { accounts:accounts, history:history, subs:subs, orders:orders, wishes:wishes, savingsRate:640 };
  }

  /* ── Derive ── */
  function derive(d) {
    var net = d.accounts.reduce(function(a, b) { return a + b.value; }, 0);
    var alloc = Object.keys(CLASSES).map(function(k) {
      return {
        k:k, label:CLASSES[k].label, color:CLASSES[k].color,
        value: d.accounts.filter(function(a) { return a.cls === k; }).reduce(function(a, b) { return a + b.value; }, 0)
      };
    }).filter(function(a) { return a.value > 0; });

    var monthly = d.subs.reduce(function(a, s) { return a + (s.cycle === 'mo' ? s.amount : s.amount / 12); }, 0);
    var annual = monthly * 12;
    var runway = net > 0 && monthly > 0 ? net / monthly : 0;
    var prev = d.history.length >= 2 ? d.history[d.history.length - 2].value : net;
    var delta = net - prev;
    var hi = Math.max.apply(null, d.history.map(function(h) { return h.value; }));
    var lo = Math.min.apply(null, d.history.map(function(h) { return h.value; }));

    var committed = d.orders.reduce(function(a, o) { return a + o.cost; }, 0);
    var free = net - committed;

    return { net:net, alloc:alloc, monthly:monthly, annual:annual, runway:runway, delta:delta, hi:hi, lo:lo, committed:committed, free:free };
  }

  /* ── State ── */
  var data = buildMock();
  var fin = derive(data);
  var currentTab = 0;
  var TABS = ['NET WORTH', 'BURN', 'ORDERS', 'WISHLIST'];

  /* ── Render header ── */
  function renderHeader() {
    document.getElementById('hero-net').textContent = aud(fin.net);
    var deltaEl = document.getElementById('hero-delta');
    deltaEl.className = 'f-delta ' + (fin.delta >= 0 ? 'is-up' : 'is-down');
    deltaEl.textContent = (fin.delta >= 0 ? '\u25B2' : '\u25BC') + ' ' + aud(Math.abs(fin.delta)) + ' this month';
    document.getElementById('pill-snaps').textContent = data.history.length + ' snapshots';
    document.getElementById('foot-net').textContent = 'NET WORTH ' + aud(fin.net);
  }

  /* ── Render tabs ── */
  function renderTabs() {
    var nav = document.getElementById('tabs');
    nav.innerHTML = TABS.map(function(t, i) {
      var cls = i === currentTab ? 'is-on' : '';
      return '<button role="tab" aria-selected="' + (i === currentTab) + '" class="' + cls + '" data-tab="' + i + '">' +
        '<span class="f-tn">' + String(i + 1).padStart(2, '0') + '</span>' + t + '</button>';
    }).join('');
    nav.querySelectorAll('button').forEach(function(btn) {
      btn.addEventListener('click', function() {
        currentTab = parseInt(this.getAttribute('data-tab'));
        renderTabs();
        renderGrid();
      });
    });
  }

  /* ── Card builder ── */
  function card(index, span, title, meta, bodyHTML) {
    return '<section class="f-card" style="grid-column:span ' + span + '">' +
      '<header class="f-card-h"><span>' + index + '</span></header>' +
      '<div class="f-card-b">' + bodyHTML + '</div>' +
      '<footer class="f-card-f"><h2 class="f-card-t">' + title + '</h2>' +
      (meta ? '<p class="f-card-m">' + meta + '</p>' : '') +
      '</footer></section>';
  }

  function stat(value, unit, label, tone) {
    return '<div class="f-stat"><div class="f-stat-v' + (tone ? ' is-' + tone : '') + '">' + value +
      (unit ? '<span class="f-stat-u">' + unit + '</span>' : '') +
      '</div><div class="f-stat-l">' + label + '</div></div>';
  }

  /* ── 1. Net Worth Curve SVG ── */
  function renderCurveSVG() {
    var history = data.history;
    var W = 900, H = 240, PAD = 10, BASE = H - 26;
    var top = fin.hi * 1.08, bot = fin.lo * 0.86;
    function x(i) { return PAD + (i / (history.length - 1)) * (W - PAD * 2); }
    function y(v) { return BASE - ((v - bot) / (top - bot)) * (BASE - PAD); }

    var line = history.map(function(h, i) { return (i ? 'L' : 'M') + x(i) + ',' + y(h.value); }).join('');
    var hiI = 0;
    history.forEach(function(h, i) { if (h.value === fin.hi) hiI = i; });

    var svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" class="f-svg" id="curve-svg">' +
      '<defs><linearGradient id="fnFill" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0%" stop-color="#4ADE80" stop-opacity=".26"/>' +
      '<stop offset="100%" stop-color="#4ADE80" stop-opacity="0"/>' +
      '</linearGradient></defs>' +
      '<line x1="' + PAD + '" x2="' + (W - PAD) + '" y1="' + y(fin.hi) + '" y2="' + y(fin.hi) + '" class="f-hi"/>' +
      '<text x="' + (W - PAD) + '" y="' + (y(fin.hi) - 6) + '" class="f-axis is-gold" text-anchor="end">ALL-TIME HIGH ' + aud(fin.hi) + '</text>' +
      '<path d="' + line + 'L' + x(history.length - 1) + ',' + BASE + 'L' + PAD + ',' + BASE + 'Z" fill="url(#fnFill)"/>' +
      '<path d="' + line + '" class="f-line" vector-effect="non-scaling-stroke"/>' +
      '<circle cx="' + x(hiI) + '" cy="' + y(fin.hi) + '" r="3" class="f-hidot"/>' +
      '<line id="c-cross" x1="0" x2="0" y1="' + PAD + '" y2="' + BASE + '" class="f-cross" style="display:none"/>' +
      '<circle id="c-dot" r="4" class="f-dot" style="display:none"/>' +
      '<rect x="' + PAD + '" y="' + PAD + '" width="' + (W - PAD * 2) + '" height="' + (BASE - PAD) + '" fill="transparent" id="curve-hover" style="cursor:crosshair"/>' +
      '</svg>' +
      '<div class="f-read" id="curve-read">18 monthly snapshots &middot; hover to scrub</div>';
    return svg;
  }

  /* ── 2. Donut ── */
  function renderDonut() {
    var R = 62, T = 16, C = 2 * Math.PI * R;
    var arcs = '';
    var acc = 0;
    fin.alloc.forEach(function(a, i) {
      var frac = a.value / fin.net;
      var dash = (C * frac - 2) + ' ' + C;
      var off = -C * acc;
      acc += frac;
      arcs += '<circle cx="80" cy="80" r="' + R + '" fill="none" stroke="' + a.color + '" ' +
        'stroke-width="' + T + '" stroke-dasharray="' + dash + '" stroke-dashoffset="' + off + '" ' +
        'class="f-arc" data-idx="' + i + '"/>';
    });

    var html = '<div class="f-donut">' +
      '<svg viewBox="0 0 160 160" id="donut-svg">' +
      '<circle cx="80" cy="80" r="' + R + '" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="' + T + '"/>' +
      arcs +
      '<text x="80" y="76" class="f-dv" text-anchor="middle" id="donut-val">' + aud(fin.net) + '</text>' +
      '<text x="80" y="93" class="f-dl" text-anchor="middle" id="donut-label">NET WORTH</text>' +
      '</svg>' +
      '<ul class="f-keys">';

    fin.alloc.forEach(function(a) {
      html += '<li><i style="background:' + a.color + '"></i><span>' + a.label + '</span>' +
        '<em>' + Math.round((a.value / fin.net) * 100) + '%</em>' +
        '<b>' + aud(a.value) + '</b></li>';
    });
    html += '</ul></div>';
    return html;
  }

  /* ── 3. Accounts ── */
  function renderAccounts() {
    var sorted = data.accounts.slice().sort(function(a, b) { return b.value - a.value; });
    var max = Math.max.apply(null, sorted.map(function(a) { return a.value; }));
    var html = '<ul class="f-accts">';
    sorted.forEach(function(a) {
      html += '<li><span class="f-an">' + a.name + '</span>' +
        '<div class="f-abar"><div style="width:' + ((a.value / max) * 100) + '%;background:' + CLASSES[a.cls].color + '"></div></div>' +
        '<span class="f-ap">' + ((a.value / fin.net) * 100).toFixed(1) + '%</span>' +
        '<b>' + aud(a.value) + '</b></li>';
    });
    html += '</ul>';
    return html;
  }

  /* ── 4. Burn ── */
  function renderBurn() {
    var catColor = { Tools:'#7DD3C0', Health:'#4ADE80', Media:'#E8873A' };
    var cats = ['Tools', 'Health', 'Media'];
    var byCat = cats.map(function(c) {
      return {
        c: c,
        v: data.subs.filter(function(s) { return s.cat === c; }).reduce(function(a, s) {
          return a + (s.cycle === 'mo' ? s.amount : s.amount / 12);
        }, 0)
      };
    });

    var html = '<div class="f-legend">' +
      stat(aud(fin.monthly, 2), '/mo', 'Monthly burn', 'hot') +
      stat(aud(fin.annual), '', 'Annualised', '') +
      stat(((fin.annual / fin.net) * 100).toFixed(1) + '%', '', 'Of net worth / yr', '') +
      stat(Math.floor(fin.runway) + ' mo', '', 'Runway if income stops', 'good') +
      '</div>';

    html += '<div class="f-catbar">';
    byCat.forEach(function(b) {
      html += '<div style="flex:' + b.v + ';background:' + catColor[b.c] + '" title="' + b.c + ' ' + aud(b.v, 2) + '"></div>';
    });
    html += '</div>';

    html += '<ul class="f-cats">';
    byCat.forEach(function(b) {
      html += '<li><i style="background:' + catColor[b.c] + '"></i>' + b.c + '<b>' + aud(b.v, 2) + '</b></li>';
    });
    html += '</ul>';

    var sorted = data.subs.slice().sort(function(a, b) { return a.next - b.next; });
    html += '<ul class="f-subs">';
    sorted.forEach(function(s) {
      var m = s.cycle === 'mo' ? s.amount : s.amount / 12;
      html += '<li><span class="f-sn">' + s.name + '</span>' +
        '<span class="f-scat" style="color:' + catColor[s.cat] + ';border-color:' + catColor[s.cat] + '44">' + s.cat.toUpperCase() + '</span>' +
        '<span class="f-snext">' + s.next + 'd</span>' +
        '<div class="f-sbar"><div style="width:' + ((m / 65) * 100) + '%;background:' + catColor[s.cat] + '"></div></div>' +
        '<b>' + aud(s.amount, 2) + '<em>/' + s.cycle + '</em></b></li>';
    });
    html += '</ul>';
    html += '<div class="f-read">Yearly plans amortised monthly &middot; sorted by next charge</div>';
    return html;
  }

  /* ── 5. Orders ── */
  function renderOrders() {
    var maxEta = Math.max.apply(null, data.orders.map(function(o) { return o.eta; }).concat([30]));

    var html = '<div class="f-legend">' +
      stat(aud(fin.committed), '', 'Committed', 'hot') +
      stat(aud(fin.free), '', 'Free after delivery', '') +
      stat(((fin.committed / fin.net) * 100).toFixed(1) + '%', '', 'Of net worth', '') +
      '</div>';

    html += '<div class="f-timeline"><div class="f-tl-axis">';
    [0, 7, 14, 21, 30].forEach(function(d) {
      html += '<span style="left:' + ((d / maxEta) * 100) + '%">' + (d ? '+' + d + 'd' : 'TODAY') + '</span>';
    });
    html += '</div>';

    var sorted = data.orders.slice().sort(function(a, b) { return a.eta - b.eta; });
    sorted.forEach(function(o) {
      html += '<div class="f-tl-row"><span class="f-tl-name">' + o.item + '</span>' +
        '<div class="f-tl-track"><div class="f-tl-line" style="width:' + ((o.eta / maxEta) * 100) + '%"></div>' +
        '<span class="f-tl-dot" style="left:' + ((o.eta / maxEta) * 100) + '%"></span></div>' +
        '<span class="f-tl-pct">' + ((o.cost / fin.net) * 100).toFixed(1) + '%</span>' +
        '<b>' + aud(o.cost) + '</b></div>';
    });
    html += '</div>';
    html += '<div class="f-read">Each order deducts from its account on arrival &middot; projection assumes no returns</div>';
    return html;
  }

  /* ── 6. Wishlist ── */
  function renderWishlist() {
    var total = data.wishes.reduce(function(a, w) { return a + w.cost; }, 0);
    var totalPct = (total / fin.net) * 100;

    var html = '<div class="f-legend">' +
      stat(aud(total), '', 'Wishlist total', '') +
      stat(totalPct.toFixed(0) + '%', '', 'Of net worth', totalPct > 50 ? 'hot' : '') +
      stat(aud(data.savingsRate), '/mo', 'Savings rate', 'good') +
      '</div>';

    var sorted = data.wishes.slice().sort(function(a, b) { return a.cost - b.cost; });
    html += '<ul class="f-wish">';
    sorted.forEach(function(w) {
      var months = w.cost / data.savingsRate;
      var pct = (w.cost / fin.net) * 100;
      html += '<li><span class="f-wn">' + w.item + '</span>' +
        '<div class="f-wbar"><div style="width:' + Math.min(pct, 100) + '%" class="' + (pct > 20 ? 'is-hot' : '') + '"></div></div>' +
        '<span class="f-wm">' + (months < 1 ? '<1 mo' : Math.ceil(months) + ' mo') + '</span>' +
        '<span class="f-wp">' + pct.toFixed(1) + '%</span>' +
        '<b>' + aud(w.cost) + '</b></li>';
    });
    html += '</ul>';
    html += '<div class="f-read">Months-to-afford at ' + aud(data.savingsRate) + '/mo &middot; bar length is share of net worth</div>';
    return html;
  }

  /* ── Render grid ── */
  function renderGrid() {
    var grid = document.getElementById('grid');
    var html = '';

    if (currentTab === 0) {
      html += card('01', 8, 'ALL-TIME', 'MONTHLY SNAPSHOTS', renderCurveSVG());
      html += card('02', 4, 'ALLOCATION', 'BY ASSET CLASS', renderDonut());
      html += card('03', 12, 'ACCOUNTS', data.accounts.length + ' HOLDINGS', renderAccounts());
    } else if (currentTab === 1) {
      html += card('04', 12, 'BURN', 'RECURRING COMMITMENTS', renderBurn());
    } else if (currentTab === 2) {
      html += card('05', 12, 'INCOMING', 'ORDERS ON THE WAY', renderOrders());
    } else if (currentTab === 3) {
      html += card('06', 12, 'WISHLIST', 'PRICED AGAINST NET WORTH', renderWishlist());
    }

    grid.innerHTML = html;

    // Bind interactions after render
    if (currentTab === 0) {
      bindCurveHover();
      bindDonutHover();
    }
  }

  /* ── Curve hover ── */
  function bindCurveHover() {
    var svg = document.getElementById('curve-svg');
    var hoverRect = document.getElementById('curve-hover');
    var cross = document.getElementById('c-cross');
    var dot = document.getElementById('c-dot');
    var readout = document.getElementById('curve-read');
    if (!svg || !hoverRect) return;

    var history = data.history;
    var W = 900, PAD = 10, BASE = 214;
    var top = fin.hi * 1.08, bot = fin.lo * 0.86;
    function x(i) { return PAD + (i / (history.length - 1)) * (W - PAD * 2); }
    function y(v) { return BASE - ((v - bot) / (top - bot)) * (BASE - PAD); }

    function show(evt) {
      var rect = svg.getBoundingClientRect();
      var mx = evt.clientX - rect.left;
      var ratio = mx / rect.width;
      var i = Math.round((ratio * W - PAD) / (W - PAD * 2) * (history.length - 1));
      i = Math.max(0, Math.min(history.length - 1, i));

      var px = x(i);
      cross.setAttribute('x1', px); cross.setAttribute('x2', px); cross.style.display = '';
      dot.setAttribute('cx', px); dot.setAttribute('cy', y(history[i].value)); dot.style.display = '';
      readout.innerHTML = '<b>' + aud(history[i].value) + '</b> &middot; ' + (history.length - 1 - i) + ' months ago';
    }

    function hide() {
      cross.style.display = 'none'; dot.style.display = 'none';
      readout.innerHTML = history.length + ' monthly snapshots &middot; hover to scrub';
    }

    hoverRect.addEventListener('mousemove', show);
    hoverRect.addEventListener('mouseleave', hide);
    hoverRect.addEventListener('touchmove', function(e) { e.preventDefault(); show(e.touches[0]); }, { passive: false });
    hoverRect.addEventListener('touchend', hide);
  }

  /* ── Donut hover ── */
  function bindDonutHover() {
    var svg = document.getElementById('donut-svg');
    if (!svg) return;
    var arcs = svg.querySelectorAll('.f-arc');
    var valEl = document.getElementById('donut-val');
    var labelEl = document.getElementById('donut-label');

    arcs.forEach(function(arc) {
      arc.addEventListener('mouseenter', function() {
        var idx = parseInt(this.getAttribute('data-idx'));
        var a = fin.alloc[idx];
        this.setAttribute('stroke-width', '20');
        valEl.textContent = aud(a.value);
        labelEl.textContent = a.label.toUpperCase();
      });
      arc.addEventListener('mouseleave', function() {
        this.setAttribute('stroke-width', '16');
        valEl.textContent = aud(fin.net);
        labelEl.textContent = 'NET WORTH';
      });
    });
  }

  /* ── Init ── */
  renderHeader();
  renderTabs();
  renderGrid();

  /* ── Try live data ── */
  fetch('/api/finance').then(function(r) { return r.ok ? r.json() : null; }).then(function(j) {
    if (!j) return;
    data = j;
    fin = derive(data);
    renderHeader();
    renderGrid();
  }).catch(function() {});

})();
</script>
</body>
</html>
