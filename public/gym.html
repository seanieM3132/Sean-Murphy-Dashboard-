<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050D0A">
<title>Gym — Sean</title>
<script src="/topbar.js" defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#050D0A;--line:rgba(74,222,128,.10);
  --green:#4ADE80;--teal:#7DD3C0;--amber:#E8873A;--gold:#D8B24A;
  --ink:#E6F2EC;--dim:#5F786E;--dimmer:#3B4E47;
  --gap:18px;--pad:20px;--r:16px;
  --mono:'JetBrains Mono',monospace;--serif:'Instrument Serif',Georgia,serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  min-height:100vh;padding:40px 32px 64px;
  background:radial-gradient(1200px 600px at 20% -10%,#0D2419 0%,transparent 60%),var(--bg);
  color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;
}
ul{list-style:none;}

/* header */
.g-top{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;max-width:1240px;margin:0 auto 20px;}
.g-back{font:500 11px/1 var(--mono);letter-spacing:.14em;color:var(--dim);text-decoration:none;}
.g-back:hover{color:var(--green);}
.g-title{font-family:var(--serif);font-size:clamp(32px,4.2vw,50px);font-weight:400;font-style:italic;margin:14px 0 6px;}
.g-title em{color:var(--green);}
.g-sub{font:500 11px/1 var(--mono);letter-spacing:.2em;color:var(--dim);}
.g-clock{display:flex;gap:12px;align-items:center;border:1px solid var(--line);border-radius:12px;padding:12px 16px;background:rgba(10,23,18,.6);}
.g-clock b{display:block;font-family:var(--serif);font-size:24px;font-weight:400;}
.g-clock>div>span{font:400 10px/1.5 var(--mono);color:var(--dim);letter-spacing:.06em;}
.g-dot{width:7px;height:7px;border-radius:50%;background:var(--dimmer);flex:none;}
.g-dot.is-live{background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(74,222,128,.5)}70%{box-shadow:0 0 0 9px rgba(74,222,128,0)}}

/* coach */
.g-coach{display:flex;gap:18px;max-width:1240px;margin:0 auto var(--gap);padding:20px 22px;
  border:1px solid rgba(74,222,128,.16);border-radius:var(--r);background:linear-gradient(180deg,rgba(20,44,33,.6),rgba(6,15,11,.5));}
.g-av{width:44px;height:44px;flex:none;border-radius:12px;border:1px solid rgba(74,222,128,.3);
  display:flex;align-items:center;justify-content:center;background:rgba(74,222,128,.06);}
.g-av span{font-family:var(--serif);font-size:21px;color:var(--green);}
.g-cname{font:500 9px var(--mono);letter-spacing:.2em;color:var(--green);}
.g-cname em{font-style:normal;color:var(--dimmer);letter-spacing:.1em;}
.g-chead{font-family:var(--serif);font-style:italic;font-weight:400;font-size:26px;margin:8px 0 7px;}
.g-chead.is-hot{color:var(--amber);} .g-chead.is-good{color:var(--green);}
.g-clead{font:400 13px/1.6 'Inter',sans-serif;color:var(--ink);opacity:.85;max-width:72ch;}

/* rest bar */
.g-rest{position:sticky;top:12px;z-index:5;display:flex;align-items:center;gap:14px;
  max-width:1240px;margin:0 auto var(--gap);padding:10px 18px;
  border:1px solid rgba(125,211,192,.3);border-radius:14px;background:rgba(8,26,20,.94);backdrop-filter:blur(8px);}
.g-rest svg{width:52px;flex:none;transform:rotate(-90deg);}
.g-rt{fill:none;stroke:rgba(255,255,255,.07);stroke-width:5;}
.g-rp{fill:none;stroke:var(--teal);stroke-width:5;stroke-linecap:round;}
.g-rnum{font-family:var(--serif);font-size:26px;}
.g-rnum em{font-style:normal;font:400 11px var(--mono);color:var(--dim);margin-left:2px;}
.g-rlab{font:500 9px var(--mono);letter-spacing:.2em;color:var(--teal);}
.g-rbtns{margin-left:auto;display:flex;gap:6px;}
.g-rbtns button{background:none;border:1px solid var(--line);border-radius:6px;padding:7px 10px;cursor:pointer;
  font:500 9px var(--mono);color:var(--dim);letter-spacing:.1em;}
.g-rbtns button:hover{color:var(--teal);border-color:rgba(125,211,192,.3);}
.g-rbtns button:focus-visible{outline:2px solid var(--teal);outline-offset:1px;}

/* layout */
.g-main{display:grid;grid-template-columns:1fr 300px;gap:var(--gap);max-width:1240px;margin:0 auto;align-items:start;}
.g-col-l{display:flex;flex-direction:column;gap:10px;}
.g-col-r{position:sticky;top:12px;display:flex;flex-direction:column;gap:10px;}

/* shared surface */
.g-blk,.g-ex,.g-panel{border:1px solid var(--line);border-radius:var(--r);
  background:linear-gradient(180deg,rgba(16,36,27,.5),rgba(6,15,11,.5));}

/* warm-up / cool-down */
.g-blk.is-complete{opacity:.55;}
.g-blk-h{display:flex;align-items:center;gap:14px;width:100%;background:none;border:0;cursor:pointer;padding:15px var(--pad);}
.g-blk-h:focus-visible{outline:2px solid var(--green);outline-offset:-2px;}
.g-blk-l{flex:1;text-align:left;font:500 9px var(--mono);letter-spacing:.22em;}
.g-blk.is-warm .g-blk-l{color:var(--amber);}
.g-blk.is-cool .g-blk-l{color:var(--teal);}
.g-blk-m,.g-blk-c{font:400 10px var(--mono);color:var(--dimmer);}
.g-chev{font:400 13px var(--mono);color:var(--dim);width:12px;}
.g-blk-b{padding:0 var(--pad) 12px;}
.g-row{display:flex;align-items:center;gap:11px;width:100%;background:none;border:0;cursor:pointer;
  padding:8px;border-radius:7px;text-align:left;transition:background .15s;}
.g-row:hover{background:rgba(74,222,128,.04);}
.g-row:focus-visible{outline:2px solid var(--green);outline-offset:-2px;}
.g-box{width:14px;height:14px;border-radius:4px;border:1px solid rgba(255,255,255,.14);flex:none;
  display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--bg);}
.g-row.is-done .g-box{background:var(--green);border-color:var(--green);}
.g-row-n{flex:1;font:400 11px 'Inter',sans-serif;color:var(--dim);}
.g-row.is-done .g-row-n{color:var(--ink);}
.g-row-m{font:400 9px var(--mono);color:var(--dimmer);}

/* exercise */
.g-ex{transition:border-color .2s;}
.g-ex.is-open{border-color:rgba(74,222,128,.26);}
.g-ex.is-complete .g-ex-n{color:var(--dim);text-decoration:line-through;text-decoration-color:var(--dimmer);}
.g-ex-h{display:flex;align-items:center;gap:14px;width:100%;background:none;border:0;cursor:pointer;padding:16px var(--pad);}
.g-ex-h:focus-visible{outline:2px solid var(--green);outline-offset:-2px;}
.g-ex-n{flex:1;text-align:left;font:400 14px 'Inter',sans-serif;color:var(--ink);}
.g-tag{font:500 8px var(--mono);letter-spacing:.12em;border:1px solid;border-radius:4px;padding:5px 7px;width:84px;text-align:center;flex:none;}
.g-tag.is-up{color:var(--green);border-color:rgba(74,222,128,.3);}
.g-tag.is-down{color:var(--amber);border-color:rgba(232,135,58,.3);}
.g-tag.is-hold,.g-tag.is-none{color:var(--dimmer);border-color:var(--line);}
.g-ex-p{font:500 11px var(--mono);color:var(--gold);width:104px;text-align:right;flex:none;}
.g-ex-c{font:400 10px var(--mono);color:var(--dimmer);width:28px;text-align:right;flex:none;}
.g-ex-b{padding:0 var(--pad) 16px;}
.g-why{font:400 12px/1.6 'Inter',sans-serif;color:var(--dim);padding-bottom:14px;max-width:62ch;}

.g-chips{display:flex;align-items:center;gap:5px;padding-bottom:16px;flex-wrap:wrap;}
.g-chips>span{font:500 8px var(--mono);letter-spacing:.2em;color:var(--dimmer);margin-right:5px;}
.g-chips button{background:none;border:1px solid var(--line);border-radius:6px;padding:6px 10px;cursor:pointer;
  font:400 10px var(--mono);color:var(--dim);transition:all .15s;}
.g-chips button:hover{color:var(--ink);}
.g-chips button.is-on{background:rgba(125,211,192,.12);border-color:rgba(125,211,192,.4);color:var(--teal);}
.g-chips button:focus-visible{outline:2px solid var(--teal);outline-offset:1px;}

/* set table — one grid, shared by header and rows */
.g-th,.g-tr{display:grid;grid-template-columns:24px 118px 96px 1fr 48px 58px;gap:10px;align-items:center;}
.g-th{font:500 8px var(--mono);letter-spacing:.18em;color:var(--dimmer);padding-bottom:8px;}
.g-th span:nth-child(4){text-align:center;} .g-th span:nth-child(5){text-align:right;}
.g-tr{padding:7px 0;border-top:1px solid rgba(255,255,255,.04);}
.g-tr.is-done{opacity:.5;}
.g-i{font:400 10px var(--mono);color:var(--dimmer);}
.g-bw{font:500 10px var(--mono);color:var(--dim);letter-spacing:.12em;}

.g-step{display:flex;align-items:center;gap:2px;}
.g-step button{width:28px;height:30px;border-radius:6px;border:1px solid var(--line);background:rgba(255,255,255,.02);
  color:var(--dim);cursor:pointer;font-size:14px;line-height:1;}
.g-step button:hover{color:var(--green);border-color:rgba(74,222,128,.3);}
.g-step button:focus-visible{outline:2px solid var(--green);outline-offset:1px;}
.g-step span{flex:1;text-align:center;font:400 13px var(--mono);color:var(--ink);}
.g-step em{font-style:normal;font-size:9px;color:var(--dimmer);margin-left:2px;}

.g-rpe{display:flex;gap:3px;}
.g-rpe button{flex:1;height:30px;border-radius:6px;border:1px solid var(--line);background:none;
  color:var(--dimmer);cursor:pointer;font:400 11px var(--mono);}
.g-rpe button:hover{color:var(--ink);}
.g-rpe button.is-on{background:rgba(216,178,74,.14);border-color:rgba(216,178,74,.4);color:var(--gold);}
.g-rpe button:focus-visible{outline:2px solid var(--gold);outline-offset:1px;}
.g-last{font:400 10px var(--mono);color:var(--dimmer);text-align:right;}
.g-log{height:30px;border-radius:6px;border:1px solid rgba(74,222,128,.28);background:rgba(74,222,128,.07);
  color:var(--green);cursor:pointer;font:500 9px var(--mono);letter-spacing:.1em;}
.g-log:disabled{opacity:.25;cursor:not-allowed;}
.g-log.is-done{background:var(--green);color:#062015;border-color:var(--green);}
.g-log:focus-visible{outline:2px solid var(--green);outline-offset:1px;}

.g-add,.g-addex{background:none;border:1px dashed var(--line);border-radius:8px;cursor:pointer;width:100%;
  font:500 9px var(--mono);letter-spacing:.14em;color:var(--dimmer);transition:all .2s;}
.g-add{padding:10px;margin-top:12px;}
.g-addex{padding:14px;}
.g-add:hover,.g-addex:hover{color:var(--green);border-color:rgba(74,222,128,.3);}

/* panels */
.g-panel{padding:18px var(--pad) 16px;}
.g-idx{font:400 10px var(--mono);letter-spacing:.16em;color:var(--dimmer);}
.g-grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px 14px;margin:18px 0;}
.g-sv{font-family:var(--serif);font-size:25px;line-height:1;}
.g-sv em{font-style:normal;font:400 10px var(--mono);color:var(--dim);margin-left:3px;}
.g-sv.is-good{color:var(--green);} .g-sv.is-gold{color:var(--gold);} .g-sv.is-hot{color:var(--amber);}
.g-sl{font:500 9px var(--mono);letter-spacing:.18em;color:var(--dim);margin-top:8px;text-transform:uppercase;}
.g-prog{height:4px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;margin-bottom:16px;}
.g-prog div{height:100%;background:var(--green);border-radius:3px;box-shadow:0 0 8px rgba(74,222,128,.5);transition:width .3s;}
.g-note{font:400 10px/1.5 var(--mono);color:var(--dim);letter-spacing:.04em;margin-top:12px;}
.g-note.is-hot{color:var(--amber);}
.g-ptitle{font-family:var(--serif);font-style:italic;font-weight:400;font-size:20px;margin-top:16px;}

.g-finish{width:100%;background:var(--green);border:0;color:#062015;border-radius:10px;padding:15px;cursor:pointer;
  font:500 10px var(--mono);letter-spacing:.16em;}
.g-finish:disabled{opacity:.22;cursor:not-allowed;}
.g-finish:hover:not(:disabled){filter:brightness(1.08);}
.g-finish:focus-visible{outline:2px solid var(--green);outline-offset:2px;}
.g-logged h3{font-family:var(--serif);font-style:italic;font-weight:400;font-size:24px;color:var(--green);margin-bottom:12px;}
.g-logged li{display:flex;justify-content:space-between;font:400 11px var(--mono);color:var(--dim);padding:4px 0;}
.g-logged b{color:var(--ink);font-weight:400;}

.g-stack{display:flex;align-items:flex-end;gap:5px;height:90px;}
.g-col{flex:1;display:flex;flex-direction:column-reverse;border-radius:3px;overflow:hidden;min-height:5px;}
.g-axis{display:flex;justify-content:space-between;font:500 8px var(--mono);color:var(--dimmer);letter-spacing:.14em;margin-top:8px;}
.g-keys{margin-top:16px;display:flex;flex-direction:column;gap:8px;}
.g-keys li{display:flex;align-items:center;gap:8px;font:400 10px var(--mono);color:var(--dim);}
.g-keys i{width:7px;height:7px;border-radius:2px;flex:none;display:inline-block;}
.g-keys b{margin-left:auto;color:var(--ink);font-weight:400;}

.g-foot{display:flex;justify-content:space-between;max-width:1240px;margin:40px auto 0;padding-top:18px;border-top:1px solid var(--line);
  font:400 9px var(--mono);letter-spacing:.2em;color:var(--dimmer);}

@media (max-width:1080px){
  .g-main{grid-template-columns:1fr;} .g-col-r{position:static;flex-direction:row;} .g-col-r>*{flex:1;}
  .g-top{flex-direction:column;}
}
@media (max-width:760px){
  body{padding:24px 16px 48px;}
  .g-coach{flex-direction:column;gap:12px;padding:18px;} .g-col-r{flex-direction:column;}
  .g-th,.g-tr{grid-template-columns:20px 1fr 92px 52px;}
  .g-th span:nth-child(4),.g-th span:nth-child(5),.g-rpe,.g-last{display:none;}
  .g-ex-p{width:auto;font-size:10px;} .g-tag{width:70px;}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>

<header class="g-top">
  <div>
    <a href="/train.html" class="g-back">&#8592; Train</a>
    <h1 class="g-title">Gym, <em>Sean</em></h1>
    <p class="g-sub" id="session-sub"></p>
  </div>
  <div class="g-clock">
    <span class="g-dot is-live" id="clock-dot"></span>
    <div>
      <b id="clock-time">00:00</b>
      <span id="clock-label">Session running</span>
    </div>
  </div>
</header>

<section class="g-coach" id="coach"></section>
<div id="rest-bar"></div>
<main class="g-main"><div class="g-col-l" id="col-left"></div><aside class="g-col-r" id="col-right"></aside></main>
<footer class="g-foot"><span>EPLEY e1RM &middot; RPE-GATED PROGRESSION</span><span>DELOAD FLOORS BELOW THE INCREMENT</span></footer>

<script>
(function() {
  'use strict';

  /* ── Progression maths ── */
  function deloadTo(kg, inc) {
    return inc ? Math.min(Math.floor((kg * 0.9) / inc) * inc, kg - inc) : 0;
  }

  function prescribe(lift, gate) {
    var lo = lift.repRange[0], hi = lift.repRange[1];
    if (lift.history.length < 2)
      return { reps: lo, action: 'none', why: "Log a session first. I don't guess." };

    var last = lift.history[lift.history.length - 1];
    var reps = last.sets.map(function(s) { return s.reps; });
    var rpeSum = last.sets.reduce(function(a, s) { return a + s.rpe; }, 0);
    var rpe = rpeSum / last.sets.length;
    var kg = last.sets[0].kg;

    if (reps.some(function(r) { return r < lo; })) {
      var down = deloadTo(kg, lift.increment);
      return { kg: down, reps: lo, action: 'down',
        why: lift.increment
          ? 'You missed the bottom of the range at RPE ' + rpe.toFixed(1) + '. Back to ' + down + 'kg and rebuild.'
          : 'Reps are falling. Get ' + lo + ' clean before adding volume.' };
    }

    if (reps.every(function(r) { return r >= hi; }) && rpe <= 8) {
      if (gate.hold)
        return { kg: kg, reps: hi, action: 'hold', why: 'You earned the jump. ' + gate.reason + ' Not this week.' };
      if (!lift.increment)
        return { kg: 0, reps: hi + 1, action: 'up', why: 'Bodyweight. Load doesn\'t move \u2014 add a rep. ' + (hi + 1) + ' clean.' };
      return { kg: kg + lift.increment, reps: lo, action: 'up',
        why: 'Every set hit ' + hi + ' at RPE ' + rpe.toFixed(1) + '. Add ' + lift.increment + 'kg, drop to ' + lo + 's.' };
    }

    return { kg: kg, reps: hi, action: 'hold', why: 'Same weight. Chase ' + hi + ' on every set before you add load.' };
  }

  function clockFmt(s) { return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0'); }
  function restFmt(s) { return s >= 60 ? Math.floor(s/60) + ':' + String(s%60).padStart(2,'0') : s + 's'; }

  var DISC = { team:{label:'TEAM',color:'#4ADE80'}, gym:{label:'GYM',color:'#D8B24A'}, run:{label:'RUN',color:'#7DD3C0'}, mobility:{label:'MOBILITY',color:'#2E7F5B'} };
  var RPES = [6,7,8,9,10];
  var RESTS = [60,90,120,180,240];

  /* ── Mock data ── */
  function st(kg, reps, rpe) { return { kg:kg, reps:reps, rpe:rpe }; }

  var data = {
    session: { name:'Lower + pull', at:'07:00' },
    gate: { hold:false, reason:'' },
    warmup: [
      { n:'Bike or row, easy', m:5, done:false },
      { n:'Hip 90/90 + ankle rocks', m:4, done:false },
      { n:'Adductor rockbacks', m:3, done:false },
      { n:'Squat ramp \u2014 bar, 40, 60kg', m:6, done:false }
    ],
    cooldown: [
      { n:'Walk, nasal breathing', m:5, done:false },
      { n:'Couch stretch, each side', m:4, done:false },
      { n:'Adductor + hamstring hold', m:4, done:false },
      { n:'Box breathing, 4-4-4-4', m:3, done:false }
    ],
    lifts: [
      { name:'Back squat', repRange:[5,8], increment:5, rest:180, history:[
        { sets:[st(85,7,8),st(85,7,8),st(85,6,8.5)] },
        { sets:[st(85,8,7.5),st(85,8,8),st(85,8,8)] }
      ]},
      { name:'Romanian deadlift', repRange:[6,10], increment:5, rest:150, history:[
        { sets:[st(90,10,7),st(90,10,7.5),st(90,10,8)] },
        { sets:[st(95,8,8),st(95,8,8),st(95,7,8.5)] }
      ]},
      { name:'Weighted chin-up', repRange:[4,7], increment:2.5, rest:120, history:[
        { sets:[st(10,6,8.5),st(10,5,9),st(10,3,10)] },
        { sets:[st(10,5,9),st(10,4,9.5),st(10,3,10)] }
      ]},
      { name:'Nordic curl', repRange:[4,6], increment:0, rest:90, history:[
        { sets:[st(0,6,8),st(0,5,8.5),st(0,5,9)] },
        { sets:[st(0,6,8),st(0,6,8.5),st(0,6,9)] }
      ]}
    ],
    weeks: [
      {team:160,gym:120,run:40,mobility:30},{team:180,gym:150,run:58,mobility:42},
      {team:200,gym:120,run:76,mobility:54},{team:160,gym:150,run:94,mobility:30},
      {team:180,gym:120,run:40,mobility:42},{team:200,gym:150,run:58,mobility:54},
      {team:160,gym:120,run:76,mobility:30},{team:180,gym:150,run:94,mobility:42}
    ]
  };

  /* ── State ── */
  var elapsed = 0;
  var finished = false;
  var openEx = data.lifts[0].name;
  var rests = {};
  data.lifts.forEach(function(l) { rests[l.name] = l.rest; });

  var plans = {};
  data.lifts.forEach(function(l) { plans[l.name] = prescribe(l, data.gate); });

  var log = {};
  data.lifts.forEach(function(l) {
    var p = plans[l.name];
    log[l.name] = [
      { kg: p.kg || 0, reps: p.reps, rpe: null, done: false },
      { kg: p.kg || 0, reps: p.reps, rpe: null, done: false },
      { kg: p.kg || 0, reps: p.reps, rpe: null, done: false }
    ];
  });

  var restLeft = null, restTotal = 0, restInterval = null;

  /* ── Timer ── */
  function startRest(secs) {
    restTotal = secs; restLeft = secs;
    clearInterval(restInterval);
    restInterval = setInterval(function() {
      restLeft--;
      if (restLeft <= 0) { restLeft = null; clearInterval(restInterval); }
      renderRestBar();
    }, 1000);
    renderRestBar();
  }
  function stopRest() { restLeft = null; clearInterval(restInterval); renderRestBar(); }
  function addRest(s) { if (restLeft !== null) { restLeft += s; renderRestBar(); } }

  /* ── Elapsed clock ── */
  setInterval(function() {
    if (finished) return;
    elapsed++;
    document.getElementById('clock-time').textContent = clockFmt(elapsed);
  }, 1000);

  /* ── Render header ── */
  document.getElementById('session-sub').textContent = data.session.name.toUpperCase() + ' \u00B7 ' + data.session.at;

  /* ── Coach ── */
  function renderCoach() {
    var ups = data.lifts.filter(function(l) { return plans[l.name].action === 'up'; });
    var downs = data.lifts.filter(function(l) { return plans[l.name].action === 'down'; });
    var headline = data.gate.hold ? 'HOLD EVERYTHING'
      : downs.length ? downs[0].name.toUpperCase() + ' \u2014 BACK OFF'
      : ups.length ? 'ADD LOAD TODAY' : 'CHASE REPS';
    var lead = data.gate.hold ? data.gate.reason
      : downs.length ? plans[downs[0].name].why
      : ups.length ? plans[ups[0].name].why
      : 'Nothing moves today. Top of every rep range, then we talk.';
    var tone = (downs.length || data.gate.hold) ? 'hot' : 'good';

    document.getElementById('coach').innerHTML =
      '<div class="g-av"><span>K</span></div><div>' +
      '<div class="g-cname">KHABIB <em>\u00B7 your AI coach</em></div>' +
      '<h2 class="g-chead is-' + tone + '">' + headline + '</h2>' +
      '<p class="g-clead">' + lead + '</p></div>';
  }

  /* ── Rest bar ── */
  function renderRestBar() {
    var el = document.getElementById('rest-bar');
    if (restLeft === null || finished) { el.innerHTML = ''; return; }
    var R = 26, C = 2 * Math.PI * R;
    el.innerHTML = '<div class="g-rest" role="status" aria-live="polite">' +
      '<svg viewBox="0 0 66 66" aria-hidden="true">' +
      '<circle cx="33" cy="33" r="' + R + '" class="g-rt"/>' +
      '<circle cx="33" cy="33" r="' + R + '" class="g-rp" stroke-dasharray="' + (C * restLeft / restTotal) + ' ' + C + '"/>' +
      '</svg>' +
      '<div class="g-rnum">' + restLeft + '<em>s</em></div>' +
      '<span class="g-rlab">RESTING</span>' +
      '<div class="g-rbtns"><button id="rest-add">+30s</button><button id="rest-skip">Skip</button></div></div>';
    document.getElementById('rest-add').addEventListener('click', function() { addRest(30); });
    document.getElementById('rest-skip').addEventListener('click', function() { stopRest(); });
  }

  /* ── Blocks (warmup/cooldown) ── */
  function renderBlock(key, label, tone) {
    var blocks = data[key];
    var done = blocks.filter(function(b) { return b.done; }).length;
    var mins = blocks.reduce(function(a, b) { return a + b.m; }, 0);
    var isOpen = openEx === key;
    var complete = done === blocks.length;

    var html = '<section class="g-blk is-' + tone + (complete ? ' is-complete' : '') + '">' +
      '<button class="g-blk-h" data-toggle="' + key + '" aria-expanded="' + isOpen + '">' +
      '<span class="g-blk-l">' + label + '</span>' +
      '<span class="g-blk-m">' + mins + '\u2032</span>' +
      '<span class="g-blk-c">' + done + '/' + blocks.length + '</span>' +
      '<span class="g-chev">' + (isOpen ? '\u2212' : '+') + '</span></button>';

    if (isOpen) {
      html += '<ul class="g-blk-b">';
      blocks.forEach(function(b) {
        html += '<li><button class="g-row' + (b.done ? ' is-done' : '') + '" data-tick="' + key + '|' + b.n + '" aria-pressed="' + b.done + '">' +
          '<span class="g-box">' + (b.done ? '\u2713' : '') + '</span>' +
          '<span class="g-row-n">' + b.n + '</span>' +
          '<span class="g-row-m">' + b.m + '\u2032</span></button></li>';
      });
      html += '</ul>';
    }
    html += '</section>';
    return html;
  }

  /* ── Exercise ── */
  function renderExercise(lift) {
    var plan = plans[lift.name];
    var sets = log[lift.name];
    var done = sets.filter(function(s) { return s.done; }).length;
    var isOpen = openEx === lift.name;
    var complete = done === sets.length;
    var last = lift.history.length ? lift.history[lift.history.length - 1].sets : [];
    var restSec = rests[lift.name];

    var tag = plan.action === 'up' ? '\u25B2 +' + (lift.increment || 1) + (lift.increment ? 'kg' : ' rep')
      : plan.action === 'down' ? '\u25BC DELOAD'
      : plan.action === 'none' ? 'NEW' : '= HOLD';

    var prescription = plan.action === 'none' ? '\u2014'
      : sets.length + '\u00D7' + plan.reps + (lift.increment ? ' \u00B7 ' + (plan.kg || 0) + 'kg' : '');

    var html = '<section class="g-ex' + (isOpen ? ' is-open' : '') + (complete ? ' is-complete' : '') + '">' +
      '<button class="g-ex-h" data-toggle="' + lift.name + '" aria-expanded="' + isOpen + '">' +
      '<span class="g-ex-n">' + lift.name + '</span>' +
      '<span class="g-tag is-' + plan.action + '">' + tag + '</span>' +
      '<span class="g-ex-p">' + prescription + '</span>' +
      '<span class="g-ex-c">' + done + '/' + sets.length + '</span></button>';

    if (isOpen) {
      html += '<div class="g-ex-b"><p class="g-why">' + plan.why + '</p>';

      // Rest chips
      html += '<div class="g-chips"><span>REST</span>';
      RESTS.forEach(function(r) {
        html += '<button class="' + (restSec === r ? 'is-on' : '') + '" data-rest="' + lift.name + '|' + r + '" aria-pressed="' + (restSec === r) + '">' + restFmt(r) + '</button>';
      });
      html += '</div>';

      // Table header
      html += '<div class="g-tbl"><div class="g-th"><span>SET</span><span>' + (lift.increment ? 'LOAD' : '') + '</span><span>REPS</span><span>RPE</span><span>LAST</span><span></span></div>';

      // Set rows
      sets.forEach(function(s, i) {
        html += '<div class="g-tr' + (s.done ? ' is-done' : '') + '">';
        html += '<span class="g-i">' + (i + 1) + '</span>';

        // Load stepper or BW
        if (lift.increment) {
          html += '<div class="g-step">' +
            '<button data-step="' + lift.name + '|' + i + '|kg|-' + lift.increment + '">\u2212</button>' +
            '<span>' + s.kg + '<em>kg</em></span>' +
            '<button data-step="' + lift.name + '|' + i + '|kg|' + lift.increment + '">+</button></div>';
        } else {
          html += '<span class="g-bw">BW</span>';
        }

        // Reps stepper
        html += '<div class="g-step">' +
          '<button data-step="' + lift.name + '|' + i + '|reps|-1">\u2212</button>' +
          '<span>' + s.reps + '</span>' +
          '<button data-step="' + lift.name + '|' + i + '|reps|1">+</button></div>';

        // RPE
        html += '<div class="g-rpe" role="group" aria-label="RPE">';
        RPES.forEach(function(r) {
          html += '<button class="' + (s.rpe === r ? 'is-on' : '') + '" data-rpe="' + lift.name + '|' + i + '|' + r + '">' + r + '</button>';
        });
        html += '</div>';

        // Last
        var lastSet = last[i];
        html += '<span class="g-last">' + (lastSet ? (lastSet.kg || 'BW') + '\u00D7' + lastSet.reps : '\u2014') + '</span>';

        // Log button
        html += '<button class="g-log' + (s.done ? ' is-done' : '') + '" data-log="' + lift.name + '|' + i + '"' +
          (s.rpe ? '' : ' disabled') + ' aria-label="' + (s.done ? 'Undo set' : 'Log set') + '">' +
          (s.done ? '\u2713' : 'Log') + '</button>';

        html += '</div>';
      });

      html += '</div>'; // end g-tbl
      html += '<button class="g-add" data-addset="' + lift.name + '">+ Add set</button>';
      html += '</div>'; // end g-ex-b
    }
    html += '</section>';
    return html;
  }

  /* ── Session panel ── */
  function renderSessionPanel() {
    var all = [];
    Object.keys(log).forEach(function(k) { log[k].forEach(function(s) { all.push(s); }); });
    var doneSets = all.filter(function(s) { return s.done; });
    var tonnage = doneSets.reduce(function(a, s) { return a + s.kg * s.reps; }, 0);
    var meanRpe = doneSets.length ? doneSets.reduce(function(a, s) { return a + s.rpe; }, 0) / doneSets.length : 0;
    var mins = Math.round(elapsed / 60);
    var load = Math.round(meanRpe * mins);
    var pct = all.length ? (doneSets.length / all.length) * 100 : 0;

    var html = '<section class="g-panel"><div class="g-idx">01</div>' +
      '<div class="g-grid2">' +
      '<div class="g-stat"><div class="g-sv">' + doneSets.length + '<em>/' + all.length + '</em></div><div class="g-sl">Sets logged</div></div>' +
      '<div class="g-stat"><div class="g-sv">' + Math.round(tonnage).toLocaleString() + '<em>kg</em></div><div class="g-sl">Tonnage</div></div>' +
      '<div class="g-stat"><div class="g-sv is-gold">' + (meanRpe ? meanRpe.toFixed(1) : '\u2014') + '</div><div class="g-sl">Mean RPE</div></div>' +
      '<div class="g-stat"><div class="g-sv is-good">' + (load || '\u2014') + '</div><div class="g-sl">Session load</div></div>' +
      '</div>' +
      '<div class="g-prog"><div style="width:' + pct + '%"></div></div>';

    if (finished) {
      html += '<div class="g-logged"><h3>Logged.</h3><ul>' +
        '<li><span>Duration</span><b>' + mins + ' min</b></li>' +
        '<li><span>Load to Peak</span><b>' + load + '</b></li></ul>' +
        '<p class="g-note">Next session\'s weights come from this. Fix a bad log now, not later.</p></div>';
    } else {
      html += '<button class="g-finish" id="finish-btn"' + (!doneSets.length ? ' disabled' : '') + '>Finish session</button>' +
        '<p class="g-note">Load = mean RPE \u00D7 minutes. The Peak page reads this number.</p>';
    }
    html += '<h2 class="g-ptitle">SESSION</h2></section>';
    return html;
  }

  /* ── Load panel ── */
  function renderLoadPanel() {
    var keys = ['team','gym','run','mobility'];
    var weeks = data.weeks;
    var totals = weeks.map(function(w) { return keys.reduce(function(a, k) { return a + w[k]; }, 0); });
    var max = Math.max.apply(null, totals);
    var now = weeks[weeks.length - 1];
    var total = totals[totals.length - 1];
    var prev = totals[totals.length - 2];
    var delta = Math.round(((total - prev) / prev) * 100);
    var spike = delta > 30;

    var html = '<section class="g-panel"><div class="g-idx">02</div>' +
      '<div class="g-grid2">' +
      '<div class="g-stat"><div class="g-sv is-good">' + Math.floor(total/60) + 'h ' + (total%60) + 'm</div><div class="g-sl">This week</div></div>' +
      '<div class="g-stat"><div class="g-sv' + (spike ? ' is-hot' : '') + '">' + (delta > 0 ? '+' : '') + delta + '<em>%</em></div><div class="g-sl">Vs last week</div></div>' +
      '</div>';

    html += '<div class="g-stack">';
    weeks.forEach(function(w, i) {
      html += '<div class="g-col" style="height:' + (totals[i] / max * 100) + '%">';
      keys.forEach(function(k) {
        html += '<div style="flex:' + w[k] + ';background:' + DISC[k].color + '" title="' + DISC[k].label + ' ' + w[k] + '\u2032"></div>';
      });
      html += '</div>';
    });
    html += '</div><div class="g-axis"><span>8 WEEKS AGO</span><span>NOW</span></div>';

    html += '<ul class="g-keys">';
    keys.forEach(function(k) {
      html += '<li><i style="background:' + DISC[k].color + '"></i>' + DISC[k].label + '<b>' + now[k] + '\u2032</b></li>';
    });
    html += '</ul>';

    if (spike) html += '<p class="g-note is-hot">Volume jumped ' + delta + '% on last week. Above 30% is where soft tissue fails.</p>';
    html += '<h2 class="g-ptitle">LOAD</h2></section>';
    return html;
  }

  /* ── Main render ── */
  function renderAll() {
    renderCoach();

    var left = '';
    left += renderBlock('warmup', 'WARM-UP', 'warm');
    data.lifts.forEach(function(l) { left += renderExercise(l); });
    left += '<button class="g-addex">+ Add exercise</button>';
    left += renderBlock('cooldown', 'COOL-DOWN', 'cool');
    document.getElementById('col-left').innerHTML = left;

    document.getElementById('col-right').innerHTML = renderSessionPanel() + renderLoadPanel();

    bindEvents();
  }

  /* ── Event binding ── */
  function bindEvents() {
    // Toggle expand
    document.querySelectorAll('[data-toggle]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var name = this.dataset.toggle;
        openEx = (openEx === name) ? null : name;
        renderAll();
      });
    });

    // Block ticks
    document.querySelectorAll('[data-tick]').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var parts = this.dataset.tick.split('|');
        var key = parts[0], name = parts[1];
        data[key].forEach(function(b) { if (b.n === name) b.done = !b.done; });
        renderAll();
      });
    });

    // Rest chips
    document.querySelectorAll('[data-rest]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var parts = this.dataset.rest.split('|');
        rests[parts[0]] = parseInt(parts[1]);
        renderAll();
      });
    });

    // Steppers
    document.querySelectorAll('[data-step]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var parts = this.dataset.step.split('|');
        var name = parts[0], idx = parseInt(parts[1]), field = parts[2], delta = parseFloat(parts[3]);
        var s = log[name][idx];
        if (field === 'kg') s.kg = Math.max(0, +(s.kg + delta).toFixed(2));
        else s.reps = Math.max(1, s.reps + delta);
        renderAll();
      });
    });

    // RPE
    document.querySelectorAll('[data-rpe]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var parts = this.dataset.rpe.split('|');
        log[parts[0]][parseInt(parts[1])].rpe = parseInt(parts[2]);
        renderAll();
      });
    });

    // Log set
    document.querySelectorAll('[data-log]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var parts = this.dataset.log.split('|');
        var s = log[parts[0]][parseInt(parts[1])];
        var was = s.done;
        s.done = !was;
        if (!was) startRest(rests[parts[0]]);
        renderAll();
      });
    });

    // Add set
    document.querySelectorAll('[data-addset]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var name = this.dataset.addset;
        var sets = log[name];
        var last = sets[sets.length - 1];
        log[name].push({ kg: last.kg, reps: last.reps, rpe: null, done: false });
        renderAll();
      });
    });

    // Finish
    var finBtn = document.getElementById('finish-btn');
    if (finBtn) {
      finBtn.addEventListener('click', function() {
        finished = true;
        document.getElementById('clock-dot').className = 'g-dot';
        document.getElementById('clock-label').textContent = 'Session logged';
        stopRest();
        renderAll();
      });
    }
  }

  renderAll();

  /* ── Try live data ── */
  fetch('/api/gym/session').then(function(r) { return r.ok ? r.json() : null; }).then(function(j) {
    if (!j) return;
    data = j;
    rests = {}; plans = {}; log = {};
    data.lifts.forEach(function(l) { rests[l.name] = l.rest; });
    data.lifts.forEach(function(l) { plans[l.name] = prescribe(l, data.gate); });
    data.lifts.forEach(function(l) {
      var p = plans[l.name];
      log[l.name] = [
        { kg:p.kg||0, reps:p.reps, rpe:null, done:false },
        { kg:p.kg||0, reps:p.reps, rpe:null, done:false },
        { kg:p.kg||0, reps:p.reps, rpe:null, done:false }
      ];
    });
    renderAll();
  }).catch(function() {});

})();
</script>
</body>
</html>
