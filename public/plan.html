<style>
:root {
  --bg:#050D0A;--line:rgba(74,222,128,.10);--green:#4ADE80;--teal:#7DD3C0;--amber:#E8873A;--gold:#D8B24A;--violet:#9C8ADE;
  --ink:#E6F2EC;--dim:#5F786E;--dimmer:#3B4E47;
  --mono:'JetBrains Mono',monospace;--serif:'Instrument Serif',Georgia,serif;--sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --card:rgba(255,255,255,0.035);--border:rgba(255,255,255,0.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:var(--sans);background:var(--bg);color:var(--ink);
  min-height:100vh;padding:20px;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 20% 10%,rgba(74,222,128,0.06),transparent 60%),
             radial-gradient(ellipse at 80% 80%,rgba(232,135,58,0.04),transparent 60%);
  filter:blur(40px);pointer-events:none;z-index:-1;
}

/* Header */
.header{max-width:1400px;margin:0 auto 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.header-left{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;}
.back-link{display:inline-flex;align-items:center;gap:10px;padding:12px 20px 12px 16px;border:1px solid var(--line);border-radius:14px;background:rgba(16,36,27,.35);font:500 12px/1 var(--mono);letter-spacing:.08em;color:var(--dim);text-decoration:none;transition:all .2s;}
.back-link:hover{color:var(--green);border-color:rgba(74,222,128,.35);background:rgba(74,222,128,.06);transform:translateX(-3px);}
.title{font-family:var(--serif);font-style:italic;font-size:32px;color:var(--ink);}
.week-dates{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.04em;}
.header-right{display:flex;align-items:center;gap:16px;}
.clock{font-family:var(--mono);font-size:13px;color:var(--green);letter-spacing:.02em;}
.nav-btn{
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  color:var(--dim);font-size:16px;width:32px;height:32px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.nav-btn:hover{color:var(--green);border-color:rgba(74,222,128,.2);}

/* Grid */
.planner-grid{
  max-width:1400px;margin:0 auto;
  display:grid;grid-template-columns:repeat(7,1fr);gap:8px;
}
.day-col{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:12px 10px;min-height:520px;position:relative;transition:border-color .3s;
}
.day-col.today{border-color:rgba(74,222,128,.35);box-shadow:0 0 20px rgba(74,222,128,.06);}
.day-header{text-align:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.day-name{font-family:var(--mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);}
.day-date{font-family:var(--mono);font-size:12px;color:var(--ink);margin-top:2px;}
.day-col.today .day-name{color:var(--green);}

/* Time blocks */
.block{
  padding:6px 8px;border-radius:8px;margin-bottom:5px;
  font-family:var(--sans);font-size:11px;line-height:1.35;
  border-left:3px solid;position:relative;
}
.block .block-time{font-family:var(--mono);font-size:9px;opacity:.7;display:block;margin-bottom:1px;}
.block .block-label{font-weight:500;}
.block--green{background:rgba(74,222,128,.08);border-color:var(--green);color:var(--green);}
.block--teal{background:rgba(125,211,192,.08);border-color:var(--teal);color:var(--teal);}
.block--amber{background:rgba(232,135,58,.08);border-color:var(--amber);color:var(--amber);}
.block--gold{background:rgba(216,178,74,.08);border-color:var(--gold);color:var(--gold);}
.block--violet{background:rgba(156,138,222,.08);border-color:var(--violet);color:var(--violet);}
.block--large{padding:10px 8px;font-size:12px;}

/* Appointment pills */
.appt-pill{
  padding:5px 8px;border-radius:6px;margin-bottom:4px;
  font-family:var(--mono);font-size:10px;cursor:pointer;
  border:1px dashed;transition:opacity .2s;
}
.appt-pill:hover{opacity:.7;}

/* Time indicator */
.time-indicator{
  position:absolute;left:0;right:0;height:2px;
  background:var(--green);z-index:5;pointer-events:none;
  box-shadow:0 0 6px var(--green);
}
.time-indicator::before{
  content:'';position:absolute;left:-3px;top:-3px;
  width:8px;height:8px;border-radius:50%;background:var(--green);
}

/* Appointments section */
.appt-section{
  max-width:1400px;margin:20px auto 0;
  background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 20px;
}
.appt-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.appt-title{font-family:var(--serif);font-style:italic;font-size:20px;}
.add-btn{
  background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2);border-radius:8px;
  color:var(--green);font:500 12px var(--mono);padding:6px 14px;cursor:pointer;transition:all .2s;
}
.add-btn:hover{background:rgba(74,222,128,.18);}
.appt-list{display:flex;flex-wrap:wrap;gap:8px;}
.appt-item{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;
  padding:8px 12px;font-size:12px;
}
.appt-item .dot{width:8px;height:8px;border-radius:50;flex-shrink:0;}
.appt-item .appt-info{display:flex;flex-direction:column;gap:1px;}
.appt-item .appt-name{font-weight:500;color:var(--ink);}
.appt-item .appt-meta{font-family:var(--mono);font-size:10px;color:var(--dim);}
.appt-item .appt-del{
  background:none;border:none;color:var(--dimmer);cursor:pointer;font-size:14px;padding:0 4px;
}
.appt-item .appt-del:hover{color:#FF6B6B;}

/* Modal */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:100;align-items:center;justify-content:center;
}
.modal-overlay.active{display:flex;}
.modal{
  background:#0D1A14;border:1px solid var(--border);border-radius:16px;
  padding:24px;width:90%;max-width:380px;
}
.modal h3{font-family:var(--serif);font-style:italic;font-size:22px;margin-bottom:16px;}
.modal label{display:block;font-family:var(--mono);font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;margin-top:12px;}
.modal input,.modal select{
  width:100%;padding:8px 12px;background:rgba(255,255,255,.04);border:1px solid var(--border);
  border-radius:8px;color:var(--ink);font:13px var(--sans);outline:none;
}
.modal input:focus,.modal select:focus{border-color:rgba(74,222,128,.3);}
.modal select option{background:#0D1A14;color:var(--ink);}
.modal-actions{display:flex;gap:8px;margin-top:20px;}
.modal-actions button{
  flex:1;padding:10px;border-radius:8px;font:500 12px var(--mono);cursor:pointer;border:none;
}
.modal-actions .btn-save{background:var(--green);color:#050D0A;}
.modal-actions .btn-cancel{background:rgba(255,255,255,.06);color:var(--dim);}
.modal-actions .btn-delete{background:rgba(255,107,107,.15);color:#FF6B6B;}

/* Color picker row */
.color-options{display:flex;gap:8px;margin-top:6px;}
.color-opt{
  width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .2s;
}
.color-opt.selected{border-color:var(--ink);}

/* Mobile */
@media(max-width:900px){
  .planner-grid{grid-template-columns:1fr;gap:10px;}
  .day-col{min-height:auto;}
  .day-col:not(.visible){display:none;}
  .mobile-nav{display:flex!important;}

@media(min-width:901px){

.mobile-nav{

.mobile-nav .nav-btn{width:36px;height:36px;}
.mobile-day-label{font-family:var(--mono);font-size:12px;color:var(--ink);min-width:120px;text-align:center;}
</style>

/* ── Day type resolver (same logic as dashboard) ── */
function resolveDayType(planDow) {
  const cfg = loadGameDay();
  const teamCfg = loadTeamDays();
  const gameDays = cfg.days || [5];
  const isBye = cfg.status === 'bye';
  const teamDays = teamCfg.days || [1, 3];

  if (gameDays.includes(planDow)) return isBye ? 'bye' : 'match';

  if (!isBye) {
    for (const g of gameDays) {
      if (planDow === (g + 6) % 7) return 'prematch';
      if (planDow === (g + 1) % 7) return 'recovery';
    }
  }

  if (planDow === 6) return 'recovery'; // Sunday

  if (teamDays.includes(planDow)) {
    return teamDays.indexOf(planDow) === 0 ? 'team_a' : 'team_b';
  }

  // Remaining: alternate heavy lower / upper
  let heavySlot = 0;
  for (let j = 0; j < planDow; j++) {
    if (gameDays.includes(j)) continue;
    if (j === 6) continue;
    if (teamDays.includes(j)) continue;
    let skip = false;
    if (!isBye) {
      for (const g of gameDays) {
        if (j === (g + 6) % 7 || j === (g + 1) % 7) { skip = true; break; }
      }
    }
    if (skip) continue;
    heavySlot++;
  }
  return heavySlot % 2 === 0 ? 'heavy_lower' : 'heavy_upper';
}

/* ── Helpers ── */
function getMelbourneNow(){
  return new Date(new Date().toLocaleString('en-US',{timeZone:'Australia/Melbourne'}));
}

function getMonday(date){
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  d.setDate(diff);
  d.setHours(0,0,0,0);
  return d;
}

function formatDate(d){
  return d.getDate()+' '+ d.toLocaleString('en-AU',{month:'short'});
}

function getWeekMonday(){
  const now = getMelbourneNow();
  const mon = getMonday(now);
  mon.setDate(mon.getDate() + weekOffset * 7);
  return mon;
}

/* ── Clock ── */
function updateClock(){
  const now = getMelbourneNow();
  const h = now.getHours().toString().padStart(2,'0');
  const m = now.getMinutes().toString().padStart(2,'0');
  const s = now.getSeconds().toString().padStart(2,'0');
  document.getElementById('clock').textContent = h+':'+m+':'+s+' AEST';
}
updateClock();
setInterval(updateClock,1000);

/* ── Appointments (localStorage) ── */
const STORAGE_KEY = 'planner-appointments';

function loadAppointments(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  // Default appointment
  const defaults = [
    {id:'mfm-jul15',name:'MFM Appointment',day:1,time:'12:00',color:'amber',date:'2026-07-15'}
  ];
  saveAppointments(defaults);
  return defaults;
}

function saveAppointments(appts){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(appts));
}

function getAppointmentsForWeek(monday){
  const appts = loadAppointments();
  const results = [];
  for(let i=0;i<7;i++){
    const d = new Date(monday);
    d.setDate(d.getDate()+i);
    const dateStr = d.toISOString().split('T')[0];
    const dow = i; // 0=Mon
    appts.forEach(a=>{
      if(a.date && a.date===dateStr){
        results.push({...a,dayIndex:i});
      } else if(!a.date && a.day===dow){
        results.push({...a,dayIndex:i});
      }
    });
  }
  return results;
}

/* ── Render ── */
function render(){
  const monday = getWeekMonday();
  const now = getMelbourneNow();
  const todayStr = now.toISOString().split('T')[0];

  // Week dates header
  const sunday = new Date(monday);
  sunday.setDate(sunday.getDate()+6);
  document.getElementById('week-dates').textContent = formatDate(monday)+' - '+formatDate(sunday)+', '+monday.getFullYear();

  // Get appointments for this week
  const weekAppts = getAppointmentsForWeek(monday);

  // Build grid
  const grid = document.getElementById('planner-grid');
  grid.innerHTML = '';

  const gameDayCfg = loadGameDay();

  for(let i=0;i<7;i++){
    const dayDate = new Date(monday);
    dayDate.setDate(dayDate.getDate()+i);
    const dateStr = dayDate.toISOString().split('T')[0];
    const isToday = dateStr === todayStr;
    const isMobileVisible = i === mobileDay;
    // Resolve day type dynamically
    const dayType = resolveDayType(i);
    const typeLabel = TYPE_LABELS[dayType] || '';
    const typeColors = {match:'var(--amber)',prematch:'var(--gold)',recovery:'var(--teal)',bye:'var(--teal)',heavy_lower:'var(--green)',heavy_upper:'var(--green)',team_a:'var(--green)',team_b:'var(--green)'};
    const borderColors = {match:'rgba(232,135,58,.35)',prematch:'rgba(216,178,74,.25)',recovery:'rgba(125,211,192,.2)',bye:'rgba(125,211,192,.25)',team_a:'rgba(74,222,128,.25)',team_b:'rgba(74,222,128,.25)'};

    const col = document.createElement('div');
    col.className = 'day-col' + (isToday?' today':'') + (isMobileVisible?' visible':'');
    if(borderColors[dayType]) col.style.borderColor = borderColors[dayType];

    // Header with type badge
    const typeBadge = typeLabel ? `<div style="font:600 8px var(--mono);color:${typeColors[dayType]||'var(--dim)'};letter-spacing:.1em;margin-top:2px">${typeLabel}</div>` : '';
    col.innerHTML = `<div class="day-header"><div class="day-name">${DAY_SHORT[i]}</div><div class="day-date">${dayDate.getDate()}</div>${typeBadge}</div>`;

    // Work block (if work scheduled on this day)
    const workCfg = loadWork();
    if(workCfg.days.includes(i)){
      col.innerHTML += `<div class="block block--gold" style="background:rgba(216,178,74,.1);border-color:var(--gold);color:var(--gold)"><span class="block-time">${workCfg.start}-${workCfg.end}</span><span class="block-label">WORK</span></div>`;
    }

    // Template blocks from resolved day type
    const blocks = SCHEDULE_TEMPLATES[dayType] || [];
    blocks.forEach(b=>{
      const colorClass = b.color === 'dimmer' ? '' : 'block--'+b.color;
      const dimStyle = b.color === 'dimmer' ? 'background:rgba(255,255,255,.03);border-color:var(--dimmer);color:var(--dim);' : '';
      const large = b.large ? ' block--large' : '';
      col.innerHTML += `<div class="block ${colorClass}${large}" style="${dimStyle}"><span class="block-time">${b.time}</span><span class="block-label">${b.label}</span></div>`;
    });

    // Appointments for this day
    const dayAppts = weekAppts.filter(a=>a.dayIndex===i);
    dayAppts.forEach(a=>{
      const colors = {green:'var(--green)',teal:'var(--teal)',amber:'var(--amber)',gold:'var(--gold)',violet:'var(--violet)'};
      const c = colors[a.color]||'var(--green)';
      const apptEnd = a.endTime || (()=>{ const sp=a.time.split(':'); const sm=parseInt(sp[0])*60+parseInt(sp[1]||0)+(a.duration||60); return String(Math.floor(sm/60)%24).padStart(2,'0')+':'+String(sm%60).padStart(2,'0'); })();
      col.innerHTML += `<div class="appt-pill" style="border-color:${c};color:${c};background:${c}11;" data-id="${a.id}" onclick="window._editAppt('${a.id}')"><span style="font-size:9px;opacity:.7;">${a.time}-${apptEnd}</span> ${a.name}</div>`;
    });

    // Time indicator for today
    if(isToday){
      const mins = now.getHours()*60+now.getMinutes();
      // Map roughly: 6am=0%, 11pm=100% of column height
      const startMin=360, endMin=1380;
      const pct = Math.max(0,Math.min(100,((mins-startMin)/(endMin-startMin))*100));
      if(mins>=startMin && mins<=endMin){
        col.innerHTML += `<div class="time-indicator" style="top:${40+pct*4.5}px;"></div>`;
      }
    }

    grid.appendChild(col);
  }

  // Mobile day label
  const mobileDayDate = new Date(monday);
  mobileDayDate.setDate(mobileDayDate.getDate()+mobileDay);
  document.getElementById('mobile-day-label').textContent = DAY_NAMES[mobileDay]+', '+formatDate(mobileDayDate);

  // Render appointments list
  renderApptList();
}

function renderApptList(){
  const appts = loadAppointments();
  const list = document.getElementById('appt-list');
  if(!appts.length){
    list.innerHTML = '<span style="font-size:12px;color:var(--dim);">No appointments yet.</span>';
    return;
  }
  const colors = {green:'var(--green)',teal:'var(--teal)',amber:'var(--amber)',gold:'var(--gold)',violet:'var(--violet)'};
  list.innerHTML = appts.map(a=>{
    const c = colors[a.color]||'var(--green)';
    const dayLabel = a.date ? a.date : DAY_NAMES[a.day]+' (weekly)';
    const endLabel = a.endTime || (()=>{ const sp=a.time.split(':'); const sm=parseInt(sp[0])*60+parseInt(sp[1]||0)+(a.duration||60); return String(Math.floor(sm/60)%24).padStart(2,'0')+':'+String(sm%60).padStart(2,'0'); })();
    const durMins = a.duration||60;
    const durStr = durMins >= 60 ? Math.floor(durMins/60)+'h'+(durMins%60?' '+durMins%60+'m':'') : durMins+' min';
    return `<div class="appt-item">
      <div class="dot" style="width:8px;height:8px;border-radius:50%;background:${c};flex-shrink:0;"></div>
      <div class="appt-info">
        <span class="appt-name">${a.name}</span>
        <span class="appt-meta">${dayLabel} ${a.time}-${endLabel} (${durStr})</span>
      </div>
      <button class="appt-del" onclick="window._editAppt('${a.id}')" title="Edit">&#9998;</button>
      <button class="appt-del" onclick="window._deleteAppt('${a.id}')" title="Delete">&times;</button>
    </div>`;
  }).join('');
}

/* ── Navigation ── */
document.getElementById('prev-week').onclick = ()=>{weekOffset--;render();};
document.getElementById('next-week').onclick = ()=>{weekOffset++;render();};
document.getElementById('prev-day').onclick = ()=>{mobileDay=(mobileDay+6)%7;render();};
document.getElementById('next-day').onclick = ()=>{mobileDay=(mobileDay+1)%7;render();};

// Set initial mobile day to today
const nowInit = getMelbourneNow();
const todayDow = nowInit.getDay();
mobileDay = todayDow === 0 ? 6 : todayDow - 1;

/* ── Modal ── */
const overlay = document.getElementById('modal-overlay');
const colorOpts = document.querySelectorAll('.color-opt');
let selectedColor = 'green';

colorOpts.forEach(opt=>{
  opt.addEventListener('click',()=>{
    colorOpts.forEach(o=>o.classList.remove('selected'));
    opt.classList.add('selected');
    selectedColor = opt.dataset.color;
  });
});
colorOpts[0].classList.add('selected');

document.getElementById('add-appt-btn').onclick = ()=>{
  editingApptId = null;
  document.getElementById('modal-title').textContent = 'Add Appointment';
  document.getElementById('appt-name').value = '';
  document.getElementById('appt-time').value = '12:00';
  document.getElementById('appt-end').value = '13:00';
  document.getElementById('appt-day').value = '0';
  colorOpts.forEach(o=>o.classList.remove('selected'));
  colorOpts[0].classList.add('selected');
  selectedColor = 'green';
  const existing = document.getElementById('btn-del');
  if(existing) existing.remove();
  overlay.classList.add('active');
};

document.getElementById('modal-cancel').onclick = ()=>{overlay.classList.remove('active');};
overlay.addEventListener('click',(e)=>{if(e.target===overlay)overlay.classList.remove('active');});

document.getElementById('modal-save').onclick = ()=>{
  const name = document.getElementById('appt-name').value.trim();
  if(!name) return;
  const day = parseInt(document.getElementById('appt-day').value);
  const time = document.getElementById('appt-time').value;
  const endTime = document.getElementById('appt-end').value;
  // Calculate duration from start/end
  const startParts = time.split(':');
  const endParts = endTime.split(':');
  const startMins = parseInt(startParts[0])*60 + parseInt(startParts[1]||0);
  let endMins = parseInt(endParts[0])*60 + parseInt(endParts[1]||0);
  if(endMins <= startMins) endMins += 1440; // next day
  const duration = endMins - startMins;
  const appts = loadAppointments();

  if(editingApptId){
    const idx = appts.findIndex(a=>a.id===editingApptId);
    if(idx>=0){
      appts[idx].name = name;
      appts[idx].day = day;
      appts[idx].time = time;
      appts[idx].endTime = endTime;
      appts[idx].duration = duration;
      appts[idx].color = selectedColor;
      if(!appts[idx].date) delete appts[idx].date;
    }
  } else {
    const id = 'appt-'+Date.now();
    const monday = getWeekMonday();
    const apptDate = new Date(monday);
    apptDate.setDate(apptDate.getDate()+day);
    appts.push({id,name,day,time,endTime,duration,color:selectedColor,date:apptDate.toISOString().split('T')[0]});
  }

  saveAppointments(appts);
  overlay.classList.remove('active');
  render();
};

window._editAppt = function(id){
  const appts = loadAppointments();
  const appt = appts.find(a=>a.id===id);
  if(!appt) return;
  editingApptId = id;
  document.getElementById('modal-title').textContent = 'Edit Appointment';
  document.getElementById('appt-name').value = appt.name;
  document.getElementById('appt-day').value = appt.day;
  document.getElementById('appt-time').value = appt.time;
  // Calculate end time from start + duration if no endTime stored
  if(appt.endTime){
    document.getElementById('appt-end').value = appt.endTime;
  } else {
    const sp = appt.time.split(':');
    const sm = parseInt(sp[0])*60+parseInt(sp[1]||0)+(appt.duration||60);
    document.getElementById('appt-end').value = String(Math.floor(sm/60)%24).padStart(2,'0')+':'+String(sm%60).padStart(2,'0');
  }
  colorOpts.forEach(o=>{
    o.classList.remove('selected');
    if(o.dataset.color===appt.color) o.classList.add('selected');
  });
  selectedColor = appt.color;

  // Add delete button if not present
  let delBtn = document.getElementById('btn-del');
  if(!delBtn){
    delBtn = document.createElement('button');
    delBtn.id = 'btn-del';
    delBtn.className = 'btn-delete';
    delBtn.textContent = 'Delete';
    delBtn.onclick = ()=>{window._deleteAppt(id);overlay.classList.remove('active');};
    document.getElementById('modal-actions').appendChild(delBtn);
  } else {
    delBtn.onclick = ()=>{window._deleteAppt(id);overlay.classList.remove('active');};
  }

  overlay.classList.add('active');
};

window._deleteAppt = function(id){
  let appts = loadAppointments();
  appts = appts.filter(a=>a.id!==id);
  saveAppointments(appts);
  render();
};

/* ── Touch swipe (mobile) ── */
let touchStartX = 0;
document.addEventListener('touchstart',(e)=>{touchStartX=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',(e)=>{
  const diff = e.changedTouches[0].clientX - touchStartX;
  if(Math.abs(diff)>60){
    if(diff>0){mobileDay=(mobileDay+6)%7;} else {mobileDay=(mobileDay+1)%7;}
    render();
  }
},{passive:true});

/* ── Game Day Config ── */
const GAMEDAY_KEY = 'planner-gameday';

function loadGameDay(){
  try{
    const raw = localStorage.getItem(GAMEDAY_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return {days:[5], status:'game'}; // Default: Saturday game
}

function saveGameDay(config){
  localStorage.setItem(GAMEDAY_KEY, JSON.stringify(config));
}

function renderGameDayConfig(){
  const config = loadGameDay();
  const container = document.getElementById('gameday-config');
  const status = document.getElementById('gameday-status');

  let html = '';
  // Day buttons
  DAY_NAMES.forEach((name, i)=>{
    const isSelected = config.days.includes(i);
    const bg = isSelected ? 'rgba(232,135,58,.18)' : 'rgba(255,255,255,.04)';
    const border = isSelected ? 'rgba(232,135,58,.4)' : 'var(--border)';
    const color = isSelected ? 'var(--amber)' : 'var(--dim)';
    html += `<button data-gameday="${i}" style="background:${bg};border:1px solid ${border};border-radius:8px;padding:6px 12px;font:500 10px var(--mono);letter-spacing:.08em;color:${color};cursor:pointer;transition:all .2s">${DAY_SHORT[i]}</button>`;
  });

  // Bye toggle
  const isBye = config.status === 'bye';
  html += `<span style="width:1px;height:20px;background:var(--border);margin:0 4px"></span>`;
  html += `<button id="bye-toggle" style="background:${isBye?'rgba(125,211,192,.15)':'rgba(255,255,255,.04)'};border:1px solid ${isBye?'rgba(125,211,192,.3)':'var(--border)'};border-radius:8px;padding:6px 14px;font:500 10px var(--mono);letter-spacing:.08em;color:${isBye?'var(--teal)':'var(--dim)'};cursor:pointer;transition:all .2s">BYE</button>`;

  container.innerHTML = html;

  // Status label
  if(isBye){
    status.textContent = 'BYE WEEK';
    status.style.color = 'var(--teal)';
  } else if(config.days.length === 0){
    status.textContent = 'NO GAME SET';
    status.style.color = 'var(--dimmer)';
  } else if(config.days.length === 1){
    status.textContent = DAY_NAMES[config.days[0]].toUpperCase() + ' GAME DAY';
    status.style.color = 'var(--amber)';
  } else {
    status.textContent = config.days.map(d=>DAY_SHORT[d].toUpperCase()).join(' + ') + ' GAME DAYS';
    status.style.color = 'var(--amber)';
  }

  // Bind day buttons
  container.querySelectorAll('[data-gameday]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const d = parseInt(btn.dataset.gameday);
      const cfg = loadGameDay();
      cfg.status = 'game';
      const idx = cfg.days.indexOf(d);
      if(idx >= 0){
        cfg.days.splice(idx, 1);
      } else {
        if(cfg.days.length >= 2) cfg.days.shift(); // max 2 game days
        cfg.days.push(d);
      }
      cfg.days.sort((a,b)=>a-b);
      saveGameDay(cfg);
      renderGameDayConfig();
      render(); // re-render grid to show game day styling
    });
  });

  // Bind bye toggle
  document.getElementById('bye-toggle').addEventListener('click',()=>{
    const cfg = loadGameDay();
    if(cfg.status === 'bye'){
      cfg.status = 'game';
    } else {
      cfg.status = 'bye';
    }
    saveGameDay(cfg);
    renderGameDayConfig();
    render();
  });
}

renderGameDayConfig();

/* ── Work Schedule Config ── */
const WORK_KEY = 'planner-work';

function loadWork(){
  try{
    const raw = localStorage.getItem(WORK_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return {days:[], start:'09:00', end:'17:00'}; // Default: no work days
}

function saveWork(config){
  localStorage.setItem(WORK_KEY, JSON.stringify(config));
}

function renderWorkConfig(){
  const config = loadWork();
  const container = document.getElementById('work-config');
  const status = document.getElementById('work-status');
  const timesContainer = document.getElementById('work-times');

  let html = '';
  DAY_NAMES.forEach((name, i)=>{
    const isSelected = config.days.includes(i);
    const bg = isSelected ? 'rgba(216,178,74,.18)' : 'rgba(255,255,255,.04)';
    const border = isSelected ? 'rgba(216,178,74,.4)' : 'var(--border)';
    const color = isSelected ? 'var(--gold)' : 'var(--dim)';
    html += `<button data-workday="${i}" style="background:${bg};border:1px solid ${border};border-radius:8px;padding:6px 12px;font:500 10px var(--mono);letter-spacing:.08em;color:${color};cursor:pointer;transition:all .2s">${DAY_SHORT[i]}</button>`;
  });
  container.innerHTML = html;

  // Status
  if(config.days.length === 0){
    status.textContent = 'NOT WORKING';
    status.style.color = 'var(--dimmer)';
  } else {
    status.textContent = config.days.map(d=>DAY_SHORT[d].toUpperCase()).join(' + ');
    status.style.color = 'var(--gold)';
  }

  // Time inputs
  timesContainer.innerHTML = config.days.length > 0 ? `
    <label style="font:500 9px var(--mono);color:var(--dim);letter-spacing:.08em">START</label>
    <input type="time" id="work-start" value="${config.start}" style="width:100px;padding:6px 10px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;color:var(--ink);font:12px var(--sans);outline:none">
    <label style="font:500 9px var(--mono);color:var(--dim);letter-spacing:.08em">END</label>
    <input type="time" id="work-end" value="${config.end}" style="width:100px;padding:6px 10px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;color:var(--ink);font:12px var(--sans);outline:none">
  ` : '';

  // Bind day buttons
  container.querySelectorAll('[data-workday]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const d = parseInt(btn.dataset.workday);
      const cfg = loadWork();
      const idx = cfg.days.indexOf(d);
      if(idx >= 0) cfg.days.splice(idx, 1);
      else cfg.days.push(d);
      cfg.days.sort((a,b)=>a-b);
      saveWork(cfg);
      renderWorkConfig();
      render();
    });
  });

  // Bind time inputs
  const ws = document.getElementById('work-start');
  const we = document.getElementById('work-end');
  if(ws) ws.addEventListener('change',()=>{
    const cfg = loadWork();
    cfg.start = ws.value;
    saveWork(cfg);
    render();
  });
  if(we) we.addEventListener('change',()=>{
    const cfg = loadWork();
    cfg.end = we.value;
    saveWork(cfg);
    render();
  });
}

renderWorkConfig();

renderTeamDayConfig();

/* ── Init ── */
render();

// Refresh time indicator every minute
setInterval(render, 60000);

})();
