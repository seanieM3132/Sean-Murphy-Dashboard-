<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050D0A">
<title>Peak — Performance Model</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050D0A;
  --card: rgba(255,255,255,0.035);
  --border: rgba(255,255,255,0.06);
  --fg: #FAFAFA;
  --muted: #76746E;
  --green: #4ADE80;
  --amber: #E8873A;
  --gold: #D8B24A;
  --teal: #7DD3C0;
  --red: #FF6B6B;
  --blue: #60A5FA;
  --font-serif: 'Instrument Serif', Georgia, serif;
  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--fg);
  min-height: 100vh;
  max-width: 900px;
  margin: 0 auto;
  padding: 24px 20px 60px;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(74,222,128,0.08), transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(232,135,58,0.06), transparent 60%);
  filter: blur(40px);
  pointer-events: none; z-index: -1;
}

/* Header */
.pk-header { display: flex; align-items: baseline; gap: 14px; margin-bottom: 6px; }
.pk-title { font-family: var(--font-serif); font-style: italic; font-size: 32px; color: var(--fg); }
.pk-sub { font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }

/* Target banner */
.pk-target {
  display: flex; align-items: center; gap: 10px;
  background: rgba(74,222,128,0.06); border: 1px solid rgba(74,222,128,0.12);
  border-radius: 10px; padding: 10px 16px; margin: 14px 0 22px;
  font-family: var(--font-mono); font-size: 12px; color: var(--green);
}
.pk-target .days { color: var(--gold); font-weight: 600; }

/* Grid */
.pk-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}
.pk-grid .wide { grid-column: span 2; }

/* Card */
.pk-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}
.pk-card-head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 12px;
}
.pk-card-title { font-family: var(--font-serif); font-style: italic; font-size: 18px; }
.pk-card-label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }

/* The Curve (main chart) */
.curve-wrap { position: relative; width: 100%; }
.curve-svg { width: 100%; display: block; }
.curve-legend {
  display: flex; gap: 18px; margin-top: 10px;
  font-family: var(--font-mono); font-size: 10px; color: var(--muted);
}
.curve-legend span { display: flex; align-items: center; gap: 5px; }
.curve-legend .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.curve-tooltip {
  display: none; position: absolute;
  background: rgba(5,13,10,0.92); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 12px;
  font-family: var(--font-mono); font-size: 11px;
  pointer-events: none; z-index: 10; white-space: nowrap;
}

/* Peak Index ring */
.peak-ring-wrap { display: flex; align-items: center; gap: 20px; }
.peak-ring-svg { width: 110px; height: 110px; flex-shrink: 0; }
.peak-ring-details { flex: 1; }
.peak-ring-big { font-family: var(--font-mono); font-size: 36px; font-weight: 600; }
.peak-ring-label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
.peak-ring-status { font-size: 13px; margin-top: 6px; }

/* Pillars */
.pillar-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 10px; font-family: var(--font-mono); font-size: 11px;
}
.pillar-row:last-child { margin-bottom: 0; }
.pillar-name { width: 90px; color: var(--muted); text-transform: uppercase; font-size: 9px; letter-spacing: 0.06em; }
.pillar-bar-bg { flex: 1; height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
.pillar-bar { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
.pillar-val { width: 32px; text-align: right; }
.pillar-wt { width: 28px; text-align: right; color: var(--muted); font-size: 9px; }

/* Sleep Debt bars */
.sleep-bars { display: flex; align-items: flex-end; gap: 3px; height: 80px; margin-top: 8px; }
.sleep-bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; }
.sleep-bar {
  width: 100%; border-radius: 3px 3px 0 0;
  transition: height 0.4s ease;
}
.sleep-bar.deficit { border-radius: 0 0 3px 3px; }
.sleep-day { font-family: var(--font-mono); font-size: 9px; color: var(--muted); margin-top: 4px; }

/* HRV Drift */
.hrv-scatter { width: 100%; display: block; }

/* Engine */
.engine-stats { display: flex; gap: 20px; margin-top: 8px; }
.engine-stat { text-align: center; flex: 1; }
.engine-val { font-family: var(--font-mono); font-size: 24px; font-weight: 600; }
.engine-label { font-family: var(--font-mono); font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
.engine-delta { font-size: 11px; margin-top: 2px; }

/* Consistency grid */
.consist-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 8px; }
.consist-cell {
  aspect-ratio: 1; border-radius: 4px;
  background: rgba(255,255,255,0.04);
  position: relative;
}
.consist-cell.active { background: rgba(74,222,128,0.25); }
.consist-cell.rest { background: rgba(232,135,58,0.15); }
.consist-week-labels {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 4px;
  font-family: var(--font-mono); font-size: 8px; color: var(--muted); text-align: center;
}
.consist-summary {
  display: flex; justify-content: space-between; margin-top: 10px;
  font-family: var(--font-mono); font-size: 11px; color: var(--muted);
}

/* Responsive */
@media (max-width: 640px) {
  .pk-grid { grid-template-columns: 1fr; }
  .pk-grid .wide { grid-column: span 1; }
  .pk-title { font-size: 26px; }
}
</style>
</head>
<body>

<div class="pk-header">
  <h1 class="pk-title">Peak</h1>
  <span class="pk-sub">Banister Impulse-Response</span>
</div>

<div class="pk-target" id="target-banner">
  <span>TARGET</span>
  <span style="color:var(--fg)">College Showcase</span>
  <span>2026-08-08</span>
  <span class="days" id="days-out"></span>
</div>

<div class="pk-grid">
  <!-- 1. The Curve (wide) -->
  <div class="pk-card wide" id="curve-card">
    <div class="pk-card-head">
      <span class="pk-card-title">The Curve</span>
      <span class="pk-card-label">42-DAY WINDOW</span>
    </div>
    <div class="curve-wrap">
      <svg class="curve-svg" id="curve-svg" viewBox="0 0 800 200" preserveAspectRatio="none"></svg>
      <div class="curve-tooltip" id="curve-tip"></div>
    </div>
    <div class="curve-legend">
      <span><span class="dot" style="background:var(--green)"></span> Fitness (CTL)</span>
      <span><span class="dot" style="background:var(--amber)"></span> Fatigue (ATL)</span>
      <span><span class="dot" style="background:var(--teal)"></span> Form (TSB)</span>
    </div>
  </div>

  <!-- 2. Peak Index -->
  <div class="pk-card" id="peak-index-card">
    <div class="pk-card-head">
      <span class="pk-card-title">Peak Index</span>
      <span class="pk-card-label">COMPOSITE</span>
    </div>
    <div class="peak-ring-wrap">
      <svg class="peak-ring-svg" id="peak-ring" viewBox="0 0 110 110"></svg>
      <div class="peak-ring-details">
        <div class="peak-ring-big" id="peak-val">--</div>
        <div class="peak-ring-label">PEAK SCORE</div>
        <div class="peak-ring-status" id="peak-status"></div>
      </div>
    </div>
  </div>

  <!-- 3. Pillars -->
  <div class="pk-card" id="pillars-card">
    <div class="pk-card-head">
      <span class="pk-card-title">Pillars</span>
      <span class="pk-card-label">WEIGHTED</span>
    </div>
    <div id="pillars-list"></div>
  </div>

  <!-- 4. Sleep Debt -->
  <div class="pk-card" id="sleep-card">
    <div class="pk-card-head">
      <span class="pk-card-title">Sleep Debt</span>
      <span class="pk-card-label" id="sleep-net"></span>
    </div>
    <div class="sleep-bars" id="sleep-bars"></div>
  </div>

  <!-- 5. HRV Drift -->
  <div class="pk-card" id="hrv-card">
    <div class="pk-card-head">
      <span class="pk-card-title">HRV Drift</span>
      <span class="pk-card-label">14-DAY TREND</span>
    </div>
    <svg class="hrv-scatter" id="hrv-svg" viewBox="0 0 400 140"></svg>
  </div>

  <!-- 6. Engine -->
  <div class="pk-card" id="engine-card">
    <div class="pk-card-head">
      <span class="pk-card-title">Engine</span>
      <span class="pk-card-label">AEROBIC</span>
    </div>
    <div class="engine-stats" id="engine-stats"></div>
  </div>

  <!-- 7. Consistency (wide) -->
  <div class="pk-card wide" id="consist-card">
    <div class="pk-card-head">
      <span class="pk-card-title">Consistency</span>
      <span class="pk-card-label">8-WEEK GRID</span>
    </div>
    <div class="consist-week-labels" id="consist-labels"></div>
    <div class="consist-grid" id="consist-grid"></div>
    <div class="consist-summary" id="consist-summary"></div>
  </div>
</div>

<script>
(function() {
  'use strict';

  /* ── Deterministic RNG ── */
  let _seed = 42;
  function rng() { _seed = (_seed * 16807 + 0) % 2147483647; return (_seed & 0x7fffffff) / 0x7fffffff; }
  function rngRange(lo, hi) { return lo + rng() * (hi - lo); }
  function rngInt(lo, hi) { return Math.floor(rngRange(lo, hi + 1)); }

  /* ── Target countdown ── */
  const TARGET_DATE = new Date('2026-08-08');
  const today = new Date();
  const daysOut = Math.max(0, Math.ceil((TARGET_DATE - today) / 86400000));
  document.getElementById('days-out').textContent = daysOut + ' days out';

  /* ── Generate mock training data (42 days) ── */
  const DAYS = 42;
  const dates = [];
  const tss = []; // training stress scores
  for (let i = DAYS - 1; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    dates.push(d);
    // ~4 training days/week, rest days = 0
    const dow = d.getDay();
    const isRest = (dow === 0 || dow === 3) || rng() < 0.15;
    tss.push(isRest ? 0 : rngInt(45, 130));
  }

  /* ── Banister model: CTL (42d EMA), ATL (7d EMA), TSB = CTL - ATL ── */
  const ctl = [], atl = [], tsb = [];
  let c = 40, a = 30;
  for (let i = 0; i < DAYS; i++) {
    c = c + (tss[i] - c) / 42;
    a = a + (tss[i] - a) / 7;
    ctl.push(Math.round(c * 10) / 10);
    atl.push(Math.round(a * 10) / 10);
    tsb.push(Math.round((c - a) * 10) / 10);
  }

  const lastCTL = ctl[DAYS - 1];
  const lastATL = atl[DAYS - 1];
  const lastTSB = tsb[DAYS - 1];

  /* ── 1. The Curve chart ── */
  function drawCurve() {
    const svg = document.getElementById('curve-svg');
    const W = 800, H = 200, pad = { t: 10, b: 25, l: 0, r: 0 };
    const cw = W - pad.l - pad.r, ch = H - pad.t - pad.b;

    const allVals = [...ctl, ...atl, ...tsb];
    const mn = Math.min(...allVals) - 5;
    const mx = Math.max(...allVals) + 5;

    function x(i) { return pad.l + (i / (DAYS - 1)) * cw; }
    function y(v) { return pad.t + ch - ((v - mn) / (mx - mn)) * ch; }

    function polyline(arr, color, width) {
      const pts = arr.map((v, i) => `${x(i)},${y(v)}`).join(' ');
      return `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="${width}" stroke-linejoin="round"/>`;
    }

    // Zero line for TSB
    const zeroY = y(0);

    // TSB fill (area between curve and zero)
    let tsbFill = `M${x(0)},${zeroY}`;
    for (let i = 0; i < DAYS; i++) tsbFill += ` L${x(i)},${y(tsb[i])}`;
    tsbFill += ` L${x(DAYS-1)},${zeroY} Z`;

    let html = '';
    // Grid lines
    const gridVals = [mn, mn + (mx-mn)*0.25, mn + (mx-mn)*0.5, mn + (mx-mn)*0.75, mx];
    for (const gv of gridVals) {
      html += `<line x1="${pad.l}" y1="${y(gv)}" x2="${W-pad.r}" y2="${y(gv)}" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>`;
    }
    // Zero line
    if (mn < 0 && mx > 0) {
      html += `<line x1="${pad.l}" y1="${zeroY}" x2="${W-pad.r}" y2="${zeroY}" stroke="rgba(255,255,255,0.1)" stroke-width="1" stroke-dasharray="4,4"/>`;
    }
    // TSB area fill
    html += `<path d="${tsbFill}" fill="rgba(125,211,192,0.08)"/>`;
    // Lines
    html += polyline(ctl, '#4ADE80', 2);
    html += polyline(atl, '#E8873A', 2);
    html += polyline(tsb, '#7DD3C0', 1.5);

    // Date labels (every 7 days)
    for (let i = 0; i < DAYS; i += 7) {
      const d = dates[i];
      const label = (d.getMonth()+1) + '/' + d.getDate();
      html += `<text x="${x(i)}" y="${H - 4}" fill="#76746E" font-family="var(--font-mono)" font-size="9" text-anchor="middle">${label}</text>`;
    }

    // Hover target (invisible rect)
    html += `<rect id="curve-hover" x="${pad.l}" y="${pad.t}" width="${cw}" height="${ch}" fill="transparent" style="cursor:crosshair"/>`;
    // Hover line
    html += `<line id="curve-line" x1="0" y1="${pad.t}" x2="0" y2="${pad.t+ch}" stroke="rgba(255,255,255,0.15)" stroke-width="1" style="display:none"/>`;
    // Hover dots
    html += `<circle id="dot-ctl" r="4" fill="#4ADE80" style="display:none"/>`;
    html += `<circle id="dot-atl" r="4" fill="#E8873A" style="display:none"/>`;
    html += `<circle id="dot-tsb" r="4" fill="#7DD3C0" style="display:none"/>`;

    svg.innerHTML = html;

    // Hover interaction
    const hoverRect = document.getElementById('curve-hover');
    const hline = document.getElementById('curve-line');
    const dotCtl = document.getElementById('dot-ctl');
    const dotAtl = document.getElementById('dot-atl');
    const dotTsb = document.getElementById('dot-tsb');
    const tip = document.getElementById('curve-tip');

    function showHover(evt) {
      const rect = svg.getBoundingClientRect();
      const mx2 = evt.clientX - rect.left;
      const ratio = mx2 / rect.width;
      const idx = Math.round(ratio * (DAYS - 1));
      if (idx < 0 || idx >= DAYS) return;

      const px = x(idx);
      hline.setAttribute('x1', px); hline.setAttribute('x2', px); hline.style.display = '';
      dotCtl.setAttribute('cx', px); dotCtl.setAttribute('cy', y(ctl[idx])); dotCtl.style.display = '';
      dotAtl.setAttribute('cx', px); dotAtl.setAttribute('cy', y(atl[idx])); dotAtl.style.display = '';
      dotTsb.setAttribute('cx', px); dotTsb.setAttribute('cy', y(tsb[idx])); dotTsb.style.display = '';

      const d = dates[idx];
      const dateStr = d.toLocaleDateString('en-AU', { month: 'short', day: 'numeric' });
      const tsbColor = tsb[idx] >= 0 ? 'var(--green)' : 'var(--red)';
      tip.innerHTML = `<div style="color:var(--muted);margin-bottom:4px">${dateStr}</div>` +
        `<div>CTL <span style="color:var(--green)">${ctl[idx]}</span></div>` +
        `<div>ATL <span style="color:var(--amber)">${atl[idx]}</span></div>` +
        `<div>TSB <span style="color:${tsbColor}">${tsb[idx] > 0 ? '+' : ''}${tsb[idx]}</span></div>` +
        `<div style="color:var(--muted);margin-top:2px">TSS ${tss[idx]}</div>`;
      tip.style.display = 'block';

      // Position tooltip
      const tipW = tip.offsetWidth;
      const parentRect = svg.parentElement.getBoundingClientRect();
      const tipX = evt.clientX - parentRect.left;
      tip.style.left = (tipX + tipW + 20 > parentRect.width ? tipX - tipW - 12 : tipX + 12) + 'px';
      tip.style.top = '20px';
    }

    function hideHover() {
      hline.style.display = 'none';
      dotCtl.style.display = 'none'; dotAtl.style.display = 'none'; dotTsb.style.display = 'none';
      tip.style.display = 'none';
    }

    hoverRect.addEventListener('mousemove', showHover);
    hoverRect.addEventListener('mouseleave', hideHover);
    // Touch
    hoverRect.addEventListener('touchmove', function(e) { e.preventDefault(); showHover(e.touches[0]); }, { passive: false });
    hoverRect.addEventListener('touchend', hideHover);
  }

  /* ── 2. Peak Index ring ── */
  function drawPeakIndex() {
    // 5 pillars
    const pillars = computePillars();
    const peakScore = Math.round(pillars.reduce((s, p) => s + p.val * p.weight, 0));

    const svg = document.getElementById('peak-ring');
    const cx = 55, cy = 55, r = 44, sw = 8;
    const circ = 2 * Math.PI * r;
    const pct = peakScore / 100;
    const color = peakScore >= 75 ? 'var(--green)' : peakScore >= 50 ? 'var(--gold)' : 'var(--red)';

    svg.innerHTML =
      `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="${sw}"/>` +
      `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}" ` +
      `stroke-dasharray="${circ * pct} ${circ * (1 - pct)}" stroke-linecap="round" ` +
      `transform="rotate(-90 ${cx} ${cy})" style="transition:stroke-dasharray 0.8s ease"/>`;

    document.getElementById('peak-val').textContent = peakScore;
    document.getElementById('peak-val').style.color = color;

    let status = '';
    if (peakScore >= 80) status = '<span style="color:var(--green)">Race-ready</span>';
    else if (peakScore >= 65) status = '<span style="color:var(--gold)">Building</span>';
    else if (peakScore >= 45) status = '<span style="color:var(--amber)">Developing</span>';
    else status = '<span style="color:var(--red)">Base phase</span>';
    document.getElementById('peak-status').innerHTML = status;

    return { pillars, peakScore };
  }

  /* ── 3. Pillars ── */
  function computePillars() {
    // Aerobic Engine (VO2 proxy)
    const vo2 = rngRange(42, 52);
    const aerobic = Math.min(100, Math.round((vo2 / 55) * 100));

    // Recovery (HRV-based)
    const hrvBase = rngRange(55, 85);
    const recovery = Math.min(100, Math.round((hrvBase / 90) * 100));

    // Fitness (CTL)
    const fitness = Math.min(100, Math.round((lastCTL / 80) * 100));

    // Freshness (Gaussian around TSB = 15)
    const optTSB = 15;
    const freshness = Math.min(100, Math.round(100 * Math.exp(-Math.pow(lastTSB - optTSB, 2) / 200)));

    // Consistency (training adherence)
    const trainDays = tss.filter(v => v > 0).length;
    const consistency = Math.min(100, Math.round((trainDays / (DAYS * 0.7)) * 100));

    return [
      { name: 'Aerobic', val: aerobic, weight: 0.25, color: 'var(--blue)' },
      { name: 'Recovery', val: recovery, weight: 0.20, color: 'var(--teal)' },
      { name: 'Fitness', val: fitness, weight: 0.25, color: 'var(--green)' },
      { name: 'Freshness', val: freshness, weight: 0.15, color: 'var(--gold)' },
      { name: 'Consistency', val: consistency, weight: 0.15, color: 'var(--amber)' },
    ];
  }

  function drawPillars(pillars) {
    const el = document.getElementById('pillars-list');
    el.innerHTML = pillars.map(p =>
      `<div class="pillar-row">
        <span class="pillar-name">${p.name}</span>
        <div class="pillar-bar-bg"><div class="pillar-bar" style="width:${p.val}%;background:${p.color}"></div></div>
        <span class="pillar-val" style="color:${p.color}">${p.val}</span>
        <span class="pillar-wt">${Math.round(p.weight * 100)}%</span>
      </div>`
    ).join('');
  }

  /* ── 4. Sleep Debt ── */
  function drawSleepDebt() {
    const el = document.getElementById('sleep-bars');
    const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
    const target = 8;
    const sleepData = days.map(() => rngRange(5.5, 9.5));
    const debts = sleepData.map(h => Math.round((h - target) * 10) / 10);
    const maxAbs = Math.max(...debts.map(Math.abs), 2);
    const netDebt = Math.round(debts.reduce((s, d) => s + d, 0) * 10) / 10;

    document.getElementById('sleep-net').textContent = (netDebt >= 0 ? '+' : '') + netDebt + 'h NET';
    document.getElementById('sleep-net').style.color = netDebt >= 0 ? 'var(--green)' : 'var(--red)';

    el.innerHTML = debts.map((d, i) => {
      const h = Math.abs(d) / maxAbs * 60;
      const color = d >= 0 ? 'var(--green)' : 'var(--red)';
      const isDeficit = d < 0;
      // Bars grow up for surplus, down for deficit from a center line
      return `<div class="sleep-bar-col">
        ${!isDeficit ? `<div class="sleep-bar" style="height:${h}px;background:${color};opacity:0.6"></div>` : ''}
        <div style="height:2px;width:100%;background:rgba(255,255,255,0.08)"></div>
        ${isDeficit ? `<div class="sleep-bar deficit" style="height:${h}px;background:${color};opacity:0.6"></div>` : ''}
        <div class="sleep-day">${days[i]}</div>
      </div>`;
    }).join('');
  }

  /* ── 5. HRV Drift ── */
  function drawHRVDrift() {
    const svg = document.getElementById('hrv-svg');
    const W = 400, H = 140, pad = { t: 10, b: 20, l: 30, r: 10 };
    const cw = W - pad.l - pad.r, ch = H - pad.t - pad.b;
    const N = 14;

    const hrvData = [];
    let baseHRV = rngRange(55, 70);
    for (let i = 0; i < N; i++) {
      baseHRV += rngRange(-3, 4); // slight upward drift
      hrvData.push(Math.round(baseHRV));
    }

    const mn = Math.min(...hrvData) - 5;
    const mx = Math.max(...hrvData) + 5;
    function x(i) { return pad.l + (i / (N - 1)) * cw; }
    function yv(v) { return pad.t + ch - ((v - mn) / (mx - mn)) * ch; }

    // Linear regression for trend line
    const xMean = (N - 1) / 2;
    const yMean = hrvData.reduce((s, v) => s + v, 0) / N;
    let num = 0, den = 0;
    for (let i = 0; i < N; i++) {
      num += (i - xMean) * (hrvData[i] - yMean);
      den += (i - xMean) * (i - xMean);
    }
    const slope = num / den;
    const intercept = yMean - slope * xMean;
    const trendUp = slope > 0;

    let html = '';
    // Grid
    for (let g = 0; g <= 4; g++) {
      const gv = mn + (mx - mn) * (g / 4);
      html += `<line x1="${pad.l}" y1="${yv(gv)}" x2="${W-pad.r}" y2="${yv(gv)}" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>`;
      if (g % 2 === 0) {
        html += `<text x="${pad.l - 4}" y="${yv(gv) + 3}" fill="#76746E" font-family="var(--font-mono)" font-size="8" text-anchor="end">${Math.round(gv)}</text>`;
      }
    }
    // Trend line
    const trendColor = trendUp ? 'var(--green)' : 'var(--red)';
    html += `<line x1="${x(0)}" y1="${yv(intercept)}" x2="${x(N-1)}" y2="${yv(slope*(N-1)+intercept)}" stroke="${trendColor}" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>`;
    // Scatter dots
    for (let i = 0; i < N; i++) {
      html += `<circle cx="${x(i)}" cy="${yv(hrvData[i])}" r="4" fill="var(--teal)" opacity="0.7"/>`;
    }
    // Trend label
    const trendText = trendUp ? '+' + slope.toFixed(1) + ' ms/d' : slope.toFixed(1) + ' ms/d';
    html += `<text x="${W - pad.r}" y="${pad.t + 12}" fill="${trendColor}" font-family="var(--font-mono)" font-size="10" text-anchor="end">${trendText}</text>`;

    svg.innerHTML = html;
  }

  /* ── 6. Engine ── */
  function drawEngine() {
    const vo2 = rngRange(42, 52).toFixed(1);
    const rhr = rngInt(48, 58);
    const vo2Delta = rngRange(-1, 3).toFixed(1);
    const rhrDelta = rngInt(-3, 2);

    const el = document.getElementById('engine-stats');
    el.innerHTML = `
      <div class="engine-stat">
        <div class="engine-val" style="color:var(--blue)">${vo2}</div>
        <div class="engine-label">VO2 Max</div>
        <div class="engine-delta" style="color:${parseFloat(vo2Delta) >= 0 ? 'var(--green)' : 'var(--red)'}">
          ${parseFloat(vo2Delta) >= 0 ? '+' : ''}${vo2Delta} <span style="color:var(--muted)">30d</span>
        </div>
      </div>
      <div class="engine-stat">
        <div class="engine-val" style="color:var(--teal)">${rhr}</div>
        <div class="engine-label">Resting HR</div>
        <div class="engine-delta" style="color:${rhrDelta <= 0 ? 'var(--green)' : 'var(--red)'}">
          ${rhrDelta > 0 ? '+' : ''}${rhrDelta} <span style="color:var(--muted)">30d</span>
        </div>
      </div>
      <div class="engine-stat">
        <div class="engine-val" style="color:var(--green)">${lastCTL.toFixed(0)}</div>
        <div class="engine-label">CTL</div>
        <div class="engine-delta" style="color:var(--muted)">Fitness load</div>
      </div>
    `;
  }

  /* ── 7. Consistency grid (8 weeks) ── */
  function drawConsistency() {
    const WEEKS = 8;
    const labels = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];
    document.getElementById('consist-labels').innerHTML = labels.map(l => `<span>${l}</span>`).join('');

    const grid = document.getElementById('consist-grid');
    let totalActive = 0, totalDays = WEEKS * 7;
    let cells = '';
    for (let w = 0; w < WEEKS; w++) {
      for (let d = 0; d < 7; d++) {
        const isActive = rng() > 0.3;
        const isRest = !isActive && rng() > 0.5;
        if (isActive) totalActive++;
        const cls = isActive ? 'active' : (isRest ? 'rest' : '');
        cells += `<div class="consist-cell ${cls}"></div>`;
      }
    }
    grid.innerHTML = cells;

    const pct = Math.round((totalActive / totalDays) * 100);
    document.getElementById('consist-summary').innerHTML =
      `<span>${totalActive} / ${totalDays} days trained</span>` +
      `<span style="color:${pct >= 65 ? 'var(--green)' : 'var(--amber)'}">${pct}% adherence</span>`;
  }

  /* ── Render all ── */
  drawCurve();
  const { pillars } = drawPeakIndex();
  drawPillars(pillars);
  drawSleepDebt();
  drawHRVDrift();
  drawEngine();
  drawConsistency();

  /* ── Try live data ── */
  fetch('/api/peak').then(r => r.ok ? r.json() : null).then(data => {
    if (!data) return;
    // If live data available, re-render with it
    // (future: wire real Garmin TSS into the Banister model)
  }).catch(() => {});

})();
</script>
</body>
