<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vitals</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#6EE7B7;--green-dim:#34D399;--yellow:#fbbf24;--red:#ef4444;--blue:#60a5fa;--purple:#818cf8;
  --bg:#050506;--card:rgba(255,255,255,.028);--card-border:rgba(255,255,255,.055);
  --text:#f0f0f0;--text-dim:#999;--text-muted:#555;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --serif:'Instrument Serif',Georgia,serif;
  --radius:20px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--text);padding:16px 14px 40px;min-height:100vh;
  -webkit-font-smoothing:antialiased;position:relative;z-index:0;overflow-x:hidden}

body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 75% 10%,rgba(110,231,183,.10),transparent 55%),
    radial-gradient(ellipse at 20% 85%,rgba(96,165,250,.06),transparent 55%);
  filter:blur(50px);pointer-events:none;z-index:-2;animation:bgDrift 30s ease-in-out infinite alternate}
@keyframes bgDrift{0%{transform:translate(0,0) scale(1)}50%{transform:translate(-15px,10px) scale(1.02)}100%{transform:translate(10px,-8px) scale(1)}}
body::after{content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg width='3' height='3' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='1' height='1' fill='rgba(255,255,255,0.012)'/%3E%3C/svg%3E");
  pointer-events:none;z-index:-1}

#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;opacity:0.35}

/* Typography */
.page-title{font-family:var(--serif);font-style:italic;font-size:36px;letter-spacing:-0.02em;font-weight:400;line-height:1.1;margin-bottom:2px}
.page-sub{font-size:12px;color:var(--green);margin-bottom:18px;display:flex;align-items:center;gap:8px;font-family:var(--mono)}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.status-dot.live{animation:pulseDot 2s ease-in-out infinite}
.status-dot.off{background:var(--red)}
@keyframes pulseDot{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(110,231,183,.4)}50%{opacity:.7;box-shadow:0 0 0 6px rgba(110,231,183,0)}}

.label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--text-muted);font-family:var(--mono)}
.big-num{font-size:32px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1;font-family:var(--mono);letter-spacing:-0.03em}
.mid-num{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1;font-family:var(--mono);letter-spacing:-0.03em}
.sm-num{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1;font-family:var(--mono)}
.unit{font-size:11px;font-weight:500;color:var(--text-dim);margin-left:2px;font-family:var(--mono)}
.sub-text{font-size:10px;color:var(--text-muted);margin-top:2px;font-family:var(--mono)}

/* Layout */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.full{grid-column:1/-1}

.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--card-border);padding:16px;
  position:relative;overflow:hidden;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  box-shadow:0 1px 0 0 rgba(255,255,255,.04) inset,0 8px 32px rgba(0,0,0,.3);
  transition:transform .25s cubic-bezier(.4,0,.2,1),border-color .3s}
.card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.09)}
.card::before{content:'';position:absolute;inset:0;border-radius:var(--radius);
  background:radial-gradient(ellipse at 50% -40%,rgba(255,255,255,.03),transparent 70%);pointer-events:none}

/* Section headers */
.section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;
  color:var(--text-muted);margin:20px 0 10px;display:flex;align-items:center;gap:8px;font-family:var(--mono)}
.section-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.04)}

/* Hero ring */
.hero{display:flex;flex-direction:column;align-items:center;padding:24px 16px 18px}
.ring-wrap{position:relative;width:150px;height:150px;margin-bottom:12px}
.ring-wrap svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:rgba(255,255,255,.05);stroke-width:10}
.ring-fg{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1),stroke .3s}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-val{font-size:42px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1;font-family:var(--mono);letter-spacing:-0.04em}
.ring-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.12em;margin-top:5px;font-family:var(--mono)}
.hero-subtitle{font-size:11px;color:var(--text-dim);text-align:center}
.bb-range{display:flex;justify-content:center;gap:16px;margin-top:8px;font-size:10px;color:var(--text-muted);font-family:var(--mono)}

/* Sleep bar */
.sleep-bar-wrap{margin:10px 0 6px;height:14px;border-radius:7px;overflow:hidden;display:flex;background:rgba(255,255,255,.03)}
.sleep-bar-wrap>div{height:100%;transition:width .8s cubic-bezier(.4,0,.2,1)}
.sleep-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.sleep-legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-dim);font-family:var(--mono)}
.sleep-legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.clr-rem{background:var(--purple)}
.clr-deep{background:#6366f1}
.clr-light{background:#a5b4fc}
.clr-awake{background:var(--red)}
.sleep-meta{display:flex;justify-content:space-between;align-items:baseline;margin-top:8px;font-size:10px;color:var(--text-muted);font-family:var(--mono)}

/* Heart pair */
.heart-pair{display:flex;gap:10px}
.heart-half{flex:1;text-align:center}
.heart-half .mid-num{margin:6px 0 3px}
.heart-ctx{font-size:10px;color:var(--text-muted);font-family:var(--mono)}
.heart-divider{width:1px;background:rgba(255,255,255,.04)}

/* HRV badge */
.hrv-badge{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  padding:3px 9px;border-radius:6px;margin-top:4px;font-family:var(--mono)}
.hrv-badge.balanced{background:rgba(110,231,183,.12);color:var(--green)}
.hrv-badge.low{background:rgba(248,113,113,.12);color:var(--red)}
.hrv-badge.high{background:rgba(96,165,250,.12);color:var(--blue)}

/* Mini grid */
.mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mini-card{background:rgba(255,255,255,.02);border-radius:12px;padding:12px;text-align:center}
.mini-card .sm-num{margin:6px 0 2px}
.steps-bar{height:4px;background:rgba(255,255,255,.04);border-radius:2px;margin-top:6px;overflow:hidden}
.steps-fill{height:100%;border-radius:2px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.fill-green{background:linear-gradient(90deg,#34D399,#6EE7B7)}
.fill-blue{background:linear-gradient(90deg,#3B82F6,#60A5FA)}

/* Coach insights */
.coach-card{background:rgba(110,231,183,.03);border:1px solid rgba(110,231,183,.1);border-radius:14px;
  padding:12px 14px;display:flex;align-items:flex-start;gap:10px;margin-bottom:6px;transition:transform .15s}
.coach-card:hover{transform:translateX(2px)}
.coach-card.warning{background:rgba(251,191,36,.03);border-color:rgba(251,191,36,.1)}
.coach-card.recover{background:rgba(248,113,113,.03);border-color:rgba(248,113,113,.1)}
.coach-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0}
.coach-card .coach-icon{background:rgba(110,231,183,.08)}
.coach-card.warning .coach-icon{background:rgba(251,191,36,.08)}
.coach-card.recover .coach-icon{background:rgba(248,113,113,.08)}
.coach-text{font-size:12px;line-height:1.5;color:#ccc}

/* Activity list */
.activity-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03);transition:transform .15s}
.activity-item:hover{transform:translateX(2px)}
.activity-item:last-child{border-bottom:none}
.activity-icon{width:32px;height:32px;border-radius:8px;background:rgba(110,231,183,.06);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.activity-info{flex:1;min-width:0}
.activity-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.activity-meta{font-size:10px;color:var(--text-muted);margin-top:2px;font-family:var(--mono)}
.activity-stats{text-align:right;font-size:11px;color:var(--text-dim)}
.activity-stats .sm-num{font-size:12px;color:var(--green)}

/* Refresh */
.refresh-row{display:flex;justify-content:space-between;align-items:center;margin-top:16px}
.refresh-btn{background:rgba(110,231,183,.08);border:1px solid rgba(110,231,183,.15);border-radius:10px;
  padding:7px 16px;color:var(--green);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;
  transition:all .15s}
.refresh-btn:hover{background:rgba(110,231,183,.12);border-color:rgba(110,231,183,.25)}
.refresh-btn.spinning .r-icon{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.last-update{font-size:10px;color:var(--text-muted);font-family:var(--mono)}

/* Error */
.error-banner{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);border-radius:10px;padding:8px 12px;
  font-size:11px;color:var(--red);margin-bottom:10px;display:none;font-family:var(--mono)}
.error-banner.show{display:block}

/* Skeleton */
.skeleton{position:relative;overflow:hidden}
.skeleton::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.03),transparent);animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.skel-ring{width:150px;height:150px;border-radius:50%;border:10px solid rgba(255,255,255,.03);margin:0 auto 12px}
.skel-line{height:12px;background:rgba(255,255,255,.04);border-radius:4px;margin:4px 0}

/* Fade in */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeUp .4s cubic-bezier(.4,0,.2,1) both}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<h1 class="page-title">Vitals</h1>
<p class="page-sub">
  <span class="status-dot" id="statusDot"></span>
  <span id="statusText">Connecting to Forerunner...</span>
</p>

<div class="error-banner" id="errorBanner"></div>

<div id="content">
  <div id="skeletonView">
    <div class="card full skeleton" style="padding:24px;text-align:center">
      <div class="skel-ring"></div>
      <div class="skel-line" style="width:50%;margin:0 auto"></div>
    </div>
    <div class="grid" style="margin-top:10px">
      <div class="card skeleton" style="height:100px"></div>
      <div class="card skeleton" style="height:100px"></div>
      <div class="card full skeleton" style="height:80px"></div>
    </div>
  </div>
  <div id="dataView" style="display:none"></div>
</div>

<script>
/* ═══ BACKGROUND CANVAS: ECG heartbeat lines ═══ */
(function() {
  const cv = document.getElementById('bgCanvas');
  const ctx = cv.getContext('2d');

  function resize() { cv.width = window.innerWidth; cv.height = window.innerHeight; }

  function ecg(t) {
    t = t % 1;
    if (t < 0.12) return Math.sin(t / 0.12 * Math.PI) * 0.15;
    if (t < 0.18) return 0;
    if (t < 0.22) return -0.1 * Math.sin((t - 0.18) / 0.04 * Math.PI);
    if (t < 0.28) return Math.sin((t - 0.22) / 0.06 * Math.PI) * 0.85;
    if (t < 0.32) return -0.2 * Math.sin((t - 0.28) / 0.04 * Math.PI);
    if (t < 0.40) return 0;
    if (t < 0.56) return Math.sin((t - 0.40) / 0.16 * Math.PI) * 0.25;
    return 0;
  }

  let phase = 0;
  function draw() {
    const w = cv.width, h = cv.height;
    ctx.clearRect(0, 0, w, h);
    phase += 0.004;

    // Multiple ECG lines at different heights
    [0.25, 0.5, 0.75].forEach((yPct, idx) => {
      const cy = h * yPct;
      const amp = h * 0.06;
      const alpha = 0.04 - idx * 0.01;

      ctx.beginPath();
      ctx.strokeStyle = `rgba(110, 231, 183, ${alpha})`;
      ctx.lineWidth = 1;
      ctx.lineJoin = 'round';

      for (let x = 0; x < w; x += 2) {
        const t = (x / w * 3 + phase + idx * 0.7) % 3;
        const y = cy - ecg(t / 3) * amp;
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    });

    requestAnimationFrame(draw);
  }

  resize();
  requestAnimationFrame(draw);
  window.addEventListener('resize', resize);
})();

const CACHE_KEY = 'vitals_garmin';
let cachedData = null;

function fmtMins(m) {
  if (m == null) return '--';
  const h = Math.floor(m / 60);
  const mm = Math.round(m % 60);
  return h + 'h ' + String(mm).padStart(2, '0') + 'm';
}

function fmtTime(ts) {
  if (!ts) return '--';
  try { return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
  catch { return '--'; }
}

function bbColor(v) { return v >= 70 ? '#6EE7B7' : v >= 40 ? '#fbbf24' : '#ef4444'; }
function bbContext(v) {
  if (v >= 80) return 'Fully charged \u2014 ready for max effort';
  if (v >= 60) return 'Good energy \u2014 ready to perform';
  if (v >= 40) return 'Moderate \u2014 pace yourself today';
  if (v >= 20) return 'Low \u2014 prioritize recovery';
  return 'Depleted \u2014 rest day recommended';
}

function stressLabel(v) { return v <= 25 ? 'Rest' : v <= 50 ? 'Low' : v <= 75 ? 'Medium' : 'High'; }
function stressColor(v) { return v <= 50 ? '#6EE7B7' : v <= 75 ? '#fbbf24' : '#ef4444'; }

function activityIcon(type) {
  const icons = { running:'\u{1F3C3}',cycling:'\u{1F6B4}',swimming:'\u{1F3CA}',
    strength_training:'\u{1F4AA}',soccer:'\u26BD',walking:'\u{1F6B6}',yoga:'\u{1F9D8}',hiit:'\u{1F525}'};
  return icons[type] || '\u{1F3CB}';
}

function animateNumber(el, target, duration) {
  if (target == null || isNaN(target)) { el.textContent = '--'; return; }
  const startTime = performance.now();
  const isFloat = !Number.isInteger(target);
  function tick(now) {
    const progress = Math.min((now - startTime) / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    el.textContent = isFloat ? (target * eased).toFixed(1) : Math.round(target * eased);
    if (progress < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function renderData(d) {
  document.getElementById('skeletonView').style.display = 'none';
  const dv = document.getElementById('dataView');
  dv.style.display = 'block';

  const bb = d.bodyBattery ?? 0;
  const bbClr = bbColor(bb);
  const circumference = 2 * Math.PI * 65;
  const dashOffset = circumference - (bb / 100) * circumference;

  // Coach insights
  let coachHTML = '';
  if (d.coachInsights && d.coachInsights.length > 0) {
    const iconMap = { zap:'\u26A1',activity:'\u{1F3C3}',moon:'\u{1F319}',alert:'\u26A0\uFE0F',clock:'\u23F0',
      'trending-up':'\u2197\uFE0F','trending-down':'\u2198\uFE0F',wind:'\u{1F32C}\uFE0F',heart:'\u2764\uFE0F',
      droplet:'\u{1F4A7}',footprints:'\u{1F463}',flame:'\u{1F525}',target:'\u{1F3AF}',check:'\u2705'};
    const classMap = {peak:'',moderate:'',warning:'warning',recover:'recover',info:''};
    coachHTML = d.coachInsights.map(c =>
      '<div class="coach-card '+(classMap[c.type]||'')+' fade-in">'+
        '<div class="coach-icon">'+(iconMap[c.icon]||'\u{1F4A1}')+'</div>'+
        '<div class="coach-text">'+c.text+'</div></div>'
    ).join('');
  }

  // Sleep stages
  const total = (d.sleepRem||0)+(d.sleepDeep||0)+(d.sleepLight||0)+(d.sleepAwake||0);
  let sleepBarHTML = '<div style="width:100%;background:rgba(255,255,255,.03)"></div>';
  let legendHTML = '';
  if (total > 0) {
    const pct = v => ((v/total)*100).toFixed(1)+'%';
    sleepBarHTML = '<div class="clr-rem" style="width:'+pct(d.sleepRem||0)+'"></div>'+
      '<div class="clr-deep" style="width:'+pct(d.sleepDeep||0)+'"></div>'+
      '<div class="clr-light" style="width:'+pct(d.sleepLight||0)+'"></div>'+
      '<div class="clr-awake" style="width:'+pct(d.sleepAwake||0)+'"></div>';
    legendHTML = '<div class="sleep-legend-item"><div class="sleep-legend-dot clr-rem"></div>REM '+fmtMins(d.sleepRem)+'</div>'+
      '<div class="sleep-legend-item"><div class="sleep-legend-dot clr-deep"></div>Deep '+fmtMins(d.sleepDeep)+'</div>'+
      '<div class="sleep-legend-item"><div class="sleep-legend-dot clr-light"></div>Light '+fmtMins(d.sleepLight)+'</div>'+
      '<div class="sleep-legend-item"><div class="sleep-legend-dot clr-awake"></div>Awake '+fmtMins(d.sleepAwake)+'</div>';
  }

  // HRV badge
  let hrvBadgeClass = 'balanced', hrvBadgeText = 'Balanced';
  if (d.hrvStatus) {
    const s = String(d.hrvStatus).toLowerCase();
    if (s.includes('low')||s.includes('poor')) { hrvBadgeClass='low'; hrvBadgeText='Below Baseline'; }
    else if (s.includes('high')||s.includes('above')) { hrvBadgeClass='high'; hrvBadgeText='Above Baseline'; }
    else hrvBadgeText = d.hrvStatus;
  } else if (d.hrv != null && d.hrvWeeklyAvg != null) {
    if (d.hrv > d.hrvWeeklyAvg*1.1) { hrvBadgeClass='high'; hrvBadgeText='Above Avg'; }
    else if (d.hrv < d.hrvWeeklyAvg*0.85) { hrvBadgeClass='low'; hrvBadgeText='Below Avg'; }
  }

  // Activities
  let activitiesHTML = '';
  if (d.recentActivities && d.recentActivities.length > 0) {
    activitiesHTML = d.recentActivities.map(a => {
      const date = a.date ? new Date(a.date).toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'}) : '';
      const dur = a.duration ? fmtMins(a.duration) : '';
      const dist = a.distance ? (a.distance/1000).toFixed(1)+' km' : '';
      return '<div class="activity-item"><div class="activity-icon">'+activityIcon(a.type)+'</div>'+
        '<div class="activity-info"><div class="activity-name">'+a.name+'</div>'+
        '<div class="activity-meta">'+[date,dur,dist].filter(Boolean).join(' \u00B7 ')+'</div></div>'+
        '<div class="activity-stats">'+(a.avgHR?'<div><span class="sm-num">'+a.avgHR+'</span> <span class="unit">bpm</span></div>':'')+
        (a.trainingEffect?'<div class="sub-text">TE '+a.trainingEffect.toFixed(1)+'</div>':'')+'</div></div>';
    }).join('');
  }

  const stepPct = d.stepGoal ? Math.min((d.steps||0)/d.stepGoal*100,100) : 0;
  const floorPct = d.floorsGoal ? Math.min((d.floorsClimbed||0)/d.floorsGoal*100,100) : 0;
  const modMins = d.moderateIntensityMins || 0;
  const vigMins = d.vigorousIntensityMins || 0;
  const totalIntensity = modMins + vigMins * 2;

  dv.innerHTML = `
    <div class="grid">
      <div class="card full hero fade-in">
        <div class="ring-wrap">
          <svg viewBox="0 0 160 160">
            <circle class="ring-bg" cx="80" cy="80" r="65"/>
            <circle class="ring-fg" id="ringFg" cx="80" cy="80" r="65"
              stroke="${bbClr}" stroke-dasharray="${circumference}" stroke-dashoffset="${dashOffset}"
              transform="rotate(-90 80 80)"/>
          </svg>
          <div class="ring-center">
            <div class="ring-val" style="color:${bbClr}" id="bbVal">${bb}</div>
            <div class="ring-label">Body Battery</div>
          </div>
        </div>
        <div class="hero-subtitle">${bbContext(bb)}</div>
        <div class="bb-range">
          ${d.bodyBatteryLow!=null?'<span>\u2193 Low '+d.bodyBatteryLow+'</span>':''}
          ${d.bodyBatteryHigh!=null?'<span>\u2191 High '+d.bodyBatteryHigh+'</span>':''}
          ${d.bodyBatteryCharged!=null?'<span>\u26A1 +'+d.bodyBatteryCharged+' charged</span>':''}
        </div>
      </div>

      ${coachHTML?`<div class="full"><div class="section-title">AI Coach</div>${coachHTML}</div>`:''}

      <div class="card full fade-in">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px">
          <div class="label">Sleep</div>
          <div class="mid-num" style="color:${d.sleepScore>=75?'var(--green)':d.sleepScore>=50?'var(--yellow)':'var(--red)'}">${d.sleepScore??'--'}</div>
        </div>
        <div style="font-size:13px;color:var(--text-dim)">${fmtMins(d.sleepDurationMins)}</div>
        <div class="sleep-bar-wrap">${sleepBarHTML}</div>
        <div class="sleep-legend">${legendHTML}</div>
        <div class="sleep-meta">
          <span>${fmtTime(d.sleepStart)} \u2192 ${fmtTime(d.sleepEnd)}</span>
          ${d.sleepNeedMins?'<span>Need: '+fmtMins(d.sleepNeedMins)+'</span>':''}
        </div>
      </div>

      <div class="card full fade-in">
        <div class="label" style="margin-bottom:8px">Heart Rate</div>
        <div class="heart-pair">
          <div class="heart-half">
            <div class="label">HRV</div>
            <div class="mid-num" style="color:var(--green)" id="hrvVal">${d.hrv??'--'}</div>
            <span class="unit">ms</span>
            <div><span class="hrv-badge ${hrvBadgeClass}">${hrvBadgeText}</span></div>
            ${d.hrvWeeklyAvg?'<div class="heart-ctx">7d avg: '+d.hrvWeeklyAvg+' ms</div>':''}
          </div>
          <div class="heart-divider"></div>
          <div class="heart-half">
            <div class="label">Resting HR</div>
            <div class="mid-num" style="color:${d.restingHR<=55?'var(--green)':d.restingHR<=65?'var(--yellow)':'var(--red)'}" id="rhrVal">${d.restingHR??'--'}</div>
            <span class="unit">bpm</span>
            <div class="heart-ctx">${d.restingHR?(d.restingHR<=50?'Elite range':d.restingHR<=55?'Athletic':d.restingHR<=65?'Normal':'Elevated'):''}</div>
            ${d.hr7DayAvg?'<div class="heart-ctx">7d avg: '+d.hr7DayAvg+' bpm</div>':''}
          </div>
        </div>
        ${d.hrMin||d.hrMax?'<div style="display:flex;justify-content:center;gap:16px;margin-top:10px;font-size:10px;color:var(--text-muted);font-family:var(--mono)"><span>Min '+(d.hrMin||'--')+'</span><span>Max '+(d.hrMax||'--')+'</span></div>':''}
      </div>

      <div class="full"><div class="section-title">Core Vitals</div></div>
      <div class="card full fade-in">
        <div class="mini-grid">
          <div class="mini-card">
            <div class="label">SpO2</div>
            <div class="sm-num" style="color:${d.spo2>=95?'var(--green)':'var(--yellow)'}">${d.spo2??'--'}<span class="unit">%</span></div>
            ${d.spo2Low?'<div class="sub-text">Low: '+d.spo2Low+'%</div>':''}
          </div>
          <div class="mini-card">
            <div class="label">Respiration</div>
            <div class="sm-num">${d.respRate??'--'}<span class="unit">rpm</span></div>
            ${d.respLow||d.respHigh?'<div class="sub-text">'+(d.respLow||'--')+'-'+(d.respHigh||'--')+' range</div>':''}
          </div>
          <div class="mini-card">
            <div class="label">Stress</div>
            <div class="sm-num" style="color:${stressColor(d.avgStress||0)}">${d.avgStress??'--'}</div>
            <div class="sub-text">${d.avgStress?stressLabel(d.avgStress):''}</div>
            ${d.maxStress?'<div class="sub-text">Peak: '+d.maxStress+'</div>':''}
          </div>
          <div class="mini-card">
            <div class="label">VO2 Max</div>
            <div class="sm-num" style="color:${d.vo2Max>=55?'var(--green)':d.vo2Max>=45?'var(--yellow)':'var(--red)'}">${d.vo2Max??'--'}</div>
            ${d.vo2MaxRunning?'<div class="sub-text">Run: '+d.vo2MaxRunning+'</div>':''}
            ${d.vo2Max?'<div class="sub-text">'+(d.vo2Max>=55?'Excellent':d.vo2Max>=50?'Good':d.vo2Max>=45?'Fair':'Build it up')+'</div>':''}
          </div>
        </div>
      </div>

      ${d.trainingLoad||d.trainingStatus?`
      <div class="full"><div class="section-title">Training</div></div>
      <div class="card full fade-in">
        <div class="mini-grid">
          ${d.trainingLoad?'<div class="mini-card"><div class="label">Training Load</div><div class="sm-num">'+d.trainingLoad+'</div></div>':''}
          ${d.trainingStatus?'<div class="mini-card"><div class="label">Status</div><div class="sm-num" style="font-size:13px;color:var(--green)">'+d.trainingStatus+'</div></div>':''}
        </div>
      </div>`:''}

      <div class="full"><div class="section-title">Daily Activity</div></div>
      <div class="card full fade-in">
        <div class="mini-grid">
          <div class="mini-card">
            <div class="label">Steps</div>
            <div class="sm-num">${(d.steps||0).toLocaleString()}</div>
            <div class="steps-bar"><div class="steps-fill fill-green" style="width:${stepPct}%"></div></div>
            <div class="sub-text">${(d.steps||0).toLocaleString()} / ${(d.stepGoal||10000).toLocaleString()}</div>
          </div>
          <div class="mini-card">
            <div class="label">Calories</div>
            <div class="sm-num">${d.totalCalories?d.totalCalories.toLocaleString():'--'}</div>
            ${d.activeCalories?'<div class="sub-text">'+d.activeCalories+' active</div>':''}
          </div>
          <div class="mini-card">
            <div class="label">Floors</div>
            <div class="sm-num">${d.floorsClimbed??'--'}</div>
            ${d.floorsGoal?'<div class="steps-bar"><div class="steps-fill fill-blue" style="width:'+floorPct+'%"></div></div><div class="sub-text">Goal: '+d.floorsGoal+'</div>':''}
          </div>
          <div class="mini-card">
            <div class="label">Intensity Min</div>
            <div class="sm-num">${totalIntensity||'--'}</div>
            ${modMins||vigMins?'<div class="sub-text">'+modMins+' mod + '+vigMins+' vig</div>':''}
          </div>
        </div>
        ${d.totalDistanceMeters?'<div style="text-align:center;margin-top:8px;font-size:11px;color:var(--text-muted);font-family:var(--mono)">Distance: '+(d.totalDistanceMeters/1000).toFixed(1)+' km</div>':''}
      </div>

      ${d.hydrationMl!=null?`
      <div class="card full fade-in">
        <div class="label" style="margin-bottom:6px">Hydration</div>
        <div style="display:flex;align-items:baseline;gap:4px">
          <div class="mid-num" style="color:var(--blue)">${Math.round(d.hydrationMl/1000*10)/10}</div>
          <span class="unit">L</span>
          ${d.hydrationGoal?'<span class="sub-text" style="margin-left:8px">/ '+(d.hydrationGoal/1000).toFixed(1)+' L goal</span>':''}
        </div>
        ${d.hydrationGoal?'<div class="steps-bar" style="margin-top:8px"><div class="steps-fill fill-blue" style="width:'+Math.min(d.hydrationMl/d.hydrationGoal*100,100)+'%"></div></div>':''}
      </div>`:''}

      ${activitiesHTML?`
      <div class="full"><div class="section-title">Recent Activities</div></div>
      <div class="card full fade-in">${activitiesHTML}</div>`:''}
    </div>

    <div class="refresh-row">
      <span class="last-update" id="lastUpdate"></span>
      <button class="refresh-btn" id="refreshBtn" onclick="refresh()">
        <span class="r-icon" style="display:inline-block">&#x21bb;</span> Refresh
      </button>
    </div>
  `;

  // Animate numbers after render
  setTimeout(() => {
    const bbEl = document.getElementById('bbVal');
    if (bbEl && bb) animateNumber(bbEl, bb, 800);
    const hrvEl = document.getElementById('hrvVal');
    if (hrvEl && d.hrv) animateNumber(hrvEl, d.hrv, 600);
    const rhrEl = document.getElementById('rhrVal');
    if (rhrEl && d.restingHR) animateNumber(rhrEl, d.restingHR, 600);
  }, 200);
}

function setStatus(connected) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  if (connected) { dot.className = 'status-dot live'; txt.textContent = 'Forerunner 265 synced'; }
  else { dot.className = 'status-dot off'; txt.textContent = 'Disconnected'; }
}

function showError(msg) { const b = document.getElementById('errorBanner'); b.textContent = msg; b.classList.add('show'); }
function hideError() { document.getElementById('errorBanner').classList.remove('show'); }

async function fetchData() {
  const btn = document.getElementById('refreshBtn');
  if (btn) btn.classList.add('spinning');

  try {
    const res = await fetch('/api/garmin-data');
    if (!res.ok) { const err = await res.json().catch(()=>({})); throw new Error(err.error || 'API returned ' + res.status); }
    const d = await res.json();
    cachedData = { data: d, ts: Date.now() };
    if (window.Vitality && window.Vitality.save) await window.Vitality.save(cachedData);
    hideError(); setStatus(true); renderData(d); updateTimestamp('Updated');
  } catch (err) {
    setStatus(false);
    showError('Could not reach Garmin \u2014 ' + (err.message || 'showing cached data'));
    if (cachedData && cachedData.data) { renderData(cachedData.data); updateTimestamp('Cached'); }
  } finally {
    if (btn) btn.classList.remove('spinning');
  }
}

function updateTimestamp(prefix) {
  const el = document.getElementById('lastUpdate');
  if (el) el.textContent = prefix + ' ' + new Date(cachedData ? cachedData.ts : Date.now()).toLocaleTimeString();
}

function refresh() { fetchData(); }

async function init() {
  try {
    if (window.Vitality && window.Vitality.load) {
      const loaded = await window.Vitality.load();
      if (loaded && loaded.data) { cachedData = loaded; renderData(loaded.data); updateTimestamp('Cached'); setStatus(true); }
    }
  } catch (e) {}
  await fetchData();
}

init();
</script>
</body>
</html>
