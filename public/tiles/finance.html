<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050506;--card:rgba(255,255,255,0.028);--card-border:rgba(255,255,255,0.055);
  --green:#6EE7B7;--green-dim:rgba(110,231,183,0.15);--red:#F87171;--red-dim:rgba(248,113,113,0.15);
  --yellow:#FBBF24;--text:#fff;--text-dim:rgba(255,255,255,0.55);--text-muted:rgba(255,255,255,0.35);
  --radius:20px;--radius-sm:14px;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --serif:'Instrument Serif',Georgia,serif;
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,sans-serif;
  font-size:14px;line-height:1.4;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body{padding:16px 14px 40px;max-width:480px;margin:0 auto;position:relative;z-index:0}

body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 75% 10%,rgba(242,192,99,.10),transparent 55%),
    radial-gradient(ellipse at 20% 85%,rgba(110,231,183,.06),transparent 55%);
  filter:blur(50px);pointer-events:none;z-index:-2;animation:bgDrift 30s ease-in-out infinite alternate}
@keyframes bgDrift{0%{transform:translate(0,0) scale(1)}50%{transform:translate(-15px,10px) scale(1.02)}100%{transform:translate(10px,-8px) scale(1)}}
body::after{content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg width='3' height='3' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='1' height='1' fill='rgba(255,255,255,0.012)'/%3E%3C/svg%3E");
  pointer-events:none;z-index:-1}

#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;opacity:0.4}

h1{font-family:var(--serif);font-style:italic;font-size:36px;letter-spacing:-0.02em;font-weight:400;line-height:1.1;margin-bottom:2px}
.page-sub{font-size:12px;color:var(--yellow);margin-bottom:18px;font-family:var(--mono);letter-spacing:0.04em}

.card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);
  padding:18px;margin-bottom:12px;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  box-shadow:0 1px 0 0 rgba(255,255,255,.04) inset,0 8px 32px rgba(0,0,0,.3);
  transition:transform .25s cubic-bezier(.4,0,.2,1),border-color .3s;
  position:relative;overflow:hidden}
.card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.09)}
.card::before{content:'';position:absolute;inset:0;border-radius:var(--radius);
  background:radial-gradient(ellipse at 50% -40%,rgba(255,255,255,.03),transparent 70%);pointer-events:none}

.label{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-dim);font-weight:600;
  margin-bottom:6px;font-family:var(--mono)}
.big-number{font-size:44px;font-weight:800;letter-spacing:-2px;font-family:var(--mono);
  font-variant-numeric:tabular-nums;line-height:1.1}
.sub-number{font-size:12px;color:var(--text-dim);font-variant-numeric:tabular-nums;margin-top:2px;
  font-family:var(--mono)}

/* Progress bar */
.progress-wrap{height:5px;background:rgba(255,255,255,0.04);border-radius:3px;margin-top:14px;overflow:hidden}
.progress-bar{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1),background .3s}

/* Stats row */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{text-align:center;padding:14px}
.stat-val{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;margin-bottom:2px;
  font-family:var(--mono);letter-spacing:-0.03em}
.stat-label{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);font-weight:600;
  font-family:var(--mono)}

/* Inputs */
input,select{background:rgba(255,255,255,0.04);border:1px solid var(--card-border);border-radius:10px;
  padding:10px 12px;color:#fff;font-size:14px;width:100%;outline:none;font-family:inherit;
  transition:border-color .2s,box-shadow .2s}
input:focus,select:focus{border-color:var(--yellow);box-shadow:0 0 0 3px rgba(242,192,99,.08)}
input::placeholder{color:var(--text-muted)}
select option{background:#111;color:#fff}

/* Buttons */
.btn{border:none;border-radius:10px;padding:11px 16px;font-size:13px;font-weight:600;cursor:pointer;
  font-family:inherit;transition:all .15s;width:100%;position:relative;overflow:hidden}
.btn:active{transform:scale(0.97)}
.btn-green{background:linear-gradient(135deg,var(--green),#34D399);color:#000;
  box-shadow:0 2px 12px rgba(110,231,183,.15)}
.btn-green:hover{box-shadow:0 4px 20px rgba(110,231,183,.25)}
.btn-red{background:linear-gradient(135deg,var(--red),#EF4444);color:#000;
  box-shadow:0 2px 12px rgba(248,113,113,.15)}
.btn-red:hover{box-shadow:0 4px 20px rgba(248,113,113,.25)}
.btn-outline{background:transparent;border:1px solid var(--card-border);color:var(--text-dim)}
.btn-outline:hover{border-color:var(--yellow);color:var(--yellow)}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}

.form-row{margin-bottom:8px}

/* Section title */
.section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);
  margin-bottom:12px;display:flex;align-items:center;gap:8px;font-family:var(--mono)}
.section-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.04)}

/* Category breakdown */
.cat-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.cat-row:last-child{border-bottom:none}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-name{flex:1;font-size:13px;font-weight:500}
.cat-bar-wrap{width:80px;height:4px;background:rgba(255,255,255,0.04);border-radius:2px;overflow:hidden;flex-shrink:0}
.cat-bar-fill{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.cat-amt{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;width:60px;text-align:right;
  font-family:var(--mono)}
.cat-pct{font-size:11px;color:var(--text-dim);width:36px;text-align:right;font-variant-numeric:tabular-nums;
  font-family:var(--mono)}

/* Transactions */
.txn-list{max-height:360px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.08) transparent}
.txn-list::-webkit-scrollbar{width:4px}
.txn-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
.txn{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.03);
  transition:transform .15s}
.txn:hover{transform:translateX(2px)}
.txn:last-child{border-bottom:none}
.txn-info{flex:1;min-width:0}
.txn-desc{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txn-meta{font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:6px;margin-top:2px;
  font-family:var(--mono)}
.txn-tag{background:rgba(255,255,255,0.04);padding:2px 7px;border-radius:5px;font-size:10px;font-weight:500;
  font-family:var(--mono)}
.txn-amt{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;
  font-family:var(--mono)}
.txn-amt.inc{color:var(--green)}
.txn-amt.exp{color:var(--red)}
.txn-del{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;padding:4px 8px;
  line-height:1;transition:color .2s;flex-shrink:0;border-radius:4px}
.txn-del:hover{color:var(--red);background:rgba(248,113,113,.06)}

/* Canvas chart */
#trendCanvas{width:100%;height:130px;display:block}
.chart-legend{display:flex;gap:14px;justify-content:center;margin-top:10px}
.chart-legend span{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text-dim);font-weight:500;
  font-family:var(--mono)}
.chart-legend-dot{width:6px;height:6px;border-radius:50%;display:inline-block}

/* Budget */
.budget-row{display:flex;gap:8px;align-items:center}
.budget-row input{flex:1}
.budget-row .btn{width:auto;padding:10px 20px}

.empty-state{text-align:center;padding:30px 0;color:var(--text-muted);font-size:13px}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeUp .4s cubic-bezier(.4,0,.2,1) both}
.fade-in:nth-child(1){animation-delay:0s}
.fade-in:nth-child(2){animation-delay:.05s}
.fade-in:nth-child(3){animation-delay:.1s}
.fade-in:nth-child(4){animation-delay:.15s}
.fade-in:nth-child(5){animation-delay:.2s}
.fade-in:nth-child(6){animation-delay:.25s}
.fade-in:nth-child(7){animation-delay:.3s}
.fade-in:nth-child(8){animation-delay:.35s}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<h1 class="fade-in">Finance</h1>
<p class="page-sub fade-in">Track every dollar</p>

<!-- Hero Balance -->
<div class="card fade-in" id="hero">
  <div class="label">Spending This Month</div>
  <div class="big-number" id="totalSpending" style="color:var(--yellow)">$0</div>
  <div class="sub-number" id="budgetSub">No budget set</div>
  <div class="progress-wrap"><div class="progress-bar" id="budgetBar"></div></div>
</div>

<!-- Stats Row -->
<div class="stats-row fade-in">
  <div class="card stat-card">
    <div class="stat-val" id="statIncome" style="color:var(--green)">$0</div>
    <div class="stat-label">Income</div>
  </div>
  <div class="card stat-card">
    <div class="stat-val" id="statNet">$0</div>
    <div class="stat-label">Net</div>
  </div>
  <div class="card stat-card">
    <div class="stat-val" id="statSavings" style="color:var(--green)">0%</div>
    <div class="stat-label">Saved</div>
  </div>
</div>

<!-- Budget Settings -->
<div class="card fade-in">
  <div class="section-title">Monthly Budget</div>
  <div class="budget-row">
    <input type="number" id="budgetInput" placeholder="e.g. 1500" min="0" step="50">
    <button class="btn btn-green" onclick="saveBudget()" style="width:auto;padding:10px 20px">Set</button>
  </div>
</div>

<!-- Add Transaction -->
<div class="card fade-in">
  <div class="section-title">Add Transaction</div>
  <div class="form-row">
    <input type="number" id="txnAmt" placeholder="Amount ($)" min="0" step="0.01">
  </div>
  <div class="form-row">
    <input type="text" id="txnDesc" placeholder="Description" maxlength="80">
  </div>
  <div class="form-row">
    <select id="txnCat">
      <option value="Food">Food</option>
      <option value="Transport">Transport</option>
      <option value="Gear/Equipment">Gear/Equipment</option>
      <option value="Social">Social</option>
      <option value="Subscriptions">Subscriptions</option>
      <option value="Supplements">Supplements</option>
      <option value="Training">Training</option>
      <option value="Other">Other</option>
    </select>
  </div>
  <div class="btn-row">
    <button class="btn btn-red" onclick="addTxn('expense')">- Expense</button>
    <button class="btn btn-green" onclick="addTxn('income')">+ Income</button>
  </div>
</div>

<!-- Category Breakdown -->
<div class="card fade-in">
  <div class="section-title">Spending by Category</div>
  <div id="catBreakdown"><div class="empty-state">No expenses yet</div></div>
</div>

<!-- Recent Transactions -->
<div class="card fade-in">
  <div class="section-title">Recent Transactions</div>
  <div class="txn-list" id="txnList"><div class="empty-state">No transactions yet</div></div>
</div>

<!-- Monthly Trend (Canvas) -->
<div class="card fade-in">
  <div class="section-title">6-Month Trend</div>
  <canvas id="trendCanvas"></canvas>
  <div class="chart-legend">
    <span><span class="chart-legend-dot" style="background:var(--green)"></span>Income</span>
    <span><span class="chart-legend-dot" style="background:var(--red)"></span>Expenses</span>
  </div>
</div>

<script>
/* ═══ BACKGROUND CANVAS: Floating currency particles ═══ */
(function() {
  const cv = document.getElementById('bgCanvas');
  const ctx = cv.getContext('2d');
  let particles = [];

  function resize() {
    cv.width = window.innerWidth;
    cv.height = window.innerHeight;
  }

  function init() {
    resize();
    particles = [];
    for (let i = 0; i < 20; i++) {
      particles.push({
        x: Math.random() * cv.width,
        y: Math.random() * cv.height,
        vy: -0.15 - Math.random() * 0.2,
        size: 8 + Math.random() * 6,
        opacity: 0.03 + Math.random() * 0.04,
        phase: Math.random() * Math.PI * 2,
        char: ['$','%','+','-','='][Math.floor(Math.random() * 5)]
      });
    }
  }

  function draw(t) {
    ctx.clearRect(0, 0, cv.width, cv.height);
    particles.forEach(p => {
      p.y += p.vy;
      p.x += Math.sin(t * 0.0005 + p.phase) * 0.2;
      p.phase += 0.003;
      if (p.y < -20) { p.y = cv.height + 20; p.x = Math.random() * cv.width; }

      ctx.font = `600 ${p.size}px "JetBrains Mono", monospace`;
      ctx.fillStyle = `rgba(242, 192, 99, ${p.opacity * (0.6 + 0.4 * Math.sin(p.phase))})`;
      ctx.textAlign = 'center';
      ctx.fillText(p.char, p.x, p.y);
    });
    requestAnimationFrame(draw);
  }

  init();
  requestAnimationFrame(draw);
  window.addEventListener('resize', init);
})();

/* ═══ ANIMATED COUNT ═══ */
function animateCount(el, target, prefix = '$', duration = 600) {
  const start = performance.now();
  const from = parseFloat(el.textContent.replace(/[$,%]/g, '')) || 0;
  function tick(now) {
    const p = Math.min((now - start) / duration, 1);
    const e = 1 - Math.pow(1 - p, 3);
    const val = Math.round(from + (target - from) * e);
    el.textContent = prefix + Math.abs(val).toLocaleString('en-AU');
    if (p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

const CAT_COLORS = {
  'Food':'#6EE7B7','Transport':'#60A5FA','Gear/Equipment':'#F59E0B',
  'Social':'#A78BFA','Subscriptions':'#F472B6','Supplements':'#34D399',
  'Training':'#FB923C','Other':'#94A3B8'
};
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let data = { txns: [], budget: 0 };

function fmt(n) { return '$' + Math.abs(n).toLocaleString('en-AU', { minimumFractionDigits: 0, maximumFractionDigits: 0 }); }
function fmtDec(n) { return '$' + Math.abs(n).toLocaleString('en-AU', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function getMonthKey(ts) { const d = new Date(ts); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0'); }
function currentMonthKey() { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0'); }
function txnsForMonth(key) { return data.txns.filter(t => getMonthKey(t.ts) === key); }

function render() {
  const mk = currentMonthKey();
  const mTxns = txnsForMonth(mk);
  const expenses = mTxns.filter(t => t.type === 'expense').reduce((s, t) => s + t.amt, 0);
  const income = mTxns.filter(t => t.type === 'income').reduce((s, t) => s + t.amt, 0);
  const net = income - expenses;
  const savingsRate = income > 0 ? Math.round((net / income) * 100) : 0;

  document.getElementById('totalSpending').textContent = fmt(expenses);
  if (data.budget > 0) {
    const pct = Math.min((expenses / data.budget) * 100, 120);
    document.getElementById('budgetSub').textContent = fmt(expenses) + ' of ' + fmt(data.budget) + ' budget';
    const bar = document.getElementById('budgetBar');
    bar.style.width = Math.min(pct, 100) + '%';
    bar.style.background = pct < 80 ? 'linear-gradient(90deg,#34D399,#6EE7B7)' : pct <= 100 ? 'linear-gradient(90deg,#F59E0B,#FBBF24)' : 'linear-gradient(90deg,#EF4444,#F87171)';
  } else {
    document.getElementById('budgetSub').textContent = 'No budget set';
    document.getElementById('budgetBar').style.width = '0%';
  }

  document.getElementById('statIncome').textContent = fmt(income);
  const netEl = document.getElementById('statNet');
  netEl.textContent = (net < 0 ? '-' : '') + fmt(net);
  netEl.style.color = net >= 0 ? 'var(--green)' : 'var(--red)';

  const savEl = document.getElementById('statSavings');
  savEl.textContent = savingsRate + '%';
  savEl.style.color = savingsRate >= 0 ? 'var(--green)' : 'var(--red)';

  if (data.budget > 0) document.getElementById('budgetInput').placeholder = 'Current: $' + data.budget;

  renderCategories(mTxns);
  renderTransactions();
  renderTrend();
}

function renderCategories(mTxns) {
  const wrap = document.getElementById('catBreakdown');
  const expTxns = mTxns.filter(t => t.type === 'expense');
  if (expTxns.length === 0) { wrap.innerHTML = '<div class="empty-state">No expenses yet</div>'; return; }

  const cats = {};
  let total = 0;
  expTxns.forEach(t => { cats[t.cat] = (cats[t.cat] || 0) + t.amt; total += t.amt; });
  const sorted = Object.entries(cats).sort((a, b) => b[1] - a[1]);
  const maxAmt = sorted[0][1];

  wrap.innerHTML = sorted.map(([cat, amt]) => {
    const pct = Math.round((amt / total) * 100);
    const barW = Math.round((amt / maxAmt) * 100);
    const color = CAT_COLORS[cat] || '#94A3B8';
    return `<div class="cat-row">
      <div class="cat-dot" style="background:${color};box-shadow:0 0 6px ${color}40"></div>
      <div class="cat-name">${esc(cat)}</div>
      <div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:${barW}%;background:${color}"></div></div>
      <div class="cat-amt">${fmt(amt)}</div>
      <div class="cat-pct">${pct}%</div>
    </div>`;
  }).join('');
}

function renderTransactions() {
  const wrap = document.getElementById('txnList');
  const sorted = [...data.txns].sort((a, b) => b.ts - a.ts).slice(0, 30);
  if (sorted.length === 0) { wrap.innerHTML = '<div class="empty-state">No transactions yet</div>'; return; }

  wrap.innerHTML = sorted.map(t => {
    const d = new Date(t.ts);
    const dateStr = d.getDate() + ' ' + MONTHS[d.getMonth()];
    const isInc = t.type === 'income';
    return `<div class="txn">
      <div class="txn-info">
        <div class="txn-desc">${esc(t.desc || t.cat)}</div>
        <div class="txn-meta"><span class="txn-tag">${esc(t.cat)}</span> ${dateStr}</div>
      </div>
      <div class="txn-amt ${isInc ? 'inc' : 'exp'}">${isInc ? '+' : '-'}${fmtDec(t.amt)}</div>
      <button class="txn-del" onclick="delTxn(${t.ts})" title="Delete">&times;</button>
    </div>`;
  }).join('');
}

/* ═══ TREND CHART — Canvas powered with animation ═══ */
function renderTrend() {
  const cv = document.getElementById('trendCanvas');
  const rect = cv.parentElement.getBoundingClientRect();
  const dpr = devicePixelRatio || 1;
  cv.width = (rect.width - 36) * dpr;
  cv.height = 130 * dpr;
  cv.style.width = (rect.width - 36) + 'px';
  cv.style.height = '130px';
  const ctx = cv.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const w = rect.width - 36, h = 130;
  const d = new Date();
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const md = new Date(d.getFullYear(), d.getMonth() - i, 1);
    months.push({ key: getMonthKey(md.getTime()), label: MONTHS[md.getMonth()] });
  }

  let maxVal = 1;
  const monthData = months.map(m => {
    const txns = txnsForMonth(m.key);
    const inc = txns.filter(t => t.type === 'income').reduce((s, t) => s + t.amt, 0);
    const exp = txns.filter(t => t.type === 'expense').reduce((s, t) => s + t.amt, 0);
    maxVal = Math.max(maxVal, inc, exp);
    return { label: m.label, inc, exp };
  });

  const barW = (w / 6) * 0.28;
  const gap = w / 6;
  const padTop = 8, padBot = 20;
  const maxH = h - padTop - padBot;

  // Animate
  const animStart = performance.now();
  function draw(now) {
    const progress = Math.min((now - animStart) / 800, 1);
    const ease = 1 - Math.pow(1 - progress, 3);

    ctx.clearRect(0, 0, w, h);

    monthData.forEach((m, i) => {
      const cx = i * gap + gap / 2;
      const incH = m.inc ? Math.max((m.inc / maxVal) * maxH, 4) * ease : 2;
      const expH = m.exp ? Math.max((m.exp / maxVal) * maxH, 4) * ease : 2;

      // Income bar
      const incGrad = ctx.createLinearGradient(0, h - padBot - incH, 0, h - padBot);
      incGrad.addColorStop(0, m.inc ? 'rgba(110, 231, 183, 0.8)' : 'rgba(110, 231, 183, 0.08)');
      incGrad.addColorStop(1, m.inc ? 'rgba(110, 231, 183, 0.3)' : 'rgba(110, 231, 183, 0.03)');

      const ix = cx - barW - 1;
      roundedBar(ctx, ix, h - padBot - incH, barW, incH, 3);
      ctx.fillStyle = incGrad;
      ctx.fill();

      // Expense bar
      const expGrad = ctx.createLinearGradient(0, h - padBot - expH, 0, h - padBot);
      expGrad.addColorStop(0, m.exp ? 'rgba(248, 113, 113, 0.6)' : 'rgba(248, 113, 113, 0.08)');
      expGrad.addColorStop(1, m.exp ? 'rgba(248, 113, 113, 0.2)' : 'rgba(248, 113, 113, 0.03)');

      const ex = cx + 1;
      roundedBar(ctx, ex, h - padBot - expH, barW, expH, 3);
      ctx.fillStyle = expGrad;
      ctx.fill();

      // Label
      ctx.font = '600 9px "JetBrains Mono", monospace';
      ctx.fillStyle = i === 5 ? 'rgba(242, 192, 99, 0.8)' : 'rgba(255, 255, 255, 0.25)';
      ctx.textAlign = 'center';
      ctx.fillText(m.label, cx, h - 4);
    });

    if (progress < 1) requestAnimationFrame(draw);
  }

  function roundedBar(ctx, x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h);
    ctx.lineTo(x, y + h);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  requestAnimationFrame(draw);
}

function esc(s) { const el = document.createElement('span'); el.textContent = s; return el.innerHTML; }

async function persist() { await window.Vitality.save(data); }

async function saveBudget() {
  const v = parseFloat(document.getElementById('budgetInput').value);
  if (!v || v <= 0) return;
  data.budget = Math.round(v);
  document.getElementById('budgetInput').value = '';
  await persist();
  render();
}

async function addTxn(type) {
  const amtEl = document.getElementById('txnAmt');
  const descEl = document.getElementById('txnDesc');
  const catEl = document.getElementById('txnCat');
  const amt = parseFloat(amtEl.value);
  if (!amt || amt <= 0) { amtEl.focus(); return; }

  data.txns.push({
    ts: Date.now(), type, amt: Math.round(amt * 100) / 100,
    desc: descEl.value.trim() || catEl.value, cat: catEl.value
  });

  amtEl.value = '';
  descEl.value = '';
  await persist();
  render();
}

async function delTxn(ts) {
  data.txns = data.txns.filter(t => t.ts !== ts);
  await persist();
  render();
}

// Init
(async () => {
  try {
    const loaded = await window.Vitality.load();
    if (loaded && typeof loaded === 'object') {
      data.txns = Array.isArray(loaded.txns) ? loaded.txns : [];
      data.budget = loaded.budget || 0;
    }
  } catch (e) {}
  render();
})();
</script>
