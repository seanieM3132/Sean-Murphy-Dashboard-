<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Coach Khabib</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#6EE7B7;--green-dim:#34D399;--green-deep:#059669;--green-glow:rgba(110,231,183,.18);
  --bg:#050506;--card:rgba(255,255,255,.028);--card-border:rgba(255,255,255,.055);
  --text:#f0f0f0;--text-dim:#999;--text-muted:#555;--mono:'JetBrains Mono',ui-monospace,monospace;
  --radius:16px;--radius-sm:12px;
}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);padding:20px 16px 40px;min-height:100vh;-webkit-font-smoothing:antialiased;position:relative;z-index:0}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 70% 10%,rgba(110,231,183,.10),transparent 55%),radial-gradient(ellipse at 20% 85%,rgba(110,231,183,.06),transparent 55%),radial-gradient(ellipse at 90% 70%,rgba(52,211,153,.04),transparent 40%);filter:blur(50px);pointer-events:none;z-index:-2;animation:bgDrift 30s ease-in-out infinite alternate}
@keyframes bgDrift{0%{transform:translate(0,0) scale(1)}50%{transform:translate(-15px,10px) scale(1.02)}100%{transform:translate(10px,-8px) scale(1)}}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='3' height='3' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='1' height='1' fill='rgba(255,255,255,0.012)'/%3E%3C/svg%3E");pointer-events:none;z-index:-1}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1a1a1a;border-radius:4px}

/* ─── ENTRANCE ANIMATIONS ─── */
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeScale{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes breathe{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.02)}}
@keyframes ringPulse{0%,100%{filter:drop-shadow(0 0 4px rgba(110,231,183,.3))}50%{filter:drop-shadow(0 0 12px rgba(110,231,183,.5))}}
@keyframes countSpin{from{stroke-dashoffset:var(--ring-offset)}to{stroke-dashoffset:var(--ring-target)}}
@keyframes gridReveal{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes dataFlicker{0%,100%{opacity:1}50%{opacity:.7}}
@keyframes scanLine{0%{transform:translateY(-100%)}100%{transform:translateY(100%)}}
@keyframes dotPop{0%{transform:scale(0)}60%{transform:scale(1.3)}100%{transform:scale(1)}}

.anim-in{animation:slideUp .5s ease-out both}
.anim-in:nth-child(2){animation-delay:.06s}.anim-in:nth-child(3){animation-delay:.12s}.anim-in:nth-child(4){animation-delay:.18s}.anim-in:nth-child(5){animation-delay:.24s}.anim-in:nth-child(6){animation-delay:.3s}.anim-in:nth-child(7){animation-delay:.36s}.anim-in:nth-child(8){animation-delay:.42s}

/* ─── HEADER ─── */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid rgba(110,231,183,.08)}
.header-left h1{font-family:'Instrument Serif',Georgia,serif;font-style:italic;font-size:36px;font-weight:800;letter-spacing:3px;line-height:1;background:linear-gradient(135deg,var(--green) 0%,#fff 40%,var(--green-dim) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 20px rgba(110,231,183,.15))}
.header-left .subtitle{font-size:11px;color:var(--green-deep);font-weight:700;margin-top:4px;letter-spacing:2px;text-transform:uppercase;font-family:var(--mono)}
.header-right{display:flex;align-items:center;gap:12px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green-glow);animation:breathe 2s ease-in-out infinite}
.live-label{font-size:10px;color:var(--green);font-family:var(--mono);font-weight:600;letter-spacing:1px;text-transform:uppercase}

/* ─── HERO METRICS ROW ─── */
.hero-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.hero-metric{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:16px 14px;text-align:center;position:relative;overflow:hidden;transition:border-color .3s}
.hero-metric:hover{border-color:rgba(110,231,183,.15)}
.hero-metric::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(110,231,183,.2),transparent)}
.hero-val{font-size:32px;font-weight:800;font-family:var(--mono);color:var(--green);line-height:1;font-variant-numeric:tabular-nums;text-shadow:0 0 20px rgba(110,231,183,.2)}
.hero-unit{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:6px;font-family:var(--mono)}
.hero-metric .hero-spark{position:absolute;bottom:0;left:0;right:0;height:28px;opacity:.25}

/* ─── CARDS ─── */
.card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:18px;margin-bottom:12px;position:relative;overflow:hidden;transition:border-color .3s;box-shadow:0 1px 0 0 rgba(255,255,255,.04) inset,0 12px 40px rgba(0,0,0,.5)}
.card:hover{border-color:rgba(110,231,183,.1)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(110,231,183,.12),transparent)}
.card-glass{background:linear-gradient(135deg,rgba(110,231,183,.025) 0%,rgba(0,0,0,.4) 100%);border:1px solid rgba(110,231,183,.08);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.section-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text-muted);margin-bottom:14px;display:flex;align-items:center;gap:8px;font-family:var(--mono)}
.section-label::before{content:'';display:inline-block;width:3px;height:10px;background:var(--green);border-radius:2px;box-shadow:0 0 6px var(--green-glow)}
.section-label .sl-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(110,231,183,.1),transparent)}

/* ─── COUNTDOWN RING ─── */
.countdown-wrap{display:flex;align-items:center;gap:18px;margin-bottom:14px}
.countdown-ring-box{position:relative;width:80px;height:80px;flex-shrink:0}
.countdown-ring-box svg{width:80px;height:80px;transform:rotate(-90deg);animation:ringPulse 3s ease-in-out infinite}
.ring-bg{fill:none;stroke:rgba(255,255,255,.04);stroke-width:4}
.ring-fg{fill:none;stroke:url(#ringGrad);stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)}
.countdown-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.cd-num{font-size:26px;font-weight:800;font-family:var(--mono);color:var(--green);line-height:1;text-shadow:0 0 16px rgba(110,231,183,.3)}
.cd-unit{font-size:8px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;font-family:var(--mono);margin-top:2px}
.countdown-info{flex:1}
.countdown-date{font-size:15px;font-weight:700;color:var(--text)}
.countdown-sub{font-size:11px;color:var(--text-dim);margin-top:2px;font-family:var(--mono)}
.countdown-progress{font-size:10px;color:var(--green);font-family:var(--mono);font-weight:600;margin-top:6px;display:flex;align-items:center;gap:6px}
.countdown-progress .cp-bar{flex:1;max-width:120px;height:3px;background:#111;border-radius:3px;overflow:hidden}
.countdown-progress .cp-fill{height:100%;background:linear-gradient(90deg,var(--green-deep),var(--green));border-radius:3px;transition:width 1s ease}

/* ─── QUOTE ─── */
.quote-block{position:relative;padding:14px 40px 14px 16px;background:linear-gradient(135deg,rgba(110,231,183,.03) 0%,rgba(0,0,0,.2) 100%);border-left:2px solid var(--green);border-radius:0 var(--radius-sm) var(--radius-sm) 0;box-shadow:inset 0 0 30px rgba(110,231,183,.02)}
.quote-text{font-size:14px;font-weight:600;line-height:1.55;color:var(--text)}
.quote-attr{font-size:10px;color:var(--green-deep);margin-top:5px;font-weight:600;font-family:var(--mono);letter-spacing:.5px}
.btn-shuffle{position:absolute;top:8px;right:8px;background:rgba(110,231,183,.04);border:1px solid rgba(110,231,183,.1);border-radius:8px;color:var(--green-deep);font-size:14px;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.btn-shuffle:hover{border-color:var(--green);color:var(--green);background:rgba(110,231,183,.08);box-shadow:0 0 12px rgba(110,231,183,.1)}
.btn-shuffle:active{transform:rotate(180deg)}

/* ─── TRAINING PLAN ─── */
.plan-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.plan-title{font-size:16px;font-weight:700}
.plan-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:4px 10px;border-radius:6px;font-family:var(--mono)}
.plan-body{display:flex;flex-direction:column;gap:8px}
.plan-row{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text-dim)}
.plan-label{color:var(--text-muted);font-size:9px;text-transform:uppercase;letter-spacing:1px;width:70px;flex-shrink:0;font-family:var(--mono);font-weight:600}
.plan-value{color:var(--text);font-weight:600}
.intensity-bar{display:flex;gap:3px;align-items:center}
.intensity-bar .bar-seg{width:20px;height:6px;border-radius:3px;background:#111;transition:all .3s}
.intensity-bar .bar-seg.active{background:linear-gradient(90deg,var(--green-deep),var(--green));box-shadow:0 0 6px var(--green-glow)}
.focus-tags{display:flex;flex-wrap:wrap;gap:4px}
.focus-tag{font-size:9px;font-weight:600;padding:3px 8px;border-radius:6px;background:rgba(110,231,183,.04);color:var(--green-dim);border:1px solid rgba(110,231,183,.08);font-family:var(--mono);letter-spacing:.3px;transition:all .2s}
.focus-tag:hover{background:rgba(110,231,183,.08);border-color:rgba(110,231,183,.15)}

/* ─── READINESS GAUGE ─── */
.readiness-wrap{display:flex;align-items:center;gap:18px}
.readiness-ring{position:relative;width:90px;height:90px;flex-shrink:0}
.readiness-ring svg{width:90px;height:90px;transform:rotate(-90deg)}
.rr-bg{fill:none;stroke:rgba(255,255,255,.03);stroke-width:5}
.rr-fg{fill:none;stroke:url(#readinessGrad);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1)}
.readiness-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.readiness-score{font-size:28px;font-weight:800;font-family:var(--mono);color:var(--green);line-height:1;text-shadow:0 0 16px rgba(110,231,183,.25)}
.readiness-label{font-size:7px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;font-family:var(--mono);margin-top:3px}
.readiness-details{flex:1;display:flex;flex-direction:column;gap:6px}
.rd-row{display:flex;align-items:center;gap:8px}
.rd-label{font-size:10px;color:var(--text-muted);font-family:var(--mono);font-weight:600;letter-spacing:.5px;text-transform:uppercase;width:62px;flex-shrink:0}
.rd-bar{flex:1;height:4px;background:#111;border-radius:4px;overflow:hidden}
.rd-fill{height:100%;border-radius:4px;transition:width .8s ease}
.rd-val{font-size:10px;font-weight:700;font-family:var(--mono);color:var(--green);min-width:24px;text-align:right}

/* ─── CHECKLIST ─── */
.checklist{display:flex;flex-direction:column;gap:4px}
.check-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.04);border-radius:var(--radius-sm);cursor:pointer;transition:all .25s ease;position:relative;overflow:hidden}
.check-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:0;background:linear-gradient(90deg,rgba(110,231,183,.06),transparent);transition:width .4s ease}
.check-item:hover{border-color:rgba(110,231,183,.08)}
.check-item.done{border-color:rgba(110,231,183,.12)}
.check-item.done::before{width:100%}
.check-item.done .ci-text{color:#555}
.check-item.done .ci-time{color:#333}
.ci-box{width:18px;height:18px;border-radius:6px;border:1.5px solid #2a2a2a;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .25s;position:relative;z-index:1}
.check-item.done .ci-box{border-color:var(--green);background:rgba(110,231,183,.15);box-shadow:0 0 10px rgba(110,231,183,.2)}
.ci-check{opacity:0;transition:all .25s;color:var(--green);font-size:10px;font-weight:700}
.check-item.done .ci-check{opacity:1}
.ci-content{flex:1;display:flex;align-items:center;gap:8px;min-width:0;position:relative;z-index:1}
.ci-text{font-size:12px;font-weight:500;transition:all .25s}
.ci-time{font-size:9px;color:var(--text-muted);font-weight:600;font-family:var(--mono);background:rgba(255,255,255,.03);padding:2px 6px;border-radius:4px;flex-shrink:0;transition:all .25s;letter-spacing:.3px}

/* ─── PROGRESS RING (checklist) ─── */
.progress-row{display:flex;align-items:center;gap:14px;margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,.03)}
.progress-ring-sm{position:relative;width:44px;height:44px;flex-shrink:0}
.progress-ring-sm svg{width:44px;height:44px;transform:rotate(-90deg)}
.pr-bg{fill:none;stroke:rgba(255,255,255,.04);stroke-width:3.5}
.pr-fg{fill:none;stroke:url(#prGrad);stroke-width:3.5;stroke-linecap:round;transition:stroke-dashoffset .6s ease}
.pr-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;font-family:var(--mono);color:var(--green)}
.progress-stats{flex:1;display:flex;gap:16px}
.ps-item{display:flex;flex-direction:column}
.ps-val{font-size:16px;font-weight:800;font-family:var(--mono);color:var(--text);line-height:1}
.ps-val.green{color:var(--green)}
.ps-label{font-size:8px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;font-family:var(--mono);margin-top:3px}

/* ─── JOURNAL ─── */
.journal-prompts{display:flex;flex-direction:column;gap:10px}
.journal-prompt label{font-size:9px;font-weight:700;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;font-family:var(--mono);display:block;margin-bottom:4px}
.journal-prompt textarea,.journal-prompt input{width:100%;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:10px;padding:10px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;resize:vertical;transition:border-color .2s}
.journal-prompt textarea:focus,.journal-prompt input:focus{border-color:rgba(110,231,183,.25);box-shadow:0 0 0 3px rgba(110,231,183,.05)}
.journal-prompt textarea{min-height:56px}
.journal-prompt input[type="number"]{width:70px;font-family:var(--mono);font-weight:700}
.rating-row{display:flex;align-items:center;gap:10px}
.rating-display{font-size:22px;font-weight:800;font-family:var(--mono);color:var(--green);min-width:30px;text-shadow:0 0 12px rgba(110,231,183,.2)}
.journal-status{font-size:9px;color:var(--text-muted);margin-top:4px;min-height:12px;transition:color .3s;font-family:var(--mono);letter-spacing:.5px}
.journal-status.saving{color:#FBBF24}
.journal-status.saved{color:var(--green)}

/* ─── WEEK HEATMAP ─── */
.week-heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:14px}
.hm-day{display:flex;flex-direction:column;align-items:center;gap:5px}
.hm-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);font-family:var(--mono)}
.hm-label.today{color:var(--green)}
.hm-cell{width:100%;aspect-ratio:1;border-radius:8px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:var(--mono);color:var(--text-muted);transition:all .3s;position:relative;overflow:hidden}
.hm-cell.partial{background:rgba(110,231,183,.06);border-color:rgba(110,231,183,.1);color:var(--green-deep)}
.hm-cell.complete{background:rgba(110,231,183,.15);border-color:rgba(110,231,183,.25);color:var(--green);box-shadow:0 0 12px rgba(110,231,183,.08)}
.hm-cell.today-cell{border-color:rgba(110,231,183,.2)}
.hm-cell::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.03),transparent);pointer-events:none}

/* ─── SPARKLINE ─── */
.sparkline-row{display:flex;align-items:center;gap:14px;padding:10px 0}
.sparkline-box{flex:1;height:48px;position:relative}
.sparkline-box svg{width:100%;height:100%}
.spark-area{fill:url(#sparkGrad);opacity:.3}
.spark-line{fill:none;stroke:var(--green);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.spark-dot{fill:var(--green);filter:drop-shadow(0 0 4px rgba(110,231,183,.5))}
.sparkline-info{text-align:right;min-width:60px}
.si-val{font-size:20px;font-weight:800;font-family:var(--mono);color:var(--green);line-height:1}
.si-label{font-size:8px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;font-family:var(--mono);margin-top:3px}
.si-delta{font-size:9px;font-weight:700;font-family:var(--mono);margin-top:2px}
.si-delta.up{color:var(--green)}
.si-delta.down{color:#F87171}

/* ─── BOTTOM STATS ─── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.stat-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius-sm);padding:14px 8px;text-align:center;position:relative;overflow:hidden;transition:border-color .3s}
.stat-card:hover{border-color:rgba(110,231,183,.1)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(110,231,183,.15),transparent)}
.stat-val{font-size:20px;font-weight:800;font-family:var(--mono);color:var(--green);font-variant-numeric:tabular-nums;line-height:1;text-shadow:0 0 14px rgba(110,231,183,.15)}
.stat-lbl{font-size:7px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.2px;margin-top:5px;font-family:var(--mono)}

/* ─── SCAN LINE ─── */
.scan-line{position:absolute;top:0;left:0;right:0;height:40px;background:linear-gradient(180deg,rgba(110,231,183,.03),transparent);pointer-events:none;animation:scanLine 8s linear infinite;opacity:.5}

/* ─── ANIMATIONS ─── */
@keyframes checkPulse{0%{box-shadow:0 0 0 0 rgba(110,231,183,.5)}100%{box-shadow:0 0 0 12px rgba(110,231,183,0)}}
.check-item.just-checked .ci-box{animation:checkPulse .4s ease-out}

/* ─── RESPONSIVE ─── */
@media(max-width:400px){.hero-row{grid-template-columns:1fr 1fr}.hero-metric:last-child{grid-column:span 2}.stats-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<!-- SVG DEFS -->
<svg style="position:absolute;width:0;height:0">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#6EE7B7"/>
    </linearGradient>
    <linearGradient id="readinessGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="50%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#6EE7B7"/>
    </linearGradient>
    <linearGradient id="prGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#6EE7B7"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6EE7B7" stop-opacity=".3"/>
      <stop offset="100%" stop-color="#6EE7B7" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>

<!-- HEADER -->
<div class="header anim-in">
  <div class="header-left">
    <h1>KHABIB</h1>
    <div class="subtitle">Performance System v2.0</div>
  </div>
  <div class="header-right">
    <div class="live-dot"></div>
    <div class="live-label">Live</div>
  </div>
</div>

<!-- HERO METRICS -->
<div class="hero-row anim-in">
  <div class="hero-metric">
    <div class="hero-val" id="heroDaysLeft">--</div>
    <div class="hero-unit">Days Left</div>
    <svg class="hero-spark" id="heroSpark1" viewBox="0 0 100 28" preserveAspectRatio="none"></svg>
  </div>
  <div class="hero-metric">
    <div class="hero-val" id="heroStreak">0</div>
    <div class="hero-unit">Day Streak</div>

<script>

{t:"July 28 is coming whether you're ready or not. Be ready.",a:"Coach Khabib"},
];

const HABITS=[
{text:"Wake at 7:00am \u2014 no snooze",time:"7:00"},
{text:"Sunlight 10 min within 15 min of waking",time:"7:15"},
{text:"No phone first 15 min",time:"7:00"},
{text:"Hydrate 500ml + electrolytes on waking",time:"7:00"},
{text:"Eat breakfast (3 eggs minimum)",time:"7:30"},
{text:"Creatine 5g",time:"7:30"},
{text:"Touch a ball (minimum 20 min)",time:"vary"},
{text:"GOATA groundwork (10 min)",time:"AM"},
{text:"112mvmnt mobility (10 min)",time:"AM"},
{text:"Sauna / ice bath post-training",time:"post"},
{text:"Cool-down after every session",time:"post"},
{text:"Evening journal",time:"21:00"},
{text:"Lights out by 10pm",time:"22:00"},
];

const PLANS={
0:{name:"Recovery + Weekly Planning",duration:"60 min",intensity:1,type:"Recovery",focus:["Sauna / ice bath","Light stretching","Foam rolling","Weekly review","Next week planning"]},
1:{name:"Speed & Acceleration Drills",duration:"75 min",intensity:4,type:"Speed",focus:["Sprint mechanics","Acceleration","Agility ladder","Reaction drills","Short shuttle runs"]},
2:{name:"Melbourne Seniors Training",duration:"90 min",intensity:3,type:"Team",focus:["Tactical work","Passing patterns","Team shape","Match prep","Coach instructions"]},
3:{name:"Gym + Ball Work",duration:"90 min",intensity:4,type:"Strength",focus:["Compound lifts","Core stability","Ball mastery","Passing wall","Weak foot work"]},
4:{name:"Gym + GOATA / 112mvmnt",duration:"80 min",intensity:3,type:"Movement",focus:["Strength training","GOATA groundwork","112mvmnt flows","Fascia work","Hip mobility"]},
5:{name:"Match Day",duration:"Full day",intensity:5,type:"Match",focus:["Pre-match routine","Hydration","Mental prep","Full 90 min","Post-match recovery"]},
6:{name:"Melbourne Seniors Training",duration:"90 min",intensity:3,type:"Team",focus:["Tactical work","Set pieces","Positioning","CM/CDM role play","Recovery run"]},
};

const TYPE_BG={Speed:"rgba(192,132,252,.10)",Team:"rgba(239,68,68,.08)",Strength:"rgba(125,211,252,.10)",Movement:"rgba(110,231,183,.08)",Match:"rgba(251,191,36,.10)",Recovery:"rgba(110,231,183,.06)"};
const TYPE_FG={Speed:"#C084FC",Team:"#F87171",Strength:"#7DD3FC",Movement:"#6EE7B7",Match:"#FBBF24",Recovery:"#34D399"};

const START=new Date(2026,6,9);
const REPORT=new Date(2026,6,28);
const TOTAL_DAYS=Math.ceil((REPORT-START)/(1e3*60*60*24));
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let data={};

function todayKey(){return new Date().toISOString().split('T')[0]}
function dateKey(d){return d.toISOString().split('T')[0]}
function getDay(key){
  if(!data.days) data.days={};
  if(!data.days[key]) data.days[key]={habits:{},journal:{good:'',better:'',rating:''},quoteIdx:Math.floor(Math.random()*QUOTES.length)};
  return data.days[key];
}
function getToday(){return getDay(todayKey())}

async function init(){
  const loaded=await window.Vitality.load();
  if(loaded&&typeof loaded==='object'&&!Array.isArray(loaded)){
    data=loaded;
    if(!data.days){
      const newDays={};
      for(const k in data){if(/^\d{4}-\d{2}-\d{2}$/.test(k)){newDays[k]=data[k];delete data[k]}}
      data.days=Object.keys(newDays).length?newDays:{};
    }
  }else{data={days:{}};}
  render();
}

function render(){
  renderHeroMetrics();
  renderCountdown();
  renderReadiness();
  renderPlan();
  renderChecklist();
  renderJournal();
  renderWeekHeatmap();
  renderSparkline();
  renderStats();
}

function renderHeroMetrics(){
  const now=new Date();
  const daysLeft=Math.max(0,Math.ceil((REPORT-now)/(1e3*60*60*24)));
  const streak=calcStreak();
  const rate=calcOverallRate();

  document.getElementById('heroDaysLeft').textContent=daysLeft;
  document.getElementById('heroStreak').textContent=streak;
  document.getElementById('heroRate').innerHTML=rate+'<span style="font-size:16px;opacity:.6">%</span>';

  // Mini sparklines in hero cards
  drawHeroSpark('heroSpark1',generateMiniData(7,daysLeft,daysLeft+6,true));
  drawHeroSpark('heroSpark2',generateMiniData(7,0,streak));
  drawHeroSpark('heroSpark3',generateMiniData(7,0,rate));
}

function drawHeroSpark(id,pts){
  const svg=document.getElementById(id);
  const path=pts.map((v,i)=>{
    const x=(i/(pts.length-1))*100;
    const y=28-((v/100)*24);
    return (i===0?'M':'L')+x.toFixed(1)+' '+y.toFixed(1);
  }).join(' ');
  svg.innerHTML='<path d="'+path+' L100 28 L0 28 Z" fill="url(#sparkGrad)" opacity=".4"/><path d="'+path+'" fill="none" stroke="rgba(110,231,183,.4)" stroke-width="1.2"/>';
}

function generateMiniData(n,low,high,desc){
  const pts=[];
  for(let i=0;i<n;i++){
    const t=desc?(high-(high-low)*i/(n-1)):(low+(high-low)*i/(n-1));
    pts.push(Math.max(0,Math.min(100,t+Math.random()*8-4)));
  }
  return pts;
}

function renderCountdown(){
  const now=new Date();
  const fullDay=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][now.getDay()];
  document.getElementById('briefDate').textContent=fullDay+', '+MONTHS[now.getMonth()]+' '+now.getDate()+', '+now.getFullYear();
  document.getElementById('briefDay').textContent='Week '+getWeekNumber(now)+' // '+now.getFullYear();

  const daysLeft=Math.max(0,Math.ceil((REPORT-now)/(1e3*60*60*24)));
  const daysIn=Math.max(0,Math.ceil((now-START)/(1e3*60*60*24)));
  const pctDone=TOTAL_DAYS>0?Math.round((daysIn/TOTAL_DAYS)*100):0;

  document.getElementById('cdNum').textContent=daysLeft;

  // Ring
  const circ=2*Math.PI*34;
  const ring=document.getElementById('countdownRing');
  ring.style.strokeDasharray=circ;
  ring.style.strokeDashoffset=circ-(circ*(Math.min(pctDone,100)/100));

  // Progress bar
  document.getElementById('cpPct').textContent=pctDone+'%';
  document.getElementById('cpFill').style.width=pctDone+'%';

  // Quote
  const today=getToday();
  const q=QUOTES[today.quoteIdx%QUOTES.length];
  document.getElementById('quoteText').textContent='\u201C'+q.t+'\u201D';
  document.getElementById('quoteAttr').textContent='\u2014 '+q.a;
}

function renderReadiness(){
  const today=getToday();
  const j=today.journal||{};
  let doneCount=0;
  for(const k in today.habits) if(today.habits[k]) doneCount++;
  const habitPct=Math.round((doneCount/HABITS.length)*100);

  // Compute sub-scores
  const morningHabits=[0,1,2,3,4,5]; // wake, sunlight, phone, hydrate, breakfast, creatine
  const trainingHabits=[6,7,8,9,10]; // ball, goata, 112mvmnt, sauna, cooldown
  const recoveryHabits=[11,12]; // journal, sleep

  const morningPct=calcSubPct(today,morningHabits);
  const trainingPct=calcSubPct(today,trainingHabits);
  const recoveryPct=calcSubPct(today,recoveryHabits);
  const mentalPct=j.rating?Math.round(j.rating*10):0;

  const overall=Math.round((morningPct*.3+trainingPct*.35+recoveryPct*.2+mentalPct*.15));

  // Ring
  const circ=2*Math.PI*38;
  const ring=document.getElementById('readinessRing');
  ring.style.strokeDasharray=circ;
  ring.style.strokeDashoffset=circ-(circ*(overall/100));
  document.getElementById('readinessScore').textContent=overall;

  // Details
  const metrics=[
    {label:'Morning',pct:morningPct,color:'#6EE7B7'},
    {label:'Training',pct:trainingPct,color:'#34D399'},
    {label:'Recovery',pct:recoveryPct,color:'#059669'},
    {label:'Mental',pct:mentalPct,color:'#047857'},
  ];
  document.getElementById('readinessDetails').innerHTML=metrics.map(m=>`
    <div class="rd-row">
      <span class="rd-label">${m.label}</span>
      <div class="rd-bar"><div class="rd-fill" style="width:${m.pct}%;background:${m.color}"></div></div>
      <span class="rd-val">${m.pct}</span>
    </div>
  `).join('');
}

function calcSubPct(today,indices){
  let done=0;
  indices.forEach(i=>{if(today.habits[i]) done++});
  return Math.round((done/indices.length)*100);
}

function renderPlan(){
  const dow=new Date().getDay();
  const plan=PLANS[dow];
  const c=document.getElementById('trainingPlan');
  let bars='';
  for(let i=1;i<=5;i++) bars+='<div class="bar-seg'+(i<=plan.intensity?' active':'')+'"></div>';
  let tags=plan.focus.map(f=>'<span class="focus-tag">'+f+'</span>').join('');
  c.innerHTML=`
    <div class="plan-header">
      <div class="plan-title">${plan.name}</div>
      <div class="plan-tag" style="background:${TYPE_BG[plan.type]};color:${TYPE_FG[plan.type]}">${plan.type}</div>
    </div>
    <div class="plan-body">
      <div class="plan-row"><span class="plan-label">Duration</span><span class="plan-value">${plan.duration}</span></div>
      <div class="plan-row"><span class="plan-label">Intensity</span><div class="intensity-bar">${bars}</div></div>
      <div class="plan-row" style="align-items:flex-start"><span class="plan-label">Focus</span><div class="focus-tags">${tags}</div></div>
    </div>`;
}

function renderChecklist(){
  const today=getToday();
  const cl=document.getElementById('checklist');
  let doneCount=0;
  cl.innerHTML=HABITS.map((h,i)=>{
    const done=today.habits[i]||false;
    if(done) doneCount++;
    return `<div class="check-item ${done?'done':''}" onclick="toggleHabit(${i})" data-idx="${i}">
      <div class="ci-box"><span class="ci-check">\u2713</span></div>
      <div class="ci-content">
        <span class="ci-text">${h.text}</span>
        <span class="ci-time">${h.time}</span>

    </div>`;
  }).join('');

  const pct=Math.round((doneCount/HABITS.length)*100);
  const remaining=HABITS.length-doneCount;

  // Progress ring
  const circ=2*Math.PI*18;
  const ring=document.getElementById('progressRing');
  ring.style.strokeDasharray=circ;
  ring.style.strokeDashoffset=circ-(circ*(pct/100));
  document.getElementById('progressPct').textContent=pct+'%';

  document.getElementById('psTotal').textContent=HABITS.length;
  document.getElementById('psRemain').textContent=remaining;

function renderJournal(){
  const today=getToday();
  const j=today.journal||{};
  document.getElementById('jGood').value=j.good||'';
  document.getElementById('jBetter').value=j.better||'';
  document.getElementById('jRating').value=j.rating||'';
  document.getElementById('ratingDisplay').textContent=j.rating||'--';

function renderWeekHeatmap(){
  const now=new Date();
  const dow=now.getDay();
  const hm=document.getElementById('weekHeatmap');
  let html='';

  for(let i=0;i<7;i++){
    const d=new Date(now);
    d.setDate(d.getDate()-dow+i);
    const key=dateKey(d);
    const dayData=data.days&&data.days[key];
    const isToday=key===todayKey();
    let completedCount=0;
    if(dayData&&dayData.habits){
      for(const k in dayData.habits) if(dayData.habits[k]) completedCount++;
    }
    const pct=dayData?Math.round((completedCount/HABITS.length)*100):0;
    let cellClass='hm-cell';
    if(isToday) cellClass+=' today-cell';
    if(pct>=80) cellClass+=' complete'; else if(pct>0) cellClass+=' partial';
    html+=`<div class="hm-day">
      <div class="hm-label ${isToday?'today':''}">${DAYS[i]}</div>
      <div class="${cellClass}">${pct>0?pct+'%':'\u2013'}</div>
    </div>`;
  }
  hm.innerHTML=html;
}

function renderSparkline(){
  const now=new Date();
  const dow=now.getDay();
  const pts=[];
  let totalPct=0;
  let filledDays=0;

  for(let i=0;i<7;i++){
    const d=new Date(now);
    d.setDate(d.getDate()-dow+i);
    const key=dateKey(d);
    const dayData=data.days&&data.days[key];
    let completedCount=0;
    if(dayData&&dayData.habits){
      for(const k in dayData.habits) if(dayData.habits[k]) completedCount++;
    }
    const pct=dayData?Math.round((completedCount/HABITS.length)*100):0;
    pts.push(pct);
    if(d<=now){totalPct+=pct;filledDays++;}
  }

  const avg=filledDays?Math.round(totalPct/filledDays):0;
  document.getElementById('siAvg').textContent=avg+'%';

  // Compute last week avg for delta
  const lastWeekPts=[];
  for(let i=0;i<7;i++){
    const d=new Date(now);
    d.setDate(d.getDate()-dow+i-7);
    const key=dateKey(d);
    const dayData=data.days&&data.days[key];
    let cc=0;
    if(dayData&&dayData.habits){for(const k in dayData.habits) if(dayData.habits[k]) cc++;}
    lastWeekPts.push(dayData?Math.round((cc/HABITS.length)*100):0);
  }
  const lastAvg=lastWeekPts.reduce((a,b)=>a+b,0)/7;
  const delta=Math.round(avg-lastAvg);
  const deltaEl=document.getElementById('siDelta');
  if(delta>0){deltaEl.textContent='+'+delta+'% vs last wk';deltaEl.className='si-delta up';}
  else if(delta<0){deltaEl.textContent=delta+'% vs last wk';deltaEl.className='si-delta down';}
  else{deltaEl.textContent='-- vs last wk';deltaEl.className='si-delta';}

  // Draw sparkline
  const box=document.getElementById('sparklineBox');
  const w=box.offsetWidth||280;
  const h=48;
  const maxVal=Math.max(...pts,1);
  const coords=pts.map((v,i)=>{
    const x=(i/(pts.length-1))*w;
    const y=h-4-((v/Math.max(maxVal,100))*(h-8));
    return {x,y};
  });

  const linePath=coords.map((c,i)=>(i===0?'M':'L')+c.x.toFixed(1)+','+c.y.toFixed(1)).join(' ');
  const areaPath=linePath+' L'+w+','+h+' L0,'+h+' Z';
  const lastPt=coords[coords.length-1];

  box.innerHTML=`<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <path class="spark-area" d="${areaPath}"/>
    <path class="spark-line" d="${linePath}"/>
    <circle class="spark-dot" cx="${lastPt.x}" cy="${lastPt.y}" r="3"/>
  </svg>`;
}

function renderStats(){
  const now=new Date();
  const daysIn=Math.max(0,Math.ceil((now-START)/(1e3*60*60*24)));
  const daysLeft=Math.max(0,Math.ceil((REPORT-now)/(1e3*60*60*24)));
  const streak=calcStreak();
  const rate=calcOverallRate();

  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-card"><div class="stat-val">${daysIn}</div><div class="stat-lbl">Days In</div></div>
    <div class="stat-card"><div class="stat-val">${daysLeft}</div><div class="stat-lbl">To Report</div></div>
    <div class="stat-card"><div class="stat-val">${streak}</div><div class="stat-lbl">Streak</div></div>
    <div class="stat-card"><div class="stat-val">${rate}%</div><div class="stat-lbl">All-Time</div></div>
  `;
}

function calcStreak(){
  let streak=0;
  const d=new Date();
  for(let i=0;i<365;i++){
    const key=dateKey(d);
    const dayData=data.days&&data.days[key];
    if(!dayData||!dayData.habits) break;
    let count=0;
    for(const k in dayData.habits) if(dayData.habits[k]) count++;
    if(count===0) break;
    streak++;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

function calcOverallRate(){
  let totalCompleted=0,totalPossible=0;
  if(data.days){
    for(const key in data.days){
      const d=data.days[key];
      if(d.habits){
        for(const k in d.habits){if(d.habits[k]) totalCompleted++;}
        totalPossible+=HABITS.length;
      }
    }
  }
  return totalPossible?Math.round((totalCompleted/totalPossible)*100):0;
}

function getWeekNumber(d){
  const start=new Date(d.getFullYear(),0,1);
  return Math.ceil((((d-start)/(1e3*60*60*24))+start.getDay()+1)/7);
}

async function toggleHabit(i){
  const today=getToday();
  today.habits[i]=!today.habits[i];
  await window.Vitality.save(data);
  const el=document.querySelector(`.check-item[data-idx="${i}"]`);
  if(el&&today.habits[i]){
    el.classList.add('just-checked');
    setTimeout(()=>el.classList.remove('just-checked'),500);
  }
  render();
}

async function shuffleQuote(){
  const today=getToday();
  today.quoteIdx=(today.quoteIdx+1)%QUOTES.length;
  await window.Vitality.save(data);
  renderCountdown();
}

let jTimer;
function journalInput(){
  clearTimeout(jTimer);
  const today=getToday();
  today.journal={good:document.getElementById('jGood').value,better:document.getElementById('jBetter').value,rating:document.getElementById('jRating').value};
  document.getElementById('ratingDisplay').textContent=today.journal.rating||'--';
  const st=document.getElementById('journalStatus');
  st.textContent='Saving...';st.className='journal-status saving';
  jTimer=setTimeout(async()=>{
    await window.Vitality.save(data);
    st.textContent='Saved';st.className='journal-status saved';
    renderReadiness();
    setTimeout(()=>{st.textContent='';st.className='journal-status'},2000);
  },800);
}
document.getElementById('jGood').addEventListener('input',journalInput);
document.getElementById('jBetter').addEventListener('input',journalInput);
document.getElementById('jRating').addEventListener('input',journalInput);

init();
</script>
