<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Coach Khabib</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green:#6EE7B7;--bg:#050506;--card:rgba(255,255,255,.035);--card-border:rgba(255,255,255,.06);--card-hover:#141414;--text:#f0f0f0;--text-dim:#888;--text-muted:#555;--glass:rgba(110,231,183,.04);--glass-border:rgba(110,231,183,.08);--glow:rgba(110,231,183,.15);--radius:14px;--radius-sm:10px}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);padding:20px 16px 32px;min-height:100vh;-webkit-font-smoothing:antialiased;position:relative;z-index:0}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 82% 14%,rgba(110,231,183,.12),transparent 60%),radial-gradient(ellipse at 18% 90%,rgba(180,180,200,.06),transparent 60%);filter:blur(40px);pointer-events:none;z-index:-2;animation:bgDrift 36s ease-in-out infinite alternate}
@keyframes bgDrift{0%{transform:translate(0,0)}50%{transform:translate(-12px,8px)}100%{transform:translate(8px,-6px)}}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='3' height='3' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='1' height='1' fill='rgba(255,255,255,0.014)'/%3E%3C/svg%3E");pointer-events:none;z-index:-1}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#222;border-radius:4px}

/* ─── HEADER ─── */
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;position:relative}
.header-left h1{font-family:'Instrument Serif',Georgia,serif;font-style:italic;font-size:32px;font-weight:800;letter-spacing:2px;line-height:1;background:linear-gradient(135deg,#fff 0%,#ccc 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-left .subtitle{font-size:13px;color:var(--green);font-weight:600;margin-top:4px;letter-spacing:.5px}
.eagle-icon{width:48px;height:48px;opacity:.7;transition:opacity .3s}
.eagle-icon:hover{opacity:1}

/* ─── CARDS ─── */
.card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:18px;margin-bottom:14px;position:relative;transition:border-color .3s;box-shadow:0 1px 0 0 rgba(255,255,255,.06) inset,0 12px 40px rgba(0,0,0,.45)}
.card-glass{background:linear-gradient(135deg,rgba(110,231,183,.03) 0%,rgba(0,0,0,.5) 100%);border:1px solid var(--glass-border);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.section-label{font-family:'Instrument Serif',Georgia,serif;font-style:italic;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.section-label::before{content:'';display:inline-block;width:3px;height:10px;background:var(--green);border-radius:2px}

/* ─── DAILY BRIEFING ─── */
.briefing-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.briefing-date{font-size:14px;font-weight:600;color:var(--text)}
.briefing-day{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px}
.countdown-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:.3px}
.countdown-badge.urgent{background:rgba(239,68,68,.12);color:#F87171;border:1px solid rgba(239,68,68,.2)}
.countdown-badge.moderate{background:rgba(251,191,36,.1);color:#FBBF24;border:1px solid rgba(251,191,36,.15)}
.countdown-badge.relaxed{background:rgba(110,231,183,.1);color:var(--green);border:1px solid rgba(110,231,183,.15)}
.countdown-badge .cd-num{font-size:16px}
.quote-block{position:relative;padding:16px 42px 16px 18px;background:rgba(110,231,183,.03);border-left:3px solid var(--green);border-radius:0 var(--radius-sm) var(--radius-sm) 0;min-height:70px;display:flex;flex-direction:column;justify-content:center}
.quote-text{font-size:15px;font-weight:600;line-height:1.55;color:var(--text)}
.quote-attr{font-size:11px;color:var(--green);margin-top:6px;font-weight:500}
.btn-shuffle{position:absolute;top:10px;right:10px;background:rgba(255,255,255,.04);border:1px solid #222;border-radius:8px;color:#666;font-size:16px;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.btn-shuffle:hover{border-color:var(--green);color:var(--green);background:rgba(110,231,183,.06)}
.btn-shuffle:active{transform:rotate(180deg)}

/* ─── TRAINING PLAN ─── */
.plan-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.plan-title{font-size:16px;font-weight:700}
.plan-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 10px;border-radius:6px;background:rgba(110,231,183,.1);color:var(--green);border:1px solid rgba(110,231,183,.15)}
.plan-body{display:flex;flex-direction:column;gap:8px}
.plan-row{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text-dim)}
.plan-row .plan-icon{width:18px;text-align:center;font-size:14px;flex-shrink:0}
.plan-row .plan-label{color:var(--text-muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;width:70px;flex-shrink:0}
.plan-row .plan-value{color:var(--text);font-weight:500}
.intensity-dots{display:flex;gap:3px}
.intensity-dots .dot{width:8px;height:8px;border-radius:50%;background:#222;transition:background .3s}
.intensity-dots .dot.active{background:var(--green);box-shadow:0 0 6px var(--glow)}
.focus-tags{display:flex;flex-wrap:wrap;gap:4px}
.focus-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;background:rgba(255,255,255,.05);color:var(--text-dim);border:1px solid #222}

/* ─── CHECKLIST ─── */
.checklist{display:flex;flex-direction:column;gap:5px}
.check-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius-sm);cursor:pointer;transition:all .25s ease;position:relative;overflow:hidden}
.check-item::after{content:'';position:absolute;inset:0;background:rgba(110,231,183,.06);opacity:0;transition:opacity .3s}
.check-item:hover{border-color:#2a2a2a}
.check-item.done{border-color:rgba(110,231,183,.2)}
.check-item.done::after{opacity:1}
.check-item.done .ci-text{text-decoration:line-through;color:#555}
.check-item.done .ci-time{color:#333}
.ci-box{width:20px;height:20px;border-radius:6px;border:2px solid #333;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .25s;position:relative;z-index:1}
.check-item.done .ci-box{border-color:var(--green);background:rgba(110,231,183,.12);box-shadow:0 0 10px rgba(110,231,183,.2)}
.ci-check{opacity:0;transition:all .25s;color:var(--green);font-size:12px;font-weight:700}
.check-item.done .ci-check{opacity:1}
.ci-content{flex:1;display:flex;align-items:center;gap:8px;min-width:0;position:relative;z-index:1}
.ci-text{font-size:13px;font-weight:500;transition:all .25s}
.ci-time{font-size:10px;color:var(--text-muted);font-weight:500;background:rgba(255,255,255,.04);padding:1px 6px;border-radius:4px;flex-shrink:0;transition:all .25s}
.check-progress{display:flex;align-items:center;gap:10px;margin-top:10px;padding:8px 0 2px}
.check-progress-bar{flex:1;height:4px;background:#151515;border-radius:4px;overflow:hidden}
.check-progress-fill{height:100%;background:linear-gradient(90deg,var(--green),#34D399);border-radius:4px;transition:width .4s ease}
.check-progress-text{font-size:12px;font-weight:700;color:var(--green);min-width:40px;text-align:right}

/* ─── JOURNAL ─── */
.journal-prompts{display:flex;flex-direction:column;gap:12px}
.journal-prompt{display:flex;flex-direction:column;gap:4px}
.journal-prompt label{font-size:11px;font-weight:600;color:var(--text-dim);letter-spacing:.3px}
.journal-prompt textarea,.journal-prompt input{width:100%;background:#080808;border:1px solid #1a1a1a;border-radius:8px;padding:10px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;resize:vertical;transition:border-color .2s}
.journal-prompt textarea:focus,.journal-prompt input:focus{border-color:var(--green)}
.journal-prompt textarea{min-height:60px}
.journal-prompt input[type="number"]{width:80px}
.rating-row{display:flex;align-items:center;gap:10px}
.rating-display{font-size:20px;font-weight:800;color:var(--green);min-width:30px}
.journal-status{font-size:10px;color:var(--text-muted);margin-top:6px;min-height:14px;transition:color .3s}
.journal-status.saving{color:#FBBF24}
.journal-status.saved{color:var(--green)}

/* ─── WEEK STRIP ─── */
.week-strip{display:flex;gap:6px;margin-bottom:12px}
.week-day{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 0}
.week-day-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted)}
.week-day-label.today-label{color:var(--green)}
.week-dot{width:12px;height:12px;border-radius:50%;background:#151515;border:1.5px solid #222;transition:all .3s}
.week-dot.partial{background:rgba(110,231,183,.2);border-color:rgba(110,231,183,.3)}
.week-dot.complete{background:var(--green);border-color:var(--green);box-shadow:0 0 8px var(--glow)}
.week-dot.today-dot{border-color:var(--green)}
.week-pct{font-size:9px;color:var(--text-muted);font-weight:600}
.week-summary{display:flex;justify-content:space-between;align-items:center}
.week-summary-left{font-size:12px;color:var(--text-dim)}
.week-summary-left strong{color:var(--text);font-weight:700}
.streak-badge{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--green);background:rgba(110,231,183,.06);padding:4px 10px;border-radius:8px;border:1px solid rgba(110,231,183,.1)}

/* ─── STATS FOOTER ─── */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.stats-grid-wide{grid-template-columns:repeat(2,1fr)}
.stat-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius-sm);padding:12px 10px;text-align:center}
.stat-val{font-size:22px;font-weight:800;color:var(--green);font-variant-numeric:tabular-nums;line-height:1.1}
.stat-lbl{font-size:9px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-top:4px}

/* ─── ANIMATIONS ─── */
@keyframes checkPulse{0%{box-shadow:0 0 0 0 rgba(110,231,183,.4)}100%{box-shadow:0 0 0 10px rgba(110,231,183,0)}}
.check-item.just-checked .ci-box{animation:checkPulse .4s ease-out}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <h1>KHABIB</h1>

  <svg class="eagle-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">

<!-- DAILY BRIEFING -->
<div class="card card-glass">

</div>

<div class="card">
  <div class="section-label">Today's Training Plan</div>

</div>

<!-- DAILY NON-NEGOTIABLES -->
<div class="card">

<!-- EVENING REFLECTION -->
<div class="card">

      <label>What did you do well today?</label>

      <label>What will you do better tomorrow?</label>

      <label>Rate today (1-10)</label>

        <input type="number" id="jRating" min="1" max="10" placeholder="—">

  </div>

</div>

<!-- WEEK AT A GLANCE -->
<div class="card">
  <div class="section-label">Week at a Glance</div>
  <div class="week-strip" id="weekStrip"></div>
  <div class="week-summary">
    <div class="week-summary-left" id="weekSummary"></div>
    <div class="streak-badge" id="streakBadge"></div>
  </div>
</div>

<!-- ACCOUNTABILITY STATS -->
<div class="stats-grid" id="statsGrid"></div>
<div class="stats-grid stats-grid-wide" id="statsGridWide"></div>

<script>
const QUOTES=[
{t:"If you want to be the best, you have to do things that other people aren't willing to do.",a:"Khabib Nurmagomedov"},
{t:"Father plan. I follow the plan. That's it.",a:"Khabib Nurmagomedov"},
{t:"I don't fight for the money. I fight for my legacy. I fight for history.",a:"Khabib Nurmagomedov"},
{t:"Nobody is going to outwork me. That's my mentality.",a:"Khabib Nurmagomedov"},
{t:"I trained like an animal for years. When the moment came, I was ready.",a:"Khabib Nurmagomedov"},
{t:"Location is everything. Be where the competition is.",a:"Khabib Nurmagomedov"},
{t:"In training, I am the most disciplined. This is why I win.",a:"Khabib Nurmagomedov"},
{t:"You cannot cheat the grind. It knows how much you've invested. It won't give you nothing you haven't worked for.",a:"David Goggins"},
{t:"Motivation is crap. Motivation comes and goes. When you're driven, whatever is in front of you will get destroyed.",a:"David Goggins"},
{t:"We live in a world where mediocrity is rewarded. Don't buy into that.",a:"David Goggins"},
{t:"Suffering is the true test of life. The more you can handle, the more you can grow.",a:"David Goggins"},
{t:"Don't stop when you're tired. Stop when you're done.",a:"David Goggins"},
{t:"The only person who was going to turn my life around was me.",a:"David Goggins"},
{t:"You are in danger of living a life so comfortable and soft that you will die without ever realizing your potential.",a:"David Goggins"},
{t:"Sleep is the greatest legal performance enhancer that most people are neglecting.",a:"Andrew Huberman"},
{t:"Your morning routine determines the trajectory of your day.",a:"Andrew Huberman"},
{t:"Sunlight viewed within the first hour of waking is the most powerful tool for mental and physical health.",a:"Andrew Huberman"},
{t:"The best way to build focus is to train it, like a muscle.",a:"Andrew Huberman"},
{t:"Deliberate cold exposure triggers massive increases in dopamine that last for hours.",a:"Andrew Huberman"},
{t:"I'm not the most talented. I'm not the biggest. I'm not the fastest. I just will not be outworked.",a:"Cristiano Ronaldo"},

{t:"I feel an endless need to learn, to improve, to evolve.",a:"Cristiano Ronaldo"},
{t:"Every champion was once a contender who refused to give up.",a:"Rocky Balboa"},
{t:"The difference between who you are and who you want to be is what you do.",a:"Bill Phillips"},
{t:"Hard work beats talent when talent doesn't work hard.",a:"Tim Notke"},
{t:"Be so good they can't ignore you.",a:"Steve Martin"},
{t:"Obsessed is a word the lazy use to describe the dedicated.",a:"Grant Cardone"},
{t:"The pain you feel today will be the strength you feel tomorrow.",a:"Arnold Schwarzenegger"},
{t:"You have 19 days. Every single hour counts. No dead time.",a:"Coach Khabib"},
{t:"Touch the ball every day. No exceptions. Not even one day off.",a:"Coach Khabib"},
{t:"Eat breakfast. Take creatine. Get sunlight. The basics win championships.",a:"Coach Khabib"},
{t:"Nobody outruns you. Nobody outworks you. That's the standard.",a:"Coach Khabib"},
{t:"Start every game. Be the fittest player on the team. Be wanted by 4-year schools.",a:"Your Goals"},
{t:"I'm not the next anyone. I'm the first Sean Murphy.",a:"You"},
{t:"You're not training to be good enough. You're training to be undeniable.",a:"Coach Khabib"},
{t:"When coach looks at the squad, your name is the first one written down. That's the goal.",a:"Coach Khabib"},
{t:"Endurance is your weakness. That means endurance is your biggest opportunity.",a:"Coach Khabib"},
{t:"Every meal is a deposit. Every sleep is a deposit. Every session is a deposit. Compound interest wins.",a:"Coach Khabib"},

{t:"July 28 is coming whether you're ready or not. Be ready.",a:"Coach Khabib"},
];

const HABITS=[
{text:"Wake at 7:00am — no snooze",time:"7:00am"},
{text:"Sunlight 10 min within 15 min of waking",time:"7:15am"},
{text:"No phone first 15 min",time:"7:00am"},
{text:"Hydrate 500ml + electrolytes on waking",time:"7:00am"},

{text:"Lights out by 10pm",time:"10:00pm"},
];

0:{name:"Speed & Acceleration Drills",duration:"75 min",intensity:4,type:"Speed",focus:["Sprint mechanics","Acceleration","Agility ladder","Reaction drills","Short shuttle runs"]},

2:{name:"Gym + Ball Work",duration:"90 min",intensity:4,type:"Strength",focus:["Compound lifts","Core stability","Ball mastery","Passing wall","Weak foot work"]},

};

};

Speed:"#C084FC",Team:"#FF6B6B",Strength:"#7DD3FC",Movement:"#A7F3D0",Match:"#FBBF24",Recovery:"#6EE7B7",
};

const START=new Date(2026,6,9);
const REPORT=new Date(2026,6,28);
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let data={};

function todayKey(){return new Date().toISOString().split('T')[0]}
function dateKey(d){return d.toISOString().split('T')[0]}

function getDay(key){
  if(!data.days) data.days={};
  if(!data.days[key]) data.days[key]={habits:{},journal:{good:'',better:'',rating:''},quoteIdx:Math.floor(Math.random()*QUOTES.length)};
  return data.days[key];
}

function getToday(){return getDay(todayKey())}

async function init(){
  const loaded=await window.Vitality.load();
  if(loaded&&typeof loaded==='object'&&!Array.isArray(loaded)){
    data=loaded;
    // migrate old format
    if(!data.days){
      const newDays={};
      for(const k in data){
        if(/^\d{4}-\d{2}-\d{2}$/.test(k)){newDays[k]=data[k];delete data[k]}
      }
      data.days=Object.keys(newDays).length?newDays:{};
    }
  }else{
    data={days:{}};
  }
  render();
}

function render(){
  renderBriefing();
  renderPlan();
  renderChecklist();
  renderJournal();
  renderWeekStrip();
  renderStats();
}

function renderBriefing(){
  const now=new Date();
  const dayName=DAYS[now.getDay()];
  const fullDay=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][now.getDay()];
  document.getElementById('briefDate').textContent=fullDay+', '+MONTHS[now.getMonth()]+' '+now.getDate()+', '+now.getFullYear();
  document.getElementById('briefDay').textContent='Week '+getWeekNumber(now);

  const daysLeft=Math.max(0,Math.ceil((REPORT-now)/(1e3*60*60*24)));
  const cd=document.getElementById('countdown');
  let cls='relaxed';
  if(daysLeft<=7) cls='urgent'; else if(daysLeft<=14) cls='moderate';
  cd.className='countdown-badge '+cls;
  cd.innerHTML='<span class="cd-num">'+daysLeft+'</span> day'+(daysLeft!==1?'s':'')+' to report';

  const today=getToday();
  const q=QUOTES[today.quoteIdx%QUOTES.length];
  document.getElementById('quoteText').textContent='\u201C'+q.t+'\u201D';
  document.getElementById('quoteAttr').textContent='\u2014 '+q.a;
}

function renderPlan(){
  const dow=new Date().getDay();
  const plan=PLANS[dow];
  const c=document.getElementById('trainingPlan');
  let dots='';
  for(let i=1;i<=5;i++) dots+='<div class="dot'+(i<=plan.intensity?' active':'')+'"></div>';
  let tags=plan.focus.map(f=>'<span class="focus-tag">'+f+'</span>').join('');
  c.innerHTML=`
    <div class="plan-header">
      <div class="plan-title">${plan.name}</div>
      <div class="plan-tag" style="background:${TYPE_COLORS[plan.type]};color:${TYPE_TEXT[plan.type]};border-color:transparent">${plan.type}</div>
    </div>
    <div class="plan-body">
      <div class="plan-row"><span class="plan-label">Duration</span><span class="plan-value">${plan.duration}</span></div>
      <div class="plan-row"><span class="plan-label">Intensity</span><div class="intensity-dots">${dots}</div></div>
      <div class="plan-row" style="align-items:flex-start"><span class="plan-label">Focus</span><div class="focus-tags">${tags}</div></div>
    </div>`;
}

function renderChecklist(){
  const today=getToday();
  const cl=document.getElementById('checklist');
  let doneCount=0;
  cl.innerHTML=HABITS.map((h,i)=>{
    const done=today.habits[i]||false;
    if(done) doneCount++;
    return `<div class="check-item ${done?'done':''}" onclick="toggleHabit(${i})" data-idx="${i}">
      <div class="ci-box"><span class="ci-check">\u2713</span></div>
      <div class="ci-content">
        <span class="ci-text">${h.text}</span>
        <span class="ci-time">${h.time}</span>
      </div>
    </div>`;
  }).join('');
  const pct=Math.round((doneCount/HABITS.length)*100);
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressText').textContent=pct+'%';
}

function renderJournal(){
  const today=getToday();
  const j=today.journal||{};
  document.getElementById('jGood').value=j.good||'';
  document.getElementById('jBetter').value=j.better||'';
  document.getElementById('jRating').value=j.rating||'';
  document.getElementById('ratingDisplay').textContent=j.rating||'\u2014';
}

function renderWeekStrip(){
  const now=new Date();
  const dow=now.getDay();
  const strip=document.getElementById('weekStrip');
  let html='';
  let totalWeekPct=0;
  let weekDays=0;

  for(let i=0;i<7;i++){
    const d=new Date(now);
    d.setDate(d.getDate()-dow+i);
    const key=dateKey(d);
    const dayData=data.days&&data.days[key];
    const isToday=key===todayKey();
    let completedCount=0;
    if(dayData&&dayData.habits){
      for(const k in dayData.habits) if(dayData.habits[k]) completedCount++;
    }
    const pct=dayData?Math.round((completedCount/HABITS.length)*100):0;
    let dotClass='week-dot';
    if(isToday) dotClass+=' today-dot';
    if(pct>=80) dotClass+=' complete'; else if(pct>0) dotClass+=' partial';
    if(d<=now){weekDays++;totalWeekPct+=pct;}
    html+=`<div class="week-day">
      <div class="week-day-label ${isToday?'today-label':''}">${DAYS[i]}</div>
      <div class="${dotClass}"></div>
      <div class="week-pct">${pct>0?pct+'%':''}</div>
    </div>`;
  }
  strip.innerHTML=html;

  const avgPct=weekDays?Math.round(totalWeekPct/weekDays):0;
  document.getElementById('weekSummary').innerHTML='Week avg: <strong>'+avgPct+'%</strong>';

  const streak=calcStreak();
  document.getElementById('streakBadge').innerHTML='\u26A1 '+streak+' day'+(streak!==1?'s':'');
}

function renderStats(){
  const now=new Date();
  const daysIn=Math.max(0,Math.ceil((now-START)/(1e3*60*60*24)));
  const daysLeft=Math.max(0,Math.ceil((REPORT-now)/(1e3*60*60*24)));
  let totalCompleted=0;
  let totalPossible=0;
  if(data.days){
    for(const key in data.days){
      const d=data.days[key];
      if(d.habits){
        for(const k in d.habits){if(d.habits[k]) totalCompleted++;}
        totalPossible+=HABITS.length;
      }
    }
  }
  const rate=totalPossible?Math.round((totalCompleted/totalPossible)*100):0;
  const streak=calcStreak();

  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-card"><div class="stat-val">${daysIn}</div><div class="stat-lbl">Days In</div></div>
    <div class="stat-card"><div class="stat-val">${daysLeft}</div><div class="stat-lbl">To Report</div></div>
    <div class="stat-card"><div class="stat-val">${streak}</div><div class="stat-lbl">Streak</div></div>
  `;
  document.getElementById('statsGridWide').innerHTML=`
    <div class="stat-card"><div class="stat-val">${totalCompleted}</div><div class="stat-lbl">Habits Done</div></div>
    <div class="stat-card"><div class="stat-val">${rate}%</div><div class="stat-lbl">Completion</div></div>
  `;
}

function calcStreak(){
  let streak=0;
  const now=new Date();
  const d=new Date(now);
  // check today first — if partial, still counts
  for(let i=0;i<365;i++){
    const key=dateKey(d);
    const dayData=data.days&&data.days[key];
    if(!dayData||!dayData.habits) break;
    let count=0;
    for(const k in dayData.habits) if(dayData.habits[k]) count++;
    if(count===0) break;
    streak++;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

function getWeekNumber(d){
  const start=new Date(d.getFullYear(),0,1);
  return Math.ceil((((d-start)/(1e3*60*60*24))+start.getDay()+1)/7);
}

async function toggleHabit(i){
  const today=getToday();
  today.habits[i]=!today.habits[i];
  await window.Vitality.save(data);
  // animate
  const el=document.querySelector(`.check-item[data-idx="${i}"]`);
  if(el&&today.habits[i]){
    el.classList.add('just-checked');
    setTimeout(()=>el.classList.remove('just-checked'),500);
  }
  render();
}

async function shuffleQuote(){
  const today=getToday();
  today.quoteIdx=(today.quoteIdx+1)%QUOTES.length;
  await window.Vitality.save(data);
  renderBriefing();
}

// Journal debounce
let jTimer;
function journalInput(){
  clearTimeout(jTimer);
  const today=getToday();
  today.journal={
    good:document.getElementById('jGood').value,
    better:document.getElementById('jBetter').value,
    rating:document.getElementById('jRating').value,
  };
  const rd=document.getElementById('ratingDisplay');
  rd.textContent=today.journal.rating||'\u2014';
  const st=document.getElementById('journalStatus');
  st.textContent='Saving...';st.className='journal-status saving';
  jTimer=setTimeout(async()=>{
    await window.Vitality.save(data);
    st.textContent='Saved';st.className='journal-status saved';
    setTimeout(()=>{st.textContent='';st.className='journal-status'},2000);
  },800);
}
document.getElementById('jGood').addEventListener('input',journalInput);
document.getElementById('jBetter').addEventListener('input',journalInput);
document.getElementById('jRating').addEventListener('input',journalInput);

init();
</script>
