<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Train</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#6EE7B7;--green-dim:#34D399;--green-glow:rgba(110,231,183,.18);
  --blue:#7DD3FC;--purple:#C084FC;--amber:#FDBA74;--red:#F87171;--pink:#F472B6;
  --bg:#050506;--card:rgba(255,255,255,.028);--card-border:rgba(255,255,255,.055);
  --card-hover:rgba(255,255,255,.05);
  --text:#f0f0f0;--text-dim:#999;--text-muted:#555;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --serif:'Instrument Serif',Georgia,serif;
  --radius:20px;--radius-sm:14px;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--text);
  padding:16px 14px 40px;min-height:100vh;
  -webkit-font-smoothing:antialiased;
  position:relative;z-index:0;overflow-x:hidden;
}

/* Ambient background */
body::before{content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 75% 10%,rgba(125,211,252,.10),transparent 55%),
    radial-gradient(ellipse at 20% 85%,rgba(110,231,183,.06),transparent 55%);
  filter:blur(50px);pointer-events:none;z-index:-2;animation:bgDrift 30s ease-in-out infinite alternate}
@keyframes bgDrift{0%{transform:translate(0,0) scale(1)}50%{transform:translate(-15px,10px) scale(1.02)}100%{transform:translate(10px,-8px) scale(1)}}
body::after{content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg width='3' height='3' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='1' height='1' fill='rgba(255,255,255,0.012)'/%3E%3C/svg%3E");
  pointer-events:none;z-index:-1}

/* Canvas behind everything */
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;pointer-events:none;opacity:0.5}

/* Typography */
h1{font-family:var(--serif);font-style:italic;font-size:36px;letter-spacing:-0.02em;font-weight:400;line-height:1.1}
.sub{font-size:12px;color:var(--green);margin-bottom:20px;font-family:var(--mono);letter-spacing:0.04em;display:flex;align-items:center;gap:8px}
.sub .pulse{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulseDot 2s ease-in-out infinite;flex-shrink:0}
@keyframes pulseDot{0%,100%{box-shadow:0 0 0 0 rgba(110,231,183,.4)}50%{box-shadow:0 0 0 6px rgba(110,231,183,0)}}

/* Cards */
.card{
  background:var(--card);
  border:1px solid var(--card-border);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:12px;
  position:relative;
  overflow:hidden;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  box-shadow:0 1px 0 0 rgba(255,255,255,.04) inset,0 8px 32px rgba(0,0,0,.3);
  transition:transform .25s cubic-bezier(.4,0,.2,1),border-color .3s,box-shadow .3s;
}
.card:hover{
  transform:translateY(-2px);
  border-color:rgba(255,255,255,.09);
  box-shadow:0 1px 0 0 rgba(255,255,255,.06) inset,0 16px 48px rgba(0,0,0,.4);
}
.card::before{content:'';position:absolute;inset:0;border-radius:var(--radius);
  background:radial-gradient(ellipse at 50% -40%,rgba(255,255,255,.03),transparent 70%);pointer-events:none}

/* Split Indicator */
.split-bar{padding:16px 18px;display:flex;align-items:center;justify-content:space-between}
.split-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono)}
.split-pill{font-size:13px;font-weight:700;padding:6px 16px;border-radius:20px;letter-spacing:.03em;font-family:var(--mono);
  box-shadow:0 0 20px rgba(110,231,183,.1);transition:box-shadow .3s}
.split-push{background:rgba(125,211,252,.12);color:var(--blue);box-shadow:0 0 20px rgba(125,211,252,.1)}
.split-pull{background:rgba(192,132,252,.12);color:var(--purple);box-shadow:0 0 20px rgba(192,132,252,.1)}
.split-legs{background:rgba(253,186,116,.12);color:var(--amber);box-shadow:0 0 20px rgba(253,186,116,.1)}
.split-rest{background:rgba(110,231,183,.08);color:var(--green);box-shadow:0 0 20px rgba(110,231,183,.06)}
.split-cycle{display:flex;gap:5px;margin-top:8px}
.split-dot{width:10px;height:10px;border-radius:50%;background:#1a1a1a;flex-shrink:0;transition:all .3s}
.split-dot.active{outline:2px solid var(--green);outline-offset:2px;transform:scale(1.15)}
.split-dot.push-c{background:var(--blue)}
.split-dot.pull-c{background:var(--purple)}
.split-dot.legs-c{background:var(--amber)}
.split-dot.rest-c{background:#333}

/* Stats with animated counters */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.stat{text-align:center;padding:14px 8px}
.stat-val{font-size:28px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--green);line-height:1;
  font-family:var(--mono);letter-spacing:-0.03em}
.stat-lbl{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.12em;margin-top:6px;font-family:var(--mono)}
.stat-delta{font-size:10px;color:var(--green);margin-top:3px;font-family:var(--mono)}

/* Weekly Chart — canvas-powered */
.week-chart{padding:14px 16px}
.week-title{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px;font-family:var(--mono);
  display:flex;justify-content:space-between;align-items:center}
.week-title span{color:var(--green);font-size:10px}
#weekCanvas{width:100%;height:80px;display:block}
.week-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--text-muted);margin-top:6px;font-family:var(--mono)}
.week-labels span.today{color:var(--green);font-weight:700}

/* Log Button */
.log-btn{width:100%;padding:15px;
  background:linear-gradient(135deg,var(--green),var(--green-dim));
  color:#000;border:none;border-radius:var(--radius-sm);
  font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;
  margin-bottom:12px;
  box-shadow:0 4px 20px rgba(110,231,183,.2);
  transition:transform .15s,box-shadow .15s,opacity .15s;
  position:relative;overflow:hidden}
.log-btn:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(110,231,183,.3)}
.log-btn:active{transform:scale(.98);opacity:.85}
.log-btn::after{content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);
  transform:translateX(-100%);transition:transform .5s}
.log-btn:hover::after{transform:translateX(100%)}

/* Form */
.form{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1),opacity .3s;opacity:0;margin-bottom:0}
.form.show{max-height:700px;opacity:1;margin-bottom:12px}
.form-inner{padding:18px}
.form label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;
  display:block;margin-bottom:5px;margin-top:14px;font-family:var(--mono)}
.form label:first-child{margin-top:0}
.form select,.form input,.form textarea{width:100%;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:10px 12px;
  color:var(--text);font-size:13px;font-family:inherit;outline:none;
  transition:border-color .2s,box-shadow .2s}
.form select:focus,.form input:focus,.form textarea:focus{
  border-color:var(--green);box-shadow:0 0 0 3px rgba(110,231,183,.08)}
.form textarea{min-height:60px;resize:vertical}
.form select option{background:#111}

/* RPE Slider */
.rpe-wrap{display:flex;align-items:center;gap:12px;margin-top:6px}
.rpe-slider{flex:1;-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;
  background:linear-gradient(90deg,#34D399 0%,#FBBF24 50%,#EF4444 100%);outline:none}
.rpe-slider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;
  background:#fff;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.4);transition:transform .15s}
.rpe-slider::-webkit-slider-thumb:hover{transform:scale(1.15)}
.rpe-slider::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#fff;cursor:pointer;border:none}
.rpe-val{font-size:24px;font-weight:800;min-width:32px;text-align:center;font-family:var(--mono);
  transition:color .2s}

.form-row{display:flex;gap:8px;margin-top:16px}
.form-row button{flex:1;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:all .15s}
.btn-save{background:linear-gradient(135deg,var(--green),var(--green-dim));color:#000;
  box-shadow:0 2px 12px rgba(110,231,183,.15)}
.btn-save:hover{box-shadow:0 4px 20px rgba(110,231,183,.25)}
.btn-save:active{transform:scale(.97)}
.btn-cancel{background:rgba(255,255,255,.04);color:var(--text-dim);border:1px solid rgba(255,255,255,.06)!important}

/* Section Headers */
.section-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--text-muted);
  margin-bottom:10px;margin-top:20px;display:flex;align-items:center;gap:8px;font-family:var(--mono)}
.section-hdr::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.04)}
.section-hdr .toggle{font-size:10px;color:var(--green);cursor:pointer;font-weight:600;text-transform:none;
  letter-spacing:0;margin-left:auto;transition:color .2s}
.section-hdr .toggle:hover{color:#fff}

/* Overload Tracker */
.lifts{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.lift{padding:14px 16px}
.lift-top{display:flex;justify-content:space-between;align-items:center}
.lift-name{font-size:13px;font-weight:600}
.lift-weight{font-size:16px;font-weight:800;color:var(--green);font-family:var(--mono)}
.lift-meta{font-size:10px;color:var(--text-muted);margin-top:4px;display:flex;gap:12px;align-items:center;font-family:var(--mono)}
.lift-up{color:var(--green);font-weight:700;font-size:11px;display:flex;align-items:center;gap:3px}
.lift-up::before{content:'';width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;
  border-bottom:5px solid var(--green)}
.lift-hold{color:#FBBF24;font-weight:600;font-size:11px}
/* Mini progress for each lift */
.lift-progress{height:3px;background:rgba(255,255,255,.04);border-radius:2px;margin-top:8px;overflow:hidden}
.lift-progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--green-dim),var(--green));
  transition:width .6s cubic-bezier(.4,0,.2,1)}
.lift-log{margin-top:10px;display:none;gap:6px;align-items:center}
.lift-log.show{display:flex}
.lift-log input{width:70px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);
  border-radius:8px;padding:7px 9px;color:var(--text);font-size:13px;font-family:inherit;outline:none;text-align:center}
.lift-log input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(110,231,183,.08)}
.lift-log-btn{background:rgba(110,231,183,.1);border:1px solid rgba(110,231,183,.2);border-radius:8px;
  padding:7px 12px;color:var(--green);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;
  white-space:nowrap;transition:all .15s}
.lift-log-btn:hover{background:rgba(110,231,183,.15);border-color:rgba(110,231,183,.3)}
.lift-tap{font-size:10px;color:var(--text-muted);margin-top:6px;cursor:pointer;font-family:var(--mono);
  transition:color .2s}
.lift-tap:hover{color:var(--green)}

/* History */
.history{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;max-height:500px;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent}
.history::-webkit-scrollbar{width:4px}
.history::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
.entry{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;
  transition:transform .15s}
.entry:hover{transform:translateX(2px)}
.entry-left{flex:1;min-width:0}
.entry-type{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.entry-detail{font-size:11px;color:var(--text-dim);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-right{flex-shrink:0;margin-left:10px;text-align:right}
.entry-date{font-size:11px;color:var(--text-muted);font-family:var(--mono)}
.entry-dur{font-size:10px;color:var(--text-muted);margin-top:2px;font-family:var(--mono)}
.tag{display:inline-block;font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;font-family:var(--mono);letter-spacing:0.02em}
.tag-seward{background:rgba(110,231,183,.10);color:var(--green)}
.tag-push{background:rgba(125,211,252,.10);color:var(--blue)}
.tag-pull{background:rgba(192,132,252,.10);color:var(--purple)}
.tag-legs{background:rgba(253,186,116,.10);color:var(--amber)}
.tag-ball{background:rgba(251,191,36,.10);color:#FBBF24}
.tag-team{background:rgba(255,107,107,.10);color:#FF6B6B}
.tag-speed{background:rgba(244,114,182,.10);color:var(--pink)}
.tag-mobility{background:rgba(167,243,208,.10);color:#A7F3D0}
.tag-match{background:rgba(248,113,113,.12);color:var(--red)}
.tag-recovery{background:rgba(99,102,241,.10);color:#818CF8}
.rpe-badge{font-size:10px;font-weight:700;padding:3px 7px;border-radius:6px;margin-left:2px;font-family:var(--mono)}
.empty{text-align:center;color:var(--text-muted);font-size:13px;padding:30px 0}

/* Flash notification */
.flash{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-60px);
  background:linear-gradient(135deg,var(--green),var(--green-dim));
  color:#000;padding:10px 24px;border-radius:12px;font-size:13px;font-weight:700;
  opacity:0;transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s;z-index:99;pointer-events:none;
  box-shadow:0 8px 30px rgba(110,231,183,.3)}
.flash.show{transform:translateX(-50%) translateY(0);opacity:1}

/* Delete button */
.entry-del{background:none;border:none;color:#333;font-size:14px;cursor:pointer;padding:4px 8px;
  margin-left:6px;transition:color .15s;border-radius:4px}
.entry-del:hover{color:var(--red);background:rgba(248,113,113,.08)}

/* Fade-in animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeUp .4s cubic-bezier(.4,0,.2,1) both}
.fade-in:nth-child(1){animation-delay:0s}
.fade-in:nth-child(2){animation-delay:.06s}
.fade-in:nth-child(3){animation-delay:.12s}
.fade-in:nth-child(4){animation-delay:.18s}
.fade-in:nth-child(5){animation-delay:.24s}
.fade-in:nth-child(6){animation-delay:.30s}
.fade-in:nth-child(7){animation-delay:.36s}
.fade-in:nth-child(8){animation-delay:.42s}

/* Number counting animation */
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<h1 class="fade-in">Train</h1>
<p class="sub fade-in"><span class="pulse"></span> Log every session</p>

<div class="card split-bar fade-in">
  <div>
    <div class="split-label">Today's Split</div>
    <div class="split-cycle" id="splitCycle"></div>
  </div>
  <div class="split-pill" id="splitPill">--</div>
</div>

<div class="stats fade-in">
  <div class="card stat"><div class="stat-val" id="weekCount">0</div><div class="stat-lbl">This week</div></div>
  <div class="card stat"><div class="stat-val" id="streak">0</div><div class="stat-lbl">Day streak</div></div>
  <div class="card stat"><div class="stat-val" id="total">0</div><div class="stat-lbl">Total</div></div>
</div>

<div class="card fade-in" style="padding:14px 0">
  <div style="padding:0 16px">
    <div class="week-title">Volume This Week <span id="weekTotal"></span></div>
  </div>
  <canvas id="weekCanvas" style="padding:0 8px"></canvas>
  <div class="week-labels" style="padding:0 16px" id="weekLabels"></div>
</div>

<button class="log-btn fade-in" id="logBtn">+ Log Session</button>

<div class="form card" id="form">
  <div class="form-inner">
    <label>Type</label>
    <select id="fType">
      <option value="Seward Workout">Seward Workout</option>
      <option value="Gym (Push)">Gym (Push)</option>
      <option value="Gym (Pull)">Gym (Pull)</option>
      <option value="Gym (Legs)">Gym (Legs)</option>
      <option value="Ball Work">Ball Work</option>
      <option value="Team Training">Team Training</option>
      <option value="Speed & Acceleration">Speed & Acceleration</option>
      <option value="112mvmnt/GOATA">112mvmnt / GOATA</option>
      <option value="Match">Match</option>
      <option value="Recovery">Recovery</option>
    </select>
    <label>Duration (min)</label>
    <input type="number" id="fDur" placeholder="45" min="1" max="300">
    <label>RPE (Rate of Perceived Exertion)</label>
    <div class="rpe-wrap">
      <input type="range" class="rpe-slider" id="fRpe" min="1" max="10" value="6">
      <div class="rpe-val" id="rpeDisplay">6</div>
    </div>
    <label>Exercises</label>
    <textarea id="fExercises" placeholder="e.g. Bench 60kg 3x8&#10;Incline DB 22.5kg 3x10&#10;Cable flies 3x12"></textarea>
    <label>Notes</label>
    <textarea id="fNotes" placeholder="How did it feel? Anything notable?" style="min-height:44px"></textarea>
    <div class="form-row">
      <button class="btn-save" id="saveBtn">Save Session</button>
      <button class="btn-cancel" id="cancelBtn">Cancel</button>
    </div>
  </div>
</div>

<div class="section-hdr fade-in">Progressive Overload<span class="toggle" id="overloadToggle">Expand</span></div>
<div class="lifts" id="lifts" style="display:none"></div>

<div class="section-hdr fade-in">Session History</div>
<div class="history" id="history"></div>

<div class="flash" id="flash">Session saved</div>

<script>
/* ═══════════════════════════════════════
   TRAIN — Interactive Dashboard
   Mathematical background + animated UI
   ═══════════════════════════════════════ */

/* ---- Background Canvas: Floating grid particles ---- */
(function() {
  const cv = document.getElementById('bgCanvas');
  const ctx = cv.getContext('2d');
  let w, h, particles = [];

  function resize() {
    w = cv.width = window.innerWidth;
    h = cv.height = window.innerHeight;
  }

  function init() {
    resize();
    particles = [];
    const count = Math.floor((w * h) / 25000);
    for (let i = 0; i < count; i++) {
      particles.push({
        x: Math.random() * w,
        y: Math.random() * h,
        vx: (Math.random() - 0.5) * 0.15,
        vy: (Math.random() - 0.5) * 0.15,
        r: 1 + Math.random() * 1.5,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  function draw(t) {
    ctx.clearRect(0, 0, w, h);

    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < -10) p.x = w + 10;
      if (p.x > w + 10) p.x = -10;
      if (p.y < -10) p.y = h + 10;
      if (p.y > h + 10) p.y = -10;
      p.phase += 0.008;

      const alpha = 0.06 + 0.04 * Math.sin(p.phase);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(125, 211, 252, ${alpha})`;
      ctx.fill();
    });

    // Connect nearby particles
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = dx * dx + dy * dy;
        if (dist < 12000) {
          const alpha = (1 - dist / 12000) * 0.04;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(125, 211, 252, ${alpha})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }

    requestAnimationFrame(draw);
  }

  init();
  requestAnimationFrame(draw);
  window.addEventListener('resize', () => { resize(); init(); });
})();

/* ---- Animated number counter ---- */
function animateCount(el, target, duration = 600) {
  if (target == null || isNaN(target)) { el.textContent = '--'; return; }
  const start = performance.now();
  const from = parseInt(el.textContent) || 0;
  function tick(now) {
    const progress = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic
    el.textContent = Math.round(from + (target - from) * eased);
    if (progress < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

/* ---- State ---- */
let data = { sessions: [], lifts: {} };

const SPLIT_ANCHOR = new Date('2026-05-12T00:00:00');
const SPLIT_ORDER = ['Rest','Push','Pull','Legs'];
const TAG_MAP = {
  'Seward Workout':'seward','Gym (Push)':'push','Gym (Pull)':'pull','Gym (Legs)':'legs',
  'Ball Work':'ball','Team Training':'team','Speed & Acceleration':'speed',
  '112mvmnt/GOATA':'mobility','Match':'match','Recovery':'recovery'
};

const COMPOUND_LIFTS = [
  { id:'bench',   name:'Bench Press',      repMin:5, repMax:8, step:2.5, upgradeAt:8, unit:'kg' },
  { id:'squat',   name:'Back Squat',       repMin:5, repMax:8, step:5,   upgradeAt:8, unit:'kg' },
  { id:'row',     name:'Barbell Row',      repMin:6, repMax:10,step:2.5, upgradeAt:8, unit:'kg' },
  { id:'rdl',     name:'Romanian Deadlift',repMin:6, repMax:10,step:5,   upgradeAt:8, unit:'kg' },
  { id:'ohp',     name:'Overhead Press',   repMin:5, repMax:8, step:2.5, upgradeAt:8, unit:'kg' }
];

/* ---- RPE Color ---- */
function rpeColor(v) {
  if (v <= 3) return '#34D399';
  if (v <= 5) return '#6EE7B7';
  if (v <= 7) return '#FBBF24';
  if (v <= 8) return '#FB923C';
  if (v <= 9) return '#F87171';
  return '#EF4444';
}

/* ---- Split ---- */
function getTodaySplit() {
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.floor((today - SPLIT_ANCHOR) / 86400000);
  const idx = ((diff % 4) + 4) % 4;
  return SPLIT_ORDER[idx];
}

function renderSplit() {
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.floor((today - SPLIT_ANCHOR) / 86400000);
  const idx = ((diff % 4) + 4) % 4;
  const split = SPLIT_ORDER[idx];
  const pill = document.getElementById('splitPill');
  pill.textContent = split;
  pill.className = 'split-pill split-' + split.toLowerCase();

  const cycle = document.getElementById('splitCycle');
  cycle.innerHTML = SPLIT_ORDER.map((s, i) => {
    const cls = s.toLowerCase() + '-c' + (i === idx ? ' active' : '');
    return `<div class="split-dot ${cls}" title="${s}"></div>`;
  }).join('');
}

/* ---- Stats ---- */
function calcStats() {
  const sessions = data.sessions || [];
  const now = new Date();
  const dayOfWeek = (now.getDay() + 6) % 7;
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - dayOfWeek);
  weekStart.setHours(0,0,0,0);

  const weekCount = sessions.filter(e => e.ts >= weekStart.getTime()).length;
  animateCount(document.getElementById('weekCount'), weekCount);
  animateCount(document.getElementById('total'), sessions.length, 800);

  // Streak
  let streak = 0;
  const today = new Date(); today.setHours(0,0,0,0);
  let checkDate = new Date(today);
  const todaySessions = sessions.filter(e => e.ts >= today.getTime());
  if (todaySessions.length === 0) checkDate.setDate(checkDate.getDate() - 1);
  while (true) {
    const dayStart = new Date(checkDate); dayStart.setHours(0,0,0,0);
    const dayEnd = new Date(checkDate); dayEnd.setHours(23,59,59,999);
    if (sessions.some(e => e.ts >= dayStart.getTime() && e.ts <= dayEnd.getTime())) {
      streak++; checkDate.setDate(checkDate.getDate() - 1);
    } else break;
  }
  animateCount(document.getElementById('streak'), streak);
}

/* ---- Weekly Volume Chart (Canvas) ---- */
function renderWeekChart() {
  const sessions = data.sessions || [];
  const now = new Date();
  const dayOfWeek = (now.getDay() + 6) % 7;
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - dayOfWeek);
  weekStart.setHours(0,0,0,0);

  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const counts = new Array(7).fill(0);
  const durations = new Array(7).fill(0);
  sessions.forEach(e => {
    const d = new Date(e.ts);
    if (d >= weekStart) {
      const di = (d.getDay() + 6) % 7;
      if (di < 7) { counts[di]++; durations[di] += (e.dur || 0); }
    }
  });
  const max = Math.max(...durations, 60);
  const totalMins = durations.reduce((a, b) => a + b, 0);
  document.getElementById('weekTotal').textContent = totalMins ? totalMins + ' min total' : '';

  // Labels
  const labelsEl = document.getElementById('weekLabels');
  labelsEl.innerHTML = days.map((d, i) =>
    `<span class="${i === dayOfWeek ? 'today' : ''}">${d}</span>`
  ).join('');

  // Canvas chart
  const cv = document.getElementById('weekCanvas');
  const rect = cv.parentElement.getBoundingClientRect();
  const dpr = devicePixelRatio || 1;
  cv.width = (rect.width - 16) * dpr;
  cv.height = 80 * dpr;
  cv.style.width = (rect.width - 16) + 'px';
  cv.style.height = '80px';
  const ctx = cv.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const w = rect.width - 16;
  const h = 80;
  const barW = (w / 7) * 0.55;
  const gap = w / 7;
  const padTop = 4;
  const padBot = 4;
  const maxH = h - padTop - padBot;

  // Animate bars
  let progress = 0;
  const animStart = performance.now();
  const animDur = 700;

  function drawBars(now) {
    progress = Math.min((now - animStart) / animDur, 1);
    const ease = 1 - Math.pow(1 - progress, 3);

    ctx.clearRect(0, 0, w, h);

    days.forEach((_, i) => {
      const x = i * gap + (gap - barW) / 2;
      const dur = durations[i];
      const targetH = dur > 0 ? Math.max((dur / max) * maxH, 6) : 3;
      const barH = targetH * ease;
      const y = h - padBot - barH;
      const isToday = i === dayOfWeek;

      // Bar gradient
      const grad = ctx.createLinearGradient(x, y, x, h - padBot);
      if (dur > 0) {
        if (isToday) {
          grad.addColorStop(0, 'rgba(125, 211, 252, 0.9)');
          grad.addColorStop(1, 'rgba(125, 211, 252, 0.3)');
        } else {
          grad.addColorStop(0, 'rgba(110, 231, 183, 0.7)');
          grad.addColorStop(1, 'rgba(110, 231, 183, 0.2)');
        }
      } else {
        grad.addColorStop(0, 'rgba(255, 255, 255, 0.04)');
        grad.addColorStop(1, 'rgba(255, 255, 255, 0.02)');
      }

      // Draw rounded bar
      const r = Math.min(barW / 2, 4);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + barW - r, y);
      ctx.quadraticCurveTo(x + barW, y, x + barW, y + r);
      ctx.lineTo(x + barW, h - padBot);
      ctx.lineTo(x, h - padBot);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      // Duration label on top of bar
      if (dur > 0 && progress > 0.8) {
        const labelAlpha = (progress - 0.8) / 0.2;
        ctx.fillStyle = `rgba(255, 255, 255, ${0.5 * labelAlpha})`;
        ctx.font = '600 9px "JetBrains Mono", monospace';
        ctx.textAlign = 'center';
        ctx.fillText(dur + 'm', x + barW / 2, y - 4);
      }

      // Glow on today
      if (isToday && dur > 0) {
        ctx.shadowColor = 'rgba(125, 211, 252, 0.3)';
        ctx.shadowBlur = 12;
        ctx.fillStyle = 'transparent';
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    });

    if (progress < 1) requestAnimationFrame(drawBars);
  }
  requestAnimationFrame(drawBars);
}

/* ---- Overload Tracker ---- */
function renderLifts() {
  const el = document.getElementById('lifts');
  const lifts = data.lifts || {};
  el.innerHTML = COMPOUND_LIFTS.map(l => {
    const liftData = lifts[l.id] || { weight: 0, sets: [] };
    const lastSet = liftData.sets && liftData.sets.length ? liftData.sets[liftData.sets.length - 1] : null;
    const lastReps = lastSet ? lastSet.reps : '--';
    const lastW = lastSet ? lastSet.weight : '--';
    const currentW = liftData.weight || 0;

    let status = '';
    if (lastSet && lastSet.reps >= l.upgradeAt) {
      status = `<span class="lift-up">Increase to ${currentW + l.step}${l.unit}</span>`;
    } else if (lastSet) {
      status = `<span class="lift-hold">Hit ${l.upgradeAt} reps to progress</span>`;
    }

    // Progress bar: reps toward upgrade threshold
    const progressPct = lastSet ? Math.min((lastSet.reps / l.upgradeAt) * 100, 100) : 0;

    return `<div class="card lift">
      <div class="lift-top">
        <div class="lift-name">${l.name}</div>
        <div class="lift-weight">${currentW ? currentW + l.unit : 'Not set'}</div>
      </div>
      <div class="lift-meta">
        <span>Last: ${lastW !== '--' ? lastW + l.unit + ' x ' + lastReps : 'No sets'}</span>
        <span>${l.repMin}-${l.repMax} range</span>
        ${status}
      </div>
      <div class="lift-progress"><div class="lift-progress-fill" style="width:${progressPct}%"></div></div>
      <div class="lift-tap" onclick="toggleLiftLog('${l.id}')">+ Log set</div>
      <div class="lift-log" id="liftLog_${l.id}">
        <input type="number" id="lw_${l.id}" placeholder="${l.unit}" value="${currentW || ''}" step="${l.step}">
        <span style="color:var(--text-muted);font-size:12px">x</span>
        <input type="number" id="lr_${l.id}" placeholder="reps" min="1" max="30">
        <button class="lift-log-btn" onclick="saveLiftSet('${l.id}')">Save</button>
      </div>
    </div>`;
  }).join('');
}

function toggleLiftLog(id) {
  const el = document.getElementById('liftLog_' + id);
  el.classList.toggle('show');
}

async function saveLiftSet(id) {
  const lift = COMPOUND_LIFTS.find(l => l.id === id);
  if (!lift) return;
  const w = parseFloat(document.getElementById('lw_' + id).value);
  const r = parseInt(document.getElementById('lr_' + id).value);
  if (!w || !r) return;

  if (!data.lifts) data.lifts = {};
  if (!data.lifts[id]) data.lifts[id] = { weight: w, sets: [] };

  data.lifts[id].sets.push({ weight: w, reps: r, ts: Date.now() });
  if (data.lifts[id].sets.length > 50) data.lifts[id].sets = data.lifts[id].sets.slice(-50);

  if (r >= lift.upgradeAt && w >= data.lifts[id].weight) {
    data.lifts[id].weight = w + lift.step;
  } else {
    data.lifts[id].weight = w;
  }

  await window.Vitality.save(data);
  document.getElementById('lr_' + id).value = '';
  showFlash('Set logged');
  renderLifts();
}

/* ---- Session History ---- */
function renderHistory() {
  const el = document.getElementById('history');
  const sessions = data.sessions || [];
  if (!sessions.length) { el.innerHTML = '<div class="empty">No sessions logged yet</div>'; return; }

  const sorted = [...sessions].sort((a, b) => b.ts - a.ts).slice(0, 30);
  el.innerHTML = sorted.map((e, idx) => {
    const d = new Date(e.ts);
    const dateStr = d.toLocaleDateString('en-AU', { weekday:'short', day:'numeric', month:'short' });
    const tc = TAG_MAP[e.type] || 'seward';
    const rpeBadge = e.rpe ? `<span class="rpe-badge" style="background:${rpeColor(e.rpe)}15;color:${rpeColor(e.rpe)}">RPE ${e.rpe}</span>` : '';
    const preview = e.exercises ? e.exercises.split('\n')[0] : (e.notes || '');
    return `<div class="card entry" style="animation-delay:${idx * 30}ms">
      <div class="entry-left">
        <div class="entry-type"><span class="tag tag-${tc}">${e.type}</span>${rpeBadge}</div>
        ${preview ? `<div class="entry-detail">${preview}</div>` : ''}
      </div>
      <div class="entry-right">
        <div class="entry-date">${dateStr}</div>
        ${e.dur ? `<div class="entry-dur">${e.dur} min</div>` : ''}
      </div>
      <button class="entry-del" onclick="deleteSession(${sessions.indexOf(e)})" title="Delete">&times;</button>
    </div>`;
  }).join('');
}

async function deleteSession(idx) {
  if (!confirm('Delete this session?')) return;
  data.sessions.splice(idx, 1);
  await window.Vitality.save(data);
  render();
}

/* ---- Flash ---- */
function showFlash(msg) {
  const el = document.getElementById('flash');
  el.textContent = msg || 'Saved';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1600);
}

/* ---- Full Render ---- */
function render() {
  renderSplit();
  calcStats();
  renderWeekChart();
  renderLifts();
  renderHistory();
}

/* ---- Events ---- */
document.getElementById('logBtn').addEventListener('click', () => {
  document.getElementById('form').classList.toggle('show');
});

document.getElementById('cancelBtn').addEventListener('click', () => {
  document.getElementById('form').classList.remove('show');
});

document.getElementById('fRpe').addEventListener('input', (e) => {
  const v = parseInt(e.target.value);
  const display = document.getElementById('rpeDisplay');
  display.textContent = v;
  display.style.color = rpeColor(v);
});
document.getElementById('rpeDisplay').style.color = rpeColor(6);

document.getElementById('saveBtn').addEventListener('click', async () => {
  const type = document.getElementById('fType').value;
  const dur = parseInt(document.getElementById('fDur').value) || 0;
  const rpe = parseInt(document.getElementById('fRpe').value);
  const exercises = document.getElementById('fExercises').value.trim();
  const notes = document.getElementById('fNotes').value.trim();

  if (!data.sessions) data.sessions = [];
  data.sessions.push({ ts: Date.now(), type, dur, rpe, exercises, notes });
  await window.Vitality.save(data);

  document.getElementById('fDur').value = '';
  document.getElementById('fRpe').value = 6;
  document.getElementById('rpeDisplay').textContent = '6';
  document.getElementById('rpeDisplay').style.color = rpeColor(6);
  document.getElementById('fExercises').value = '';
  document.getElementById('fNotes').value = '';
  document.getElementById('form').classList.remove('show');
  showFlash('Session saved');
  render();
});

document.getElementById('overloadToggle').addEventListener('click', () => {
  const el = document.getElementById('lifts');
  const toggle = document.getElementById('overloadToggle');
  if (el.style.display === 'none') {
    el.style.display = 'flex';
    toggle.textContent = 'Collapse';
  } else {
    el.style.display = 'none';
    toggle.textContent = 'Expand';
  }
});

/* ---- Init ---- */
async function init() {
  const loaded = await window.Vitality.load();
  if (loaded) {
    if (Array.isArray(loaded)) {
      data = { sessions: loaded, lifts: {} };
      await window.Vitality.save(data);
    } else {
      data = loaded;
    }
  } else {
    data = { sessions: [], lifts: {} };
  }
  if (!data.sessions) data.sessions = [];
  if (!data.lifts) data.lifts = {};
  render();
}

init();
</script>
