<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050D0A">
<title>Dashboard — Sean</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050D0A;--line:rgba(74,222,128,.10);
  --green:#4ADE80;--teal:#7DD3C0;--amber:#E8873A;--gold:#D8B24A;
  --ink:#E6F2EC;--dim:#5F786E;--dimmer:#3B4E47;
  --mono:'JetBrains Mono',monospace;--serif:'Instrument Serif',Georgia,serif;
  --w:1100px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  min-height:100vh;padding:40px 24px 64px;
  background:radial-gradient(1000px 500px at 50% -10%,#0D2419 0%,transparent 60%),var(--bg);
  color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;
}
ol,ul{list-style:none;padding:0;}
button,a{font-family:inherit;}

/* Khabib mark */
.k-frame{fill:none;stroke:rgba(74,222,128,.24);stroke-width:1;}
.k-frame-in{fill:rgba(74,222,128,.05);stroke:none;}
.k-tick{fill:none;stroke:var(--green);stroke-width:1.4;stroke-linecap:round;opacity:.55;}
.k-glyph{fill:none;stroke:var(--green);stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 5px rgba(74,222,128,.45));}
.k-orbit{fill:none;stroke:rgba(74,222,128,.1);stroke-width:.8;stroke-dasharray:2 4;}
.k-orb{transform-origin:32px 32px;}
.k-orb.is-live{animation:orbit 9s linear infinite;}
@keyframes orbit{to{transform:rotate(360deg)}}

/* back */
.d-back{display:inline-flex;align-items:center;gap:10px;padding:12px 20px 12px 16px;border:1px solid var(--line);border-radius:14px;background:rgba(16,36,27,.35);font:500 12px/1 var(--mono);letter-spacing:.08em;color:var(--dim);text-decoration:none;max-width:var(--w);margin:0 auto 16px;transition:all .2s;}
.d-back:hover{color:var(--green);border-color:rgba(74,222,128,.35);background:rgba(74,222,128,.06);transform:translateX(-3px);}
.d-back svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}

/* header */
.d-top{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;max-width:var(--w);margin:0 auto 22px;}
.d-eyebrow{font:500 9px var(--mono);letter-spacing:.24em;color:var(--dim);}
.d-title{font-family:var(--serif);font-size:clamp(32px,4.8vw,54px);font-weight:400;margin-top:12px;letter-spacing:-.01em;}
.d-title em{font-style:italic;color:var(--green);}
.d-tools{display:flex;align-items:center;gap:16px;}
.d-plan{display:flex;align-items:center;gap:10px;background:rgba(74,222,128,.07);border:1px solid rgba(74,222,128,.28);
  color:var(--green);border-radius:12px;padding:11px 16px 11px 12px;cursor:pointer;
  font:500 10px var(--mono);letter-spacing:.12em;transition:all .2s;}
.d-plan:hover{background:rgba(74,222,128,.13);}
.d-plan.is-live{box-shadow:0 0 0 1px rgba(74,222,128,.2),0 0 18px rgba(74,222,128,.12);}
.d-plan:focus-visible{outline:2px solid var(--green);outline-offset:2px;}
.d-ring{position:relative;width:68px;height:68px;flex:none;}
.d-ring svg{width:68px;transform:rotate(-90deg);}
.d-rt{fill:none;stroke:rgba(255,255,255,.06);stroke-width:4;}
.d-rp{fill:none;stroke:var(--green);stroke-width:4;stroke-linecap:round;filter:drop-shadow(0 0 6px rgba(74,222,128,.5));}
.d-ring>div{position:absolute;inset:0;display:grid;place-items:center;}
.d-ring b{font-family:var(--serif);font-size:19px;font-weight:400;}
.d-ring b em{font-style:normal;font:400 9px var(--mono);color:var(--dim);}

/* signals */
.d-signals{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--line);
  border:1px solid var(--line);border-radius:14px;overflow:hidden;max-width:var(--w);margin:0 auto 18px;}
.d-sig{display:block;background:#0A1712;padding:14px 16px;text-decoration:none;color:inherit;transition:background .18s;}
.d-sig:hover{background:#0E1F17;}
.d-sig:focus-visible{outline:2px solid var(--green);outline-offset:-2px;}
.d-sk{display:block;font:500 8px var(--mono);letter-spacing:.2em;color:var(--dimmer);text-transform:uppercase;}
.d-sig b{display:block;font-family:var(--serif);font-size:24px;font-weight:400;color:var(--ink);margin-top:9px;line-height:1;}
.d-sig.is-good b{color:var(--green);} .d-sig.is-hot b{color:var(--amber);}
.d-sig em{display:block;font-style:normal;font:400 9px var(--mono);color:var(--dim);margin-top:7px;letter-spacing:.06em;}

/* coach */
.d-coach{display:flex;gap:26px;max-width:var(--w);margin:0 auto 18px;padding:22px 26px;
  border:1px solid rgba(74,222,128,.16);border-radius:18px;
  background:linear-gradient(120deg,rgba(20,44,33,.65),rgba(6,15,11,.5));}
.d-badge{display:flex;flex-direction:column;align-items:center;gap:9px;flex:none;}
.d-name{font:500 8px var(--mono);letter-spacing:.24em;color:var(--green);}
.d-say{flex:1;display:flex;flex-direction:column;gap:14px;justify-content:center;}
.d-say p{font:400 13px/1.65 'Inter',sans-serif;display:flex;gap:14px;align-items:baseline;max-width:82ch;}
.d-say i{font-style:normal;font:500 8px var(--mono);letter-spacing:.2em;width:60px;flex:none;padding-top:3px;}
.d-good{color:var(--ink);opacity:.9;} .d-good i{color:var(--green);}
.d-change{color:var(--amber);} .d-change i{color:var(--amber);opacity:.7;}

/* plan sheet */
.d-sheet{max-width:var(--w);margin:0 auto 18px;padding:22px 26px 20px;border-radius:18px;
  border:1px solid rgba(74,222,128,.24);background:rgba(10,28,20,.7);}
.d-sheet>header{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;padding-bottom:18px;border-bottom:1px solid var(--line);}
.d-sheet h2{font-family:var(--serif);font-weight:400;font-size:25px;margin-top:10px;}
.d-sheet>ul>li{display:flex;justify-content:space-between;align-items:center;gap:24px;padding:18px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.d-pl{flex:1;min-width:0;}
.d-sig-badge{display:inline-block;font:500 8px var(--mono);letter-spacing:.16em;color:var(--gold);border:1px solid rgba(216,178,74,.3);border-radius:4px;padding:4px 7px;}
.d-pl b{display:block;font:400 15px 'Inter',sans-serif;color:var(--ink);margin:11px 0 7px;font-weight:400;}
.d-pl p{font:400 12px/1.7 'Inter',sans-serif;color:var(--dim);max-width:74ch;}
.d-pb{display:flex;gap:8px;flex:none;}
.d-none{font:400 13px 'Inter',sans-serif;color:var(--dim);padding:22px 0;}
.d-fine{font:400 10px/1.7 var(--mono);color:var(--dimmer);letter-spacing:.03em;margin-top:16px;}

/* NOW card */
.d-now{display:flex;justify-content:space-between;align-items:center;gap:32px;max-width:var(--w);margin:0 auto 20px;
  padding:28px 30px;border-radius:20px;border:1px solid rgba(74,222,128,.32);
  border-left:3px solid var(--green);background:rgba(74,222,128,.06);}
.d-nl{flex:1;min-width:0;}
.d-now h2{font-family:var(--serif);font-weight:400;font-size:clamp(26px,3.6vw,36px);margin-top:11px;}
.d-nsub{font:400 12px var(--mono);color:var(--dim);margin-top:9px;letter-spacing:.03em;}
.d-nsteps{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;padding:0;}
.d-nsteps li{display:flex;align-items:center;gap:8px;font:400 11px 'Inter',sans-serif;color:var(--dim);
  border:1px solid var(--line);border-radius:20px;padding:7px 13px 7px 8px;}
.d-nsteps span{width:17px;height:17px;border-radius:50%;background:rgba(255,255,255,.05);
  display:grid;place-items:center;font:400 8px var(--mono);color:var(--dimmer);}
.d-nr{position:relative;display:flex;flex-direction:column;align-items:center;gap:14px;flex:none;}
.d-nring{width:96px;transform:rotate(-90deg);}
.d-np{fill:none;stroke:var(--green);stroke-width:4;stroke-linecap:round;filter:drop-shadow(0 0 7px rgba(74,222,128,.5));}
.d-nclock{font:400 10px var(--mono);color:var(--dim);letter-spacing:.06em;}

/* past collapse */
.d-past{display:flex;align-items:center;gap:14px;width:100%;background:rgba(255,255,255,.014);
  border:1px dashed var(--line);border-radius:12px;padding:15px 18px;cursor:pointer;margin-bottom:8px;transition:all .18s;color:inherit;}
.d-past:hover{border-color:rgba(255,255,255,.16);}
.d-past:focus-visible{outline:2px solid var(--green);outline-offset:2px;}
.d-pl-bar{flex:1;text-align:left;}
.d-pl-bar b{display:block;font:400 13px 'Inter',sans-serif;color:var(--dim);font-weight:400;}
.d-pl-bar em{display:block;font-style:normal;font:400 10px var(--mono);color:var(--dimmer);margin-top:5px;}
.d-pu{font:500 8px var(--mono);letter-spacing:.14em;color:var(--amber);border:1px solid rgba(232,135,58,.3);border-radius:4px;padding:5px 7px;}
.d-pastlist{display:flex;flex-wrap:wrap;gap:6px;padding:4px 0 14px;}

/* period label */
.d-period{margin-top:22px;}
.d-plabel{display:flex;align-items:center;gap:14px;font:500 9px var(--mono);letter-spacing:.22em;color:var(--dim);margin-bottom:14px;}
.d-plabel i{flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent);}

/* major card */
.d-card{border:1px solid var(--line);border-left:3px solid var(--green);border-radius:14px;margin-bottom:8px;
  background:linear-gradient(180deg,rgba(16,36,27,.4),rgba(10,23,18,.35));transition:all .2s;overflow:hidden;}
.d-card:hover{border-color:rgba(74,222,128,.22);border-left-color:var(--green);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.25);}
.d-card.is-done{opacity:.38;}
.d-card.is-open{background:linear-gradient(180deg,rgba(16,36,27,.55),rgba(10,23,18,.5));border-color:rgba(74,222,128,.25);}
.d-ch{display:flex;align-items:flex-start;gap:16px;width:100%;background:none;border:0;cursor:pointer;padding:16px 18px;text-align:left;color:inherit;}
.d-ch:focus-visible{outline:2px solid var(--green);outline-offset:-2px;border-radius:14px;}
.d-cbody{flex:1;min-width:0;}
.d-dtitle{display:block;font:500 14px 'Inter',sans-serif;color:var(--ink);margin-top:6px;line-height:1.3;}
.d-card.is-done .d-dtitle{text-decoration:line-through;text-decoration-color:var(--dimmer);}

/* minor cards (same as major, slightly compact) */
.d-card.is-minor{border-left-width:2px;}
.d-card.is-minor .d-ch{padding:12px 16px;}
.d-card.is-minor .d-time b{font-size:12px;}
.d-card.is-minor .d-dtitle{font-size:13px;margin-top:4px;}
.d-card.is-minor .d-sub{font-size:10px;}

/* appointment */
.d-appt{border-left:2px solid var(--amber);padding-left:14px;margin-top:16px;}
.d-awhen{font:500 9px var(--mono);letter-spacing:.16em;color:var(--amber);}
.d-appt h3{font-family:var(--serif);font-weight:400;font-size:20px;margin:9px 0 6px;}
.d-asub{font:400 11px/1.6 'Inter',sans-serif;color:var(--dim);}
.d-alab{font:500 8px var(--mono);letter-spacing:.2em;color:var(--dimmer);margin:16px 0 9px;}
.d-ask{padding:0;}
.d-ask li{font:400 11px 'Inter',sans-serif;color:var(--dim);padding:6px 0 6px 14px;position:relative;list-style:none;}
.d-ask li:before{content:"";position:absolute;left:0;top:12px;width:4px;height:4px;border-radius:50%;background:var(--dimmer);}

.d-main{display:grid;grid-template-columns:1fr 300px;gap:18px;max-width:var(--w);margin:0 auto;align-items:start;}
.d-side{display:flex;flex-direction:column;gap:18px;}
.d-block{padding:22px 24px 18px;border:1px solid var(--line);border-radius:18px;background:rgba(16,36,27,.3);}
.d-bh{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;}
.d-bh h2{font-family:var(--serif);font-weight:400;font-size:25px;margin-top:10px;}
.d-bh em{font-style:italic;color:var(--green);}
.d-warn{font:500 9px var(--mono);letter-spacing:.14em;color:var(--amber);border:1px solid rgba(232,135,58,.3);border-radius:4px;padding:6px 9px;}
.d-bt{font-family:var(--serif);font-style:italic;font-weight:400;font-size:19px;margin-top:16px;}

/* cards + chips */
.d-time{width:66px;flex:none;}
.d-time b{display:block;font:400 13px var(--mono);color:var(--ink);font-weight:400;}
.d-time em{display:block;font-style:normal;font:400 9px var(--mono);color:var(--dimmer);margin-top:4px;}
.d-kind{display:block;font:500 7px var(--mono);letter-spacing:.2em;opacity:.85;}
.d-kind i{font-style:normal;color:var(--gold);margin-left:5px;}
.d-sub{display:block;font:400 11px 'Inter',sans-serif;color:var(--dimmer);margin-top:4px;}
.d-prog{font:400 10px var(--mono);color:var(--dim);}
.d-prog em{font-style:normal;color:var(--dimmer);}
.d-chev{font:400 14px var(--mono);color:var(--dim);width:11px;text-align:center;}

.d-guide{padding:4px 18px 20px 18px;border-top:1px solid var(--line);margin:0 18px;}
.d-guide ol{display:flex;flex-direction:column;gap:2px;}
.d-step{display:flex;align-items:flex-start;gap:12px;width:100%;background:none;border:0;cursor:pointer;
  padding:11px 10px;border-radius:10px;text-align:left;color:inherit;transition:background .15s;}
.d-step:hover{background:rgba(74,222,128,.06);}
.d-step:focus-visible{outline:2px solid var(--green);outline-offset:-2px;}
.d-box{width:20px;height:20px;border-radius:6px;border:1.5px solid rgba(255,255,255,.14);flex:none;
  display:grid;place-items:center;font:400 10px var(--mono);color:var(--dimmer);margin-top:1px;transition:all .15s;}
.d-step.is-on .d-box{background:var(--green);border-color:var(--green);color:#062015;box-shadow:0 0 8px rgba(74,222,128,.3);}
.d-st{flex:1;min-width:0;}
.d-st b{display:block;font:400 13px 'Inter',sans-serif;color:var(--ink);font-weight:400;line-height:1.4;}
.d-step.is-on .d-st b{color:var(--dim);text-decoration:line-through;text-decoration-color:var(--dimmer);}
.d-st em{display:block;font-style:normal;font:400 10px var(--mono);color:var(--dim);margin-top:4px;letter-spacing:.03em;line-height:1.5;}
.d-st em.is-late{color:var(--amber);}
.d-step-num{font:500 9px var(--mono);color:var(--dimmer);letter-spacing:.1em;width:20px;flex:none;text-align:center;margin-top:3px;}

.d-actions{display:flex;align-items:center;gap:14px;margin-top:16px;padding-left:8px;}
.d-go{background:var(--green);border:0;color:#062015;border-radius:10px;padding:11px 18px;cursor:pointer;font:500 10px var(--mono);letter-spacing:.12em;transition:all .15s;text-decoration:none;}
.d-go:hover{filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 4px 12px rgba(74,222,128,.3);}
.d-ghost{background:none;border:1px solid var(--line);border-radius:10px;padding:11px 16px;cursor:pointer;font:500 10px var(--mono);letter-spacing:.1em;color:var(--dim);transition:all .15s;}
.d-ghost:hover{color:var(--ink);border-color:rgba(255,255,255,.2);}
.d-go:focus-visible,.d-ghost:focus-visible{outline:2px solid var(--green);outline-offset:2px;}
.d-link{font:500 10px var(--mono);letter-spacing:.1em;color:var(--dim);text-decoration:none;text-transform:uppercase;padding:10px 14px;border:1px solid var(--line);border-radius:10px;transition:all .15s;}
.d-link:hover{color:var(--green);border-color:rgba(74,222,128,.25);}

.d-rem li{border-top:1px solid rgba(255,255,255,.04);display:flex;align-items:center;}
.d-rem li:first-child{border-top:0;}
.d-todo-add{display:flex;gap:8px;margin-bottom:10px;}
.d-todo-in{flex:1;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:8px;padding:10px 12px;color:var(--ink);font:400 12px 'Inter',sans-serif;}
.d-todo-in:focus{outline:none;border-color:rgba(74,222,128,.4);}
.d-todo-in::placeholder{color:var(--dimmer);}
.d-todo-btn{width:38px;height:38px;border:1px solid var(--line);border-radius:8px;background:rgba(74,222,128,.08);color:var(--green);font-size:18px;cursor:pointer;flex:none;display:grid;place-items:center;}
.d-todo-btn:hover{background:rgba(74,222,128,.15);border-color:rgba(74,222,128,.3);}
.d-todo-del{background:none;border:0;color:var(--dimmer);font-size:16px;cursor:pointer;padding:6px 8px;margin-left:auto;flex:none;}
.d-todo-del:hover{color:var(--amber);}

.d-week{display:flex;gap:5px;}
.d-wd{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;padding:12px 0 10px;border:1px solid var(--line);border-radius:10px;cursor:pointer;transition:all .15s;}
.d-wd:hover{border-color:rgba(74,222,128,.2);background:rgba(74,222,128,.03);}
.d-wd em{font-style:normal;font:500 7px var(--mono);letter-spacing:.14em;color:var(--dimmer);}
.d-wd b{font-family:var(--serif);font-size:17px;font-weight:400;color:var(--dim);}
.d-wd span{width:5px;height:5px;border-radius:50%;background:var(--dimmer);}
.d-wd.is-train span{background:var(--green);}
.d-wd.is-match span{background:var(--amber);box-shadow:0 0 7px rgba(232,135,58,.7);}
.d-wd.is-match b{color:var(--amber);}
.d-wd.is-today{background:rgba(74,222,128,.07);border-color:rgba(74,222,128,.3);}
.d-wd.is-today b{color:var(--green);}
.d-wd.is-sel{background:rgba(74,222,128,.12);border-color:rgba(74,222,128,.5);}
.d-wd.is-sel b{color:var(--green);}
.d-wd.is-past{opacity:.5;}
.d-note{font:400 10px/1.7 var(--mono);color:var(--dim);margin-top:14px;letter-spacing:.03em;}
/* day spine top */
.d-spine{display:flex;gap:5px;max-width:var(--w);margin:0 auto 18px;}
.d-spine .d-wd{padding:10px 0 8px;}

.d-foot{display:flex;justify-content:space-between;max-width:var(--w);margin:44px auto 0;padding-top:18px;
  border-top:1px solid var(--line);font:400 9px var(--mono);letter-spacing:.18em;color:var(--dimmer);}

@media(max-width:1000px){
  .d-signals{grid-template-columns:repeat(3,1fr);}
  .d-main{grid-template-columns:1fr;}
  .d-side{flex-direction:row;} .d-side>*{flex:1;}
}
@media(max-width:680px){
  body{padding:24px 16px 48px;}
  .d-top{flex-direction:column;align-items:flex-start;gap:18px;}
  .d-tools{width:100%;justify-content:space-between;}
  .d-signals{grid-template-columns:repeat(2,1fr);}
  .d-coach{flex-direction:column;gap:18px;}
  .d-badge{flex-direction:row;gap:12px;}
  .d-say p{flex-direction:column;gap:5px;} .d-say i{width:auto;}
  .d-sheet>ul>li{flex-direction:column;align-items:stretch;gap:14px;}
  .d-pb{justify-content:flex-end;}
  .d-now{flex-direction:column;align-items:flex-start;gap:18px;}
  .d-side{flex-direction:column;}
  .d-guide{padding-left:34px;}
  .d-foot{flex-direction:column;gap:8px;}
}
@media(prefers-reduced-motion:reduce){*,.k-orb{animation:none!important;transition:none!important;}}
</style>
</head>
<body>

<div id="app"></div>

<script>
(function(){
'use strict';

/* ═══ HELPERS ════════════════════════════════════════════════ */
function getMelb() { return new Date(new Date().toLocaleString('en-US',{timeZone:'Australia/Melbourne'})); }
function getNow() { var d = getMelb(); return d.getHours() * 60 + d.getMinutes(); }
function hhmm(m) { return String(Math.floor(m/60)%24).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }
function dur(m) { if(m<0)m=0; if(m>=60){var h=Math.floor(m/60),r=m%60; return h+'h'+(r?' '+r+'m':'');} return m+'m'; }
function esc(s) { var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

/* ═══ KHABIB MARK SVG ════════════════════════════════════════ */
function kmark(size, live) {
  return '<svg viewBox="0 0 64 64" width="'+size+'" height="'+size+'" aria-hidden="true">' +
    '<defs><linearGradient id="kg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#4ADE80"/><stop offset="100%" stop-color="#1F7A57"/></linearGradient></defs>' +

function renderCard(it, isDone, isOpen, steps, stepState, isMinor) {
  var k = KIND[it.kind] || KIND.routine;
  var stepsDone = it.steps ? it.steps.filter(function(_,j){return stepState[it.id+'|'+j];}).length : 0;
  var minorCls = isMinor ? ' is-minor' : '';
  var h = '<article class="d-card' + minorCls + (isDone ? ' is-done' : '') + (isOpen ? ' is-open' : '') + '" style="border-left-color:' + k.c + '">';
  h += '<button class="d-ch" data-toggle="' + it.id + '" aria-expanded="' + isOpen + '">';
  h += '<span class="d-time"><b>' + hhmm(it.at) + '</b><em>' + dur(it.mins) + '</em></span>';
  h += '<span class="d-cbody"><span class="d-kind" style="color:' + k.c + '">' + k.label + (it.added ? '<i style="color:var(--gold);margin-left:5px">\u00b7 PLANNED</i>' : '') + '</span>';
  h += '<span class="d-dtitle">' + esc(it.title) + '</span>';
  h += '<span class="d-sub">' + esc(it.sub) + '</span></span>';
  if (it.steps && it.steps.length) h += '<span class="d-prog" style="font:400 10px var(--mono);color:var(--dim)">' + stepsDone + '<em style="color:var(--dimmer)">/' + it.steps.length + '</em></span>';
  h += '<span class="d-chev">' + (isOpen ? '\u2212' : '+') + '</span>';
  h += '</button>';
  if (isOpen) {
    h += '<div class="d-guide">';
    if (it.steps && it.steps.length) {
      h += '<ul style="display:flex;flex-direction:column;gap:2px;padding:0">';
      it.steps.forEach(function(s, j) {
        var sk = it.id + '|' + j;
        var on = !!stepState[sk];
        h += '<li style="display:flex;align-items:flex-start;gap:4px"><span class="d-step-num">' + (j+1) + '</span>';
        h += '<button class="d-step' + (on ? ' is-on' : '') + '" data-stepkey="' + sk + '" aria-pressed="' + on + '" style="flex:1">';
        h += '<span class="d-box">' + (on ? '\u2713' : '') + '</span>';
        h += '<span class="d-st"><b>' + esc(s.t) + '</b>' + (s.d ? '<em>' + esc(s.d) + '</em>' : '') + '</span></button></li>';
      });
      h += '</ul>';
    }
    h += '<div class="d-actions" style="display:flex;align-items:center;gap:14px;margin-top:18px;padding:0 10px">';
    h += '<button class="d-go" data-markdone="' + it.id + '">' + (isDone ? 'Undo' : 'Mark complete') + '</button>';
    if (it.href) h += '<a class="d-link" href="' + it.href + '">Open guide \u2192</a>';
    h += '</div></div>';
  }
  h += '</article>';
  return h;
}

function render() {
  var NOW = getNow();
  var pend = pending();
  var live = state.day.filter(function(i){return !i.passive;});
  var doneCount = live.filter(function(i){return state.done[i.id];}).length;
  var pct = live.length ? Math.round((doneCount / live.length) * 100) : 0;
  var C = 2 * Math.PI * 28;

  var isToday = state.selDate === TODAY_KEY;
  var selIdx = WEEK_DATES.indexOf(state.selDate);

  // Classify items
  var past = isToday ? state.day.filter(function(i){return i.at + i.mins <= NOW;}) : [];
  var doing = null;
  if (isToday) state.day.forEach(function(i){ if(!doing && NOW >= i.at && NOW < i.at + i.mins && !state.done[i.id]) doing = i; });
  var ahead = isToday ? state.day.filter(function(i){return i.at + i.mins > NOW && i !== doing;}) : state.day;
  var unlogged = past.filter(function(i){return !state.done[i.id];});
  var pastMins = past.reduce(function(a,i){return a+i.mins;}, 0);
  var next = null;
  ahead.forEach(function(i){ if(!next && i.at > NOW && !state.done[i.id]) next = i; });
  var focus = doing || next;

  // Progress through current item
  var through = doing ? (NOW - doing.at) / doing.mins : 0;

  // Date
  var months = ["JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE","JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"];

  var greeting = NOW < 720 ? 'Good morning' : NOW < 1080 ? 'Good afternoon' : 'Good evening';

  var h = '';

  // Back + Header
  h += '<a href="/" class="d-back"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Home</a>';
  h += '<header class="d-top"><div>';
  h += '<p class="d-eyebrow">' + dateStr + '</p>';
  h += '<h1 class="d-title">' + (isToday ? greeting + ', <em>Sean</em>' : '<em>' + (WEEK_LABELS[selIdx] ? WEEK_LABELS[selIdx].d + ' JULY ' + WEEK_LABELS[selIdx].n : state.selDate) + '</em>') + '</h1>';
  h += '</div><div class="d-tools">';
  h += '<a class="d-plan" href="/plan.html" style="text-decoration:none">';
  h += '<svg viewBox="-12 -12 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="-8" y="-9" width="16" height="18" rx="2"/><line x1="-4" y1="-4" x2="4" y2="-4"/><line x1="-4" y1="0" x2="4" y2="0"/><line x1="-4" y1="4" x2="1" y2="4"/></svg>';
  h += ' Week Plan</a>';
  h += '<div class="d-ring"><svg viewBox="0 0 68 68" aria-hidden="true">';
  h += '<circle cx="34" cy="34" r="28" class="d-rt"/>';
  h += '<circle cx="34" cy="34" r="28" class="d-rp" stroke-dasharray="' + (C * pct / 100) + ' ' + C + '"/>';
  h += '</svg><div><b>' + doneCount + '<em>/' + live.length + '</em></b></div></div>';
  h += '</div></header>';

  // Day spine
  h += '<nav class="d-spine" aria-label="Day selector">';
  WEEK_DATES.forEach(function(dk, i) {
    var wl = WEEK_LABELS[i];
    var isSel = dk === state.selDate;

    var isPast = dk < TODAY_KEY;
    h += '<button class="d-wd is-' + wl.k + (isT ? ' is-today' : '') + (isSel ? ' is-sel' : '') + (isPast && !isSel ? ' is-past' : '') + '" data-switchday="' + dk + '">';
    h += '<em>' + wl.d + '</em><b>' + wl.n + '</b><span></span></button>';

    h += '<circle cx="48" cy="48" r="40" class="d-rt"/>';
    h += '<circle cx="48" cy="48" r="40" class="d-np" style="stroke:' + fk.c + '" stroke-dasharray="' + (R * through) + ' ' + R + '"/>';

  if (isToday && unlogged.length > 0) h += '<span class="d-warn">' + unlogged.length + ' unlogged</span>';
  h += '</header>';

  // Past collapse bar (today only, when there are past items)
  if (isToday && past.length > 0) {
    h += '<button class="d-past" data-togglepast aria-expanded="' + !!state.showPast + '">';
    h += '<span class="d-pl-bar"><b>' + past.length + ' earlier</b>';

      h += '</div>';

  // Period-grouped future items — all items are cards
  PERIODS.forEach(function(p) {
    var items = ahead.filter(function(i){return i.at >= p.from && i.at < p.to;});
    if (!items.length) return;

    h += '<section class="d-period"><p class="d-plabel">' + p.label + '<i></i></p>';

  // To-do list
  if (isToday) {
    var tdDone = state.todos.filter(function(t){return t.done;}).length;
    h += '<section class="d-block"><header class="d-rh" style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px"><p class="d-eyebrow">03 \u00b7 TO-DO</p>';
    if (state.todos.length > 0) h += '<span style="font:400 9px var(--mono);color:var(--dim)">' + tdDone + '/' + state.todos.length + '</span>';
    h += '</header>';
    h += '<div class="d-todo-add"><input id="todoInput" type="text" placeholder="Add a task\u2026" class="d-todo-in" /><button id="todoBtn" class="d-todo-btn">+</button></div>';
    h += '<ul class="d-rem">';
    state.todos.forEach(function(t, i) {
      h += '<li><button class="d-step' + (t.done ? ' is-on' : '') + '" data-todotoggle="' + i + '" aria-pressed="' + t.done + '">';
      h += '<span class="d-box">' + (t.done ? '\u2713' : '') + '</span>';
      h += '<span class="d-st"><b>' + esc(t.text) + '</b></span>';
      h += '</button><button class="d-todo-del" data-tododel="' + i + '" aria-label="Delete">\u00D7</button></li>';
    });
    h += '</ul><h3 class="d-bt">To-do</h3></section>';
  }

  // Week
  h += '<section class="d-block"><p class="d-eyebrow">' + (isToday ? '04' : '02') + ' \u00b7 THE WEEK</p><div class="d-week">';
  WEEK_DATES.forEach(function(dk, i) {
    var wl = WEEK_LABELS[i];
    var isT = dk === TODAY_KEY;
    var isSel = dk === state.selDate;
    var isPast = dk < TODAY_KEY;
    h += '<button class="d-wd is-' + wl.k + (isT ? ' is-today' : '') + (isSel ? ' is-sel' : '') + (isPast && !isSel ? ' is-past' : '') + '" data-switchday="' + dk + '">';
    h += '<em>' + wl.d + '</em><b>' + wl.n + '</b><span></span></button>';
  });
  h += '</div><p class="d-note">Match Saturday. Everything from here points at it.</p>';
  h += '<h3 class="d-bt">The week</h3></section>';

  h += '</aside></main>';

  // Footer
  h += '<footer class="d-foot"><span>SIGNALS READ FROM PEAK \u00b7 FUEL \u00b7 VITALS \u00b7 TRAIN \u00b7 RECOVERY</span>';
  h += '<span>GUIDES LINK OUT \u00b7 THEY DON\u2019T DUPLICATE</span></footer>';

  document.getElementById('app').innerHTML = h;
  bindAll();
}

/* ═══ BIND ═══════════════════════════════════════════════════ */
function bindAll() {
  // Day switcher
  document.querySelectorAll('[data-switchday]').forEach(function(btn){
    btn.addEventListener('click', function(){ switchDate(this.dataset.switchday); });
  });

  // Plan toggle
  var pt = document.querySelector('[data-plantoggle]');
  if (pt) pt.addEventListener('click', function(){ state.planOpen = !state.planOpen; render(); });

  // Accept all
  var aa = document.querySelector('[data-acceptall]');
  if (aa) aa.addEventListener('click', function(){
    var d = state.day;
    pending().forEach(function(p){ d = p.apply(d); state.handled[p.id] = true; });
    state.day = d;
    render();
  });

  // Accept / Skip
  document.querySelectorAll('[data-accept]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var id = this.dataset.accept;
      var p = PROPOSALS.find(function(x){return x.id===id;});
      if(p){ state.day = p.apply(state.day); state.handled[p.id] = true; render(); }
    });
  });
  document.querySelectorAll('[data-skip]').forEach(function(btn){
    btn.addEventListener('click', function(){ state.handled[this.dataset.skip] = true; render(); });
  });

  // Open guide from focus
  document.querySelectorAll('[data-openguide]').forEach(function(btn){
    btn.addEventListener('click', function(){ state.open = this.dataset.openguide; render(); });
  });

  // Toggle items
  document.querySelectorAll('[data-toggle]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var id = this.dataset.toggle;
      state.open = state.open === id ? null : id;
      render();
    });
  });

  // Steps
  document.querySelectorAll('[data-stepkey]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var k = this.dataset.stepkey;
      state.steps[k] = !state.steps[k];
      render();
    });
  });

  // Mark done
  document.querySelectorAll('[data-markdone]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var id = this.dataset.markdone;
      state.done[id] = !state.done[id];
      render();
    });
  });

  // Past collapse toggle
  var pt2 = document.querySelector('[data-togglepast]');
  if (pt2) pt2.addEventListener('click', function(){ state.showPast = !state.showPast; render(); });

  // To-do list
  var todoIn = document.getElementById('todoInput');
  var todoBtn = document.getElementById('todoBtn');
  if (todoBtn) {
    var addTodo = function() {
      var v = todoIn.value.trim();
      if (!v) return;
      state.todos.push({ text: v, done: false });
      saveTodos(state.todos);
      render();
    };
    todoBtn.addEventListener('click', addTodo);
    todoIn.addEventListener('keydown', function(e){ if (e.key === 'Enter') addTodo(); });
  }
  document.querySelectorAll('[data-todotoggle]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var i = parseInt(this.dataset.todotoggle);
      state.todos[i].done = !state.todos[i].done;
      saveTodos(state.todos);
      render();
    });
  });
  document.querySelectorAll('[data-tododel]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var i = parseInt(this.dataset.tododel);
      state.todos.splice(i, 1);
      saveTodos(state.todos);
      render();
    });
  });
}

// Now-line refresh
setInterval(render, 60000);
render();

})();
</script>
</body>
</html>
