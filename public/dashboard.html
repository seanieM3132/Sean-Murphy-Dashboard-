<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050D0A">
<title>Dashboard — Sean</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050D0A;--line:rgba(74,222,128,.10);
  --green:#4ADE80;--teal:#7DD3C0;--amber:#E8873A;--gold:#D8B24A;
  --ink:#E6F2EC;--dim:#5F786E;--dimmer:#3B4E47;
  --mono:'JetBrains Mono',monospace;--serif:'Instrument Serif',Georgia,serif;
  --w:1100px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  min-height:100vh;padding:40px 24px 64px;
  background:radial-gradient(1000px 500px at 50% -10%,#0D2419 0%,transparent 60%),var(--bg);
  color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;
}
ol,ul{list-style:none;padding:0;}
button,a{font-family:inherit;}

/* Khabib mark */
.k-frame{fill:none;stroke:rgba(74,222,128,.24);stroke-width:1;}
.k-frame-in{fill:rgba(74,222,128,.05);stroke:none;}
.k-tick{fill:none;stroke:var(--green);stroke-width:1.4;stroke-linecap:round;opacity:.55;}
.k-glyph{fill:none;stroke:var(--green);stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 5px rgba(74,222,128,.45));}
.k-orbit{fill:none;stroke:rgba(74,222,128,.1);stroke-width:.8;stroke-dasharray:2 4;}
.k-orb{transform-origin:32px 32px;}
.k-orb.is-live{animation:orbit 9s linear infinite;}
@keyframes orbit{to{transform:rotate(360deg)}}

/* back */
.d-back{display:block;font:500 11px/1 var(--mono);letter-spacing:.14em;color:var(--dim);text-decoration:none;max-width:var(--w);margin:0 auto 12px;}
.d-back:hover{color:var(--green);}

/* header */
.d-top{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;max-width:var(--w);margin:0 auto 22px;}
.d-eyebrow{font:500 9px var(--mono);letter-spacing:.24em;color:var(--dim);}
.d-title{font-family:var(--serif);font-size:clamp(32px,4.8vw,54px);font-weight:400;margin-top:12px;letter-spacing:-.01em;}
.d-title em{font-style:italic;color:var(--green);}
.d-tools{display:flex;align-items:center;gap:16px;}
.d-plan{display:flex;align-items:center;gap:10px;background:rgba(74,222,128,.07);border:1px solid rgba(74,222,128,.28);
  color:var(--green);border-radius:12px;padding:11px 16px 11px 12px;cursor:pointer;
  font:500 10px var(--mono);letter-spacing:.12em;transition:all .2s;}
.d-plan:hover{background:rgba(74,222,128,.13);}
.d-plan.is-live{box-shadow:0 0 0 1px rgba(74,222,128,.2),0 0 18px rgba(74,222,128,.12);}
.d-plan:focus-visible{outline:2px solid var(--green);outline-offset:2px;}
.d-ring{position:relative;width:68px;height:68px;flex:none;}
.d-ring svg{width:68px;transform:rotate(-90deg);}
.d-rt{fill:none;stroke:rgba(255,255,255,.06);stroke-width:4;}
.d-rp{fill:none;stroke:var(--green);stroke-width:4;stroke-linecap:round;filter:drop-shadow(0 0 6px rgba(74,222,128,.5));}
.d-ring>div{position:absolute;inset:0;display:grid;place-items:center;}
.d-ring b{font-family:var(--serif);font-size:19px;font-weight:400;}
.d-ring b em{font-style:normal;font:400 9px var(--mono);color:var(--dim);}

/* signals */
.d-signals{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--line);
  border:1px solid var(--line);border-radius:14px;overflow:hidden;max-width:var(--w);margin:0 auto 18px;}
.d-sig{display:block;background:#0A1712;padding:14px 16px;text-decoration:none;color:inherit;transition:background .18s;}
.d-sig:hover{background:#0E1F17;}
.d-sig:focus-visible{outline:2px solid var(--green);outline-offset:-2px;}
.d-sk{display:block;font:500 8px var(--mono);letter-spacing:.2em;color:var(--dimmer);text-transform:uppercase;}
.d-sig b{display:block;font-family:var(--serif);font-size:24px;font-weight:400;color:var(--ink);margin-top:9px;line-height:1;}
.d-sig.is-good b{color:var(--green);} .d-sig.is-hot b{color:var(--amber);}
.d-sig em{display:block;font-style:normal;font:400 9px var(--mono);color:var(--dim);margin-top:7px;letter-spacing:.06em;}

/* coach */
.d-coach{display:flex;gap:26px;max-width:var(--w);margin:0 auto 18px;padding:22px 26px;
  border:1px solid rgba(74,222,128,.16);border-radius:18px;
  background:linear-gradient(120deg,rgba(20,44,33,.65),rgba(6,15,11,.5));}
.d-badge{display:flex;flex-direction:column;align-items:center;gap:9px;flex:none;}
.d-name{font:500 8px var(--mono);letter-spacing:.24em;color:var(--green);}
.d-say{flex:1;display:flex;flex-direction:column;gap:14px;justify-content:center;}
.d-say p{font:400 13px/1.65 'Inter',sans-serif;display:flex;gap:14px;align-items:baseline;max-width:82ch;}
.d-say i{font-style:normal;font:500 8px var(--mono);letter-spacing:.2em;width:60px;flex:none;padding-top:3px;}
.d-good{color:var(--ink);opacity:.9;} .d-good i{color:var(--green);}
.d-change{color:var(--amber);} .d-change i{color:var(--amber);opacity:.7;}

/* plan sheet */
.d-sheet{max-width:var(--w);margin:0 auto 18px;padding:22px 26px 20px;border-radius:18px;
  border:1px solid rgba(74,222,128,.24);background:rgba(10,28,20,.7);}
.d-sheet>header{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;padding-bottom:18px;border-bottom:1px solid var(--line);}
.d-sheet h2{font-family:var(--serif);font-weight:400;font-size:25px;margin-top:10px;}
.d-sheet>ul>li{display:flex;justify-content:space-between;align-items:center;gap:24px;padding:18px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.d-pl{flex:1;min-width:0;}
.d-chip{display:inline-block;font:500 8px var(--mono);letter-spacing:.16em;color:var(--gold);border:1px solid rgba(216,178,74,.3);border-radius:4px;padding:4px 7px;}
.d-pl b{display:block;font:400 15px 'Inter',sans-serif;color:var(--ink);margin:11px 0 7px;font-weight:400;}
.d-pl p{font:400 12px/1.7 'Inter',sans-serif;color:var(--dim);max-width:74ch;}
.d-pb{display:flex;gap:8px;flex:none;}
.d-none{font:400 13px 'Inter',sans-serif;color:var(--dim);padding:22px 0;}
.d-fine{font:400 10px/1.7 var(--mono);color:var(--dimmer);letter-spacing:.03em;margin-top:16px;}

/* focus */
.d-focus{display:flex;justify-content:space-between;align-items:center;gap:24px;max-width:var(--w);margin:0 auto 20px;
  padding:24px 26px;border-radius:18px;border-left:3px solid var(--green);
  border:1px solid rgba(74,222,128,.2);background:rgba(74,222,128,.03);}
.d-focus h2{font-family:var(--serif);font-weight:400;font-size:clamp(24px,3.2vw,32px);margin-top:11px;}
.d-fsub{font:400 12px var(--mono);color:var(--dim);margin-top:9px;letter-spacing:.03em;}
.d-fright{display:flex;flex-direction:column;align-items:flex-end;gap:14px;}
.d-fclock{font-family:var(--serif);font-size:34px;color:var(--green);line-height:1;}

.d-main{display:grid;grid-template-columns:1fr 300px;gap:18px;max-width:var(--w);margin:0 auto;align-items:start;}
.d-side{display:flex;flex-direction:column;gap:18px;}
.d-block{padding:22px 24px 18px;border:1px solid var(--line);border-radius:18px;background:rgba(16,36,27,.3);}
.d-bh{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;}
.d-bh h2{font-family:var(--serif);font-weight:400;font-size:25px;margin-top:10px;}
.d-bh em{font-style:italic;color:var(--green);}
.d-warn{font:500 9px var(--mono);letter-spacing:.14em;color:var(--amber);border:1px solid rgba(232,135,58,.3);border-radius:4px;padding:6px 9px;}
.d-bt{font-family:var(--serif);font-style:italic;font-weight:400;font-size:19px;margin-top:16px;}

/* timeline */
.d-item{position:relative;padding-left:24px;}
.d-item:before{content:"";position:absolute;left:4px;top:0;bottom:0;width:1px;background:var(--line);}
.d-bead{position:absolute;left:0;top:18px;width:9px;height:9px;border-radius:50%;background:var(--bg);border:1px solid var(--dimmer);z-index:1;}
.d-item.is-done .d-bead{background:var(--green);border-color:var(--green);}
.d-item.is-now .d-bead{background:var(--green);border-color:var(--green);box-shadow:0 0 0 4px rgba(74,222,128,.15);}
.d-item.is-missed .d-bead{border-color:var(--amber);}
.d-item.is-done{opacity:.42;}
.d-item.is-next{opacity:.74;}
.d-item.is-added .d-head{background:rgba(74,222,128,.04);border-radius:11px;}

.d-nowline{position:relative;display:flex;align-items:center;gap:10px;padding:6px 0 6px 24px;}
.d-nowline span{flex:1;height:1px;background:linear-gradient(90deg,var(--green),transparent);}
.d-nowline em{font-style:normal;font:500 8px var(--mono);letter-spacing:.2em;color:var(--green);}
.d-nowline:before{content:"";position:absolute;left:1.5px;width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 9px rgba(74,222,128,.9);}

.d-head{display:flex;align-items:flex-start;gap:16px;width:100%;background:none;border:0;cursor:pointer;
  padding:13px 12px;border-radius:11px;text-align:left;color:inherit;transition:background .15s;}
.d-head:hover:not(:disabled){background:rgba(74,222,128,.03);}
.d-head:disabled{cursor:default;opacity:.7;}
.d-head:focus-visible{outline:2px solid var(--green);outline-offset:-2px;}
.d-time{width:66px;flex:none;}
.d-time b{display:block;font:400 13px var(--mono);color:var(--ink);font-weight:400;}
.d-time em{display:block;font-style:normal;font:400 9px var(--mono);color:var(--dimmer);margin-top:4px;}
.d-body{flex:1;min-width:0;}
.d-kind{display:block;font:500 7px var(--mono);letter-spacing:.2em;opacity:.85;}
.d-kind i{font-style:normal;color:var(--gold);margin-left:5px;}
.d-dtitle{display:block;font:400 14px 'Inter',sans-serif;color:var(--ink);margin-top:6px;}
.d-item.is-done .d-dtitle{text-decoration:line-through;text-decoration-color:var(--dimmer);}
.d-sub{display:block;font:400 11px 'Inter',sans-serif;color:var(--dimmer);margin-top:4px;}
.d-right{display:flex;align-items:center;gap:12px;}
.d-prog{font:400 10px var(--mono);color:var(--dim);}
.d-prog em{font-style:normal;color:var(--dimmer);}
.d-chev{font:400 14px var(--mono);color:var(--dim);width:11px;text-align:center;}

.d-guide{padding:2px 12px 18px 82px;}
.d-guide ol{display:flex;flex-direction:column;gap:2px;}
.d-step{display:flex;align-items:flex-start;gap:12px;width:100%;background:none;border:0;cursor:pointer;
  padding:10px 8px;border-radius:8px;text-align:left;color:inherit;transition:background .15s;}
.d-step:hover{background:rgba(74,222,128,.04);}
.d-step:focus-visible{outline:2px solid var(--green);outline-offset:-2px;}
.d-box{width:18px;height:18px;border-radius:5px;border:1px solid rgba(255,255,255,.12);flex:none;
  display:grid;place-items:center;font:400 9px var(--mono);color:var(--dimmer);margin-top:1px;}
.d-step.is-on .d-box{background:var(--green);border-color:var(--green);color:#062015;}
.d-st b{display:block;font:400 12px 'Inter',sans-serif;color:var(--ink);font-weight:400;}
.d-step.is-on .d-st b{color:var(--dim);}
.d-st em{display:block;font-style:normal;font:400 10px var(--mono);color:var(--dimmer);margin-top:3px;}
.d-st em.is-late{color:var(--amber);}

.d-actions{display:flex;align-items:center;gap:14px;margin-top:16px;padding-left:8px;}
.d-go{background:var(--green);border:0;color:#062015;border-radius:9px;padding:11px 16px;cursor:pointer;font:500 9px var(--mono);letter-spacing:.14em;}
.d-go:hover{filter:brightness(1.08);}
.d-ghost{background:none;border:1px solid var(--line);border-radius:9px;padding:11px 15px;cursor:pointer;font:500 9px var(--mono);letter-spacing:.12em;color:var(--dim);}
.d-ghost:hover{color:var(--ink);border-color:rgba(255,255,255,.2);}
.d-go:focus-visible,.d-ghost:focus-visible{outline:2px solid var(--green);outline-offset:2px;}
.d-link{font:500 9px var(--mono);letter-spacing:.12em;color:var(--dim);text-decoration:none;text-transform:uppercase;}
.d-link:hover{color:var(--green);}

.d-rem li{border-top:1px solid rgba(255,255,255,.04);}
.d-rem li:first-child{border-top:0;}

.d-week{display:flex;gap:5px;}
.d-wd{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;padding:12px 0 10px;border:1px solid var(--line);border-radius:10px;}
.d-wd em{font-style:normal;font:500 7px var(--mono);letter-spacing:.14em;color:var(--dimmer);}
.d-wd b{font-family:var(--serif);font-size:17px;font-weight:400;color:var(--dim);}
.d-wd span{width:5px;height:5px;border-radius:50%;background:var(--dimmer);}
.d-wd.is-train span{background:var(--green);}
.d-wd.is-match span{background:var(--amber);box-shadow:0 0 7px rgba(232,135,58,.7);}
.d-wd.is-match b{color:var(--amber);}
.d-wd.is-today{background:rgba(74,222,128,.07);border-color:rgba(74,222,128,.3);}
.d-wd.is-today b{color:var(--green);}
.d-note{font:400 10px/1.7 var(--mono);color:var(--dim);margin-top:14px;letter-spacing:.03em;}

.d-foot{display:flex;justify-content:space-between;max-width:var(--w);margin:44px auto 0;padding-top:18px;
  border-top:1px solid var(--line);font:400 9px var(--mono);letter-spacing:.18em;color:var(--dimmer);}

@media(max-width:1000px){
  .d-signals{grid-template-columns:repeat(3,1fr);}
  .d-main{grid-template-columns:1fr;}
  .d-side{flex-direction:row;} .d-side>*{flex:1;}
}
@media(max-width:680px){
  body{padding:24px 16px 48px;}
  .d-top{flex-direction:column;align-items:flex-start;gap:18px;}
  .d-tools{width:100%;justify-content:space-between;}
  .d-signals{grid-template-columns:repeat(2,1fr);}
  .d-coach{flex-direction:column;gap:18px;}
  .d-badge{flex-direction:row;gap:12px;}
  .d-say p{flex-direction:column;gap:5px;} .d-say i{width:auto;}
  .d-sheet>ul>li{flex-direction:column;align-items:stretch;gap:14px;}
  .d-pb{justify-content:flex-end;}
  .d-focus{flex-direction:column;align-items:flex-start;gap:18px;}
  .d-fright{flex-direction:row;align-items:center;width:100%;justify-content:space-between;}
  .d-side{flex-direction:column;}
  .d-guide{padding-left:34px;}
  .d-foot{flex-direction:column;gap:8px;}
}
@media(prefers-reduced-motion:reduce){*,.k-orb{animation:none!important;transition:none!important;}}
</style>
</head>

    {t:"Juggling \u2014 aim 50+",d:"Save legs for team training"}
  ]},
  { id:"premeal", at:960, mins:15, kind:"fuel", title:"Pre-training meal", sub:"Banana + toast + small protein shake", href:"/fuel.html", steps:[
    {t:"Light carbs + protein",d:""},
    {t:"Caffeine 1-3mg/kg",d:"Coffee or pre-workout"}
  ]},
  { id:"team", at:1020, mins:90, kind:"train", title:"Team training", sub:"Apply GOATA cues \u00b7 IABH \u00b7 back chain", href:"/train.html#soccer", steps:[
    {t:"PEP/ACL warm-up if time (15 min)",d:"Jog, shuttle, backward run, flexibility"},
    {t:"Hydrate 300-500ml + electrolytes before",d:""},
    {t:"Full team session",d:"Apply scanning, body shape, first touch"},
    {t:"Cool-down: jog 5 min + stretch 5 min",d:"Glutes, hammys, quads, groin, calves"}
  ]},
  { id:"dinner", at:1140, mins:30, kind:"fuel", title:"Dinner", sub:"3:1 carb-to-protein \u00b7 starchy carbs for sleep", href:"/fuel.html", steps:[
    {t:"Starchy carbs + protein within 1 hour",d:"Glycogen replenishment"},
    {t:"Rehydrate 125-150% of fluid lost",d:""}
  ]},
  { id:"sauna", at:1200, mins:15, kind:"recover", title:"Sauna 15 min", sub:"Recovery \u00b7 compensatory cooling for sleep", href:"/train.html#recovery", steps:[
    {t:"80-100\u00b0C for 15 min",d:"Post-team-training recovery"}
  ]},
  { id:"pm", at:1290, mins:20, kind:"routine", title:"Evening routine", sub:"Sleep stack \u00b7 nose tape \u00b7 lights out 10pm", href:"/health.html", steps:[
    {t:"Wind down from 8:30 \u2014 no intense screens",d:""},
    {t:"Sleep stack at 9:30",d:"Mg Threonate 145mg + Apigenin 50mg + Theanine"},
    {t:"Nose tape, side sleeping position",d:""},
    {t:"LIGHTS OUT 10:00",d:""}
  ]}
];

var PROPOSALS = [
  { id:"p1", signal:"SEWARD DAY 2", title:"Skip gym activation \u2014 Seward Workout B is enough",
    apply: function(d){return d.filter(function(x){return x.id!=="activation";})} },
  { id:"p2", signal:"PROTEIN NOT LOGGED", title:"Start logging meals in Fuel today",
    apply: function(d){return d;} },
  { id:"p3", signal:"ADDUCTORS WATCH", title:"Add 2 min adductor check to GOATA warm-up",
    apply: function(d){return d;} },
  { id:"p4", signal:"TEAM TRAINING", title:"Hydrate 500ml extra before 4pm \u2014 evening session",
    apply: function(d){return d;} }
];

var REMINDERS = [
  { id:"log", t:"Log Seward workout", at:550 },
  { id:"caff", t:"Caffeine cutoff \u2014 last dose before 4pm", at:960 },
  { id:"kit", t:"Pack bag for team training", at:900 },
  { id:"mfm", t:"MFM appointment MON JULY 14 @ 12pm \u2014 body assessment, blood work, labs. Ask: supplement protocol, deficiencies, body comp baseline", at:480 }
];

var WEEK_DATA = [
  {d:"MON",n:7,k:"rest"},{d:"TUE",n:8,k:"train"},{d:"WED",n:9,k:"train"},
  {d:"THU",n:10,k:"train",today:true},{d:"FRI",n:11,k:"train"},
  {d:"SAT",n:12,k:"match"},{d:"SUN",n:13,k:"rest"}
];

/* ═══ STATE ══════════════════════════════════════════════════ */
var state = {
  day: JSON.parse(JSON.stringify(BASE_DAY)),
  planOpen: false,
  handled: {},
  open: null,
  steps: {},
  done: {},
  rem: {}
};

function pending() { return PROPOSALS.filter(function(p){return !state.handled[p.id];}); }

/* ═══ RENDER ═════════════════════════════════════════════════ */
function render() {
  var NOW = getNow();
  var pend = pending();
  var live = state.day.filter(function(i){return !i.passive;});
  var doneCount = live.filter(function(i){return state.done[i.id];}).length;
  var pct = Math.round((doneCount / live.length) * 100);
  var missed = live.filter(function(i){return i.at + i.mins < NOW && !state.done[i.id];}).length;
  var C = 2 * Math.PI * 28;

  // Focus item
  var doing = null, next = null;
  live.forEach(function(i) {
    if (!doing && NOW >= i.at && NOW < i.at + i.mins && !state.done[i.id]) doing = i;
    if (!next && i.at > NOW && !state.done[i.id]) next = i;
  });
  var focus = doing || next;

  // Now line position
  var nowAfter = -1;
  state.day.forEach(function(it,i){ if(it.at<=NOW) nowAfter=i; });

  // Date
  var months = ["JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE","JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"];
  var days = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"];
  var now = new Date();
  var dateStr = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate() + ' \u00b7 ' + hhmm(NOW);
  var greeting = NOW < 720 ? 'Good morning' : NOW < 1080 ? 'Good afternoon' : 'Good evening';

  var h = '';

  // Back + Header
  h += '<a href="/" class="d-back">&#8592; Home</a>';
  h += '<header class="d-top"><div>';
  h += '<p class="d-eyebrow">' + dateStr + '</p>';
  h += '<h1 class="d-title">' + greeting + ', <em>Sean</em></h1>';
  h += '</div><div class="d-tools">';
  h += '<button class="d-plan' + (pend.length ? ' is-live' : '') + '" data-plantoggle>';
  h += kmark(22, false) + (pend.length ? 'Plan my day \u00b7 ' + pend.length : 'Day planned');
  h += '</button>';
  h += '<div class="d-ring"><svg viewBox="0 0 68 68" aria-hidden="true">';
  h += '<circle cx="34" cy="34" r="28" class="d-rt"/>';
  h += '<circle cx="34" cy="34" r="28" class="d-rp" stroke-dasharray="' + (C * pct / 100) + ' ' + C + '"/>';
  h += '</svg><div><b>' + doneCount + '<em>/' + live.length + '</em></b></div></div>';
  h += '</div></header>';

  // Signals
  h += '<nav class="d-signals" aria-label="Signals">';
  SIGNALS.forEach(function(s) {
    h += '<a href="' + s.href + '" class="d-sig is-' + (s.tone || 'flat') + '">';
    h += '<span class="d-sk">' + s.k + '</span>';
    h += '<b>' + s.v + '</b><em>' + s.s + '</em></a>';
  });
  h += '</nav>';

  // Coach
  h += '<section class="d-coach"><div class="d-badge">' + kmark(52, true) + '<span class="d-name">KHABIB</span></div>';
  h += '<div class="d-say">';
  h += '<p class="d-good"><i>WORKING</i>Protein hit six days running and the squat went up. That is what consistent looks like.</p>';
  h += '<p class="d-change"><i>CHANGE</i>48 g of protein short with five hours left, and you play tomorrow. Fix it at dinner, not at 10pm.</p>';
  h += '</div></section>';

  // Plan sheet
  if (state.planOpen) {
    h += '<section class="d-sheet"><header><div><p class="d-eyebrow">KHABIB\u2019S PLAN</p>';
    h += '<h2>' + (pend.length ? pend.length + ' change' + (pend.length > 1 ? 's' : '') + ' to today' : 'Nothing left to change') + '</h2></div>';
    if (pend.length > 1) h += '<button class="d-go" data-acceptall>Accept all</button>';
    h += '</header>';
    if (!pend.length) h += '<p class="d-none">The day stands. Go and do it.</p>';
    h += '<ul>';
    pend.forEach(function(p) {
      h += '<li><div class="d-pl"><span class="d-chip">' + esc(p.signal) + '</span>';
      h += '<b>' + esc(p.title) + '</b><p>' + esc(p.why) + '</p></div>';
      h += '<div class="d-pb"><button class="d-ghost" data-skip="' + p.id + '">Skip</button>';
      h += '<button class="d-go" data-accept="' + p.id + '">Accept</button></div></li>';
    });
    h += '</ul>';
    h += '<p class="d-fine">Khabib never edits the day silently. Every change cites the signal that produced it.</p>';
    h += '</section>';
  }

  // Focus
  if (focus) {
    var fk = KIND[focus.kind];
    h += '<section class="d-focus" style="border-left:3px solid ' + fk.c + '">';
    h += '<div><p class="d-eyebrow">' + (doing ? 'HAPPENING NOW' : 'NEXT \u00b7 IN ' + dur(focus.at - NOW)) + '</p>';
    h += '<h2>' + esc(focus.title) + '</h2>';
    h += '<p class="d-fsub">' + esc(focus.sub) + '</p></div>';
    h += '<div class="d-fright"><span class="d-fclock" style="color:' + fk.c + '">' + hhmm(focus.at) + '</span>';
    h += '<button class="d-go" data-openguide="' + focus.id + '">Open guide</button></div></section>';
  }

  // Main + sidebar
  h += '<main class="d-main"><section class="d-block"><header class="d-bh"><div>';
  h += '<p class="d-eyebrow">01 \u00b7 TODAY</p><h2>The <em>day</em></h2></div>';
  if (missed > 0) h += '<span class="d-warn">' + missed + ' unlogged</span>';
  h += '</header><ol class="d-list">';

  state.day.forEach(function(it, i) {
    var st = state.done[it.id] ? 'done' : (NOW >= it.at && NOW < it.at + it.mins ? 'now' : (NOW >= it.at + it.mins ? 'missed' : 'next'));
    var isOpen = state.open === it.id;
    var k = KIND[it.kind];
    var stepsDone = it.steps.filter(function(_,j){return state.steps[it.id+'|'+j];}).length;

    h += '<li class="d-item is-' + st + (it.added ? ' is-added' : '') + '">';
    h += '<span class="d-bead"></span>';
    h += '<button class="d-head" data-toggle="' + it.id + '" aria-expanded="' + isOpen + '"' + (it.passive ? ' disabled' : '') + '>';
    h += '<span class="d-time"><b>' + hhmm(it.at) + '</b>' + (it.mins > 0 ? '<em>' + dur(it.mins) + '</em>' : '') + '</span>';
    h += '<span class="d-body"><span class="d-kind" style="color:' + k.c + '">' + k.label + (it.added ? '<i>\u00b7 PLANNED</i>' : '') + '</span>';
    h += '<span class="d-dtitle">' + esc(it.title) + '</span>';
    h += '<span class="d-sub">' + esc(it.sub) + '</span></span>';
    if (!it.passive) {
      h += '<span class="d-right">';
      if (it.steps.length) h += '<span class="d-prog">' + stepsDone + '<em>/' + it.steps.length + '</em></span>';
      h += '<span class="d-chev">' + (isOpen ? '\u2212' : '+') + '</span></span>';
    }
    h += '</button>';

    if (isOpen) {
      h += '<div class="d-guide"><ol>';
      it.steps.forEach(function(s, j) {
        var sk = it.id + '|' + j;
        var on = !!state.steps[sk];
        h += '<li><button class="d-step' + (on ? ' is-on' : '') + '" data-stepkey="' + sk + '" aria-pressed="' + on + '">';
        h += '<span class="d-box">' + (on ? '\u2713' : (j+1)) + '</span>';
        h += '<span class="d-st"><b>' + esc(s.t) + '</b><em>' + esc(s.d) + '</em></span></button></li>';
      });
      h += '</ol><div class="d-actions">';
      h += '<button class="d-go" data-markdone="' + it.id + '">' + (state.done[it.id] ? 'Undo' : 'Mark complete') + '</button>';
      if (it.href) h += '<a class="d-link" href="' + it.href + '">Open ' + it.href.split('/').pop().replace('.html','').replace('#','/')  + ' \u2192</a>';
      h += '</div></div>';
    }
    h += '</li>';

    // Now line
    if (i === nowAfter) {
      h += '<li class="d-nowline" aria-hidden="true"><span></span><em>' + hhmm(NOW) + '</em></li>';
    }
  });

  h += '</ol></section>';

  // Sidebar
  h += '<aside class="d-side">';

  // Reminders
  h += '<section class="d-block"><p class="d-eyebrow">02 \u00b7 REMINDERS</p><ul class="d-rem">';
  REMINDERS.forEach(function(r) {
    var on = !!state.rem[r.id];
    var late = !on && r.at < NOW;
    h += '<li><button class="d-step' + (on ? ' is-on' : '') + '" data-remkey="' + r.id + '" aria-pressed="' + on + '">';
    h += '<span class="d-box">' + (on ? '\u2713' : '') + '</span>';
    h += '<span class="d-st"><b>' + esc(r.t) + '</b><em class="' + (late ? 'is-late' : '') + '">' + (late ? 'overdue' : hhmm(r.at)) + '</em></span>';
    h += '</button></li>';
  });
  h += '</ul><h3 class="d-bt">Reminders</h3></section>';

  // Week
  h += '<section class="d-block"><p class="d-eyebrow">03 \u00b7 THE WEEK</p><div class="d-week">';
  WEEK_DATA.forEach(function(d) {
    h += '<div class="d-wd is-' + d.k + (d.today ? ' is-today' : '') + '">';
    h += '<em>' + d.d + '</em><b>' + d.n + '</b><span></span></div>';
  });
  h += '</div><p class="d-note">Match Saturday. Everything from here points at it.</p>';
  h += '<h3 class="d-bt">The week</h3></section>';

  h += '</aside></main>';

  // Footer
  h += '<footer class="d-foot"><span>SIGNALS READ FROM PEAK \u00b7 FUEL \u00b7 VITALS \u00b7 TRAIN \u00b7 RECOVERY</span>';
  h += '<span>GUIDES LINK OUT \u00b7 THEY DON\u2019T DUPLICATE</span></footer>';

  document.getElementById('app').innerHTML = h;
  bindAll();
}

/* ═══ BIND ═══════════════════════════════════════════════════ */
function bindAll() {
  // Plan toggle
  var pt = document.querySelector('[data-plantoggle]');
  if (pt) pt.addEventListener('click', function(){ state.planOpen = !state.planOpen; render(); });

  // Accept all
  var aa = document.querySelector('[data-acceptall]');
  if (aa) aa.addEventListener('click', function(){
    var d = state.day;
    pending().forEach(function(p){ d = p.apply(d); state.handled[p.id] = true; });
    state.day = d;
    render();
  });

  // Accept / Skip
  document.querySelectorAll('[data-accept]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var id = this.dataset.accept;
      var p = PROPOSALS.find(function(x){return x.id===id;});
      if(p){ state.day = p.apply(state.day); state.handled[p.id] = true; render(); }
    });
  });
  document.querySelectorAll('[data-skip]').forEach(function(btn){
    btn.addEventListener('click', function(){ state.handled[this.dataset.skip] = true; render(); });
  });

  // Open guide from focus
  document.querySelectorAll('[data-openguide]').forEach(function(btn){
    btn.addEventListener('click', function(){ state.open = this.dataset.openguide; render(); });
  });

  // Toggle items
  document.querySelectorAll('[data-toggle]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var id = this.dataset.toggle;
      state.open = state.open === id ? null : id;
      render();
    });
  });

  // Steps
  document.querySelectorAll('[data-stepkey]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var k = this.dataset.stepkey;
      state.steps[k] = !state.steps[k];
      render();
    });
  });

  // Mark done
  document.querySelectorAll('[data-markdone]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var id = this.dataset.markdone;
      state.done[id] = !state.done[id];
      render();
    });
  });

  // Reminders
  document.querySelectorAll('[data-remkey]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var id = this.dataset.remkey;
      state.rem[id] = !state.rem[id];
      render();
    });
  });
}

// Now-line refresh
setInterval(render, 60000);
render();

})();
</script>
</body>
</html>
