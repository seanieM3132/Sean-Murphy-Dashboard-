<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050D0A">
<title>Seward College Work</title>
<script src="/topbar.js" defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#050D0A;--line:rgba(74,222,128,.10);
  --green:#4ADE80;--teal:#7DD3C0;--amber:#E8873A;--gold:#D8B24A;
  --ink:#E6F2EC;--dim:#5F786E;--dimmer:#3B4E47;
  --mono:'JetBrains Mono',monospace;--serif:'Instrument Serif',Georgia,serif;
  --w:940px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  min-height:100vh;padding:40px 24px 64px;
  background:radial-gradient(1000px 500px at 50% -10%,#0D2419 0%,transparent 60%),var(--bg);
  color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;
}
ul{list-style:none;}

/* header */
.s-top{max-width:var(--w);margin:0 auto 24px;}
.s-back{font:500 11px/1 var(--mono);letter-spacing:.14em;color:var(--dim);text-decoration:none;}
.s-back:hover{color:var(--green);}
.s-title{font-family:var(--serif);font-size:clamp(32px,4.6vw,52px);font-weight:400;font-style:italic;margin:14px 0 8px;letter-spacing:-.01em;}
.s-title em{color:var(--green);}
.s-tag{font:500 10px/1 var(--mono);letter-spacing:.22em;color:var(--dimmer);}

/* stat strip */
.s-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);
  border:1px solid var(--line);border-radius:14px;overflow:hidden;max-width:var(--w);margin:0 auto 16px;}
.s-strip>div{background:#0A1712;padding:16px 18px;}
.s-strip b{display:block;font-family:var(--serif);font-size:28px;font-weight:400;line-height:1;}
.s-strip b.is-good{color:var(--green);} .s-strip b.is-hot{color:var(--amber);}
.s-strip b em{font-style:normal;font:400 11px var(--mono);color:var(--dim);margin-left:3px;}
.s-strip span{display:block;font:500 9px var(--mono);letter-spacing:.2em;color:var(--dim);margin-top:9px;text-transform:uppercase;}

/* coach */
.s-coach{display:flex;gap:16px;max-width:var(--w);margin:0 auto 24px;padding:18px 20px;
  border:1px solid rgba(74,222,128,.14);border-radius:14px;background:rgba(16,36,27,.4);}
.s-av{width:38px;height:38px;flex:none;border-radius:11px;border:1px solid rgba(74,222,128,.3);
  display:flex;align-items:center;justify-content:center;background:rgba(74,222,128,.06);}
.s-av span{font-family:var(--serif);font-size:19px;color:var(--green);}
.s-cname{font:500 9px var(--mono);letter-spacing:.2em;color:var(--green);}
.s-cname em{font-style:normal;color:var(--dimmer);letter-spacing:.1em;}
.s-clead{font:400 13px/1.65 'Inter',sans-serif;color:var(--ink);opacity:.85;margin-top:8px;max-width:72ch;}

/* rail */
.s-rail{position:relative;display:flex;justify-content:space-between;max-width:var(--w);margin:0 auto 30px;padding:0 4px;}
.s-rail-line{position:absolute;left:10px;right:10px;top:5px;height:1px;background:var(--line);}
.s-node{position:relative;display:flex;flex-direction:column;align-items:center;gap:10px;background:none;border:0;cursor:pointer;padding:0;}
.s-node-d{width:11px;height:11px;border-radius:50%;border:1px solid var(--dimmer);background:var(--bg);transition:all .2s;}
.s-node em{font-style:normal;font:400 10px var(--mono);color:var(--dimmer);}
.s-node.is-done .s-node-d{background:var(--green);border-color:var(--green);}
.s-node.is-done em{color:var(--dim);}
.s-node.is-missed .s-node-d{background:var(--bg);border-color:var(--amber);box-shadow:inset 0 0 0 2px var(--bg);}
.s-node.is-missed em{color:var(--amber);}
.s-node.is-today .s-node-d{background:var(--green);border-color:var(--green);box-shadow:0 0 0 4px rgba(74,222,128,.15),0 0 10px rgba(74,222,128,.6);}
.s-node.is-today em{color:var(--green);}
.s-node.is-travel{cursor:default;}
.s-node.is-travel .s-node-d{border-style:dashed;}
.s-node.is-sel em{color:var(--ink);}
.s-node.is-sel .s-node-d{transform:scale(1.25);}
.s-node:focus-visible{outline:2px solid var(--green);outline-offset:4px;border-radius:4px;}

/* the day */
.s-day{max-width:var(--w);margin:0 auto;}
.s-day-h{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;margin-bottom:14px;}
.s-eyebrow{font:500 9px var(--mono);letter-spacing:.22em;color:var(--dim);}
.s-day-t{font-family:var(--serif);font-weight:400;font-size:clamp(26px,3.2vw,36px);margin-top:9px;letter-spacing:-.01em;}
.s-day-t em{font-style:italic;color:var(--green);}
.s-day-p{display:flex;align-items:center;gap:14px;}
.s-pct{font-family:var(--serif);font-size:30px;color:var(--dim);}
.s-pct em{font-style:normal;font:400 12px var(--mono);margin-left:2px;}
.s-jump{background:none;border:1px solid var(--line);border-radius:6px;padding:8px 11px;cursor:pointer;
  font:500 9px var(--mono);letter-spacing:.12em;color:var(--dim);transition:all .2s;}
.s-jump:hover{color:var(--green);border-color:rgba(74,222,128,.3);}
.s-jump:focus-visible{outline:2px solid var(--green);outline-offset:2px;}

.s-bar{height:2px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;margin-bottom:22px;}
.s-bar span{display:block;height:100%;background:var(--green);box-shadow:0 0 8px rgba(74,222,128,.5);transition:width .3s;}

/* items */
.s-items{display:flex;flex-direction:column;gap:8px;}
.s-item{border:1px solid var(--line);border-radius:14px;background:rgba(16,36,27,.35);transition:border-color .2s;}
.s-item.is-open{border-color:rgba(74,222,128,.24);background:rgba(16,36,27,.55);}
.s-item.is-complete{opacity:.5;}
.s-item-h{display:flex;align-items:center;gap:14px;width:100%;background:none;border:0;cursor:pointer;padding:16px 20px;}
.s-item-h.is-static{cursor:default;padding:6px 20px;}
.s-item-h:focus-visible{outline:2px solid var(--green);outline-offset:-2px;border-radius:14px;}
.s-dot{width:8px;height:8px;border-radius:2px;flex:none;}
.s-item-n{flex:1;text-align:left;font:400 14px 'Inter',sans-serif;color:var(--ink);}
.s-item-n em{font-style:normal;display:block;font:400 9px var(--mono);letter-spacing:.16em;color:var(--dimmer);margin-top:4px;text-transform:uppercase;}
.s-mini{width:64px;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;flex:none;}
.s-mini span{display:block;height:100%;border-radius:2px;transition:width .3s;}
.s-count{font:400 10px var(--mono);color:var(--dimmer);width:30px;text-align:right;}
.s-chev{font:400 14px var(--mono);color:var(--dim);width:12px;text-align:center;}

.s-item.is-bookend{background:rgba(255,255,255,.014);border-style:dashed;}
.s-item.is-bookend.is-open{border-style:solid;}
.s-req{font:500 8px var(--mono);letter-spacing:.16em;color:var(--dimmer);border:1px solid var(--line);border-radius:3px;padding:4px 6px;flex:none;}

.s-item-b{padding:0 20px 12px;}
.s-item-b li{display:flex;align-items:center;gap:10px;border-top:1px solid rgba(255,255,255,.04);}
.s-tick{display:flex;align-items:flex-start;gap:12px;flex:1;background:none;border:0;cursor:pointer;
  padding:11px 8px;border-radius:8px;text-align:left;transition:background .15s;}
.s-tick:hover{background:rgba(74,222,128,.04);}
.s-tick:focus-visible{outline:2px solid var(--green);outline-offset:-2px;}
.s-box{width:15px;height:15px;border-radius:4px;border:1px solid rgba(255,255,255,.14);flex:none;
  display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--bg);margin-top:1px;}
.s-tick.is-done .s-box{background:var(--green);border-color:var(--green);}
.s-txt b{display:block;font:400 12px 'Inter',sans-serif;color:var(--ink);}
.s-txt em{display:block;font-style:normal;font:400 10px/1.6 var(--mono);color:var(--dimmer);margin-top:3px;}
.s-tick.is-done .s-txt b{color:var(--dim);}
.s-note{font:400 10px/1.7 var(--mono);color:var(--dim);padding:10px 8px 4px;letter-spacing:.03em;}
.s-item.is-task .s-tick{padding:11px 0;}
.s-extra{padding:4px 20px 18px;}

/* timer */
.s-timer{flex:none;background:rgba(125,211,192,.07);border:1px solid rgba(125,211,192,.22);color:var(--teal);
  border-radius:8px;padding:7px 11px;cursor:pointer;min-width:54px;text-align:center;transition:all .15s;}
.s-timer b{display:block;font:400 14px var(--mono);}
.s-timer em{font-style:normal;font:400 8px var(--mono);opacity:.7;letter-spacing:.1em;}
.s-timer.is-on{background:var(--teal);color:#04211A;border-color:var(--teal);}
.s-timer:focus-visible{outline:2px solid var(--teal);outline-offset:2px;}

/* mile test */
.s-mile-row{display:flex;align-items:center;gap:18px;}
.s-mile label{font:500 8px var(--mono);letter-spacing:.2em;color:var(--dimmer);display:flex;flex-direction:column;gap:8px;}
.s-mile input{width:104px;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:9px;
  padding:12px;color:var(--ink);font:400 17px var(--mono);text-align:center;}
.s-mile input:focus{outline:none;border-color:rgba(74,222,128,.4);}
.s-mile-mid{flex:1;font:400 9px/1.7 var(--mono);color:var(--dimmer);text-align:center;letter-spacing:.03em;}
.s-verdict{font:400 11px var(--mono);margin-top:14px;letter-spacing:.03em;}
.s-verdict.is-good{color:var(--green);} .s-verdict.is-hot{color:var(--amber);}

/* pyramid */
.s-pyr{display:flex;align-items:flex-end;gap:5px;height:76px;}
.s-pbar{flex:1;border:1px solid rgba(74,222,128,.18);border-radius:4px 4px 0 0;background:rgba(74,222,128,.04);
  cursor:pointer;display:flex;align-items:flex-start;justify-content:center;padding-top:4px;transition:all .2s;}
.s-pbar em{font-style:normal;font:400 8px var(--mono);color:var(--dimmer);}
.s-pbar.is-done{background:var(--green);border-color:var(--green);}
.s-pbar.is-done em{color:#062015;}
.s-pbar:focus-visible{outline:2px solid var(--green);outline-offset:2px;}

.s-foot{display:flex;justify-content:space-between;max-width:var(--w);margin:44px auto 0;padding-top:18px;
  border-top:1px solid var(--line);font:400 9px var(--mono);letter-spacing:.2em;color:var(--dimmer);}

@media (max-width:680px){
  body{padding:24px 16px 48px;}
  .s-strip{grid-template-columns:1fr 1fr;}
  .s-coach{flex-direction:column;gap:12px;}
  .s-rail{overflow-x:auto;gap:22px;justify-content:flex-start;padding-bottom:4px;}
  .s-rail-line{display:none;} .s-node{flex:none;}
  .s-day-h{flex-direction:column;align-items:flex-start;gap:12px;}
  .s-mile-row{flex-direction:column;align-items:stretch;} .s-mile input{width:100%;}
  .s-mini{display:none;} .s-foot{flex-direction:column;gap:8px;}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>

<header class="s-top">
  <div>
    <a href="/train.html" class="s-back">&#8592; Train</a>
    <h1 class="s-title">Seward <em>College Work</em></h1>
  </div>
  <p class="s-tag">SCCC SUMMER PROGRAM &middot; NO GYM, NO EQUIPMENT, NO EXCUSES</p>
</header>

<div class="s-strip" id="strip"></div>
<section class="s-coach" id="coach"></section>
<nav class="s-rail" aria-label="Program days" id="rail"></nav>
<main class="s-day" id="day-main"></main>
<footer class="s-foot"><span>SEWARD COUNTY COMMUNITY COLLEGE &middot; MEN'S SOCCER</span><span>FOLLOW IT EXACTLY AS WRITTEN</span></footer>

<script>
(function() {
  'use strict';

  var TONE = { warm:'#E8873A', core:'#7DD3C0', body:'#4ADE80', rope:'#D8B24A', run:'#E8873A', cool:'#7DD3C0' };
  var PYRAMID = [10,20,30,40,50,50,40,30,20,10];

  var ROUTINES = {
    warmup:{name:'Warm-up',kind:'Before every workout',tone:'warm',items:[
      {l:'Easy jog or skip',d:'3 min \u00B7 get warm before you stretch'},
      {l:'Leg swings',d:'10 each way, each leg \u00B7 front-back, then side-side'},
      {l:'Hip openers',d:'10 each side \u00B7 deep lunge, elbow to instep'},
      {l:'Ankle rocks',d:'15 each \u00B7 knee over toe, heel down'},
      {l:'Walking lunge with reach',d:'8 each leg'},
      {l:'Build-up strides',d:'4 \u00D7 40 m \u00B7 60, 70, 80, 90% effort'}
    ],note:"History shows the prepared arrive injury-free. Don't start cold."},
    stretch:{name:'Cool-down & stretch',kind:'After every workout',tone:'cool',items:[
      {l:'Walk it out',d:'2 min \u00B7 nasal breathing'},
      {l:'Couch stretch',d:'45 s each side',sec:45,sets:2},
      {l:'Hamstring',d:'30 s each side',sec:30,sets:2},
      {l:'Adductors',d:'45 s each side \u00B7 your weak link',sec:45,sets:2},
      {l:'Calves',d:'30 s each side',sec:30,sets:2},
      {l:'Hip flexors',d:'40 s each side',sec:40,sets:2}
    ],note:"Don't skip the stretch."},
    abs1:{name:'Abs 1',kind:'Core',tone:'core',items:[
      {l:'Slow crunches',d:'25 reps'},{l:'Full sit-ups',d:'25 reps \u00B7 careful with your back'},
      {l:'6-inch scissors',d:'25 reps \u00B7 legs 6" up, every 4 crosses = 1'},
      {l:'Superman',d:'3 sets \u00B7 hold 5 s = 1 set',sec:5,sets:3},{l:'Slow crunches',d:'25 reps'}
    ]},
    abs2:{name:'Abs 2',kind:'Core',tone:'core',items:[
      {l:'Front plank',d:'3 \u00D7 1 min',sec:60,sets:3},
      {l:'Left side plank',d:'3 \u00D7 1 min',sec:60,sets:3},
      {l:'Right side plank',d:'3 \u00D7 1 min',sec:60,sets:3}
    ],note:'When three sets gets easy, add a set.'},
    A:{name:'Workout A',kind:'Bodyweight',tone:'body',items:[
      {l:'Wide push-ups',d:'4 \u00D7 10 \u00B7 arms as wide as you can'},
      {l:'Normal push-ups',d:'4 \u00D7 10'},{l:'Burpees',d:'5 \u00D7 10 \u00B7 push-up, knees in, jump high'},
      {l:'Squats',d:'5 \u00D7 10'},{l:'Knees to chest',d:'3 \u00D7 15'}
    ]},
    B:{name:'Workout B',kind:'Bodyweight',tone:'body',items:[
      {l:'Walking push-ups',d:'4 \u00D7 7 \u00B7 four push-ups, hands right then left and back = 1'},
      {l:'Lunges',d:'5 \u00D7 10 each leg \u00B7 knee behind the toes'}
    ],note:'Too easy, add a set. Too hard, slow down and catch up. Slow is fine. Wrong is not.'},
    C:{name:'Workout C',kind:'Bodyweight',tone:'body',items:[
      {l:'Clap push-ups',d:'5 \u00D7 15 \u00B7 or whatever you can reach'},
      {l:'Calf jumps, \u00BC squat',d:'5 \u00D7 30 \u00B7 bounce on the toes'},
      {l:'Calf jumps',d:'5 \u00D7 15 \u00B7 straight up, as high as you can'}
    ]},
    D:{name:'Workout D',kind:'Bodyweight',tone:'body',items:[
      {l:'Decline push-ups',d:'5 \u00D7 10 \u00B7 feet on a chair'},
      {l:'Diamond push-ups',d:'5 \u00D7 11'},
      {l:'Vertical wall jumps',d:'5 \u00D7 20 \u00B7 higher every jump'},
      {l:'Single-leg jumps',d:'5 \u00D7 10 each leg'},
      {l:'Calf raises',d:'10 \u00D7 20 \u00B7 hold 5 s',sec:5,sets:10}
    ]},
    jr1:{name:'Jump Rope 1',kind:'Rope',tone:'rope',items:[
      {l:'30 jumps',d:'5 sets \u00B7 30 s rest',sec:30,sets:5}
    ]},
    jr2:{name:'Jump Rope 2',kind:'Rope',tone:'rope',items:[
      {l:'100 jumps',d:'3 sets \u00B7 30 s rest',sec:30,sets:3}
    ]}
  };

  function r(ref) { return { kind:'routine', ref:ref }; }
  function t(l, d, x) { var o = { kind:'task', l:l, d:d }; if (x) { for (var k in x) o[k] = x[k]; } return o; }

  var DAYS = [
    {date:'2026-07-09',items:[t('Run','2 miles'),r('abs1'),t('Push-ups','25'),t('Squats','25')]},
    {date:'2026-07-10',items:[r('B'),r('abs2')]},
    {date:'2026-07-11',items:[r('C'),r('abs1')]},
    {date:'2026-07-12',items:[r('D'),r('abs2')]},
    {date:'2026-07-13',items:[t('Sprint pyramid','2 sets \u00B7 recovery equals the distance in seconds \u00B7 5 min between sets',{pyramid:true}),r('abs1')]},
    {date:'2026-07-14',items:[r('B'),r('jr2'),r('abs1')]},
    {date:'2026-07-15',items:[r('A'),r('jr2'),r('abs2')]},
    {date:'2026-07-16',items:[t('100-yard sprints','10 \u00D7 full speed \u00B7 30 s to 1 min recovery'),r('abs1')]},
    {date:'2026-07-17',items:[t('Mile test','Two timed miles. Match the first.',{tt:true})]},
    {date:'2026-07-18',items:[t('Run','2 miles'),r('abs1'),r('jr2')]},
    {date:'2026-07-19',items:[r('A'),r('abs2'),r('jr2')]},
    {date:'2026-07-20',items:[t('40-yard sprints','5 sprints = 1 set \u00B7 30 s between \u00B7 5 min between sets \u00B7 5 sets'),r('abs1')]},
    {date:'2026-07-21',items:[r('D'),r('abs2')]},
    {date:'2026-07-22',items:[r('B'),r('abs1'),t('Run','1 mile, endurance'),t('100-yard sprints','10 \u00D7 \u00B7 30 s recovery')]},
    {date:'2026-07-23',items:[r('abs1'),r('abs2'),t('Run','1 mile'),r('jr1'),r('jr2')]}
  ];

  var ARRIVAL = '2026-07-28';

  /* ── Helpers ── */
  function D(iso) { return new Date(iso + 'T00:00:00'); }
  function dayNum(iso) { return D(iso).getDate(); }
  function weekday(iso) { return D(iso).toLocaleDateString('en-AU',{weekday:'long'}); }
  function monthDay(iso) { return D(iso).toLocaleDateString('en-AU',{day:'numeric',month:'long'}); }
  function between(a, b) { return Math.round((D(b) - D(a)) / 864e5); }

  function itemsOf(day) { return [r('warmup')].concat(day.items).concat([r('stretch')]); }

  function totalItems(day) {
    return itemsOf(day).reduce(function(a, it) {
      return a + (it.kind === 'routine' ? ROUTINES[it.ref].items.length : 1);
    }, 0);
  }

  function countDone(day) {
    var c = 0;
    itemsOf(day).forEach(function(it, n) {
      if (it.kind === 'routine') {
        ROUTINES[it.ref].items.forEach(function(_, i) {
          if (doneSet.has(day.date + '|' + it.ref + '|' + i)) c++;
        });
      } else {
        if (doneSet.has(day.date + '|task|' + n)) c++;
      }
    });
    return c;
  }

  /* ── State ── */
  var now = new Date();
  var TODAY = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  var todayIdx = DAYS.findIndex(function(d) { return d.date === TODAY; });
  if (todayIdx < 0) todayIdx = DAYS.length - 1; // fallback
  var sel = todayIdx;
  var openItem = null;
  var doneSet = new Set();
  var pyrDone = new Set();
  var mile = [null, null];

  // Timers state
  var timers = {};

  function stateOf(i) {
    if (i === todayIdx) return 'today';
    if (i > todayIdx) return 'next';
    return countDone(DAYS[i]) === totalItems(DAYS[i]) ? 'done' : 'missed';
  }

  /* ── Render ── */
  function renderStrip() {
    var complete = 0;
    for (var i = 0; i < todayIdx; i++) { if (countDone(DAYS[i]) === totalItems(DAYS[i])) complete++; }
    var missed = Math.max(0, todayIdx - complete);
    var daysTo = between(TODAY, ARRIVAL);

    document.getElementById('strip').innerHTML =
      '<div><b>' + (todayIdx + 1) + '<em>/' + DAYS.length + '</em></b><span>Day</span></div>' +
      '<div><b class="is-good">' + complete + '</b><span>Complete</span></div>' +
      '<div><b class="' + (missed ? 'is-hot' : '') + '">' + missed + '</b><span>Missed</span></div>' +
      '<div><b>' + daysTo + '<em>d</em></b><span>To check-in</span></div>';
  }

  function renderCoach() {
    var missed = 0;
    for (var i = 0; i < todayIdx; i++) { if (countDone(DAYS[i]) < totalItems(DAYS[i])) missed++; }
    document.getElementById('coach').innerHTML =
      '<div class="s-av"><span>K</span></div><div>' +
      '<div class="s-cname">KHABIB <em>\u00B7 compliance, not programming</em></div>' +
      '<p class="s-clead">' + (missed
        ? missed + ' day' + (missed > 1 ? 's' : '') + ' incomplete. The program is dated for a reason. Catch up, then keep going.'
        : "I don't touch this program. Seward wrote it, you follow it. My only job is telling you when you didn't.") +
      '</p></div>';
  }

  function renderRail() {
    var html = '<span class="s-rail-line"></span>';
    DAYS.forEach(function(d, i) {
      var s = stateOf(i);
      html += '<button class="s-node is-' + s + (sel === i ? ' is-sel' : '') + '" data-day="' + i + '" ' +
        'aria-label="' + weekday(d.date) + ' ' + monthDay(d.date) + '">' +
        '<span class="s-node-d"></span><em>' + dayNum(d.date) + '</em></button>';
    });
    html += '<div class="s-node is-travel" title="Travel to Liberal"><span class="s-node-d"></span><em>24</em></div>';
    document.getElementById('rail').innerHTML = html;

    document.querySelectorAll('[data-day]').forEach(function(btn) {
      btn.addEventListener('click', function() { sel = parseInt(this.dataset.day); renderAll(); });
    });
  }

  function renderDay() {
    var day = DAYS[sel];
    var isToday = sel === todayIdx;
    var done = countDone(day), tot = totalItems(day);
    var pct = Math.round((done / tot) * 100);

    var html = '<header class="s-day-h"><div>' +
      '<p class="s-eyebrow">' + (isToday ? 'TODAY' : stateOf(sel).toUpperCase()) + ' \u00B7 DAY ' + (sel + 1) + '</p>' +
      '<h2 class="s-day-t">' + weekday(day.date) + ', <em>' + monthDay(day.date) + '</em></h2></div>' +
      '<div class="s-day-p"><span class="s-pct">' + pct + '<em>%</em></span>';
    if (!isToday) html += '<button class="s-jump" id="jump-today">Back to today</button>';
    html += '</div></header>';

    html += '<div class="s-bar"><span style="width:' + pct + '%"></span></div>';
    html += '<div class="s-items">';

    itemsOf(day).forEach(function(it, n) {
      if (it.kind === 'routine') {
        html += renderRoutine(it.ref, day.date, n, it.ref === 'warmup' || it.ref === 'stretch');
      } else {
        var k = day.date + '|task|' + n;
        var on = doneSet.has(k);
        html += '<section class="s-item is-task' + (on ? ' is-complete' : '') + '">' +
          '<div class="s-item-h is-static"><span class="s-dot" style="background:' + TONE.run + '"></span>' +
          '<button class="s-tick' + (on ? ' is-done' : '') + '" data-tick="' + k + '" aria-pressed="' + on + '">' +
          '<span class="s-box">' + (on ? '\u2713' : '') + '</span>' +
          '<span class="s-txt"><b>' + it.l + '</b><em>' + it.d + '</em></span></button></div>';

        if (it.tt) html += '<div class="s-extra">' + renderMileTest() + '</div>';
        if (it.pyramid) html += '<div class="s-extra">' + renderPyramid() + '</div>';
        html += '</section>';
      }
    });

    html += '</div>';
    document.getElementById('day-main').innerHTML = html;

    // Bind events
    document.querySelectorAll('[data-tick]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var k = this.dataset.tick;
        if (doneSet.has(k)) doneSet.delete(k); else doneSet.add(k);
        renderAll();
      });
    });

    document.querySelectorAll('[data-expand]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var key = this.dataset.expand;
        openItem = (openItem === key) ? null : key;
        renderAll();
      });
    });

    document.querySelectorAll('[data-timer]').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var key = this.dataset.timer;
        var sec = parseInt(this.dataset.sec);
        if (timers[key]) {
          clearInterval(timers[key].int);
          delete timers[key];
          this.classList.remove('is-on');
          this.querySelector('b').textContent = sec;
        } else {
          var self = this;
          var left = sec;
          self.classList.add('is-on');
          timers[key] = { int: setInterval(function() {
            left--;
            self.querySelector('b').textContent = left;
            if (left <= 0) { clearInterval(timers[key].int); delete timers[key]; self.classList.remove('is-on'); self.querySelector('b').textContent = sec; }
          }, 1000) };
        }
      });
    });

    document.querySelectorAll('[data-pyr]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var i = parseInt(this.dataset.pyr);
        if (pyrDone.has(i)) pyrDone.delete(i); else pyrDone.add(i);
        renderAll();
      });
    });

    var jumpBtn = document.getElementById('jump-today');
    if (jumpBtn) jumpBtn.addEventListener('click', function() { sel = todayIdx; renderAll(); });

    // Mile test blur
    var m1 = document.getElementById('mile-1');
    var m2 = document.getElementById('mile-2');
    if (m1) m1.addEventListener('blur', function() { mile[0] = parseMile(this.value); renderMileVerdict(); });
    if (m2) m2.addEventListener('blur', function() { mile[1] = parseMile(this.value); renderMileVerdict(); });
  }

  function renderRoutine(refKey, date, n, bookend) {
    var rt = ROUTINES[refKey];
    var total = rt.items.length;
    var done = rt.items.filter(function(_, i) { return doneSet.has(date + '|' + refKey + '|' + i); }).length;
    var pct = (done / total) * 100;
    var key = sel + '-' + refKey;
    var isOpen = openItem === key;

    var html = '<section class="s-item' + (isOpen ? ' is-open' : '') + (done === total ? ' is-complete' : '') + (bookend ? ' is-bookend' : '') + '">' +
      '<button class="s-item-h" data-expand="' + key + '" aria-expanded="' + isOpen + '">' +
      '<span class="s-dot" style="background:' + TONE[rt.tone] + '"></span>' +
      '<span class="s-item-n">' + rt.name + '<em>' + rt.kind + '</em></span>';
    if (bookend) html += '<span class="s-req">REQUIRED</span>';
    html += '<span class="s-mini"><span style="width:' + pct + '%;background:' + TONE[rt.tone] + '"></span></span>' +
      '<span class="s-count">' + done + '/' + total + '</span>' +
      '<span class="s-chev">' + (isOpen ? '\u2212' : '+') + '</span></button>';

    if (isOpen) {
      html += '<ul class="s-item-b">';
      rt.items.forEach(function(it, i) {
        var k = date + '|' + refKey + '|' + i;
        var on = doneSet.has(k);
        html += '<li><button class="s-tick' + (on ? ' is-done' : '') + '" data-tick="' + k + '" aria-pressed="' + on + '">' +
          '<span class="s-box">' + (on ? '\u2713' : '') + '</span>' +
          '<span class="s-txt"><b>' + it.l + '</b><em>' + it.d + '</em></span></button>';
        if (it.sec) {
          var timerKey = date + '|' + refKey + '|' + i + '|timer';
          html += '<button class="s-timer" data-timer="' + timerKey + '" data-sec="' + it.sec + '" aria-label="Start timer">' +
            '<b>' + it.sec + '</b><em>' + (it.sets > 1 ? '1/' + it.sets : 's') + '</em></button>';
        }
        html += '</li>';
      });
      if (rt.note) html += '<p class="s-note">' + rt.note + '</p>';
      html += '</ul>';
    }
    html += '</section>';
    return html;
  }

  function renderPyramid() {
    var html = '<div class="s-pyr">';
    PYRAMID.forEach(function(m, i) {
      html += '<button class="s-pbar' + (pyrDone.has(i) ? ' is-done' : '') + '" style="height:' + (m/50*100) + '%" ' +
        'data-pyr="' + i + '" aria-pressed="' + pyrDone.has(i) + '" aria-label="' + m + ' metre sprint"><em>' + m + '</em></button>';
    });
    html += '</div>';
    return html;
  }

  function parseMile(v) { var m = v.match(/^(\d+):(\d{1,2})$/); return m ? (+m[1] * 60 + +m[2]) : null; }
  function mmss(s) { return s === null ? '' : Math.floor(s/60) + ':' + String(s%60).padStart(2,'0'); }

  function renderMileTest() {
    return '<div class="s-mile"><div class="s-mile-row">' +
      '<label>FIRST MILE<input id="mile-1" value="' + mmss(mile[0]) + '" placeholder="5:42" inputmode="numeric"></label>' +
      '<span class="s-mile-mid">1 min rest \u00B7 25 crunches \u00B7 25 push-ups \u00B7 25 knees to chest \u00B7 30 s rest</span>' +
      '<label>SECOND MILE<input id="mile-2" value="' + mmss(mile[1]) + '" placeholder="5:48" inputmode="numeric"></label>' +
      '</div><div id="mile-verdict"></div></div>';
  }

  function renderMileVerdict() {
    var el = document.getElementById('mile-verdict');
    if (!el) return;
    if (mile[0] === null || mile[1] === null) { el.innerHTML = ''; return; }
    var delta = mile[1] - mile[0];
    var cls = delta <= 5 ? 'is-good' : 'is-hot';
    var msg = delta <= 0 ? 'Second mile ' + Math.abs(delta) + 's faster. That is the whole test.'
      : delta <= 5 ? delta + 's slower. Matched, near enough.'
      : delta + 's slower. The point is to match it. Pace the first one honestly.';
    el.innerHTML = '<p class="s-verdict ' + cls + '">' + msg + '</p>';
  }

  function renderAll() {
    renderStrip();
    renderCoach();
    renderRail();
    renderDay();
  }

  renderAll();
})();
</script>
</body>
</html>
