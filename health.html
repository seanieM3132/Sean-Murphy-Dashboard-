<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#050D0A">
<title>Vitals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
.v-root{
  --bg:#050D0A; --bg2:#0A1712; --line:rgba(74,222,128,.10);
  --green:#4ADE80; --teal:#7DD3C0; --amber:#E8873A;
  --ink:#E6F2EC; --dim:#5F786E; --dimmer:#3B4E47;
  min-height:100vh; padding:40px 32px 64px; background:
    radial-gradient(1200px 600px at 20% -10%, #0D2419 0%, transparent 60%), var(--bg);
  color:var(--ink); font-family:'Inter',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
}
.v-root *{box-sizing:border-box;margin:0;}

.v-top{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;max-width:1240px;margin:0 auto 32px;}
.v-back{font:500 11px/1 'JetBrains Mono',monospace;letter-spacing:.14em;color:var(--dim);text-decoration:none;}
.v-back:hover{color:var(--green);}
.v-title{font-family:'Instrument Serif',Georgia,serif;font-size:clamp(34px,4.4vw,54px);font-weight:400;font-style:italic;letter-spacing:-.01em;margin:14px 0 6px;}
.v-title em{color:var(--green);}
.v-date{font:500 11px/1 'JetBrains Mono',monospace;letter-spacing:.22em;color:var(--dim);}
.v-device{display:flex;gap:12px;align-items:center;border:1px solid var(--line);border-radius:12px;padding:12px 16px;background:rgba(10,23,18,.6);cursor:pointer;text-decoration:none;transition:border-color .25s;}
.v-device:hover{border-color:rgba(74,222,128,.35);}
.v-device b{display:block;font:500 12px/1.5 'JetBrains Mono',monospace;letter-spacing:.08em;}
.v-device span{font:400 11px/1.5 'JetBrains Mono',monospace;color:var(--dim);}
.v-pulse{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(74,222,128,.5);animation:pulse 2.4s infinite;}
@keyframes pulse{70%{box-shadow:0 0 0 10px rgba(74,222,128,0)}100%{box-shadow:0 0 0 0 rgba(74,222,128,0)}}

.v-strip{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:14px;overflow:hidden;max-width:1240px;margin:0 auto 20px;}
.v-strip .v-stat{background:var(--bg2);padding:18px 20px;}

.v-stat-v{font-family:'Instrument Serif',Georgia,serif;font-size:30px;line-height:1;letter-spacing:-.01em;}
.v-stat-v.is-good{color:var(--green);}
.v-stat-v.is-hot{color:var(--amber);}
.v-stat-u{font:400 11px/1 'JetBrains Mono',monospace;color:var(--dim);margin-left:5px;letter-spacing:.06em;}
.v-stat-l{font:500 9px/1 'JetBrains Mono',monospace;letter-spacing:.2em;color:var(--dim);margin-top:9px;text-transform:uppercase;}

.v-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:20px;max-width:1240px;margin:0 auto;}
.v-card{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:18px;padding:18px 20px 16px;
  background:linear-gradient(180deg,rgba(16,36,27,.55),rgba(6,15,11,.55));transition:border-color .25s,transform .25s;}
.v-card:hover{border-color:rgba(74,222,128,.28);transform:translateY(-2px);}
.v-card-h{display:flex;justify-content:space-between;font:400 10px/1 'JetBrains Mono',monospace;letter-spacing:.16em;color:var(--dimmer);}
.v-icon{color:var(--green);opacity:.55;font-size:12px;}
.v-card-b{flex:1;padding:18px 0 14px;}
.v-card-f{display:flex;justify-content:space-between;align-items:flex-end;}
.v-card-t{font-family:'Instrument Serif',Georgia,serif;font-style:italic;font-weight:400;font-size:22px;letter-spacing:.01em;}
.v-card-m{font:500 9px/1 'JetBrains Mono',monospace;letter-spacing:.2em;color:var(--dim);margin-top:7px;}
.v-arr{color:var(--dim);}

.v-svg{width:100%;height:auto;display:block;overflow:visible;}
.v-line{fill:none;stroke:var(--green);stroke-width:1.6;stroke-linejoin:round;filter:drop-shadow(0 0 6px rgba(74,222,128,.45));}
.v-line.is-teal{stroke:var(--teal);filter:drop-shadow(0 0 6px rgba(125,211,192,.35));}
.v-gridline{stroke:rgba(255,255,255,.05);stroke-width:1;}
.v-cross{stroke:rgba(74,222,128,.35);stroke-width:1;stroke-dasharray:3 3;}
.v-dot{fill:#fff;stroke:var(--green);stroke-width:2;}
.v-axis{font:400 9px 'JetBrains Mono',monospace;fill:var(--dimmer);letter-spacing:.1em;}
.v-band{fill:rgba(74,222,128,.07);}
.v-bar{fill:rgba(74,222,128,.30);}
.v-bar.is-live{fill:var(--green);}
.v-bar.is-low{fill:rgba(232,135,58,.5);}

.v-legend{display:flex;gap:34px;margin-bottom:14px;}
.v-xaxis{display:flex;justify-content:space-between;font:400 9px 'JetBrains Mono',monospace;color:var(--dimmer);letter-spacing:.12em;margin-top:6px;}
.v-read{font:400 10px/1.4 'JetBrains Mono',monospace;color:var(--dim);letter-spacing:.06em;margin-top:12px;}
.v-read b{color:var(--green);font-weight:500;}

.v-bigline{display:flex;align-items:baseline;gap:8px;}
.v-big{font-family:'Instrument Serif',serif;font-size:34px;}
.v-small{font:400 11px 'JetBrains Mono',monospace;color:var(--dim);}
.v-track{height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin:12px 0 16px;}
.v-track-f{height:100%;background:var(--green);border-radius:2px;box-shadow:0 0 8px rgba(74,222,128,.6);}

.v-stack{display:flex;height:16px;border-radius:4px;overflow:hidden;gap:2px;margin:6px 0 16px;}
.v-seg{transition:opacity .2s;} .v-seg:hover{opacity:.75;}
.v-keys{list-style:none;padding:0;display:grid;grid-template-columns:1fr 1fr;gap:9px 16px;}
.v-keys li{display:flex;align-items:center;gap:8px;font:400 10px 'JetBrains Mono',monospace;color:var(--dim);letter-spacing:.06em;}
.v-keys i{width:7px;height:7px;border-radius:2px;flex:none;}
.v-keys b{margin-left:auto;color:var(--ink);font-weight:400;}

.v-zones{list-style:none;padding:0;display:flex;flex-direction:column;gap:11px;}
.v-zones li{display:flex;align-items:center;gap:10px;}
.v-zlab{font:500 10px 'JetBrains Mono',monospace;color:var(--ink);width:18px;}
.v-zname{font:400 10px 'JetBrains Mono',monospace;color:var(--dim);width:74px;letter-spacing:.04em;}
.v-zbar{flex:1;height:5px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;}
.v-zbar div{height:100%;border-radius:3px;}
.v-zmin{font:400 10px 'JetBrains Mono',monospace;color:var(--dim);width:30px;text-align:right;}

.v-ringwrap{display:flex;gap:24px;align-items:center;}
.v-ring{width:140px;flex:none;transform:rotate(-90deg);}
.v-ring-t{fill:none;stroke:rgba(255,255,255,.06);stroke-width:6;}
.v-ring-p{fill:none;stroke:var(--green);stroke-width:6;stroke-linecap:round;filter:drop-shadow(0 0 6px rgba(74,222,128,.5));}
.v-ring-v,.v-ring-l{transform:rotate(90deg);transform-origin:70px 70px;}
.v-ring-v{font-family:'Instrument Serif',serif;font-size:26px;fill:var(--ink);}
.v-ring-l{font:500 8px 'JetBrains Mono',monospace;fill:var(--dim);letter-spacing:.2em;}
.v-ringmeta{display:flex;flex-direction:column;gap:12px;}
.v-tag{display:inline-block;align-self:flex-start;font:500 9px 'JetBrains Mono',monospace;letter-spacing:.18em;color:var(--green);border:1px solid rgba(74,222,128,.3);border-radius:4px;padding:5px 8px;}
.v-delta{font:400 10px 'JetBrains Mono',monospace;color:var(--green);}

.v-session{fill:rgba(232,135,58,.07);stroke:rgba(232,135,58,.22);stroke-width:1;}
.v-slabel{font:500 8px 'JetBrains Mono',monospace;fill:var(--amber);letter-spacing:.18em;opacity:.8;}

.v-ring.is-sm{width:120px;}
.v-ring-v.is-sm{font-size:24px;transform-origin:60px 60px;}
.v-ring.is-sm .v-ring-l{transform-origin:60px 60px;}
.v-call{font:400 12px/1.5 'Inter',sans-serif;color:var(--dim);max-width:190px;}
.v-inputs{list-style:none;padding:0;margin-top:18px;display:flex;flex-direction:column;gap:9px;}
.v-inputs li{display:flex;align-items:center;gap:9px;font:400 10px 'JetBrains Mono',monospace;color:var(--dim);letter-spacing:.05em;}
.v-inputs i{width:5px;height:5px;border-radius:50%;flex:none;}
.v-inputs i.is-ok{background:var(--green);box-shadow:0 0 6px rgba(74,222,128,.7);}
.v-inputs i.is-bad{background:var(--amber);}
.v-inputs b{margin-left:auto;color:var(--ink);font-weight:400;}

.v-week{list-style:none;padding:0;display:flex;flex-direction:column;gap:2px;}
.v-week li{display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:8px;transition:background .2s;}
.v-week li:hover{background:rgba(74,222,128,.04);}
.v-week li.is-next{opacity:.45;}
.v-week li.is-today{background:rgba(74,222,128,.06);box-shadow:inset 2px 0 0 var(--green);}
.v-wday{font:500 10px 'JetBrains Mono',monospace;color:var(--ink);width:32px;letter-spacing:.08em;}
.v-wtype{font:500 8px 'JetBrains Mono',monospace;letter-spacing:.14em;border:1px solid;border-radius:3px;padding:3px 5px;width:82px;text-align:center;flex:none;}
.v-wname{font:400 12px 'Inter',sans-serif;color:var(--dim);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.v-wbar{width:110px;height:4px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;flex:none;}
.v-wbar div{height:100%;border-radius:3px;}
.v-wmin{font:400 10px 'JetBrains Mono',monospace;color:var(--dimmer);width:34px;text-align:right;}
.v-wstate{font-size:11px;color:var(--green);width:14px;text-align:center;}

.v-foot{display:flex;justify-content:space-between;max-width:1240px;margin:44px auto 0;padding-top:18px;border-top:1px solid var(--line);
  font:400 9px 'JetBrains Mono',monospace;letter-spacing:.2em;color:var(--dimmer);}

html,body{scrollbar-width:none;-ms-overflow-style:none;}
*::-webkit-scrollbar{width:0!important;height:0!important;display:none!important;}

@media (max-width:1000px){
  .v-strip{grid-template-columns:repeat(3,1fr);}
  .v-card{grid-column:span 12 !important;}
  .v-ringwrap{flex-direction:column;align-items:flex-start;}
}
@media (max-width:560px){
  .v-root{padding:24px 16px 48px;}
  .v-strip{grid-template-columns:repeat(2,1fr);}
  .v-top{flex-direction:column;}
  .v-legend{gap:22px;flex-wrap:wrap;}
  .v-wbar,.v-wname{display:none;}
  .v-wtype{margin-left:auto;}
}
@media (prefers-reduced-motion:reduce){
  .v-root *{animation:none !important;transition:none !important;}
}
</style>
</head>
<body>
<div class="v-root" id="app"></div>
<script>
/* ── deterministic mock telemetry ── */
function rng(seed){let s=seed>>>0;return()=>((s=(s*1664525+1013904223)>>>0)/4294967296)}

function buildMock(){
  const hr=Array.from({length:288},(_,i)=>({min:i*5,bpm:0}));
  const hrvDays=["SAT","SUN","MON","TUE","WED","THU","FRI"];
  const hrv=hrvDays.map((d)=>({day:d,ms:0}));
  const steps=Array.from({length:24},(_,i)=>({hour:i,count:0}));
  const battery=Array.from({length:96},(_,i)=>({min:i*15,pct:0}));
  return{
    device:"Not connected",synced:"—",battery:0,
    restingHr:0,hrvNow:0,hrvBaseline:[0,0],bodyBattery:0,
    vo2:0,vo2Delta:0,stepsToday:0,stepGoal:10000,
    sleepScore:0,sleep:{deep:0,light:0,rem:0,awake:0},
    stress:0,trainingLoad:0,trainingRange:[0,0],
    trainingStatus:"NOT CONNECTED",recovery:0,
    readiness:{score:0,verdict:"—",call:"Connect your Garmin to see readiness data.",
      inputs:[
        {k:"HRV vs baseline",v:"—",ok:false},
        {k:"Sleep",v:"—",ok:false},
        {k:"Resting HR",v:"—",ok:false},
        {k:"7d load ratio",v:"—",ok:false}
      ]},
    acwr:{value:0,safe:[0.8,1.3]},
    todaySession:{start:0,end:0,label:"—"},
    week:[
      {day:"MON",type:"rest",name:"—",mins:0,load:0,state:"next"},
      {day:"TUE",type:"rest",name:"—",mins:0,load:0,state:"next"},
      {day:"WED",type:"rest",name:"—",mins:0,load:0,state:"next"},
      {day:"THU",type:"rest",name:"—",mins:0,load:0,state:"today"},
      {day:"FRI",type:"rest",name:"—",mins:0,load:0,state:"next"},
      {day:"SAT",type:"rest",name:"—",mins:0,load:0,state:"next"},
      {day:"SUN",type:"rest",name:"—",mins:0,load:0,state:"next"}
    ],
    zones:[
      {z:1,label:"Warm up",min:0,color:"#2E5F4A"},
      {z:2,label:"Easy",min:0,color:"#3A8A63"},
      {z:3,label:"Aerobic",min:0,color:"#4ADE80"},
      {z:4,label:"Threshold",min:0,color:"#D8B24A"},
      {z:5,label:"Maximum",min:0,color:"#E8873A"}
    ],
    hr,hrv,steps,batteryCurve:battery
  };
}

const TYPE={
  team:{label:"TEAM",color:"#4ADE80"},
  solo:{label:"INDIVIDUAL",color:"#7DD3C0"},
  gym:{label:"GYM",color:"#D8B24A"},
  match:{label:"MATCH",color:"#E8873A"},
  rest:{label:"REST",color:"#3A4A44"}
};

const fmtClock=m=>`${String(Math.floor(m/60)).padStart(2,"0")}:${String(m%60).padStart(2,"0")}`;
const hm=m=>`${Math.floor(m/60)}h ${m%60}m`;

function render(v){
  const app=document.getElementById("app");
  const days=["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"];
  const months=["JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE","JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"];
  const now=new Date();
  const dateStr=`${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;

  app.innerHTML=`
  <header class="v-top">
    <div>
      <a href="/" class="v-back">\u2190 Home</a>
      <h1 class="v-title">Vitals, <em>Sean</em></h1>
      <p class="v-date">${dateStr}</p>
    </div>
    <a href="/garmin.html" class="v-device" title="Garmin settings">
      <span class="v-pulse"></span>
      <div>
        <b>${v.device}</b>
        <span>Synced ${v.synced} \u00b7 ${v.battery}% battery</span>
      </div>
    </a>
  </header>

  <div class="v-strip">
    ${stat(v.restingHr,"bpm","Resting HR")}
    ${stat(v.hrvNow,"ms","HRV","good")}
    ${stat(v.bodyBattery,"%","Body battery")}
    ${stat(v.vo2,"","VO\u2082 max")}
    ${stat(v.stepsToday.toLocaleString(),"","Steps")}
    ${stat(v.sleepScore,"","Sleep score")}
  </div>

  <main class="v-grid">
    ${card("01","\u2665",12,"HEART RATE","LAST 24 HOURS",renderHeartRate(v),'<span class="v-arr">\u2192</span>')}
    ${card("02","\u25CE",4,"READINESS","THIS MORNING",renderReadiness(v))}
    ${card("03","\u2317",8,"THE WEEK","TEAM \u00b7 INDIVIDUAL \u00b7 GYM \u00b7 MATCH",renderWeek(v),'<span class="v-arr">\u2192</span>')}
    ${card("04","\u223F",4,"HRV",`${v.hrvNow} MS \u00b7 BALANCED`,renderHrv(v))}
    ${card("05","\u2191",4,"STEPS","TODAY",renderSteps(v))}
    ${card("06","\u263E",4,"SLEEP","LAST NIGHT",renderSleep(v))}
    ${card("07","\u26A1",4,"BODY BATTERY","24H DRAIN & CHARGE",renderBattery(v))}
    ${card("08","\u2261",4,"ZONES","TIME IN HR ZONE",renderZones(v))}
    ${card("09","\u2197",4,"TRAINING",v.trainingStatus,renderRing(v))}
  </main>

  <footer class="v-foot">
    <span>GARMIN CONNECT \u00b7 OAUTH 2.0</span>
    <span>NEXT SYNC IN 12 MIN</span>
  </footer>`;

  bindHrHover(v);
}

function stat(value,unit,label,tone){
  return`<div class="v-stat">
    <div class="v-stat-v${tone?' is-'+tone:''}">${value}${unit?`<span class="v-stat-u">${unit}</span>`:''}</div>
    <div class="v-stat-l">${label}</div>
  </div>`;
}

function card(index,icon,span,title,meta,body,foot){
  return`<section class="v-card" style="grid-column:span ${span}">
    <header class="v-card-h"><span class="v-idx">${index}</span><span class="v-icon">${icon}</span></header>
    <div class="v-card-b">${body}</div>
    <footer class="v-card-f"><div><h2 class="v-card-t">${title}</h2>${meta?`<p class="v-card-m">${meta}</p>`:''}</div>${foot||''}</footer>
  </section>`;
}

/* ── 01 Heart Rate ── */
function renderHeartRate(v){
  const data=v.hr,session=v.todaySession;
  const W=900,H=260,PAD=8;
  const bpms=data.map(d=>d.bpm);
  const lo=Math.min(...bpms),hi=Math.max(...bpms);
  const avg=Math.round(bpms.reduce((a,b)=>a+b,0)/bpms.length);
  const yMin=40,yMax=Math.ceil((hi+8)/10)*10;
  const xf=i=>(i/(data.length-1))*(W-PAD*2)+PAD;
  const yf=val=>H-PAD-((val-yMin)/(yMax-yMin))*(H-PAD*2);
  const path=data.map((d,i)=>`${i?"L":"M"}${xf(i)},${yf(d.bpm)}`).join("");
  const area=`${path}L${xf(data.length-1)},${H}L${xf(0)},${H}Z`;

  let gridLines='';
  [60,100,140,180].forEach(val=>{
    gridLines+=`<line x1="${PAD}" x2="${W-PAD}" y1="${yf(val)}" y2="${yf(val)}" class="v-gridline"/>`;
    gridLines+=`<text x="${PAD+2}" y="${yf(val)-5}" class="v-axis">${val}</text>`;
  });

  let sessionRect='';
  if(session){
    const sx=xf(session.start/5),ex=xf(session.end/5);
    sessionRect=`<rect x="${sx}" y="${PAD}" width="${ex-sx}" height="${H-PAD*2}" class="v-session"/>
      <text x="${sx+6}" y="${PAD+14}" class="v-slabel">${session.label}</text>`;
  }

  return`<div class="v-chart">
    <div class="v-legend">
      ${stat(lo,"bpm","Min")}
      ${stat(avg,"bpm","Avg")}
      ${stat(hi,"bpm","Peak","hot")}
    </div>
    <svg id="hrSvg" viewBox="0 0 ${W} ${H}" class="v-svg">
      <defs>
        <linearGradient id="hrFill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#4ADE80" stop-opacity="0.30"/>
          <stop offset="100%" stop-color="#4ADE80" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${gridLines}
      ${sessionRect}
      <path d="${area}" fill="url(#hrFill)"/>
      <path d="${path}" class="v-line" vector-effect="non-scaling-stroke"/>
      <g id="hrHover" style="display:none">
        <line id="hrCross" class="v-cross"/>
        <circle id="hrDot" r="4" class="v-dot"/>
      </g>
    </svg>
    <div class="v-xaxis">
      <span>00:00</span><span>06:00</span><span>12:00</span><span>18:00</span><span>24:00</span>
    </div>
    <div class="v-read" id="hrRead">Continuous optical HR \u00b7 5\u00a0min resolution</div>
  </div>`;
}

function bindHrHover(v){
  const svg=document.getElementById("hrSvg");
  if(!svg)return;
  const data=v.hr,W=900,H=260,PAD=8;
  const bpms=data.map(d=>d.bpm);
  const yMin=40,yMax=Math.ceil((Math.max(...bpms)+8)/10)*10;
  const xf=i=>(i/(data.length-1))*(W-PAD*2)+PAD;
  const yf=val=>H-PAD-((val-yMin)/(yMax-yMin))*(H-PAD*2);
  const hoverG=document.getElementById("hrHover");
  const cross=document.getElementById("hrCross");
  const dot=document.getElementById("hrDot");
  const read=document.getElementById("hrRead");

  svg.addEventListener("mousemove",e=>{
    const b=svg.getBoundingClientRect();
    const px=((e.clientX-b.left)/b.width)*W;
    const i=Math.max(0,Math.min(data.length-1,Math.round(((px-PAD)/(W-PAD*2))*(data.length-1))));
    hoverG.style.display="";
    cross.setAttribute("x1",xf(i));cross.setAttribute("x2",xf(i));
    cross.setAttribute("y1",PAD);cross.setAttribute("y2",H-PAD);
    dot.setAttribute("cx",xf(i));dot.setAttribute("cy",yf(data[i].bpm));
    read.innerHTML=`<b>${data[i].bpm}</b> bpm \u00b7 ${fmtClock(data[i].min)}`;
  });
  svg.addEventListener("mouseleave",()=>{
    hoverG.style.display="none";
    read.innerHTML="Continuous optical HR \u00b7 5\u00a0min resolution";
  });
}

/* ── 02 Readiness ── */
function renderReadiness(v){
  const rd=v.readiness,acwr=v.acwr;
  const R=46,C=2*Math.PI*R,p=rd.score/100;
  let inputs='';
  rd.inputs.forEach(inp=>{
    inputs+=`<li><i class="${inp.ok?'is-ok':'is-bad'}"></i><span>${inp.k}</span><b>${inp.v}</b></li>`;
  });
  return`<div class="v-chart">
    <div class="v-ringwrap">
      <svg viewBox="0 0 120 120" class="v-ring is-sm">
        <circle cx="60" cy="60" r="${R}" class="v-ring-t"/>
        <circle cx="60" cy="60" r="${R}" class="v-ring-p" stroke-dasharray="${C*p} ${C}"/>
        <text x="60" y="58" class="v-ring-v is-sm" text-anchor="middle">${rd.score}</text>
        <text x="60" y="75" class="v-ring-l" text-anchor="middle">READY</text>
      </svg>
      <div class="v-ringmeta">
        <div class="v-tag">${rd.verdict}</div>
        <p class="v-call">${rd.call}</p>
      </div>
    </div>
    <ul class="v-inputs">${inputs}</ul>
    <div class="v-read">Acute:chronic ${acwr.value} \u00b7 safe ${acwr.safe[0]}\u2013${acwr.safe[1]}</div>
  </div>`;
}

/* ── 03 The Week ── */
function renderWeek(v){
  const week=v.week;
  const maxLoad=Math.max(...week.map(d=>d.load),1);
  const total=week.reduce((a,d)=>a+d.load,0);
  const mins=week.reduce((a,d)=>a+(d.state==="done"?d.mins:0),0);
  const done=week.filter(d=>d.state==="done").length;

  let rows='';
  week.forEach(d=>{
    const t=TYPE[d.type];
    const icon=d.state==="done"?"\u2713":d.state==="today"?"\u25CF":"\u25CB";
    rows+=`<li class="is-${d.state}">
      <span class="v-wday">${d.day}</span>
      <span class="v-wtype" style="color:${t.color};border-color:${t.color}44">${t.label}</span>
      <span class="v-wname">${d.name}</span>
      <div class="v-wbar"><div style="width:${(d.load/maxLoad)*100}%;background:${t.color}"></div></div>
      <span class="v-wmin">${d.mins}\u2032</span>
      <span class="v-wstate">${icon}</span>
    </li>`;
  });

  return`<div class="v-chart">
    <div class="v-legend">
      ${stat(done,`/ ${week.length}`,"Sessions logged")}
      ${stat(`${Math.floor(mins/60)}h ${mins%60}m`,"","Time on feet")}
      ${stat(total,"","Week load","good")}
    </div>
    <ul class="v-week">${rows}</ul>
    <div class="v-read">Saturday match sits 2 days out \u00b7 taper from here</div>
  </div>`;
}

/* ── 04 HRV ── */
function renderHrv(v){
  const data=v.hrv,baseline=v.hrvBaseline;
  const W=420,H=180,PAD=10,max=80;
  const bw=(W-PAD*2)/data.length-12;
  const yf=val=>H-26-(val/max)*(H-46);

  let bars='';
  data.forEach((d,i)=>{
    const cx=PAD+i*((W-PAD*2)/data.length)+6;
    const inBase=d.ms>=baseline[0]&&d.ms<=baseline[1];
    const last=i===data.length-1;
    const cls=last?"v-bar is-live":inBase?"v-bar":"v-bar is-low";
    bars+=`<rect x="${cx}" y="${yf(d.ms)}" width="${bw}" height="${H-26-yf(d.ms)}" rx="2" class="${cls}"/>`;
    bars+=`<text x="${cx+bw/2}" y="${H-10}" class="v-axis" text-anchor="middle">${d.day}</text>`;
  });

  return`<div class="v-chart">
    <svg viewBox="0 0 ${W} ${H}" class="v-svg">
      <rect x="${PAD}" y="${yf(baseline[1])}" width="${W-PAD*2}" height="${yf(baseline[0])-yf(baseline[1])}" class="v-band"/>
      <text x="${W-PAD}" y="${yf(baseline[1])-5}" class="v-axis" text-anchor="end">BASELINE</text>
      ${bars}
    </svg>
    <div class="v-read">Overnight RMSSD \u00b7 7\u00a0day window</div>
  </div>`;
}

/* ── 05 Steps ── */
function renderSteps(v){
  const data=v.steps,total=v.stepsToday,goal=v.stepGoal;
  const W=420,H=170,PAD=10;
  const max=Math.max(...data.map(d=>d.count));
  const bw=(W-PAD*2)/data.length-3;
  const pct=Math.min(100,Math.round((total/goal)*100));

  let bars='';
  data.forEach((d,i)=>{
    const h=(d.count/max)*(H-30);
    const cls=d.count>max*0.7?"v-bar is-live":"v-bar";
    bars+=`<rect x="${PAD+i*((W-PAD*2)/data.length)}" y="${H-18-h}" width="${bw}" height="${Math.max(h,1)}" rx="1" class="${cls}"/>`;
  });
  let labels='';
  [0,6,12,18].forEach(h=>{
    labels+=`<text x="${PAD+h*((W-PAD*2)/24)}" y="${H-4}" class="v-axis">${String(h).padStart(2,"0")}</text>`;
  });

  return`<div class="v-chart">
    <div class="v-bigline">
      <span class="v-big">${total.toLocaleString()}</span>
      <span class="v-small">/ ${goal.toLocaleString()}</span>
    </div>
    <div class="v-track"><div class="v-track-f" style="width:${pct}%"></div></div>
    <svg viewBox="0 0 ${W} ${H}" class="v-svg">
      ${bars}${labels}
    </svg>
    <div class="v-read">${(goal-total).toLocaleString()} to go \u00b7 hourly distribution</div>
  </div>`;
}

/* ── 06 Sleep ── */
function renderSleep(v){
  const sleep=v.sleep,score=v.sleepScore;
  const stages=[["Deep",sleep.deep,"#1F7A57"],["Light",sleep.light,"#4ADE80"],["REM",sleep.rem,"#7DD3C0"],["Awake",sleep.awake,"#3A4A44"]];
  const total=stages.reduce((a,s)=>a+s[1],0);

  let segs='',keys='';
  stages.forEach(([n,m,c])=>{
    segs+=`<div class="v-seg" style="flex:${m};background:${c}" title="${n} ${hm(m)}"></div>`;
    keys+=`<li><i style="background:${c}"></i>${n}<b>${hm(m)}</b></li>`;
  });

  return`<div class="v-chart">
    <div class="v-legend">
      ${stat(hm(total),"","Duration")}
      ${stat(score,"","Score","good")}
    </div>
    <div class="v-stack">${segs}</div>
    <ul class="v-keys">${keys}</ul>
  </div>`;
}

/* ── 07 Body Battery ── */
function renderBattery(v){
  const curve=v.batteryCurve,now=v.bodyBattery,stress=v.stress;
  const W=420,H=150,PAD=8;
  const xf=i=>(i/(curve.length-1))*(W-PAD*2)+PAD;
  const yf=val=>H-24-(val/100)*(H-40);
  const path=curve.map((d,i)=>`${i?"L":"M"}${xf(i)},${yf(d.pct)}`).join("");
  const areaPath=`${path}L${xf(curve.length-1)},${H-24}L${xf(0)},${H-24}Z`;

  return`<div class="v-chart">
    <div class="v-legend">
      ${stat(now,"%","Battery")}
      ${stat(stress,"","Stress",stress>50?"hot":"good")}
    </div>
    <svg viewBox="0 0 ${W} ${H}" class="v-svg">
      <defs>
        <linearGradient id="bbFill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#7DD3C0" stop-opacity="0.26"/>
          <stop offset="100%" stop-color="#7DD3C0" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${areaPath}" fill="url(#bbFill)"/>
      <path d="${path}" class="v-line is-teal" vector-effect="non-scaling-stroke"/>
      <line x1="${PAD}" x2="${W-PAD}" y1="${H-24}" y2="${H-24}" class="v-gridline"/>
    </svg>
    <div class="v-read">Drained 36 during the 17:00 session</div>
  </div>`;
}

/* ── 08 Zones ── */
function renderZones(v){
  const zones=v.zones;
  const max=Math.max(...zones.map(z=>z.min));
  let rows='';
  zones.forEach(z=>{
    rows+=`<li>
      <span class="v-zlab">Z${z.z}</span>
      <span class="v-zname">${z.label}</span>
      <div class="v-zbar"><div style="width:${(z.min/max)*100}%;background:${z.color}"></div></div>
      <span class="v-zmin">${z.min}\u2032</span>
    </li>`;
  });
  return`<div class="v-chart">
    <ul class="v-zones">${rows}</ul>
    <div class="v-read">Time in zone \u00b7 today\u2019s session</div>
  </div>`;
}

/* ── 09 Training Ring ── */
function renderRing(v){
  const load=v.trainingLoad,range=v.trainingRange,status=v.trainingStatus;
  const vo2=v.vo2,delta=v.vo2Delta,recovery=v.recovery;
  const pct=Math.min(1,(load-range[0])/(range[1]-range[0]));
  const R=54,C=2*Math.PI*R;

  return`<div class="v-chart v-ringwrap">
    <svg viewBox="0 0 140 140" class="v-ring">
      <circle cx="70" cy="70" r="${R}" class="v-ring-t"/>
      <circle cx="70" cy="70" r="${R}" class="v-ring-p" stroke-dasharray="${C*Math.max(pct,0.02)} ${C}"/>
      <text x="70" y="66" class="v-ring-v" text-anchor="middle">${load}</text>
      <text x="70" y="84" class="v-ring-l" text-anchor="middle">LOAD</text>
    </svg>
    <div class="v-ringmeta">
      <div class="v-tag">${status}</div>
      ${stat(vo2,"","VO\u2082 max")}
      <div class="v-delta">\u25B2 ${delta} this month</div>
      ${stat(`${recovery}h`,"","Recovery")}
      <div class="v-read">Optimal range ${range[0]}\u2013${range[1]}</div>
    </div>
  </div>`;
}

/* ── init ── */
const mockData=buildMock();
render(mockData);

fetch("/api/garmin/vitals")
  .then(r=>r.ok?r.json():null)
  .then(d=>{if(d)render(d);})
  .catch(()=>{});
</script>
