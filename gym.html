<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050D0A">
<title>Gym — Sean</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#050D0A;--line:rgba(74,222,128,.10);
  --green:#4ADE80;--teal:#7DD3C0;--amber:#E8873A;--gold:#D8B24A;--violet:#9C8ADE;
  --ink:#E6F2EC;--dim:#5F786E;--dimmer:#3B4E47;
  --mono:'JetBrains Mono',monospace;--serif:'Instrument Serif',Georgia,serif;
  --w:1060px;--hc:var(--violet);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  min-height:100vh;padding:26px 20px 40px;
  background:radial-gradient(900px 460px at 50% -6%,color-mix(in srgb,var(--hc) 7%,transparent),transparent 62%),var(--bg);
  color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;
}
body.is-work{--hc:var(--green);}
body.is-prime{--hc:var(--violet);}
body.is-gold{--hc:var(--gold);}
body.is-cool{--hc:var(--teal);}
body.is-power{--hc:var(--amber);}
ul{list-style:none;padding:0;}
button{font-family:inherit;cursor:pointer;}
.mono{font:500 8px var(--mono);letter-spacing:.22em;color:var(--dim);}
.mono.is-teal{color:var(--teal);}

/* BACK LINK */
.g-back{display:inline-flex;align-items:center;gap:10px;padding:12px 20px 12px 16px;border:1px solid var(--line);border-radius:14px;background:rgba(16,36,27,.35);font:500 12px/1 var(--mono);letter-spacing:.08em;color:var(--dim);text-decoration:none;transition:all .2s;}
.g-back:hover{color:var(--green);border-color:rgba(74,222,128,.35);background:rgba(74,222,128,.06);transform:translateX(-3px);}

/* GAME WEEK TOGGLE */
.s-gw{max-width:var(--w);margin:0 auto 10px;display:flex;gap:6px;align-items:center;}
.s-gw span{font:500 8px var(--mono);letter-spacing:.18em;color:var(--dimmer);}
.s-gw button{background:none;border:1px solid var(--line);border-radius:6px;padding:7px 12px;
  font:500 8px var(--mono);letter-spacing:.12em;color:var(--dim);transition:all .2s;}
.s-gw button:hover{color:var(--ink);border-color:rgba(74,222,128,.3);}
.s-gw button.is-on{background:rgba(74,222,128,.09);color:var(--green);border-color:rgba(74,222,128,.35);}

/* DAY SELECTOR */
.s-days{max-width:var(--w);margin:0 auto 16px;display:flex;gap:3px;border:1px solid var(--line);border-radius:10px;padding:3px;background:rgba(10,23,18,.5);}
.s-days button{flex:1;background:none;border:0;padding:10px 6px;border-radius:7px;font:500 8px var(--mono);letter-spacing:.14em;color:var(--dim);transition:all .2s;}
.s-days button:hover{color:var(--ink);}
.s-days button.is-on{background:rgba(74,222,128,.09);color:var(--green);}
.s-days button .dn{display:block;font:400 7px var(--mono);color:var(--dimmer);margin-top:3px;}
.s-days button.is-on .dn{color:rgba(74,222,128,.4);}
.s-days button:focus-visible{outline:2px solid var(--green);outline-offset:2px;}

/* TOP */
.s-top{display:flex;justify-content:space-between;align-items:center;gap:24px;max-width:var(--w);margin:0 auto 18px;}
.s-top h1{font-family:var(--serif);font-size:30px;font-weight:400;}
.s-top h1 em{font-style:italic;color:var(--green);}
.s-top .sub{margin-top:7px;font:500 8px var(--mono);letter-spacing:.22em;color:var(--dim);}
.s-coach{display:flex;align-items:center;gap:11px;padding:10px 14px;border:1px solid rgba(74,222,128,.14);
  border-radius:11px;background:rgba(16,36,27,.35);max-width:430px;}
.s-coach p{font:400 11px/1.5 'Inter',sans-serif;color:var(--dim);}
.s-coach b{font:500 8px var(--mono);letter-spacing:.2em;color:var(--green);margin-right:9px;}

/* TIMELINE */
.s-line{max-width:var(--w);margin:0 auto 12px;}
.s-track{position:relative;display:flex;gap:3px;height:64px;}
.s-seg{position:relative;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.014);
  cursor:pointer;overflow:hidden;display:grid;place-items:center;transition:border-color .16s;min-width:50px;}
.s-seg.is-prime{--sc:var(--violet);} .s-seg.is-work{--sc:var(--green);}
.s-seg.is-gold{--sc:var(--gold);} .s-seg.is-cool{--sc:var(--teal);} .s-seg.is-power{--sc:var(--amber);}
.s-seg:hover{border-color:color-mix(in srgb,var(--sc) 40%,transparent);}
.s-seg.is-on{border-color:var(--sc);box-shadow:inset 0 0 24px color-mix(in srgb,var(--sc) 10%,transparent);}
.s-seg.is-done{opacity:.5;}
.s-fill{position:absolute;inset:0 auto 0 0;background:color-mix(in srgb,var(--sc) 20%,transparent);transition:width .3s;}
.s-seg-t{position:relative;text-align:center;padding:0 4px;}
.s-seg-t b{display:block;font:500 8px var(--mono);letter-spacing:.14em;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.s-seg.is-on .s-seg-t b{color:var(--sc);}
.s-seg-t em{display:block;font-style:normal;font:400 7px var(--mono);color:var(--dimmer);margin-top:5px;}
.s-head{position:absolute;top:-6px;bottom:-6px;width:1px;background:var(--ink);box-shadow:0 0 10px rgba(230,242,236,.85);transition:left .35s;pointer-events:none;}
.s-head i{position:absolute;top:-17px;left:50%;transform:translateX(-50%);font-style:normal;font:500 7px var(--mono);letter-spacing:.14em;color:var(--ink);}
.s-seg:focus-visible{outline:2px solid var(--sc);outline-offset:2px;}

/* SECTION BODY */
.s-body{max-width:var(--w);margin:0 auto 12px;border:1px solid color-mix(in srgb,var(--hc) 24%,transparent);border-left:3px solid var(--hc);
  border-radius:16px;padding:22px 24px 18px;background:linear-gradient(150deg,color-mix(in srgb,var(--hc) 5%,transparent),rgba(6,15,11,.5));}
.s-h{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;padding-bottom:18px;border-bottom:1px solid var(--line);}
.s-eye{display:flex;align-items:center;gap:11px;font:500 8px var(--mono);letter-spacing:.22em;color:var(--hc);}
.s-eye .tag{font-style:normal;color:var(--dimmer);}
.s-eye .tag.req{color:var(--amber);border:1px solid rgba(232,135,58,.35);border-radius:3px;padding:3px 6px;}
.s-h h2{font-family:var(--serif);font-weight:400;font-size:clamp(28px,3.6vw,40px);margin-top:11px;letter-spacing:-.01em;}
.s-hm{display:flex;gap:18px;font:400 9px var(--mono);color:var(--dimmer);letter-spacing:.08em;}
.s-note{font:400 11px/1.7 'Inter',sans-serif;color:var(--dim);margin-top:16px;max-width:76ch;}

.s-grp{margin-top:22px;}
.s-grp.is-locked{opacity:.94;}
.s-gl{display:flex;align-items:baseline;gap:12px;margin-bottom:8px;}
.s-gl span{font:500 8px var(--mono);letter-spacing:.24em;color:var(--ink);text-transform:uppercase;}
.s-gl em{font-style:normal;font:400 9px var(--mono);color:var(--dimmer);}
.s-gl .lock{font-style:normal;margin-left:auto;font:500 7px var(--mono);letter-spacing:.16em;color:var(--violet);
  border:1px solid rgba(156,138,222,.32);border-radius:3px;padding:3px 6px;}

.s-row{position:relative;display:grid;grid-template-columns:1fr 140px 44px 46px 80px;gap:12px;align-items:center;
  padding:10px 8px;border-top:1px solid rgba(255,255,255,.04);border-radius:8px;}
.s-row.is-next{background:color-mix(in srgb,var(--hc) 7%,transparent);}
.s-row.is-done{opacity:.4;}
.s-caret{position:absolute;left:-16px;top:50%;width:5px;height:5px;margin-top:-2px;border-radius:50%;
  background:var(--hc);box-shadow:0 0 9px var(--hc);}
.s-n{min-width:0;font:400 12px 'Inter',sans-serif;color:var(--ink);}
.s-n .cue{display:block;font:400 9px/1.5 'Inter',sans-serif;color:var(--dimmer);margin-top:3px;}
.s-p{font:400 10px var(--mono);color:var(--hc);text-align:right;}
.s-r{font:400 9px var(--mono);color:var(--dimmer);text-align:right;}
.s-t{width:46px;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:6px;padding:6px;
  color:var(--ink);font:400 11px var(--mono);text-align:center;}
.s-t:focus{outline:none;border-color:color-mix(in srgb,var(--hc) 45%,transparent);}
.s-t.is-empty{border:0;background:none;pointer-events:none;}
.s-dots{display:flex;gap:5px;justify-content:flex-end;}
.s-dot{width:18px;height:18px;border-radius:50%;border:1px solid var(--dimmer);background:none;cursor:pointer;padding:0;transition:all .15s;}
.s-dot:hover{border-color:var(--hc);}
.s-dot.is-done{background:var(--hc);border-color:var(--hc);box-shadow:0 0 8px color-mix(in srgb,var(--hc) 55%,transparent);}
.s-dot:focus-visible{outline:2px solid var(--hc);outline-offset:2px;}

/* REST */
.s-rest{max-width:var(--w);margin:0 auto 12px;border:1px solid rgba(125,211,192,.3);border-left:3px solid var(--teal);border-radius:16px;
  padding:20px 24px;background:rgba(8,26,20,.75);}
.s-rbar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;}
.s-rbar span{display:block;height:100%;background:var(--teal);box-shadow:0 0 9px var(--teal);}
.s-rb{display:flex;align-items:center;gap:24px;margin-top:18px;}
.s-rb .time{font-family:var(--serif);font-size:50px;font-weight:400;color:var(--teal);line-height:1;}
.s-rb .time small{font-style:normal;font:400 14px var(--mono);color:var(--dim);}
.s-rb .label{font:500 8px var(--mono);letter-spacing:.22em;color:var(--teal);}
.s-rb .after{font:400 10px var(--mono);color:var(--dimmer);margin-top:8px;}
.s-rb .after em{font-style:normal;color:var(--dim);}
.s-btns{margin-left:auto;display:flex;gap:8px;}
.s-btns button{background:none;border:1px solid var(--line);border-radius:8px;padding:11px 15px;
  font:500 9px var(--mono);letter-spacing:.1em;color:var(--dim);}
.s-btns button:hover{color:var(--teal);border-color:rgba(125,211,192,.3);}

/* READOUT */
.s-read{max-width:var(--w);margin:0 auto;display:flex;align-items:stretch;gap:0;
  border:1px solid var(--line);border-radius:16px;
  background:rgba(16,36,27,.18);overflow:hidden;flex-wrap:wrap;}
.s-read .fig{flex:1;min-width:110px;padding:20px 22px 18px;border-right:1px solid var(--line);
  display:flex;flex-direction:column;justify-content:center;}
.s-read .fig:last-of-type{border-right:0;}
.s-read .fig b{font-family:var(--serif);font-size:28px;font-weight:400;color:var(--dim);line-height:1;}
.s-read .fig b.teal{color:var(--teal);} .s-read .fig b.green{color:var(--green);}
.s-read .fig b small{font-style:normal;font:400 10px var(--mono);color:var(--dimmer);}
.s-read .fig span{display:block;font:500 7px var(--mono);letter-spacing:.18em;color:var(--dimmer);margin-top:8px;}
.s-read .fig.is-empty b{color:var(--dimmer);font-size:22px;}
.s-read .fig.is-empty span{color:rgba(59,78,71,.6);}

/* RPE block */
.s-rpe-wrap{padding:18px 22px;display:flex;flex-direction:column;justify-content:center;gap:10px;
  min-width:220px;flex:1.4;border-right:1px solid var(--line);}
.s-rpe-head{display:flex;align-items:baseline;gap:8px;}
.s-rpe-head b{font-family:var(--serif);font-size:28px;font-weight:400;color:var(--dim);line-height:1;}
.s-rpe-head b.has-val{color:var(--gold);}
.s-rpe-head span{font:500 7px var(--mono);letter-spacing:.18em;color:var(--dimmer);}
.s-scale{display:flex;gap:6px;}
.s-scale button{width:34px;height:34px;border-radius:50%;background:rgba(16,36,27,.6);
  border:1px solid var(--line);color:var(--dimmer);font:500 11px var(--mono);
  transition:all .15s ease;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.s-scale button:hover{border-color:rgba(216,178,74,.4);color:var(--gold);}
.s-scale button.is-on{background:rgba(216,178,74,.08);border-color:rgba(216,178,74,.25);color:var(--gold);}
.s-scale button.is-sel{background:var(--gold);border-color:var(--gold);color:#1A1204;font-weight:600;
  box-shadow:0 0 12px rgba(216,178,74,.35);}

/* Finish button cell */
.s-finish-wrap{display:flex;align-items:center;justify-content:center;padding:18px 22px;min-width:140px;}
.s-finish{background:var(--green);border:0;color:#062015;border-radius:10px;padding:14px 24px;
  font:600 10px var(--mono);letter-spacing:.14em;cursor:pointer;
  transition:all .15s ease;box-shadow:0 0 16px rgba(74,222,128,.15);}
.s-finish:hover{box-shadow:0 0 24px rgba(74,222,128,.3);}
.s-finish:disabled{opacity:.18;cursor:not-allowed;box-shadow:none;}

/* Empty state */
.s-read-empty{max-width:var(--w);margin:0 auto;border:1px solid var(--line);border-radius:16px;
  background:rgba(16,36,27,.12);padding:28px 22px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.s-read-empty .s-empty-msg{font:400 12px var(--mono);color:var(--dimmer);letter-spacing:.04em;}
.s-read-empty .s-empty-dots{display:flex;gap:4px;}
.s-read-empty .s-empty-dots i{width:5px;height:5px;border-radius:50%;background:var(--dimmer);display:block;}

/* GAME DAY MESSAGE */
.s-gameday{max-width:var(--w);margin:0 auto;border:1px solid rgba(232,135,58,.3);border-left:3px solid var(--amber);
  border-radius:16px;padding:40px 30px;background:rgba(30,20,10,.4);text-align:center;}
.s-gameday h2{font-family:var(--serif);font-size:36px;font-weight:400;color:var(--amber);margin-bottom:12px;}
.s-gameday p{font:400 13px/1.8 'Inter',sans-serif;color:var(--dim);max-width:50ch;margin:0 auto;}

@media (max-width:900px){
  .s-top{flex-direction:column;align-items:flex-start;gap:12px;}
  .s-track{height:74px;}
  .s-h{flex-direction:column;align-items:flex-start;gap:14px;}
}
@media (max-width:640px){
  body{padding:20px 14px 36px;}
  .s-days button{padding:8px 4px;font-size:7px;}
  .s-days button .dn{font-size:6px;}
  .s-track{flex-wrap:wrap;height:auto;gap:5px;}
  .s-seg{flex:1 1 45% !important;height:56px;}
  .s-head{display:none;}
  .s-row{grid-template-columns:1fr auto;gap:9px;}
  .s-p,.s-r{grid-column:1;text-align:left;}
  .s-t{grid-column:2;}
  .s-caret{left:-10px;}
  .s-rb{flex-wrap:wrap;gap:16px;}
  .s-read{gap:18px;}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body class="is-prime">


<div id="app"></div>

<script>
(function(){
'use strict';

/* ===================================================================
   FOOTBALLER-SPECIFIC GYM PROGRAMMING (TRIMMED)
   Sources: Matt Stigler, Man City/Nico Gonzalez, Huberman/Galpin,
   GOATA/Coach Gil, Hyperarch Fascia/Coach Chong Xie, 112mvmnt

   Structure: Total Body split (Stigler)
   Method: Peak set + Back-off sets for compounds (Stigler)
   Sprint on same day as lower body (neurological crossover)
   Core: Stiffness (Mon) + Speed (Wed) + Fluidity (Fri)

   TRIMMED per Stigler 60-min rule for footballers:
   Mon: 55 min | Wed: 55 min | Fri: 40 min (Sat game) / REST (Fri game)
   =================================================================== */

var SESSIONS_SAT = {

/* --- MONDAY: Lower Power + Plyos (55 min) --- */
monday: {
  name: 'Lower Power + Plyos', day: 'MONDAY', time: '08:30',
  sections: [
    {
      id:'m-prime', name:'PRIME', purpose:'Wake the feet, then the body', tone:'prime', mins:8,
      groups:[
        { label:'Groundwork', note:'GOATA - every session, barefoot', ex:[
          { id:'mp1', type:'hold', n:'Ground hip stretch', sets:2, secs:50, side:true, rest:30, cue:'Keep IABH. Head up, reach foot back.' },
          { id:'mp2', type:'hold', n:'Child rocker', sets:3, secs:60, rest:15, cue:'Toes together, heels out. As butt goes down, ankle bone climbs higher.' },
          { id:'mp3', type:'hold', n:'Toe tuck rocker', sets:3, secs:60, rest:15, cue:'Toes tucked. Heels open during the rock.' },
          { id:'mp4', type:'drill', n:'Elevated toe curls', sets:3, work:'20 sec', rest:10, cue:'Curl toes over step edge. Plantar fascia.' }
        ]},
        { label:'Ramp', ex:[
          { id:'mp5', type:'drill', n:'Empty bar squat', sets:2, work:'8 reps', rest:30, cue:'Full depth, groove the pattern.' },
          { id:'mp6', type:'drill', n:'Ramp set (60% working)', sets:1, work:'5 reps', rest:45, cue:'Building intent. Prime nervous system.' }
        ]}
      ]
    },
    {
      id:'m-plyo', name:'PLYOS', purpose:'Explosive power while nervous system is fresh', tone:'power', mins:10,
      tag:'BEFORE LIFTS', rest:60,
      note:'Stigler: High stim plyos first. Every rep = max intent. Sprint on lower body day = neurological crossover.',
      groups:[
        { label:'Plyometrics', note:'Stigler - High Stim', ex:[
          { id:'mpl1', type:'drill', n:'Box jumps (50-60cm)', sets:3, work:'5 reps', rest:60, cue:'Explode up, land soft on balls of feet. Step down.' },
          { id:'mpl2', type:'drill', n:'Broad jumps', sets:3, work:'5 reps', rest:60, cue:'Swing arms, explode forward, STICK the landing. Measure.' },
          { id:'mpl3', type:'drill', n:'Weighted lateral bounds', sets:3, work:'5 each side', rest:60, cue:'Deep ROM. Absorb force, then redirect. (Stigler: stiff players = deep range)' }
        ]},
        { label:'Sprint projections', note:'Stigler - acceleration mechanics', ex:[
          { id:'mpl4', type:'sprint', n:'Half-kneeling start', reps:3, dist:5, rest:45, cue:'Delay knee extension. Glutes drive horizontal force. Low shin angle.' },
          { id:'mpl5', type:'sprint', n:'Split stance start', reps:3, dist:10, rest:60, cue:'Positive shin angle. Punch the ground BEHIND you.' }
        ]}
      ]
    },
    {
      id:'m-strength', name:'STRENGTH', purpose:'Peak + back-off method', tone:'work', mins:25,
      tag:'MANDATORY', rest:150,
      note:'Stigler: 1 peak set near failure, then 2-3 back-off sets at 80-85%. Tempo: 3-1-1.',
      groups:[
        { label:'Main lifts', note:'Peak + Back-off', ex:[
          { id:'ms1', type:'lift', n:'Back squat \u2014 PEAK', sets:1, reps:5, load:'55kg', rest:180, cue:'1 set, near failure. Full depth. Brace core hard.' },
          { id:'ms2', type:'lift', n:'Back squat \u2014 back-off', sets:2, reps:8, load:'45kg', rest:120, cue:'80-85% of peak. Tempo 3-1-1. Quality reps.' },
          { id:'ms3', type:'lift', n:'RDL \u2014 PEAK', sets:1, reps:5, load:'50kg', rest:180, cue:'1 set, near failure. Bar slides down thighs. FLAT BACK.' },
          { id:'ms4', type:'lift', n:'RDL \u2014 back-off', sets:2, reps:8, load:'40kg', rest:120, cue:'Feel the hamstring stretch. Squeeze glutes to stand.' }
        ]},
        { label:'Accessories', ex:[
          { id:'ms5', type:'lift', n:'Pull-ups', sets:3, reps:6, load:'BW', rest:90, cue:'Full dead hang to chin over. Band assist if needed.' },
          { id:'ms6', type:'lift', n:'DB shoulder press', sets:3, reps:8, load:'14kg ea', rest:90, cue:'Full lockout overhead. Control descent.' }
        ]}
      ]
    },
    {
      id:'m-core', name:'CORE', purpose:'Stiffness \u2014 resist rotation, brace under load', tone:'gold', mins:7, rest:30,
      note:'Stigler: Core stiffness = bilateral stances + heavy/slow loads OR reactive loads.',
      groups:[
        { label:'Core stiffness', note:'Stigler method', ex:[
          { id:'mc1', type:'drill', n:'Pallof press', sets:3, work:'10 each side', rest:30, cue:'Press out, hold 2 sec. Resist rotation. BRACE.' },
          { id:'mc2', type:'drill', n:'Dead bugs', sets:3, work:'8 each side', rest:30, cue:'Lower back GLUED to floor. Slow and controlled.' }
        ]}
      ]
    },
    {
      id:'m-restore', name:'RESTORE', purpose:'Nordics + cooldown', tone:'cool', mins:5,
      groups:[
        { label:'Nordics', note:'Phase 1 - banded assisted - 21-week progression', ex:[
          { id:'mr1', type:'drill', n:'Banded nordic curls', sets:3, work:'6 reps', rest:90, cue:'3-4 sec eccentric. Band assists concentric. Reduce band over weeks.' }
        ]},
        { label:'Cool-down', ex:[
          { id:'mr2', type:'check', n:'Light jog + quad stretch', m:2 },
          { id:'mr3', type:'check', n:'Hip flexor + hamstring stretch', m:2 }
        ]}
      ]
    }
  ]
},

/* --- TUESDAY: Activation Only (pre-team training) --- */
tuesday: {
  name: 'Activation Only', day: 'TUESDAY', time: '08:30',
  sections: [
    {
      id:'t-prime', name:'PRIME', purpose:'Wake the feet, then the body', tone:'prime', mins:8,
      groups:[
        { label:'Groundwork', note:'GOATA - every session, barefoot', ex:[
          { id:'tp1', type:'hold', n:'Ground hip stretch', sets:2, secs:50, side:true, rest:30, cue:'Keep IABH.' },
          { id:'tp2', type:'hold', n:'Child rocker', sets:3, secs:60, rest:15, cue:'Head stays up.' },

// Friday becomes game day
SESSIONS_FRI.friday = {
  name: 'GAME DAY', day: 'FRIDAY', time: '\u2014',
  isGameDay: true,
  sections: []
};

/* === STATE === */

var gameWeek = localStorage.getItem('gym-gameweek') || 'sat';
function getSessions(){ return gameWeek === 'fri' ? SESSIONS_FRI : SESSIONS_SAT; }

var DAYS = ['monday','tuesday','wednesday','thursday','friday'];
var DAY_LABELS = {monday:'MON',tuesday:'TUE',wednesday:'WED',thursday:'THU',friday:'FRI'};
var DAY_NOTES_SAT = {monday:'Lower Power',tuesday:'Activation',wednesday:'Upper Power',thursday:'Activation',friday:'Speed SHORT'};
var DAY_NOTES_FRI = {monday:'Lower Power',tuesday:'Activation',wednesday:'Upper+Speed',thursday:'Activation',friday:'GAME DAY'};

var today = new Date().getDay();
var currentDay = today>=1&&today<=5 ? DAYS[today-1] : 'friday';

var log = {};
var times = {};
var rpe = null;
var openSec = null;
var restState = null;
var restTimer = null;

function getSession(){ return getSessions()[currentDay]; }
function getSections(){ return getSession().sections; }
function getQueue(){
  var q=[];
  getSections().forEach(function(s){ s.groups.forEach(function(g){ g.ex.forEach(function(e){ q.push(Object.assign({},e,{sec:s.id,group:g.label})); }); }); });
  return q;
}

function getReps(e){ return e.type==='sprint'?e.reps : e.type==='check'?1 : e.sets; }
function getDone(e){ return log[e.id]||0; }
function fmtRest(s){ return s>=60? Math.floor(s/60)+"\u2032"+(s%60||'') : s+'s'; }
function fmtPres(e){
  if(e.type==='sprint') return e.reps+' \u00D7 '+e.dist+'m';
  if(e.type==='lift') return e.sets+' \u00D7 '+e.reps+' \u00B7 '+e.load;
  if(e.type==='hold') return e.sets+' \u00D7 '+e.secs+'s'+(e.side?' ea':'');
  if(e.type==='drill') return e.sets+' \u00D7 '+e.work;
  return e.m+' min';
}

function getNext(){
  var q=getQueue();
  for(var i=0;i<q.length;i++){ if(getDone(q[i])<getReps(q[i])) return q[i]; }
  return null;
}
function getActiveSection(){
  var secs = getSections();
  if(openSec){ var f=secs.find(function(s){return s.id===openSec;}); if(f) return f; }
  var n=getNext();
  if(n) return secs.find(function(s){return s.id===n.sec;});
  return secs[secs.length-1];
}
function sectionDone(s){ return s.groups.reduce(function(a,g){return a+g.ex.reduce(function(b,e){return b+getDone(e);},0);},0); }
function sectionTotal(s){ return s.groups.reduce(function(a,g){return a+g.ex.reduce(function(b,e){return b+getReps(e);},0);},0); }
function getTotalMins(){ return getSections().reduce(function(a,s){return a+s.mins;},0); }
function getPlayed(){ return getSections().reduce(function(a,s){var t=sectionTotal(s);return a+s.mins*(t?sectionDone(s)/t:0);},0); }

function tick(e, n){
  var prev = getDone(e);
  log[e.id] = n;
  openSec = null;
  if(n > prev && e.rest){
    restState = { endsAt: Date.now()+e.rest*1000, total:e.rest, from:e.n, sec:e.sec };
    startRestTimer();
  }
  render();
}

function startRestTimer(){
  clearInterval(restTimer);
  restTimer = setInterval(function(){
    if(!restState){ clearInterval(restTimer); return; }
    var left = Math.max(0, Math.round((restState.endsAt - Date.now())/1000));
    if(left<=0){ restState=null; clearInterval(restTimer); }
    render();
  }, 250);
}

function switchDay(day){
  currentDay = day;
  log = {};
  times = {};
  rpe = null;
  openSec = null;
  restState = null;
  clearInterval(restTimer);
  render();
}

function toggleGameWeek(gw){
  gameWeek = gw;
  localStorage.setItem('gym-gameweek', gw);
  log = {};
  times = {};
  rpe = null;
  openSec = null;
  restState = null;
  clearInterval(restTimer);
  render();
}

/* === RENDER === */

function render(){
  var sess = getSession();
  var dayNotes = gameWeek === 'fri' ? DAY_NOTES_FRI : DAY_NOTES_SAT;
  var html = '';


  // DAY SELECTOR
  html += '<nav class="s-days" role="tablist">';
  DAYS.forEach(function(d){
    html += '<button role="tab" class="'+(d===currentDay?'is-on':'')+'" data-day="'+d+'" aria-selected="'+(d===currentDay)+'">';
    html += DAY_LABELS[d]+'<span class="dn">'+dayNotes[d]+'</span></button>';
  });
  html += '</nav>';

  // GAME DAY MESSAGE
  if(sess.isGameDay){
    document.body.className = 'is-power';
    html += '<header class="s-top"><div>';
    html += '<h1>Gym, <em>Sean</em></h1>';
    html += '<p class="sub">GAME DAY \u00B7 '+sess.day+'</p>';
    html += '</div></header>';
    html += '<section class="s-gameday">';
    html += '<h2>Game Day</h2>';
    html += '<p>No gym today. All energy goes to the game.<br><br>';
    html += 'See <strong>Soccer \u2192 Game Day</strong> tab for your 20-min change room protocol + team warm-up.<br><br>';
    html += 'Speed work was moved to Wednesday this week.</p>';
    html += '</section>';
    document.getElementById('app').innerHTML = html;
    bindEvents();
    return;
  }

  var secs = getSections();
  var S = getActiveSection();
  var next = getNext();
  var QUEUE = getQueue();
  var TOTAL = getTotalMins();

  document.body.className = 'is-'+S.tone;

  var totalDone = QUEUE.reduce(function(a,e){return a+getDone(e);},0);
  var totalReps = QUEUE.reduce(function(a,e){return a+getReps(e);},0);
  var sprints = QUEUE.filter(function(e){return e.type==='sprint';});
  var lifts = QUEUE.filter(function(e){return e.type==='lift';});
  var metres = sprints.reduce(function(a,e){return a+getDone(e)*e.dist;},0);
  var velocities = sprints.map(function(e){var t=parseFloat(times[e.id]);return t>0?e.dist/t:null;}).filter(function(v){return v!==null;});
  var vMax = velocities.length? Math.max.apply(null,velocities) : null;
  var elapsed = TOTAL;
  var load = rpe? rpe*elapsed : null;

  // HEADER
  html += '<header class="s-top"><div>';
  html += '<h1>Gym, <em>Sean</em></h1>';
  html += '<p class="sub">'+sess.name.toUpperCase()+' \u00B7 '+sess.day+' '+sess.time+' \u00B7 '+TOTAL+' MIN</p>';
  html += '</div>';
  html += '<div class="s-coach">';
  html += '<svg viewBox="0 0 64 64" width="26" height="26" aria-hidden="true"><rect x="6" y="6" width="52" height="52" rx="16" fill="rgba(74,222,128,.05)" stroke="rgba(74,222,128,.24)"/><path d="M24 20 V44 M40 20 L26 32 L41 44" fill="none" stroke="#4ADE80" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  var coachMsg = {
    monday:'Sprint on lower body day = neurological crossover. Peak set then back-offs. 55 min. Earn the weight.',
    tuesday:'Save your energy for team training tonight. Light and quick.',
    wednesday: gameWeek==='fri' ? 'Speed absorbed into today. Athletic upper + explosiveness + acceleration. No gym Friday.' : 'Athletic upper body. Impulse training, rotation rows, speed transition. Not bodybuilding.',
    thursday: gameWeek==='fri' ? 'Game TOMORROW. Light activation, stay fresh.' : 'Save your energy for team training tonight. Light and quick.',
    friday:'Keep it SHORT. 40 min. Game tomorrow. Full recovery between reps. When times drop, stop.'
  };
  html += '<p><b>KHABIB</b>'+coachMsg[currentDay]+'</p>';
  html += '</div></header>';

  // TIMELINE
  html += '<nav class="s-line" aria-label="Session timeline"><div class="s-track">';
  var played = getPlayed();
  secs.forEach(function(s){
    var t = sectionTotal(s);
    var p = t? sectionDone(s)/t : 0;
    var cls = 's-seg is-'+s.tone;
    if(s.id===S.id) cls += ' is-on';
    if(p===1) cls += ' is-done';
    html += '<button class="'+cls+'" style="flex:'+s.mins+'" data-sec="'+s.id+'" aria-pressed="'+(s.id===S.id)+'">';
    html += '<span class="s-fill" style="width:'+Math.round(p*100)+'%"></span>';
    html += '<span class="s-seg-t"><b>'+s.name+'</b><em>'+s.mins+'\u2032 \u00B7 '+sectionDone(s)+'/'+t+'</em></span>';
    html += '</button>';
  });
  html += '<span class="s-head" style="left:'+((played/TOTAL)*100).toFixed(1)+'%"><i>'+Math.round(played)+'\u2032</i></span>';
  html += '</div></nav>';

  // REST or SECTION
  if(restState){
    var left = Math.max(0, Math.round((restState.endsAt - Date.now())/1000));
    var pct = restState.total? Math.round((left/restState.total)*100) : 0;
    var isHard = restState.sec && (restState.sec.indexOf('speed')>=0 || restState.sec.indexOf('agility')>=0 || restState.sec.indexOf('plyo')>=0);
    var rlabel = isHard? 'RECOVER FULLY' : 'RESTING';
    html += '<section class="s-rest">';
    html += '<div class="s-rbar"><span style="width:'+pct+'%"></span></div>';
    html += '<div class="s-rb">';
    html += '<span class="time">'+left+'<small>s</small></span>';
    html += '<div><p class="mono is-teal">'+rlabel+'</p>';
    html += '<p class="after">after '+restState.from+' \u00B7 then <em>'+(next?next.n:'session end')+'</em></p></div>';
    html += '<div class="s-btns"><button data-rest-add>+30s</button><button data-rest-skip>Skip</button></div>';
    html += '</div></section>';
  } else {
    html += '<section class="s-body">';
    html += '<header class="s-h"><div>';
    html += '<p class="s-eye">'+S.purpose.toUpperCase();
    if(S.tag){
      html += '<span class="tag'+(S.tag==='MANDATORY'?' req':'')+'">'+S.tag+'</span>';
    }
    html += '</p>';
    html += '<h2>'+S.name+'</h2>';
    html += '</div>';
    html += '<div class="s-hm"><span>'+S.mins+'\u2032</span>';
    if(S.rest) html += '<span>'+fmtRest(S.rest)+' between sets</span>';
    html += '<span>'+sectionDone(S)+'/'+sectionTotal(S)+' reps</span></div>';
    html += '</header>';
    if(S.note) html += '<p class="s-note">'+S.note+'</p>';

    S.groups.forEach(function(g){
      html += '<div class="s-grp'+(g.locked?' is-locked':'')+'">';
      html += '<p class="s-gl"><span>'+g.label+'</span>';
      if(g.note) html += '<em>'+g.note+'</em>';
      if(g.locked) html += '<span class="lock">NOT KHABIB\'S</span>';
      html += '</p><ul class="s-ex">';

      g.ex.forEach(function(e){
        var d = getDone(e), t = getReps(e);
        var isNext = next && e.id===next.id;
        var cls = 's-row';
        if(isNext) cls += ' is-next';
        if(d>=t) cls += ' is-done';
        html += '<li class="'+cls+'">';
        if(isNext) html += '<span class="s-caret" aria-hidden="true"></span>';
        html += '<span class="s-n">'+e.n+(e.cue?'<span class="cue">'+e.cue+'</span>':'')+'</span>';
        html += '<span class="s-p">'+fmtPres(e)+'</span>';
        html += '<span class="s-r">'+(e.rest?fmtRest(e.rest):'\u2014')+'</span>';
        if(e.type==='sprint'){
          html += '<input class="s-t" data-time="'+e.id+'" value="'+(times[e.id]||'')+'" placeholder="\u2014" inputmode="decimal" aria-label="Time, '+e.n+'">';
        } else {
          html += '<span class="s-t is-empty"></span>';
        }
        html += '<span class="s-dots">';
        for(var i=0;i<t;i++){
          html += '<button class="s-dot'+(i<d?' is-done':'')+'" data-tick="'+e.id+'" data-n="'+i+'" aria-label="Rep '+(i+1)+' of '+t+'" aria-pressed="'+(i<d)+'"></button>';
        }
        html += '</span></li>';
      });
      html += '</ul></div>';
    });
    html += '</section>';
  }

  // READOUT
  var hasWork = totalDone > 0;
  if(!hasWork){
    // Empty state — clean placeholder
    html += '<section class="s-read-empty">';
    html += '<span class="s-empty-dots"><i></i><i></i><i></i></span>';
    html += '<span class="s-empty-msg">Complete reps to see session stats</span>';
    html += '</section>';
  } else {
    html += '<section class="s-read">';
    html += '<div class="fig"><b>'+totalDone+'<small>/'+totalReps+'</small></b><span>REPS</span></div>';
    if(sprints.length>0){
      html += '<div class="fig"><b class="teal">'+metres+'<small>m</small></b><span>\u03A3 METRES</span></div>';
      html += '<div class="fig"><b class="green">'+(vMax?vMax.toFixed(2):'\u2014')+'<small>m/s</small></b><span>PEAK v</span></div>';
    } else {
      var setsLogged = lifts.reduce(function(a,e){return a+getDone(e);},0);
      var setsTotal = lifts.reduce(function(a,e){return a+getReps(e);},0);
      html += '<div class="fig"><b class="teal">'+setsLogged+'<small>/'+setsTotal+'</small></b><span>LIFT SETS</span></div>';
      html += '<div class="fig"><b class="green">'+elapsed+'<small>min</small></b><span>DURATION</span></div>';
    }
    // RPE scale
    html += '<div class="s-rpe-wrap">';
    html += '<div class="s-rpe-head"><b'+(load?' class="has-val"':'')+'>'+( load!==null?load:'\u2014')+'</b>';
    html += '<span>RPE \u00D7 '+elapsed+' MIN</span></div>';
    html += '<div class="s-scale">';
    [4,5,6,7,8,9,10].forEach(function(r){
      var cls = '';
      if(rpe===r) cls='is-sel'; else if(rpe && r<rpe) cls='is-on';
      html += '<button class="'+cls+'" data-rpe="'+r+'">'+r+'</button>';
    });
    html += '</div></div>';
    // Finish button
    html += '<div class="s-finish-wrap">';
    html += '<button class="s-finish" '+((!rpe||!totalDone)?'disabled':'')+' data-finish>'+(rpe?'FINISH SESSION':'SELECT RPE')+'</button>';
    html += '</div>';
    html += '</section>';
  }

  document.getElementById('app').innerHTML = html;
  bindEvents();
}

/* === EVENTS === */

function bindEvents(){
  document.querySelectorAll('[data-gw]').forEach(function(btn){
    btn.onclick = function(){ toggleGameWeek(this.getAttribute('data-gw')); };
  });
  document.querySelectorAll('[data-day]').forEach(function(btn){
    btn.onclick = function(){ switchDay(this.getAttribute('data-day')); };
  });
  document.querySelectorAll('[data-sec]').forEach(function(btn){
    btn.onclick = function(){ openSec = this.getAttribute('data-sec'); render(); };
  });
  document.querySelectorAll('[data-tick]').forEach(function(btn){
    btn.onclick = function(){
      var id = this.getAttribute('data-tick');
      var n = parseInt(this.getAttribute('data-n'),10);
      var q = getQueue();
      var e = q.find(function(x){return x.id===id;});
      if(!e) return;
      var d = getDone(e);
      tick(e, (n+1===d)? n : n+1);
    };
  });
  document.querySelectorAll('[data-time]').forEach(function(inp){
    inp.oninput = function(){ times[this.getAttribute('data-time')] = this.value; };
    inp.onblur = function(){ render(); };
  });
  document.querySelectorAll('[data-rpe]').forEach(function(btn){
    btn.onclick = function(){ rpe = parseInt(this.getAttribute('data-rpe'),10); render(); };
  });
  var addBtn = document.querySelector('[data-rest-add]');
  if(addBtn) addBtn.onclick = function(){
    if(restState){ restState.endsAt += 30000; restState.total += 30; }
  };
  var skipBtn = document.querySelector('[data-rest-skip]');
  if(skipBtn) skipBtn.onclick = function(){ restState=null; clearInterval(restTimer); render(); };
  var fin = document.querySelector('[data-finish]');
  if(fin) fin.onclick = function(){
    if(!rpe) return;
    alert('Session logged. RPE: '+rpe+' | Load: '+(rpe*getTotalMins())+' | Day: '+currentDay.toUpperCase());
  };
}

/* === INIT === */
render();

})();
</script>
</body>
</html>
