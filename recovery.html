<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050D0A">
<title>Recovery — Sean</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050D0A;--line:rgba(74,222,128,.10);
  --green:#4ADE80;--teal:#7DD3C0;--amber:#E8873A;--gold:#D8B24A;--red:#F05A3A;
  --ink:#E6F2EC;--dim:#5F786E;--dimmer:#3B4E47;
  --mono:'JetBrains Mono',monospace;--serif:'Instrument Serif',Georgia,serif;
  --w:1000px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  min-height:100vh;padding:40px 24px 64px;
  background:radial-gradient(1000px 500px at 50% -10%,#0D2419 0%,transparent 60%),var(--bg);
  color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;
}
ol,ul{list-style:none;}
button,a{font-family:inherit;}

.r-top{max-width:var(--w);margin:0 auto 20px;}
.r-back{font:500 11px/1 var(--mono);letter-spacing:.14em;color:var(--dim);text-decoration:none;}
.r-back:hover{color:var(--green);}
.r-title{font-family:var(--serif);font-size:clamp(32px,4.6vw,52px);font-weight:400;font-style:italic;margin:14px 0 10px;}
.r-title em{color:var(--green);}
.r-meta{display:flex;align-items:center;flex-wrap:wrap;font:500 9px var(--mono);letter-spacing:.2em;color:var(--dimmer);}
.r-meta i{width:3px;height:3px;border-radius:50%;background:currentColor;margin:0 12px;opacity:.5;}

.r-coach{display:flex;gap:16px;max-width:var(--w);margin:0 auto 22px;padding:16px 20px;
  border-left:2px solid rgba(74,222,128,.4);border-radius:0 12px 12px 0;background:rgba(16,36,27,.35);}
.r-av{width:36px;height:36px;flex:none;border-radius:10px;border:1px solid rgba(74,222,128,.3);
  display:grid;place-items:center;background:rgba(74,222,128,.06);}
.r-av span{font-family:var(--serif);font-size:18px;color:var(--green);}
.r-cname{font:500 9px var(--mono);letter-spacing:.2em;color:var(--green);}
.r-cname em{font-style:normal;color:var(--dimmer);letter-spacing:.1em;}
.r-clead{font:400 13px/1.65 'Inter',sans-serif;color:var(--ink);opacity:.88;margin-top:7px;max-width:78ch;}
.r-clead.is-hot{color:var(--amber);opacity:1;}

.r-block{max-width:var(--w);margin:0 auto 20px;padding:24px 26px;border:1px solid var(--line);border-radius:18px;
  background:rgba(16,36,27,.3);}
.r-bh{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;margin-bottom:24px;}
.r-eyebrow{font:500 9px var(--mono);letter-spacing:.24em;color:var(--dim);}
.r-bh h2,.r-libh h2{font-family:var(--serif);font-weight:400;font-size:26px;margin-top:10px;}
.r-bh em,.r-libh em{font-style:italic;color:var(--green);}
.r-gate{text-align:right;}
.r-gate b{display:block;font-family:var(--serif);font-size:30px;font-weight:400;color:var(--teal);line-height:1;}
.r-gate span{display:block;font:500 8px var(--mono);letter-spacing:.2em;color:var(--dimmer);margin-top:7px;}

.r-win li{position:relative;display:flex;gap:18px;padding:16px 0;border-top:1px solid rgba(255,255,255,.04);}
.r-win li:first-child{border-top:0;}
.r-win li.is-past{opacity:.42;}
.r-win li.is-now .r-bead{background:var(--green);border-color:var(--green);box-shadow:0 0 0 4px rgba(74,222,128,.14);}
.r-win li.is-past .r-bead{background:var(--dim);border-color:var(--dim);}
.r-win li.is-locked .r-bead{border-color:var(--amber);}
.r-bead{width:9px;height:9px;border-radius:50%;border:1px solid var(--dimmer);background:var(--bg);flex:none;margin-top:6px;}
.r-wt{width:150px;flex:none;}
.r-wtime{display:block;font:400 15px var(--mono);color:var(--ink);}
.r-win li.is-now .r-wtime{color:var(--green);}
.r-wlab{display:block;font:500 8px var(--mono);letter-spacing:.2em;color:var(--dimmer);margin-top:6px;text-transform:uppercase;}
.r-wc{flex:1;min-width:0;}
.r-wn{font:400 10px/1.7 var(--mono);color:var(--dim);letter-spacing:.03em;margin-top:11px;}
.r-wn.is-hot{color:var(--amber);}

.r-chips{display:flex;gap:7px;flex-wrap:wrap;}
.r-chips button{display:flex;align-items:center;gap:8px;background:none;border:1px solid var(--line);
  border-radius:20px;padding:9px 14px;cursor:pointer;font:400 11px 'Inter',sans-serif;color:var(--dim);transition:all .15s;}
.r-chips button i{width:6px;height:6px;border-radius:50%;background:var(--tc,var(--green));flex:none;}
.r-chips button:hover:not(:disabled){color:var(--ink);border-color:color-mix(in srgb,var(--tc,var(--green)) 45%,transparent);}
.r-chips button:disabled{opacity:.28;cursor:not-allowed;text-decoration:line-through;}
.r-chips button:focus-visible{outline:2px solid var(--tc,var(--green));outline-offset:2px;}

/* runner */
.r-runner{display:flex;align-items:center;gap:22px;max-width:var(--w);margin:0 auto 20px;padding:18px 24px;
  border:1px solid color-mix(in srgb,var(--tc,var(--green)) 35%,transparent);border-radius:16px;background:rgba(8,26,20,.92);}
.r-ring{width:74px;flex:none;transform:rotate(-90deg);}
.r-ring-t{fill:none;stroke:rgba(255,255,255,.06);stroke-width:5;}
.r-ring-p{fill:none;stroke:var(--tc,var(--green));stroke-width:5;stroke-linecap:round;}
.r-rt{flex:1;}
.r-rt b{display:block;font-family:var(--serif);font-size:38px;font-weight:400;line-height:1;color:var(--tc,var(--green));}
.r-rt span{display:block;font:500 9px var(--mono);letter-spacing:.16em;color:var(--dim);margin-top:9px;}
.r-rb{display:flex;gap:8px;}
.r-go{background:var(--tc,var(--green));border:0;color:#08150F;border-radius:9px;padding:13px 20px;cursor:pointer;
  font:500 10px var(--mono);letter-spacing:.14em;}
.r-go:hover{filter:brightness(1.1);}
.r-ghost{background:none;border:1px solid var(--line);border-radius:9px;padding:13px 16px;cursor:pointer;
  font:500 9px var(--mono);letter-spacing:.12em;color:var(--dim);}
.r-ghost:hover{color:var(--ink);border-color:rgba(255,255,255,.2);}

/* body map */
.r-hero{display:grid;grid-template-columns:280px 1fr;gap:30px;}
.r-figs{display:flex;flex-direction:column;align-items:center;gap:14px;}
.r-toggle{display:flex;gap:2px;border:1px solid var(--line);border-radius:8px;padding:3px;}
.r-toggle button{background:none;border:0;cursor:pointer;padding:8px 16px;border-radius:6px;
  font:500 8px var(--mono);letter-spacing:.2em;color:var(--dim);}
.r-toggle button.is-on{background:rgba(74,222,128,.09);color:var(--green);}
.r-fig svg{width:180px;height:auto;display:block;}
.r-figlab{text-align:center;font:500 8px var(--mono);letter-spacing:.24em;color:var(--dimmer);margin-top:6px;}
.r-body *{fill:rgba(255,255,255,.028);stroke:rgba(74,222,128,.16);stroke-width:.8;}
.r-reg{cursor:pointer;}
.r-reg circle{fill-opacity:.16;stroke-width:1.1;stroke-opacity:.5;transition:fill-opacity .2s,stroke-opacity .2s;}
.r-reg:hover circle{fill-opacity:.3;stroke-opacity:.9;}
.r-reg.is-sore circle{fill-opacity:.34;stroke-opacity:.8;}
.r-reg.is-sel circle{fill-opacity:.5;stroke-opacity:1;stroke-width:1.6;}

.r-side{display:flex;flex-direction:column;}
.r-rn{font-family:var(--serif);font-weight:400;font-size:clamp(26px,3.4vw,36px);margin-top:11px;}
.r-lab{font:500 8px var(--mono);letter-spacing:.24em;color:var(--dimmer);margin:24px 0 11px;}
.r-scale{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;}
.r-scale button{flex:1;padding:12px 6px;background:none;border:0;border-right:1px solid var(--line);cursor:pointer;
  color:var(--dim);font:400 11px 'Inter',sans-serif;transition:all .12s;}
.r-scale button:last-child{border-right:0;}
.r-scale button:hover{color:var(--ink);}
.r-scale button.is-sel{font-weight:500;}

/* report */
.r-rep{width:100%;border-collapse:collapse;}
.r-rep th{font:500 8px var(--mono);letter-spacing:.18em;color:var(--dimmer);text-align:center;padding-bottom:12px;}
.r-rep th:first-child{text-align:left;}
.r-rep th:last-child{text-align:right;}
.r-rep tr{cursor:pointer;transition:background .15s;}
.r-rep tbody tr:hover{background:rgba(74,222,128,.03);}
.r-rep tbody tr.is-sel{background:rgba(74,222,128,.06);}
.r-rep td{padding:9px 0;border-top:1px solid rgba(255,255,255,.04);text-align:center;}
.r-rname{text-align:left!important;font:400 12px 'Inter',sans-serif;color:var(--ink);padding-left:2px!important;}
.r-cell{display:inline-block;width:24px;height:11px;border-radius:3px;}
.r-flag{text-align:right!important;white-space:nowrap;}
.r-flag b{font:400 12px var(--mono);color:var(--dim);}
.r-flag b.is-hot{color:var(--amber);}
.r-flag b em{font-style:normal;color:var(--dimmer);}
.r-flag i{font-style:normal;font-size:8px;color:var(--dimmer);margin-left:9px;}
.r-flag i.is-hot{color:var(--amber);}
.r-flag i.is-good{color:var(--green);}
.r-insight{font:400 12px/1.75 'Inter',sans-serif;color:var(--dim);margin-top:20px;padding-left:14px;
  border-left:2px solid rgba(232,135,58,.4);max-width:74ch;}
.r-insight b{color:var(--ink);font-weight:400;}


.r-brain{display:flex;gap:14px;align-items:baseline;max-width:var(--w);margin:0 auto 18px;padding:12px 18px;
  border-radius:10px;background:rgba(74,222,128,.04);border:1px solid rgba(74,222,128,.08);}
.r-btag{font:500 8px var(--mono);letter-spacing:.2em;color:var(--green);white-space:nowrap;}
.r-btip{font:400 11px/1.6 'Inter',sans-serif;color:var(--dim);}

.r-foot{display:flex;justify-content:space-between;max-width:var(--w);margin:44px auto 0;padding-top:18px;
  border-top:1px solid var(--line);font:400 9px var(--mono);letter-spacing:.18em;color:var(--dimmer);}

/* work schedule */
.r-work{max-width:var(--w);margin:0 auto 16px;display:flex;align-items:center;gap:14px;padding:12px 18px;
  border:1px solid rgba(232,135,58,.18);border-radius:12px;background:rgba(30,20,10,.25);}
.r-work-tag{font:500 8px var(--mono);letter-spacing:.2em;color:var(--amber);white-space:nowrap;}
.r-work-body{flex:1;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.r-work-body span{font:400 11px 'Inter',sans-serif;color:var(--dim);}
.r-work-input{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:6px;padding:6px 8px;
  color:var(--ink);font:400 12px var(--mono);width:56px;text-align:center;}
.r-work-input:focus{outline:none;border-color:rgba(232,135,58,.4);}
.r-work-btn{background:none;border:1px solid var(--line);border-radius:6px;padding:6px 12px;cursor:pointer;
  font:500 8px var(--mono);letter-spacing:.1em;color:var(--dim);transition:all .12s;}
.r-work-btn:hover{color:var(--amber);border-color:rgba(232,135,58,.3);}
.r-work-btn.is-on{background:rgba(232,135,58,.1);border-color:rgba(232,135,58,.3);color:var(--amber);}
.r-work-blocked{padding:12px 16px;border:1px solid rgba(232,135,58,.25);border-left:3px solid var(--amber);
  border-radius:0 12px 12px 0;background:rgba(30,20,10,.3);margin-top:4px;}
.r-work-blocked p{font:400 10px/1.6 var(--mono);color:var(--amber);letter-spacing:.04em;}

/* protocols */
.r-proto{max-width:var(--w);margin:0 auto 20px;}
.r-pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px;margin-top:16px;}
.r-pc{border:1px solid var(--line);border-radius:14px;padding:16px 18px;cursor:pointer;transition:all .15s;background:rgba(16,36,27,.25);}
.r-pc:hover{border-color:rgba(74,222,128,.2);background:rgba(16,36,27,.45);}
.r-pc.is-on{border-color:color-mix(in srgb,var(--pc,var(--green)) 40%,transparent);border-left:3px solid var(--pc,var(--green));
  background:linear-gradient(150deg,color-mix(in srgb,var(--pc,var(--green)) 5%,transparent),rgba(6,15,11,.5));}
.r-pc-tag{font:500 7px var(--mono);letter-spacing:.22em;color:var(--pc,var(--green));}
.r-pc-n{font-family:var(--serif);font-weight:400;font-size:18px;margin:6px 0 3px;}
.r-pc-m{font:400 9px var(--mono);color:var(--dimmer);letter-spacing:.06em;}
.r-pc-why{font:400 10px/1.5 'Inter',sans-serif;color:var(--dim);margin-top:8px;display:none;}
.r-pc.is-on .r-pc-why{display:block;}
.r-steps{margin-top:12px;display:none;}
.r-pc.is-on .r-steps{display:block;}
.r-step{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-top:1px solid rgba(255,255,255,.04);}
.r-step:first-child{border-top:0;}
.r-step-i{width:20px;height:20px;border-radius:50%;border:1px solid var(--dimmer);display:grid;place-items:center;
  font:400 8px var(--mono);color:var(--dimmer);flex:none;margin-top:2px;cursor:pointer;transition:all .12s;}
.r-step-i:hover{border-color:var(--pc,var(--green));}
.r-step.is-done .r-step-i{background:rgba(74,222,128,.15);border-color:var(--green);color:var(--green);}
.r-step.is-done .r-step-n{opacity:.5;text-decoration:line-through;}
.r-step-c{flex:1;min-width:0;}
.r-step-n{font:400 11px 'Inter',sans-serif;color:var(--ink);}
.r-step-cue{font:400 9px/1.5 'Inter',sans-serif;color:var(--dimmer);margin-top:3px;}
.r-step-t{font:500 9px var(--mono);color:var(--pc,var(--green));flex:none;margin-top:3px;}

/* routine card */
.r-routine{margin-top:16px;padding:14px 16px;border:1px solid rgba(156,138,222,.2);border-radius:12px;
  background:rgba(156,138,222,.03);}
.r-routine-h{font:500 8px var(--mono);letter-spacing:.2em;color:#9C8ADE;margin-bottom:8px;}
.r-routine-t{font:400 11px/1.7 'Inter',sans-serif;color:var(--dim);}

@media(max-width:840px){
  .r-hero{grid-template-columns:1fr;gap:26px;}
  .r-figs{order:-1;}
  .r-wt{width:112px;}
}
@media(max-width:680px){
  body{padding:24px 16px 48px;}
  .r-block{padding:20px 18px;}
  .r-coach{flex-direction:column;gap:12px;}
  .r-runner{flex-direction:column;align-items:flex-start;gap:16px;}
  .r-win li{flex-wrap:wrap;}
  .r-wt{width:auto;flex:1;display:flex;gap:12px;align-items:baseline;}
  .r-wlab{margin-top:0;}
  .r-wc{flex-basis:100%;padding-left:27px;}
  .r-scale{flex-wrap:wrap;}.r-scale button{flex:1 1 44%;}
  .r-cell{width:14px;}
  .r-foot{flex-direction:column;gap:8px;}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
'use strict';

/* ═══ time helpers ═══════════════════════════════════════════════ */
function getMelb(){ return new Date(new Date().toLocaleString('en-US',{timeZone:'Australia/Melbourne'})); }
function getNow(){ var d=getMelb(); return d.getHours()*60+d.getMinutes(); }
function hhmm(m){ return String(Math.floor(m/60)%24).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }
function dur(m){ if(m<0)m=0; if(m>=60){var h=Math.floor(m/60),r=m%60;return h+'h'+(r?' '+r+'m':'');} return m+'m'; }
function esc(s){ var d=document.createElement('div');d.textContent=s;return d.innerHTML; }

/* ═══ session (localStorage-backed) ═════════════════════════════ */
var SESSION_KEY = 'recovery-session';
function loadSession(){
  try{ var r=JSON.parse(localStorage.getItem(SESSION_KEY)); if(r&&r.end) return r; }catch(e){}
  return { name:'No session logged', type:'rest', end:0 };
}
function saveSession(s){ localStorage.setItem(SESSION_KEY, JSON.stringify(s)); }

var SESSION = loadSession();
var _melb = new Date(new Date().toLocaleString('en-US',{timeZone:'Australia/Melbourne'}));
var _melbDay = _melb.getDay(); // 0=Sun, 6=Sat
var MATCH_IN = _melbDay === 6 ? 0 : (6 - _melbDay + 7) % 7;
var BED = 22*60+30;
var COLD_GATE = 4*60;

/* ═══ protocols ══════════════════════════════════════════════════ */
var TOOLS = {
  sauna:    {n:'Sauna',tag:'HEAT',c:'#E8873A',weekly:3,spec:'80-100 C . 15 min . 2 min cool between',rounds:[{p:'HEAT',s:900},{p:'COOL',s:120}],sets:4,why:'Heat adaptation raises plasma volume. Real, but slow.',care:'Hydrate. Leave if you feel faint. Not within 90 minutes of bed.'},
  ice:      {n:'Ice bath',tag:'COLD',c:'#7DD3C0',weekly:2,spec:'10-15 C . 10-15 min . to the sternum',rounds:[{p:'IMMERSE',s:720}],sets:1,why:'Blunts soreness. Best after matches and hard conditioning.',care:'Never within 4 hours of strength work. Shivering hard means get out.'},
  contrast: {n:'Contrast',tag:'HOT / COLD',c:'#D8B24A',weekly:2,spec:'3 min hot / 1 min cold x 4 . finish cold',rounds:[{p:'HOT',s:180},{p:'COLD',s:60}],sets:4,why:'Gentler than full immersion. Mostly makes you feel better.',care:'Finish cold. Not the night before a match.'},
  gun:      {n:'Massage gun',tag:'PERCUSSION',c:'#4ADE80',weekly:5,spec:'60-90 s per area . light pressure . slow glide',rounds:[{p:'WORK',s:75}],sets:3,why:'Short-term range of motion without the strength cost of static stretching.',care:'Never on bone, joints, the front of the neck, or nerve lines.'},
  roll:     {n:'Foam roll',tag:'MYOFASCIAL',c:'#4ADE80',weekly:5,spec:'60-90 s per area . slow . breathe out on tender spot',rounds:[{p:'ROLL',s:90}],sets:2,why:'Range without losing force. The effect fades in an hour.',care:'Slow. Speed is how people convince themselves they\'ve done something.'},
  ball:     {n:'Spikey ball',tag:'TARGETED',c:'#7DD3C0',weekly:4,spec:'90 s per point . sustained, not rolling',rounds:[{p:'SUSTAIN',s:90}],sets:2,why:'Reaches what a roller can\'t.',care:'Stay off the ITB, the spine itself, and the back of the knee.'},
  press:    {n:'Pressure points',tag:'ISCHAEMIC',c:'#D8B24A',weekly:3,spec:'30-45 s sustained . 6/10 discomfort . breathe',rounds:[{p:'HOLD',s:40}],sets:3,why:'Hold a tender point until it softens.',care:'6 out of 10, not 9. Pain you hold your breath through teaches you to brace.'},
  walk:     {n:'Walk & rehydrate',tag:'IMMEDIATE',c:'#5F786E',weekly:7,spec:'5-10 min . nasal breathing . 500ml + electrolytes',rounds:[{p:'WALK',s:420}],sets:1,why:'The only thing worth doing in the first fifteen minutes.',care:'Nothing to get wrong here. Do it anyway.'},
  lymph:    {n:'Lymph drain',tag:'DRAINAGE',c:'#7DD3C0',weekly:7,spec:'5 min belly breathing + 15 min nasal walk',rounds:[{p:'BREATHE',s:300},{p:'WALK',s:900}],sets:1,why:'Lymph has no pump. Breathing creates pressure differential. Walking generates the contractions.',care:'Belly extends on inhale. Nasal breathing only. 7000+ steps/day target.'},
  fascia:   {n:'Fascia work',tag:'REMODEL',c:'#9C8ADE',weekly:3,spec:'Toe curls + marble swing + gait cycles . 18 min',rounds:[{p:'TOE CURLS',s:60},{p:'MARBLE R',s:30},{p:'REST',s:15},{p:'MARBLE L',s:30},{p:'REST',s:15},{p:'GAIT',s:180},{p:'TILTS',s:180}],sets:1,why:'Fascia remodels over 12 weeks. Starts at the feet, connects to glutes.',care:'3x/week. Toe curls daily. 12-week commitment minimum.'},
  breath:   {n:'Physio sigh',tag:'PARASYMPATHETIC',c:'#D8B24A',weekly:7,spec:'Double inhale nose + long exhale mouth . 3 rounds',rounds:[{p:'SIGH',s:15}],sets:3,why:'Fastest real-time calm-down. Doubles as stress inoculation.',care:'1-3 reps per round. Use before sleep, during stress, between sets.'},
  coldshower:{n:'Cold shower',tag:'COLD LITE',c:'#7DD3C0',weekly:5,spec:'Last 30-60s of shower on cold . to shoulders',rounds:[{p:'COLD',s:45}],sets:1,why:'Quick dopamine hit when ice bath isn\'t available. Not as potent but builds tolerance.',care:'Gradual. Start warm, finish cold. Breathe through it.'}
};

/* ═══ guided protocols ═════════════════════════════════════════ */
var PROTOCOLS = {
  morning:{
    n:'Morning Protocol',tag:'EVERY DAY',c:'#D8B24A',mins:18,
    why:'Sunlight anchors circadian rhythm (sets melatonin timer 16h later). Optic flow calms amygdala. Hydration replaces overnight losses. GOATA recodes movement.',
    steps:[
      {n:'Sunlight walk — optic flow, panoramic gaze',mins:10,cue:'Outside, no sunglasses. Forward walking. 10 min minimum, longer on cloudy days. Triggers 50% cortisol pulse increase.'},
      {n:'Hydrate: 500ml water + electrolytes + pinch salt',mins:1,cue:'First drink of the day. Before coffee. Galpin protocol.'},
      {n:'GOATA: Ground hip stretch',mins:2,cue:'45-60s each side. All fours, cross leg, keep Inside Ankle Bone High, head up.'},

/* ═══ khabib ═════════════════════════════════════════════════════ */
function khabib(sore, now){
  var cold = SESSION.end + COLD_GATE;
  var worst = null, worstV = 0;
  Object.keys(sore).forEach(function(k){ if(sore[k]>=2 && sore[k]>worstV){worst=k;worstV=sore[k];} });
  if(SESSION.type==='strength' && SESSION.end && now<cold)
    return {tone:'hot',line:'You lifted '+dur(now-SESSION.end)+' ago. No cold until '+hhmm(cold)+' \u2014 it would cost you the session you just did. Heat or soft tissue instead.'};
  if(MATCH_IN===1 && worst)
    return {tone:'hot',line:REGIONS[worst].n+' is '+SORE[worstV].toLowerCase()+' and you play tomorrow. Soft tissue tonight, nothing that leaves you flat.'};
  if(worst)
    return {tone:'hot',line:REGIONS[worst].n+' is '+SORE[worstV].toLowerCase()+'. Start there. The rest can wait.'};
  return {tone:'good',line:'Nothing angry today. Ten minutes of soft tissue and get on with your life.'};
}

/* ═══ runner state ═══════════════════════════════════════════════ */
var runner = {tool:null,seq:[],idx:0,left:0,on:false,startedAt:null,timer:null};

function startRunner(toolKey){
  var t = TOOLS[toolKey];
  var seq = [];
  for(var s=0;s<t.sets;s++) t.rounds.forEach(function(r){seq.push(r);});
  runner = {tool:toolKey,seq:seq,idx:0,left:seq[0].s,on:false,startedAt:null,timer:null};
  state.run = toolKey;
  render();
}

function tickRunner(){
  if(!runner.on||!runner.seq.length) return;
  if(runner.left<=0){
    if(runner.idx+1>=runner.seq.length){runner.on=false;logRecovery(runner.tool);render();return;}
    runner.idx++;runner.left=runner.seq[runner.idx].s;
  } else {
    runner.left--;
  }
  render();
  runner.timer = setTimeout(tickRunner,1000);
}

function toggleRunner(){
  runner.on=!runner.on;
  if(runner.on){runner.startedAt=Date.now();tickRunner();}
  else{clearTimeout(runner.timer);}
  render();
}

function logRecovery(toolKey){
  if(toolKey!=='sauna'&&toolKey!=='ice'&&toolKey!=='contrast') return;
  var t = TOOLS[toolKey];
  var now = new Date(new Date().toLocaleString('en-US',{timeZone:'Australia/Melbourne'}));
  var dateKey = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  var hh = String(now.getHours()).padStart(2,'0'); var mm = String(now.getMinutes()).padStart(2,'0');
  var log = []; try{log=JSON.parse(localStorage.getItem('recovery-log')||'[]');}catch(e){}
  log.push({date:dateKey,time:hh+':'+mm,type:toolKey,label:t.n});
  localStorage.setItem('recovery-log',JSON.stringify(log));
}

function closeRunner(){
  // Log if the runner was started (had a startedAt timestamp)
  if(runner.startedAt && runner.tool) logRecovery(runner.tool);
  runner.on=false;clearTimeout(runner.timer);
  state.run=null;runner={tool:null,seq:[],idx:0,left:0,on:false,startedAt:null,timer:null};
  render();
}

/* ═══ protocol helpers ═══════════════════════════════════════════ */
function toggleProto(key){
  state.openProto = state.openProto===key ? null : key;
  render();
}
function toggleProtoStep(key,idx){
  var k = key+'-'+idx;
  state.protoDone[k] = !state.protoDone[k];
  render();
}
function getProtoProgress(key){
  var p = PROTOCOLS[key];
  if(!p) return {done:0,total:0};
  var done=0;
  for(var i=0;i<p.steps.length;i++){ if(state.protoDone[key+'-'+i]) done++; }
  return {done:done,total:p.steps.length};
}

/* ═══ figure SVG ═════════════════════════════════════════════════ */
function figSvg(view){
  var body = '<g class="r-body">' +
    '<circle cx="60" cy="20" r="14"/>' +
    '<rect x="55" y="32" width="10" height="8" rx="3"/>' +
    '<rect x="40" y="40" width="40" height="70" rx="12"/>' +
    '<rect x="42" y="108" width="36" height="26" rx="9"/>' +
    '<rect x="24" y="44" width="12" height="62" rx="6"/>' +
    '<rect x="84" y="44" width="12" height="62" rx="6"/>' +
    '<rect x="44" y="132" width="14" height="62" rx="7"/>' +
    '<rect x="62" y="132" width="14" height="62" rx="7"/>' +
    '<rect x="45" y="196" width="12" height="58" rx="6"/>' +
    '<rect x="63" y="196" width="12" height="58" rx="6"/>' +
    '<rect x="43" y="256" width="14" height="9" rx="3"/>' +
    '<rect x="63" y="256" width="14" height="9" rx="3"/></g>';

  var regs = '';
  Object.keys(REGIONS).forEach(function(k){
    var r = REGIONS[k];
    if(r.view!==view) return;
    var s = state.sore[k]||0;
    var cls = 'r-reg'+(state.sel===k?' is-sel':'')+(s?' is-sore':'');
    var circles = r.c.map(function(pt){
      return '<circle cx="'+pt[0]+'" cy="'+pt[1]+'" r="'+pt[2]+'" style="fill:'+SORE_C[s]+';stroke:'+SORE_C[s]+'"/>';
    }).join('');
    regs += '<g class="'+cls+'" data-reg="'+k+'" role="button" tabindex="0" aria-label="'+r.n+' \u2014 '+SORE[s]+'">'+circles+'</g>';
  });

  return '<div class="r-fig"><svg viewBox="0 0 120 300" aria-label="'+view+' view">'+body+regs+'</svg><p class="r-figlab">'+view.toUpperCase()+'</p></div>';
}

/* ═══ render ═════════════════════════════════════════════════════ */
function render(){
  var NOW = getNow();
  var k = khabib(state.sore, NOW);
  var win = buildWindow(SESSION, NOW);
  var coldAt = SESSION.end + COLD_GATE;
  var region = REGIONS[state.sel];
  var h = '';

  // Header
  h += '<header class="r-top"><a href="/" class="r-back">\u2190 Dashboard</a>';
  h += '<h1 class="r-title">Recovery, <em>Sean</em></h1>';
  h += '<p class="r-meta">'+esc(SESSION.name).toUpperCase()+'<i></i>';
  if(SESSION.end) h += 'ENDED '+hhmm(SESSION.end)+'<i></i>';
  h += 'MATCH IN '+MATCH_IN+' DAY</p></header>';

  // Coach
  h += '<section class="r-coach"><div class="r-av"><span>K</span></div><div>';
  h += '<div class="r-cname">KHABIB <em>\u00b7 recovery is not a workout</em></div>';
  h += '<p class="r-clead is-'+k.tone+'">'+esc(k.line)+'</p></div></section>';

  // Brain tip (rotates daily)
  var tip = BRAIN[getMelb().getDay()];
  h += '<div class="r-brain"><span class="r-btag">'+tip.tag+'</span><span class="r-btip">'+esc(tip.tip)+'</span></div>';

  // Work schedule bar
  h += '<div class="r-work">';
  h += '<span class="r-work-tag">WORK</span>';
  h += '<div class="r-work-body">';
  h += '<span>Schedule</span>';
  h += '<input class="r-work-input" type="time" id="workStart" value="'+WORK.start+'">';
  h += '<span>to</span>';
  h += '<input class="r-work-input" type="time" id="workEnd" value="'+WORK.end+'">';
  h += '<button class="r-work-btn'+(WORK.enabled?' is-on':'')+'" id="workToggle">'+(WORK.enabled?'ON':'OFF')+'</button>';
  h += '</div></div>';

  // 01 Window
  h += '<section class="r-block"><header class="r-bh"><div><p class="r-eyebrow">01 \u00b7 TODAY\'S WINDOW</p><h2>When, <em>not what</em></h2></div>';
  if(SESSION.end && SESSION.type==='strength' && NOW<coldAt){
    h += '<div class="r-gate"><b>'+dur(coldAt-NOW)+'</b><span>UNTIL COLD UNLOCKS</span></div>';
  }
  h += '</header><ol class="r-win">';
  win.forEach(function(slot,i){
    var next = win[i+1];
    var blocked = workOverlap(slot.at);
    var st = slot.at && NOW>=slot.at && (!next||NOW<next.at) ? 'now' : (slot.at && NOW>=slot.at ? 'past' : 'next');
    h += '<li class="is-'+st+(slot.lock||blocked?' is-locked':'')+'">';
    h += '<span class="r-bead"></span>';
    h += '<div class="r-wt"><span class="r-wtime">'+(slot.at?hhmm(slot.at):'\u2014')+'</span>';
    h += '<span class="r-wlab">'+esc(slot.label)+(blocked?' \u00b7 WORK':'')+'</span></div>';
    h += '<div class="r-wc">';
    if(blocked){
      h += '<div class="r-work-blocked"><p>You\'re working '+WORK.start+' \u2013 '+WORK.end+'. This window shifts to after work.</p></div>';
    } else {
      h += '<div class="r-chips">';
      slot.tools.forEach(function(t){
        var off = isLocked(t,NOW)||slot.lock;
        h += '<button data-run="'+t+'"'+(off?' disabled':'')+' style="--tc:'+TOOLS[t].c+'"><i></i> '+TOOLS[t].n+'</button>';
      });
      h += '</div><p class="r-wn'+(slot.lock||(st!=='past'&&slot.tools.some(function(t){return isLocked(t,NOW);}))?' is-hot':'')+'">';
      h += esc(slot.note)+'</p>';
    }
    h += '</div></li>';
  });
  h += '</ol></section>';

  // Runner
  if(state.run && runner.seq.length){
    var t = TOOLS[runner.tool];
    var cur = runner.seq[runner.idx];
    var done = runner.idx+1>=runner.seq.length && runner.left<=0;
    var R=40,C=2*Math.PI*R;
    var clock = Math.floor(runner.left/60)+':'+String(runner.left%60).padStart(2,'0');
    h += '<section class="r-runner" style="--tc:'+t.c+'">';
    h += '<svg viewBox="0 0 100 100" class="r-ring"><circle cx="50" cy="50" r="'+R+'" class="r-ring-t"/>';
    h += '<circle cx="50" cy="50" r="'+R+'" class="r-ring-p" stroke-dasharray="'+(C*(1-runner.left/cur.s))+' '+C+'"/></svg>';
    h += '<div class="r-rt"><b>'+(done?'Done':clock)+'</b>';
    h += '<span>'+(done?t.n+' complete':t.n+' \u00b7 '+cur.p+' \u00b7 '+Math.floor(runner.idx/t.rounds.length+1)+' of '+t.sets)+'</span></div>';
    h += '<div class="r-rb">';
    if(!done) h += '<button class="r-go" id="toggleRunner">'+(runner.on?'Pause':'Start')+'</button>';
    h += '<button class="r-ghost" id="closeRunner">Close</button></div></section>';
  }

  // 02 Guided sessions
  var PROTO_ORDER = ['morning','postTraining','postMatch','evening','activeRecovery','fasciaFull','massageBallFull','lymphDrain','saunaGH','mobilityAM'];
  h += '<section class="r-block r-proto"><header class="r-bh"><div><p class="r-eyebrow">02 \u00b7 GUIDED SESSIONS</p>';
  h += '<h2>Full <em>protocols</em></h2></div></header>';
  h += '<div class="r-pgrid">';
  PROTO_ORDER.forEach(function(key){
    var p = PROTOCOLS[key];
    var isOn = state.openProto===key;
    var prog = getProtoProgress(key);
    h += '<div class="r-pc'+(isOn?' is-on':'')+'" data-proto="'+key+'" style="--pc:'+p.c+'">';
    h += '<p class="r-pc-tag">'+p.tag+'</p>';
    h += '<h3 class="r-pc-n">'+esc(p.n)+'</h3>';
    h += '<p class="r-pc-m">'+p.mins+' min'+(prog.done?' \u00b7 '+prog.done+'/'+prog.total+' done':'')+'</p>';
    if(isOn){
      h += '<p class="r-pc-why">'+esc(p.why)+'</p>';
      h += '<div class="r-steps">';
      p.steps.forEach(function(s,i){
        var done = state.protoDone[key+'-'+i];
        h += '<div class="r-step'+(done?' is-done':'')+'">';
        h += '<button class="r-step-i" data-pstep="'+key+'-'+i+'">'+(done?'\u2713':(i+1))+'</button>';
        h += '<div class="r-step-c"><p class="r-step-n">'+esc(s.n)+'</p>';
        h += '<p class="r-step-cue">'+esc(s.cue)+'</p></div>';
        h += '<span class="r-step-t">'+s.mins+'m</span>';
        h += '</div>';
      });
      h += '</div>';
    }
    h += '</div>';
  });
  h += '</div></section>';

  // 03 Body map
  h += '<section class="r-block r-hero"><div class="r-figs">';
  h += '<div class="r-toggle"><button data-view="back" class="'+(state.view==='back'?'is-on':'')+'">BACK</button>';
  h += '<button data-view="front" class="'+(state.view==='front'?'is-on':'')+'">FRONT</button></div>';
  h += figSvg(state.view);
  h += '</div><div class="r-side">';
  h += '<p class="r-eyebrow">03 \u00b7 SELECTED REGION</p>';
  h += '<h2 class="r-rn">'+esc(region.n)+'</h2>';
  h += '<p class="r-lab">How does it feel</p><div class="r-scale">';
  SORE.forEach(function(s,i){
    var sel = (state.sore[state.sel]||0)===i;
    var style = sel ? 'background:'+SORE_C[i]+';border-color:'+SORE_C[i]+';color:#08150F' : '';
    h += '<button data-sore="'+i+'" class="'+(sel?'is-sel':'')+'"'+(style?' style="'+style+'"':'')+'>'+s+'</button>';
  });
  h += '</div><p class="r-lab">What reaches it</p><div class="r-chips">';
  region.tools.forEach(function(t){
    var off = isLocked(t,NOW);
    h += '<button data-run="'+t+'"'+(off?' disabled':'')+' style="--tc:'+TOOLS[t].c+'"><i></i> '+TOOLS[t].n+'</button>';
  });
  h += '</div>';
  if(region.routine){
    h += '<div class="r-routine"><p class="r-routine-h">TARGETED ROUTINE</p>';
    h += '<p class="r-routine-t">'+esc(region.routine)+'</p></div>';
  }
  h += '</div></section>';

  // 03 Report
  var report = Object.keys(HISTORY).map(function(k){
    var d = HISTORY[k];
    var flagged = d.filter(function(v){return v>=2;}).length;
    var trend = d[d.length-1]-d[0];
    return {k:k,d:d,flagged:flagged,trend:trend};
  }).sort(function(a,b){return b.flagged-a.flagged;});

  h += '<section class="r-block"><header class="r-bh"><div><p class="r-eyebrow">04 \u00b7 SEVEN-DAY REPORT</p><h2>The <em>pattern</em></h2></div></header>';
  h += '<table class="r-rep"><thead><tr><th>Region</th>';
  ['M','T','W','T','F','S','S'].forEach(function(d){h+='<th>'+d+'</th>';});
  h += '<th>Flagged</th></tr></thead><tbody>';
  report.forEach(function(r){
    h += '<tr class="'+(state.sel===r.k?'is-sel':'')+'" data-pick="'+r.k+'">';
    h += '<td class="r-rname">'+esc(REGIONS[r.k].n)+'</td>';
    r.d.forEach(function(v){
      h += '<td><span class="r-cell" style="background:'+SORE_C[v]+';opacity:'+(v?0.25+v*0.25:0.1)+'"></span></td>';
    });
    h += '<td class="r-flag"><b class="'+(r.flagged>=4?'is-hot':'')+'">'+r.flagged+'<em>/7</em></b>';
    h += '<i class="'+(r.trend>0?'is-hot':r.trend<0?'is-good':'')+'">'+(r.trend>0?'\u25b2':r.trend<0?'\u25bc':'=')+'</i></td></tr>';
  });
  h += '</tbody></table>';

  if(!report.length){
    h += '<p style="font:400 12px \'Inter\',sans-serif;color:var(--dim);text-align:center;padding:20px 0;">Log soreness on the body map to start tracking patterns.</p>';
  }
  if(report.length){
    var chief = report[0];
    if(chief.flagged>=4){
      h += '<p class="r-insight"><b>'+esc(REGIONS[chief.k].n)+'</b> flagged '+chief.flagged+' of the last 7 days and it hasn\'t improved. That\'s not a recovery problem any more. Book the physio.</p>';
    }
  }
  h += '</section>';


  // Footer
  h += '<footer class="r-foot"><span>NO COLD WITHIN 4H OF STRENGTH WORK \u00b7 FASCIA = 12 WEEKS \u00b7 LYMPH = EVERY DAY</span><span>SAUNA \u00b7 ICE \u00b7 FASCIA \u00b7 MASSAGE \u00b7 LYMPH \u00b7 MORNING \u00b7 EVENING</span></footer>';

  document.getElementById('app').innerHTML = h;
  bindEvents();
}

/* ═══ events ═════════════════════════════════════════════════════ */
function bindEvents(){
  // View toggle
  document.querySelectorAll('[data-view]').forEach(function(btn){
    btn.addEventListener('click',function(){state.view=this.dataset.view;render();});
  });
  // Region pick on figure
  document.querySelectorAll('[data-reg]').forEach(function(g){
    g.addEventListener('click',function(){pick(this.dataset.reg);});
    g.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();pick(this.dataset.reg);}});
  });
  // Report row pick
  document.querySelectorAll('[data-pick]').forEach(function(tr){
    tr.addEventListener('click',function(){pick(this.dataset.pick);});
  });
  // Soreness scale
  document.querySelectorAll('[data-sore]').forEach(function(btn){
    btn.addEventListener('click',function(){
      state.sore[state.sel]=parseInt(this.dataset.sore);
      saveSore(state.sore);render();
    });
  });
  // Run protocol
  document.querySelectorAll('[data-run]').forEach(function(btn){
    btn.addEventListener('click',function(){if(!this.disabled)startRunner(this.dataset.run);});
  });
  // Guided protocols
  document.querySelectorAll('[data-proto]').forEach(function(el){
    el.addEventListener('click',function(e){
      if(e.target.closest('[data-pstep]')) return;
      toggleProto(this.dataset.proto);
    });
  });
  document.querySelectorAll('[data-pstep]').forEach(function(btn){
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      var parts=this.dataset.pstep.split('-');
      var key=parts.slice(0,-1).join('-');
      var idx=parseInt(parts[parts.length-1]);
      toggleProtoStep(key,idx);
    });
  });
  // Runner controls
  var tb = document.getElementById('toggleRunner');
  if(tb) tb.addEventListener('click',toggleRunner);
  var cb = document.getElementById('closeRunner');
  if(cb) cb.addEventListener('click',closeRunner);
  // Work schedule
  var wt = document.getElementById('workToggle');
  if(wt) wt.addEventListener('click',function(){ WORK.enabled=!WORK.enabled; saveWork(WORK); render(); });
  var ws = document.getElementById('workStart');
  if(ws) ws.addEventListener('change',function(){ WORK.start=this.value; saveWork(WORK); render(); });
  var we = document.getElementById('workEnd');
  if(we) we.addEventListener('change',function(){ WORK.end=this.value; saveWork(WORK); render(); });
}

function pick(key){
  state.sel=key;
  state.view=REGIONS[key].view;
  render();
}

/* ═══ init ═══════════════════════════════════════════════════════ */
render();
// Refresh every 60s so cold gate updates live
setInterval(render,60000);

})();
</script>
